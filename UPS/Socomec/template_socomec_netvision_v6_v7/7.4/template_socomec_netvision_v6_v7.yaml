              value: Output
        - uuid: 6e9d0eeb9cd848ea9e0926083dc660ae
          name: 'Output Load'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.4.7.0
