        - uuid: 2c70a14f54d646ae9f29411c76d4ca09
          name: 'Input Frequency'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.3.2.0
          key: upsInputFrequency.0
          history: 7d
