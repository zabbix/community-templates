zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 3dcd5bbe90534f9e8eb5c2d53756af63
      name: Templates/Power
  templates:
    - uuid: 3df1e81088fd486fb8d6c0ba0da24ae9
      template: 'SOCOMEC UPS NetVision v6'
      name: 'SOCOMEC UPS NetVision v6'
      groups:
        - name: Templates/Power
      items:
        - uuid: 76c3eb932f8a4cfb86e124ecf074fca2
          name: 'Ping check'
          type: SIMPLE
          key: icmpping
          delay: 30s
          history: 45d
          trends: 120d
          valuemap:
            name: 'Service state'
          tags:
            - tag: Application
              value: Alarm
          triggers:
            - uuid: a26b288014d7428bbd1a7d0c653a4309
              expression: 'sum(/SOCOMEC UPS NetVision v6/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v6/icmpping,#3)<>3)'
              name: '{HOSTNAME} - Network unavailable'
              priority: HIGH
        - uuid: 702c7626b72d4fd191e4528356a18e8f
          name: 'Alarm - Battery Temperature'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.4555.1.1.1.1.6.3.85
          key: upsAlarmBatteryTemperature.0
          history: 7d
          tags:
            - tag: Application
              value: Alarm
        - uuid: 782c618bd1014923acae0e356d633bf6
          name: 'Alarm - Fan Fault'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.6.3.16.0
          key: upsAlarmFansFailure.0
          history: 7d
          tags:
            - tag: Application
              value: Alarm
        - uuid: 5e76d45019e24fad97f05063fa61de70
          name: 'Alarm - UPS LowBattery'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.4555.1.1.1.1.6.3.3
          key: upsAlarmLowBattery.0
          history: 7d
          tags:
            - tag: Application
              value: Alarm
        - uuid: b64b8c4b89e249d4bd4a558e20f89f54
          name: 'Alarm - UPS OnBattery Power'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.4555.1.1.1.1.6.3.2
          key: upsAlarmOnBattery
          history: 7d
          tags:
            - tag: Application
              value: Alarm
          triggers:
            - uuid: bfc2feb43513419490a0c32857ccd1e9
              expression: 'last(/SOCOMEC UPS NetVision v6/upsAlarmOnBattery)<>0'
              name: '{HOSTNAME} - On Battery Power'
              priority: HIGH
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v6/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v6/icmpping,#3)<>3)'
                - name: '{HOSTNAME} - No Input Power'
                  expression: 'last(/SOCOMEC UPS NetVision v6/upsInputFrequency.0)<45'
        - uuid: e23c1d29a01f4508bb0bc0565fa13fde
          name: 'Alarm - UPS OnBypass'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.6.3.9.0
          key: upsAlarmOnBypass.0
          history: 7d
          tags:
            - tag: Application
              value: Alarm
          triggers:
            - uuid: 27366174b9af4118bdbbb1de15119687
              expression: 'last(/SOCOMEC UPS NetVision v6/upsAlarmOnBypass.0)<>0'
              name: '{HOSTNAME} - OnBypass Mode'
              priority: HIGH
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v6/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v6/icmpping,#3)<>3)'
        - uuid: 5416f5171eb84e87a84fc9fc5776d861
          name: 'Alarm - UPS Overload'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.4555.1.1.1.1.6.3.8
          key: upsAlarmOverload.0
          history: 7d
          tags:
            - tag: Application
              value: Alarm
        - uuid: ee5bfc0487ce429d92ca84c7b592b8a1
          name: 'Ambient Temperature'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.2.7.0
          key: upsAmbientTemperature.0
          history: 7d
          units: °C
          description: '"The ambient temperature inside the UPS in 0.1 degree"'
          tags:
            - tag: Application
              value: Temperature
          triggers:
            - uuid: 858578a59c6945f69445b08501ec7744
              expression: 'avg(/SOCOMEC UPS NetVision v6/upsAmbientTemperature.0,30s)>40'
              name: '{HOSTNAME} - Ambient temperature critical'
              priority: HIGH
              description: 'External Temperature Critical'
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v6/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v6/icmpping,#3)<>3)'
            - uuid: 082133c7f1dc464ebf326194e4109a66
              expression: 'avg(/SOCOMEC UPS NetVision v6/upsAmbientTemperature.0,30s)>37'
              name: '{HOSTNAME} - Ambient temperature High'
              priority: AVERAGE
              description: 'External Temperature High'
              dependencies:
                - name: '{HOSTNAME} - Ambient temperature critical'
                  expression: 'avg(/SOCOMEC UPS NetVision v6/upsAmbientTemperature.0,30s)>40'
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v6/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v6/icmpping,#3)<>3)'
            - uuid: d85eea1f56cf425da657db7df971eff5
              expression: 'avg(/SOCOMEC UPS NetVision v6/upsAmbientTemperature.0,30s)<10'
              name: '{HOSTNAME} - Ambient temperature low'
              priority: AVERAGE
              description: 'External Temperature Low'
              dependencies:
                - name: '{HOSTNAME} - Ambient temperature too low'
                  expression: 'avg(/SOCOMEC UPS NetVision v6/upsAmbientTemperature.0,30s)<5'
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v6/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v6/icmpping,#3)<>3)'
            - uuid: eb13227ef73f48fd96dc97cae6c43bb1
              expression: 'avg(/SOCOMEC UPS NetVision v6/upsAmbientTemperature.0,30s)<5'
              name: '{HOSTNAME} - Ambient temperature too low'
              priority: HIGH
              description: 'External Temperature Too Low'
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v6/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v6/icmpping,#3)<>3)'
        - uuid: de9a5d1ec6cd4941a64bcba45085b70b
          name: 'Battery Status'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.2.1.0
          key: upsBatteryStatus.0
          history: 7d
          valuemap:
            name: 'Socomec - BatteryStatus'
          tags:
            - tag: Application
              value: Battery
          triggers:
            - uuid: 614c361d95634a8aab253fb31fd3a231
              expression: 'last(/SOCOMEC UPS NetVision v6/upsBatteryStatus.0)=1 or last(/SOCOMEC UPS NetVision v6/upsBatteryStatus.0)=8 or last(/SOCOMEC UPS NetVision v6/upsBatteryStatus.0)=9'
              name: '{HOSTNAME} - Battery Error'
              priority: HIGH
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v6/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v6/icmpping,#3)<>3)'
        - uuid: e318eb57f651452a9c672f7711d247b5
          name: 'Battery Voltage'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.2.5.0
          key: upsBatteryVoltage.0
          history: 7d
          units: V
          description: '"The magnitude of the present battery voltage in 0.1 Volt DC."'
          tags:
            - tag: Application
              value: Battery
        - uuid: 51f460423fed4a5b857a8cd6b408d8ab
          name: 'Battery Percent'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.2.4.0
          key: upsEstimatedChargeRemaining.0
          history: 7d
          value_type: FLOAT
          units: '%'
          description: '"An estimate of the battery charge remaining expressed as a percent of full charge."'
          tags:
            - tag: Application
              value: Battery
          triggers:
            - uuid: 94c76e671e5b4338ba0b8a6bb76734e1
              expression: 'last(/SOCOMEC UPS NetVision v6/upsEstimatedChargeRemaining.0)<15'
              name: '{HOSTNAME} - Battery Charge Critical'
              priority: HIGH
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v6/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v6/icmpping,#3)<>3)'
            - uuid: 912f26ca4e114d3fa6085353a64d46b1
              expression: 'last(/SOCOMEC UPS NetVision v6/upsEstimatedChargeRemaining.0)<30'
              name: '{HOSTNAME} - Battery Charge Low'
              priority: AVERAGE
              dependencies:
                - name: '{HOSTNAME} - Battery Charge Critical'
                  expression: 'last(/SOCOMEC UPS NetVision v6/upsEstimatedChargeRemaining.0)<15'
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v6/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v6/icmpping,#3)<>3)'
        - uuid: 96064f99ee224fc6955de0789372257b
          name: 'Firmware Version'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.1.4.0
          key: upsfirmware.0
          delay: 1d
          history: 7d
          value_type: TEXT
          inventory_link: OS
          preprocessing:
            - type: REGEX
              parameters:
                - '^(.*?) \('
                - \1
          tags:
            - tag: Application
              value: Information
        - uuid: 37c18b373cdc41efba233d518a1e7d95
          name: Model
          type: SNMP_AGENT
          snmp_oid: iso.3.6.1.2.1.33.1.1.2.0
          key: upsIdentModel.0
          delay: 1d
          history: 7d
          value_type: TEXT
          inventory_link: MODEL
          tags:
            - tag: Application
              value: Information
        - uuid: 598239a7b65b4c6f8e9e2e94359118f3
          name: 'Serial Number'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.4555.1.1.1.1.1.4.0
          key: upsIdentSerialNumber.0
          delay: 1d
          history: 7d
          value_type: TEXT
          inventory_link: SERIALNO_A
          tags:
            - tag: Application
              value: Information
        - uuid: 7df483ab70e247f9b484ed2bbd5d23b1
          name: 'Input Frequency'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.4555.1.1.1.1.3.2.0
          key: upsInputFrequency.0
          history: 7d
          units: Hz
          description: '"The current input frequency to the UPS system in 0.1 HZ."'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.1'
          tags:
            - tag: Application
              value: Input
          triggers:
            - uuid: e6409ea71c9d4f73a2e9499b1e2ad67f
              expression: 'last(/SOCOMEC UPS NetVision v6/upsInputFrequency.0)<45'
              name: '{HOSTNAME} - No Input Power'
              priority: HIGH
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v6/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v6/icmpping,#3)<>3)'
                - name: '{HOSTNAME} - Output status changed'
                  expression: 'last(/SOCOMEC UPS NetVision v6/upsOutputSource.0)<>3'
        - uuid: d6935ef21940408e87e5a8a17304b588
          name: 'Rectifier Input Voltage'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.3.3.1.3.1
          key: upsInputVoltage.0
          history: 7d
          units: V
          tags:
            - tag: Application
              value: Input
        - uuid: cc392d1970f34c0bb66f248c7064c58b
          name: 'Output Frequency'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.4555.1.1.1.1.4.2.0
          key: upsOutputFrequency.0
          history: 7d
          units: Hz
          description: '"The current output frequency of the UPS system in 0.1 of HZ."'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.1'
          tags:
            - tag: Application
              value: Output
        - uuid: 4a4787cfed1e4393984e984698083776
          name: 'Output Load'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.4.4.1.5.1
          key: upsOutputLoad.0
          history: 7d
          value_type: FLOAT
          units: '%'
          description: '"Output global Load Rate."'
          tags:
            - tag: Application
              value: Output
          triggers:
            - uuid: dbf5b9bc556248a6988df800f5a76304
              expression: 'avg(/SOCOMEC UPS NetVision v6/upsOutputLoad.0,30s)>80'
              name: '{HOSTNAME} - Output overloaded'
              priority: AVERAGE
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v6/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v6/icmpping,#3)<>3)'
        - uuid: 754080d17fbd4f35977fabfe0a850f25
          name: 'Output Status'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.4.1.0
          key: upsOutputSource.0
          history: 7d
          description: '"The present source of output power."'
          valuemap:
            name: 'Socomec - OutputSource'
          tags:
            - tag: Application
              value: Output
          triggers:
            - uuid: a1b59ea59b4d4483b409dfc7111ef9d0
              expression: 'last(/SOCOMEC UPS NetVision v6/upsOutputSource.0)<>3'
              name: '{HOSTNAME} - Output status changed'
              priority: AVERAGE
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v6/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v6/icmpping,#3)<>3)'
        - uuid: 4e2dd2349ba94b5999a558557d84e809
          name: 'Output Voltage'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.4.4.1.2.1
          key: upsOutputVoltage.0
          history: 7d
          units: V
          tags:
            - tag: Application
              value: Output
      macros:
        - macro: '{$SNMP_COMMUNITY}'
      dashboards:
        - uuid: 858ecb61bd7b45e8a5fe44918b7a0008
          name: 'SOCOMEC - UPS Status'
          pages:
            - name: Overview
              widgets:
                - type: item
                  name: 'UPS Model'
                  width: '36'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'UPS Model'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'SOCOMEC UPS NetVision v6'
                        key: upsIdentModel.0
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                - type: item
                  name: Firmware
                  'y': '3'
                  width: '36'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: Firmware
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'SOCOMEC UPS NetVision v6'
                        key: upsfirmware.0
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: show.2
                      value: '4'
                - type: honeycomb
                  name: Alarms
                  'y': '6'
                  width: '72'
                  height: '5'
                  fields:
                    - type: STRING
                      name: items.0
                      value: 'Alarm - *'
                    - type: STRING
                      name: primary_label
                      value: '{ITEM.NAME}'
                    - type: STRING
                      name: reference
                      value: QWAAG
                    - type: INTEGER
                      name: secondary_label_decimal_places
                      value: '0'
                    - type: STRING
                      name: thresholds.0.color
                      value: 069C56
                    - type: STRING
                      name: thresholds.0.threshold
                      value: '0'
                    - type: STRING
                      name: thresholds.1.color
                      value: D3212C
                    - type: STRING
                      name: thresholds.1.threshold
                      value: '1'
                - type: item
                  name: 'Serial Number'
                  x: '36'
                  width: '36'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'Serial Number'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'SOCOMEC UPS NetVision v6'
                        key: upsIdentSerialNumber.0
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                - type: item
                  name: 'Ambiant Temp'
                  x: '36'
                  'y': '3'
                  width: '19'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'Ambiant Temp'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'SOCOMEC UPS NetVision v6'
                        key: upsAmbientTemperature.0
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: show.2
                      value: '4'
                - type: item
                  name: 'Battery Charge'
                  x: '55'
                  'y': '3'
                  width: '17'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: INTEGER
                      name: decimal_places
                      value: '0'
                    - type: STRING
                      name: description
                      value: 'Battery Charge'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'SOCOMEC UPS NetVision v6'
                        key: upsEstimatedChargeRemaining.0
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: show.2
                      value: '4'
            - name: Metrics
              widgets:
                - type: graph
                  width: '72'
                  height: '5'
                  fields:
                    - type: GRAPH
                      name: graphid.0
                      value:
                        host: 'SOCOMEC UPS NetVision v6'
                        name: 'Ambient Temperature'
                    - type: STRING
                      name: reference
                      value: AAAAA
                - type: graph
                  'y': '5'
                  width: '72'
                  height: '5'
                  fields:
                    - type: GRAPH
                      name: graphid.0
                      value:
                        host: 'SOCOMEC UPS NetVision v6'
                        name: 'Output Load'
                    - type: STRING
                      name: reference
                      value: AAAAC
                - type: graph
                  'y': '10'
                  width: '72'
                  height: '5'
                  fields:
                    - type: GRAPH
                      name: graphid.0
                      value:
                        host: 'SOCOMEC UPS NetVision v6'
                        name: 'Battery Charge'
                    - type: STRING
                      name: reference
                      value: AAAAB
      valuemaps:
        - uuid: 99e9f58e519547788c847c9e5ffe6e1c
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: Down
            - value: '1'
              newvalue: Up
        - uuid: 920ca59ca34a4f3c9cd845d9ed76bd61
          name: 'Socomec - BatteryStatus'
          mappings:
            - value: '1'
              newvalue: unknown
            - value: '2'
              newvalue: batteryNormal
            - value: '3'
              newvalue: batteryCharging
            - value: '4'
              newvalue: batteryTest
            - value: '5'
              newvalue: batteryDischarging
            - value: '6'
              newvalue: batteryLow
            - value: '7'
              newvalue: batteryDepleted
            - value: '8'
              newvalue: batteryFailure
            - value: '9'
              newvalue: batteryDisconnected
        - uuid: d0b017e189f84dbfa5bf59a67f9a600a
          name: 'Socomec - OutputSource'
          mappings:
            - value: '1'
              newvalue: unknown
            - value: '2'
              newvalue: onMaintenBypass
            - value: '3'
              newvalue: onInverter
            - value: '4'
              newvalue: normalMode
            - value: '5'
              newvalue: ecoMode
            - value: '6'
              newvalue: onBypass
            - value: '7'
              newvalue: standby
            - value: '8'
              newvalue: upsOff
    - uuid: 1cd45808e69d419db54ab24948e4a491
      template: 'SOCOMEC UPS NetVision v7'
      name: 'SOCOMEC UPS NetVision v7'
      description: |
        ## Overview
        
        This templase include some info and trigger such as:
        
        
        - Battery
        
        
        - Temperature
        
        
        - Output
        
        
        - Alarms
        
        
         
        
        
        You just edit the SNMP\_COMMUNITY value into the template
        
        
        
        ## Author
        
        diablofight89
      groups:
        - name: Templates/Power
      items:
        - uuid: 24341d52d6b9467181e3cd83ecc28b7d
          name: 'Ping check'
          type: SIMPLE
          key: icmpping
          delay: 30s
          history: 45d
          trends: 120d
          valuemap:
            name: 'Service state'
          tags:
            - tag: Application
              value: Alarm
          triggers:
            - uuid: 10e324b0322c455c9d873db210e6e06a
              expression: 'sum(/SOCOMEC UPS NetVision v7/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v7/icmpping,#3)<>3)'
              name: '{HOSTNAME} - Network unavailable'
              priority: HIGH
        - uuid: ddee7c3479354ab69327b7825ee25198
          name: 'Alarm - Battery Temperature'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.6.3.16.0
          key: upsAlarmBatteryTemperature.0
          history: 7d
          description: '"Battery Temperature Alarm. (A020)"'
          tags:
            - tag: Application
              value: Alarm
        - uuid: ba54e1c35df44debaa884dfebca9e09f
          name: 'Alarm - Fan Fault'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.6.3.32.0
          key: upsAlarmFansFailure.0
          history: 7d
          description: '"Fans failure. (A054)"'
          tags:
            - tag: Application
              value: Alarm
          triggers:
            - uuid: db73c9b8793e40488a59c44df7358dfb
              expression: 'last(/SOCOMEC UPS NetVision v7/upsAlarmFansFailure.0)<>0'
              name: '{HOSTNAME} - Fan Fault'
              priority: AVERAGE
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v7/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v7/icmpping,#3)<>3)'
        - uuid: d5b8269c8fce4481b25db576b1503704
          name: 'Alarm - UPS LowBattery'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.6.3.14.0
          key: upsAlarmLowBattery.0
          history: 7d
          description: '"The remaining battery run-time is less than or equal to battery low threshold. (A018)"'
          tags:
            - tag: Application
              value: Alarm
        - uuid: e4e4d8830bf848e0af247012ffc7e41b
          name: 'Alarm - UPS OnBattery Power'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.6.3.15.0
          key: upsAlarmOnBattery
          history: 7d
          description: '"The UPS is drawing power from the batteries. (A019)"'
          tags:
            - tag: Application
              value: Alarm
          triggers:
            - uuid: 48542207fede426aa489c977c9f7c6bd
              expression: 'last(/SOCOMEC UPS NetVision v7/upsAlarmOnBattery)<>0'
              name: '{HOSTNAME} - On Battery Power'
              priority: HIGH
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v7/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v7/icmpping,#3)<>3)'
                - name: '{HOSTNAME} - No Input Power'
                  expression: 'last(/SOCOMEC UPS NetVision v7/upsInputFrequency.0)<45'
        - uuid: 2cc59e29b77c48ca936d150331b91fbb
          name: 'Alarm - UPS OnBypass'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.6.3.55.0
          key: upsAlarmOnBypass.0
          history: 7d
          description: |
            "Load supplied by automatic bypass.
             Load not protected."
          tags:
            - tag: Application
              value: Alarm
          triggers:
            - uuid: 0202ef22cc444c2c91921a1693491cab
              expression: 'last(/SOCOMEC UPS NetVision v7/upsAlarmOnBypass.0)<>0'
              name: '{HOSTNAME} - OnBypass Mode'
              priority: AVERAGE
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v7/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v7/icmpping,#3)<>3)'
        - uuid: 3b6fc3fb02dc4e45bba1c2fe9552f4bf
          name: 'Alarm - UPS Overload'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.6.3.2.0
          key: upsAlarmOverload.0
          history: 7d
          description: '"The output load exceeds the UPS output capacity. (A001)"'
          tags:
            - tag: Application
              value: Alarm
        - uuid: 9856a3447b294e77ad59d993737fc635
          name: 'Alarm Present Quantity'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.6.1.0
          key: upsAlarmsPresent.0
          history: 7d
          description: '"The present number of active alarm conditions."'
          tags:
            - tag: Application
              value: Alarm
          triggers:
            - uuid: b157fdc61b3944e993c61d8e895232cb
              expression: 'last(/SOCOMEC UPS NetVision v7/upsAlarmsPresent.0)<>0'
              name: '{HOSTNAME} - Active Alarms'
              priority: HIGH
              description: 'Check on the UPS the issue'
              dependencies:
                - name: '{HOSTNAME} - Ambient temperature critical'
                  expression: 'avg(/SOCOMEC UPS NetVision v7/upsAmbientTemperature.0,30s)>40'
                - name: '{HOSTNAME} - Ambient temperature High'
                  expression: 'avg(/SOCOMEC UPS NetVision v7/upsAmbientTemperature.0,30s)>37'
                - name: '{HOSTNAME} - Ambient temperature low'
                  expression: 'avg(/SOCOMEC UPS NetVision v7/upsAmbientTemperature.0,30s)<10'
                - name: '{HOSTNAME} - Ambient temperature too low'
                  expression: 'avg(/SOCOMEC UPS NetVision v7/upsAmbientTemperature.0,30s)<5'
                - name: '{HOSTNAME} - Battery Charge Critical'
                  expression: 'last(/SOCOMEC UPS NetVision v7/upsEstimatedChargeRemaining.0)<15'
                - name: '{HOSTNAME} - Battery Charge Low'
                  expression: 'last(/SOCOMEC UPS NetVision v7/upsEstimatedChargeRemaining.0)<30'
                - name: '{HOSTNAME} - Battery Error'
                  expression: 'last(/SOCOMEC UPS NetVision v7/upsBatteryStatus.0)=1 or last(/SOCOMEC UPS NetVision v7/upsBatteryStatus.0)=8 or last(/SOCOMEC UPS NetVision v7/upsBatteryStatus.0)=9'
                - name: '{HOSTNAME} - Fan Fault'
                  expression: 'last(/SOCOMEC UPS NetVision v7/upsAlarmFansFailure.0)<>0'
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v7/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v7/icmpping,#3)<>3)'
                - name: '{HOSTNAME} - No Input Power'
                  expression: 'last(/SOCOMEC UPS NetVision v7/upsInputFrequency.0)<45'
                - name: '{HOSTNAME} - On Battery Power'
                  expression: 'last(/SOCOMEC UPS NetVision v7/upsAlarmOnBattery)<>0'
                - name: '{HOSTNAME} - OnBypass Mode'
                  expression: 'last(/SOCOMEC UPS NetVision v7/upsAlarmOnBypass.0)<>0'
                - name: '{HOSTNAME} - Output overloaded'
                  expression: 'avg(/SOCOMEC UPS NetVision v7/upsOutputLoadRate.0,30s)>80'
        - uuid: 364be1a081ba412f902fa40a9e4b93a2
          name: 'Ambient Temperature'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.2.7.0
          key: upsAmbientTemperature.0
          history: 7d
          units: °C
          description: '"The ambient temperature inside the UPS in 0.1 degree"'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.1'
          tags:
            - tag: Application
              value: Temperature
          triggers:
            - uuid: 993f2e06d1374281934cf4a0bb2123d1
              expression: 'avg(/SOCOMEC UPS NetVision v7/upsAmbientTemperature.0,30s)>40'
              name: '{HOSTNAME} - Ambient temperature critical'
              priority: HIGH
              description: 'External Temperature Critical'
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v7/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v7/icmpping,#3)<>3)'
            - uuid: 722324272a9a4139ae2bb95d2edfbece
              expression: 'avg(/SOCOMEC UPS NetVision v7/upsAmbientTemperature.0,30s)>37'
              name: '{HOSTNAME} - Ambient temperature High'
              priority: AVERAGE
              description: 'External Temperature High'
              dependencies:
                - name: '{HOSTNAME} - Ambient temperature critical'
                  expression: 'avg(/SOCOMEC UPS NetVision v7/upsAmbientTemperature.0,30s)>40'
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v7/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v7/icmpping,#3)<>3)'
            - uuid: e803c91afdbc4cc09bd94987dabc6d69
              expression: 'avg(/SOCOMEC UPS NetVision v7/upsAmbientTemperature.0,30s)<10'
              name: '{HOSTNAME} - Ambient temperature low'
              priority: AVERAGE
              description: 'External Temperature Low'
              dependencies:
                - name: '{HOSTNAME} - Ambient temperature too low'
                  expression: 'avg(/SOCOMEC UPS NetVision v7/upsAmbientTemperature.0,30s)<5'
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v7/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v7/icmpping,#3)<>3)'
            - uuid: ad3d6061ce9f4d72bb276e42742140af
              expression: 'avg(/SOCOMEC UPS NetVision v7/upsAmbientTemperature.0,30s)<5'
              name: '{HOSTNAME} - Ambient temperature too low'
              priority: HIGH
              description: 'External Temperature Too Low'
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v7/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v7/icmpping,#3)<>3)'
        - uuid: b26e35ebd71d413a8bed681748a6b252
          name: 'Battery Status'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.2.1.0
          key: upsBatteryStatus.0
          history: 7d
          description: '"The present battery status"'
          valuemap:
            name: 'Socomec - BatteryStatus'
          tags:
            - tag: Application
              value: Battery
          triggers:
            - uuid: 0b8f3ed78b4f4c7a9e0a4335e19ea406
              expression: 'last(/SOCOMEC UPS NetVision v7/upsBatteryStatus.0)=1 or last(/SOCOMEC UPS NetVision v7/upsBatteryStatus.0)=8 or last(/SOCOMEC UPS NetVision v7/upsBatteryStatus.0)=9'
              name: '{HOSTNAME} - Battery Error'
              priority: HIGH
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v7/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v7/icmpping,#3)<>3)'
        - uuid: 5edc782b24f24a489a3a2cfa3275b556
          name: 'Battery Voltage'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.2.5.0
          key: upsBatteryVoltage.0
          history: 7d
          units: V
          description: '"The magnitude of the present battery voltage in 0.1 Volt DC."'
          tags:
            - tag: Application
              value: Battery
        - uuid: 3124a02591394c33bdd475cbc5d526f3
          name: 'Battery Percent'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.2.4.0
          key: upsEstimatedChargeRemaining.0
          history: 7d
          value_type: FLOAT
          units: '%'
          description: '"An estimate of the battery charge remaining expressed as a percent of full charge."'
          tags:
            - tag: Application
              value: Battery
          triggers:
            - uuid: 5fa1919fbe05491497bfe42b9769c2d7
              expression: 'last(/SOCOMEC UPS NetVision v7/upsEstimatedChargeRemaining.0)<15'
              name: '{HOSTNAME} - Battery Charge Critical'
              priority: HIGH
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v7/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v7/icmpping,#3)<>3)'
            - uuid: 05726acd77b14968bf124921af5097aa
              expression: 'last(/SOCOMEC UPS NetVision v7/upsEstimatedChargeRemaining.0)<30'
              name: '{HOSTNAME} - Battery Charge Low'
              priority: AVERAGE
              dependencies:
                - name: '{HOSTNAME} - Battery Charge Critical'
                  expression: 'last(/SOCOMEC UPS NetVision v7/upsEstimatedChargeRemaining.0)<15'
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/SOCOMEC UPS NetVision v7/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/SOCOMEC UPS NetVision v7/icmpping,#3)<>3)'
        - uuid: 422c697daf8a49d98b90a8ff49ac79b6
          name: 'Battery Time Remaining'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.4555.1.1.7.1.2.3.0
          key: upsEstimatedMinutesRemaining.0
