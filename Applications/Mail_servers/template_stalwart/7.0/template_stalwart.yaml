zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
  templates:
    - uuid: 785f69f5432c405a861e759a3a3b91f6
      template: Stalwart
      name: Stalwart
      groups:
        - name: Templates/Applications
      items:
        - uuid: 7f4ad6f59e3e4ade876a8e489b43ea4a
          name: 'FoundationDB Process'
          type: ZABBIX_ACTIVE
          key: 'proc.num[,,,fdbserver]'
          delay: 60s
          description: 'Number of running FoundationDB processes. Value >0 means FoundationDB is detected as the database backend.'
          valuemap:
            name: 'Service Status'
          tags:
            - tag: database
            - tag: discovery
          triggers:
            - uuid: 73673cd1a55745a4be7e994de2436482
              expression: 'last(/Stalwart/proc.num[,,,fdbserver])=0 and max(/Stalwart/proc.num[,,,fdbserver],3600s)>0'
              name: 'FoundationDB is down'
              priority: HIGH
              description: 'FoundationDB was previously detected but is no longer running.'
              dependencies:
                - name: 'Stalwart process not running'
                  expression: 'last(/Stalwart/proc.num[,,,stalwart])=0'
              tags:
                - tag: database
                  value: foundationdb
                - tag: scope
                  value: availability
        - uuid: d2983452b9f04600b0de69a7260ae936
          name: 'MySQL/MariaDB Process'
          type: ZABBIX_ACTIVE
          key: 'proc.num[,,,mysqld]'
