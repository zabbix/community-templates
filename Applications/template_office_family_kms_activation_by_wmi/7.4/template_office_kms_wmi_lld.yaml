zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 8f7f6db7e8c54c6ba7b50b1444dd0a11
      name: Templates
  templates:
    - uuid: 6f8a0c5ddf154a80996e26a6c3c91001
      template: 'Template Office Family KMS WMI LLD'
      name: 'Template Office Family KMS WMI LLD'
      description: |
        Office family activation monitoring through WMI.
        
        Covers products discovered by Name LIKE '%Office%'.
        In many environments this includes:
        - Office ProPlus
        - Visio
        - Project
        
        Data model:
        - Regular master item via wmi.getall[] on SoftwareLicensingProduct
        - Dependent LLD discovery rule fed from the master JSON item
        - Dependent item prototypes for days/minutes/status/name
        
        Recommended agent setting on monitored hosts:
        Timeout=10
      groups:
        - name: Templates
      items:
        - uuid: 7bc8c8568bb1484db1782de99a4e1002
          name: 'Office family activation raw JSON (WMI)'
          key: 'wmi.getall[root\cimv2,"SELECT ID,Name,LicenseStatus,GracePeriodRemaining FROM SoftwareLicensingProduct WHERE PartialProductKey IS NOT NULL AND Name LIKE ''%Office%''"]'
          delay: 1h
          history: 7d
          value_type: TEXT
          timeout: 30s
      discovery_rules:
        - uuid: 3ba2e7a97cbe46fc9faf97dfdfc22003
          name: 'Office family activation discovery'
          type: DEPENDENT
          key: office.family.activation.discovery
          item_prototypes:
            - uuid: 5e86f620cad14af5bd808c35f96f1004
              name: '{#LICENSENAME}: Days until activation expiry'
              type: DEPENDENT
              key: 'office.family.license.days[{#LICENSEID}]'
              history: 30d
              value_type: FLOAT
              trends: 36d
              units: d
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.ID == ''{#LICENSEID}'')].GracePeriodRemaining.first()'
                - type: MULTIPLIER
                  parameters:
                    - '0.000694444444'
              master_item:
                key: 'wmi.getall[root\cimv2,"SELECT ID,Name,LicenseStatus,GracePeriodRemaining FROM SoftwareLicensingProduct WHERE PartialProductKey IS NOT NULL AND Name LIKE ''%Office%''"]'
              trigger_prototypes:
                - uuid: cbc4ea9b4cf84dc4b85c8dca15131005
                  expression: 'last(/Template Office Family KMS WMI LLD/office.family.license.days[{#LICENSEID}])<{$OFFICEFAMILY.KMS.CRIT.DAYS}'
                  name: '{#LICENSENAME}: activation expires in <{$OFFICEFAMILY.KMS.CRIT.DAYS} days'
                  priority: HIGH
                - uuid: aa77558c035347bdafe0cbb40ca91006
                  expression: 'last(/Template Office Family KMS WMI LLD/office.family.license.days[{#LICENSEID}])<{$OFFICEFAMILY.KMS.WARN.DAYS}'
                  name: '{#LICENSENAME}: activation expires in <{$OFFICEFAMILY.KMS.WARN.DAYS} days'
                  priority: WARNING
            - uuid: b759c6789db84bf9b64708026ee81007
              name: '_INTERNAL_: {#LICENSENAME}: Grace minutes'
              type: DEPENDENT
              key: 'office.family.license.minutes[{#LICENSEID}]'
              history: '0'
              value_type: FLOAT
              trends: '0'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.ID == ''{#LICENSEID}'')].GracePeriodRemaining.first()'
              master_item:
                key: 'wmi.getall[root\cimv2,"SELECT ID,Name,LicenseStatus,GracePeriodRemaining FROM SoftwareLicensingProduct WHERE PartialProductKey IS NOT NULL AND Name LIKE ''%Office%''"]'
            - uuid: 8ee11441f9dc4529b99dc485efea1010
              name: '{#LICENSENAME}: Product name'
              type: DEPENDENT
              key: 'office.family.license.name[{#LICENSEID}]'
              history: 30d
              value_type: TEXT
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.ID == ''{#LICENSEID}'')].Name.first()'
              master_item:
                key: 'wmi.getall[root\cimv2,"SELECT ID,Name,LicenseStatus,GracePeriodRemaining FROM SoftwareLicensingProduct WHERE PartialProductKey IS NOT NULL AND Name LIKE ''%Office%''"]'
            - uuid: 1c9ed95f1b1d4d51a71c22ff3d441008
              name: '{#LICENSENAME}: License status code'
              type: DEPENDENT
              key: 'office.family.license.status[{#LICENSEID}]'
              history: 30d
              value_type: FLOAT
              trends: '0'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.ID == ''{#LICENSEID}'')].LicenseStatus.first()'
              master_item:
                key: 'wmi.getall[root\cimv2,"SELECT ID,Name,LicenseStatus,GracePeriodRemaining FROM SoftwareLicensingProduct WHERE PartialProductKey IS NOT NULL AND Name LIKE ''%Office%''"]'
              trigger_prototypes:
                - uuid: 21969d221ab649d8bca41d31435f1009
                  expression: 'last(/Template Office Family KMS WMI LLD/office.family.license.status[{#LICENSEID}])<>1'
                  name: '{#LICENSENAME}: license is not in Licensed state'
                  priority: AVERAGE
          master_item:
            key: 'wmi.getall[root\cimv2,"SELECT ID,Name,LicenseStatus,GracePeriodRemaining FROM SoftwareLicensingProduct WHERE PartialProductKey IS NOT NULL AND Name LIKE ''%Office%''"]'
          lld_macro_paths:
            - lld_macro: '{#LICENSEID}'
              path: $.ID
            - lld_macro: '{#LICENSENAME}'
              path: $.Name
      macros:
        - macro: '{$OFFICEFAMILY.KMS.CRIT.DAYS}'
          value: '7'
          description: 'Critical threshold for Office family activation expiration, in days.'
        - macro: '{$OFFICEFAMILY.KMS.WARN.DAYS}'
          value: '30'
          description: 'Warning threshold for Office family activation expiration, in days.'
