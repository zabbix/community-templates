      name: Hiddify Status Map
      mappings:
      - value: '1'
        newvalue: active
      - value: '0'
        newvalue: down
    description: 'Reusable community template for monitoring Hiddify Manager VPN nodes with Zabbix 7.4.


      Monitoring method:

      - Zabbix Agent 2 items for Linux/systemd/process/filesystem checks

      - HTTP agent master item with dependent items for Hiddify API telemetry

      - Native Zabbix web scenario for Hiddify panel availability


      Tested with:

      - Zabbix Server 7.4

      - Zabbix Agent 2

      - Ubuntu / Debian node running Hiddify Manager


      Community repository note:

      This export keeps the web scenario itself, but does not reference generated web monitoring items in triggers, graphs,
      or dashboard widgets. This avoids import validation issues on a clean Zabbix instance.


      Author: TyranR'
