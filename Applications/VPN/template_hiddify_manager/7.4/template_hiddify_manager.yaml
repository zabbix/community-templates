zabbix_export:
  version: '7.4'
  template_groups:
  - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
    name: Templates/Applications
  templates:
  - uuid: 6beb622f3ec649dc8529b0be4ae03b96
    template: Hiddify Manager
    name: Hiddify Manager
    vendor:
      name: TyranR
      version: '2.0'
    groups:
    - name: Templates/Applications
    items:
    - uuid: ab413bbf1fbd42419d73fd93a8b10e74
      name: 'Hiddify: Total Network Bytes Received'
      type: DEPENDENT
      key: hiddify.api.net.bytes.recv.total
      units: B
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.system.bytes_recv_cumulative
      master_item:
        key: hiddify.api.status
    - uuid: c03a1054afd54bab9a039eb36b2eceb4
      name: 'Hiddify: Total Network Bytes Sent'
      type: DEPENDENT
      key: hiddify.api.net.bytes.sent.total
      units: B
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.system.bytes_sent_cumulative
      master_item:
        key: hiddify.api.status
    - uuid: 4bc08f000cc241819388a6d1d995aaee
      name: 'Hiddify: Network Download Speed'
      type: DEPENDENT
      key: hiddify.api.net.download
      units: Bps
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.system.bytes_recv
      - type: CHANGE_PER_SECOND
      master_item:
        key: hiddify.api.status
    - uuid: 6a552550317e43849a3c6e595d104bc1
      name: 'Hiddify: Network Upload Speed'
      type: DEPENDENT
      key: hiddify.api.net.upload
      units: Bps
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.system.bytes_sent
      - type: CHANGE_PER_SECOND
      master_item:
        key: hiddify.api.status
    - uuid: e7c7716195dc4729b3e19b7e39f8b38a
      name: 'Hiddify: Online Users'
      type: DEPENDENT
      key: hiddify.api.online_users
      units: users
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.usage_history.m5.online
      master_item:
        key: hiddify.api.status
    - uuid: 997ce23223584b5ebae7fd6212f45930
      name: 'Hiddify: RAM Usage (Singbox Core)'
      type: DEPENDENT
      key: hiddify.api.proc.ram.core
      value_type: FLOAT
      units: B
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.top5.ram
      - type: JAVASCRIPT
        parameters:
        - "var data = JSON.parse(value);\nvar result = 0;\nfor (var i = 0; i < data.length; i++) {\n    if (data[i][0] ===\
          \ 'hiddify-core') { result = data[i][1] * 1024 * 1024 * 1024; break; }\n}\nreturn result;\n"
      master_item:
        key: hiddify.api.status
    - uuid: e673075862e6490395311b1f788b108c
      name: 'Hiddify: RAM Usage (HAProxy)'
      type: DEPENDENT
      key: hiddify.api.proc.ram.haproxy
      value_type: FLOAT
      units: B
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.top5.ram
      - type: JAVASCRIPT
        parameters:
        - "var data = JSON.parse(value);\nvar result = 0;\nfor (var i = 0; i < data.length; i++) {\n    if (data[i][0].toLowerCase()\
          \ === 'haproxy') {\n        result = data[i][1] * 1024 * 1024 * 1024; \n        break;\n    }\n}\nreturn result;\n"
      master_item:
        key: hiddify.api.status
    - uuid: a6641928891a4578aeb6177f442e5e6f
      name: 'Hiddify: RAM Usage (Panel)'
      type: DEPENDENT
      key: hiddify.api.proc.ram.panel
      value_type: FLOAT
      units: B
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.top5.ram
      - type: JAVASCRIPT
        parameters:
        - "var data = JSON.parse(value);\nvar result = 0;\nfor (var i = 0; i < data.length; i++) {\n    if (data[i][0] ===\
          \ 'Hiddify') { result = data[i][1] * 1024 * 1024 * 1024; break; }\n}\nreturn result;\n"
      master_item:
        key: hiddify.api.status
    - uuid: a7c7116bb9104e819ed60d44a936b70a
      name: 'Hiddify: RAM Usage (Xray)'
      type: DEPENDENT
      key: hiddify.api.proc.ram.xray
      value_type: FLOAT
      units: B
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.top5.ram
      - type: JAVASCRIPT
        parameters:
        - "var data = JSON.parse(value);\nvar result = 0;\nfor (var i = 0; i < data.length; i++) {\n    if (data[i][0] ===\
          \ 'xray') { result = data[i][1] * 1024 * 1024 * 1024; break; }\n}\nreturn result;\n"
      master_item:
        key: hiddify.api.status
    - uuid: 5c9f66064c1d439ba09ee95c540b756e
      name: 'Hiddify: Get API Status JSON'
      type: HTTP_AGENT
      key: hiddify.api.status
      value_type: TEXT
      url: https://{$HIDDIFY.DOMAIN}/{$HIDDIFY.PROXY.PATH}/api/v2/admin/server_status/
      headers:
      - name: Hiddify-API-Key
        value: '{$HIDDIFY.USER.UUID}'
      - name: Accept
        value: application/json
    - uuid: bd8719bf3f1e4278a18a0198c0fb2529
      name: 'Hiddify: Total Active Connections'
      type: DEPENDENT
      key: hiddify.api.sys.connections
      units: connections
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.system.total_connections
      master_item:
        key: hiddify.api.status
    - uuid: 10c8016c083a48e59d6bf0697e131273
      name: 'Hiddify: VPS CPU Utilization'
      type: DEPENDENT
      key: hiddify.api.sys.cpu
      value_type: FLOAT
      units: '%'
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.system.cpu_percent
      master_item:
        key: hiddify.api.status
    - uuid: 16a0cd4fa5f54b86920d5e446f149458
      name: 'Hiddify: Manager Directory Size'
      type: DEPENDENT
      key: hiddify.api.sys.dir.size
      value_type: FLOAT
      units: G
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.system.hiddify_used
      - type: JAVASCRIPT
        parameters:
        - return Number(value).toFixed(2);
      master_item:
        key: hiddify.api.status
    - uuid: b694508b6d7a45238c9b0527a623bcb1
      name: 'Hiddify: VPS Disk Total'
      type: DEPENDENT
      key: hiddify.api.sys.disk.total
      value_type: FLOAT
      units: G
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.system.disk_total
      - type: JAVASCRIPT
        parameters:
        - return Number(value).toFixed(2);
      master_item:
        key: hiddify.api.status
    - uuid: 17859ce8aae84b8d9c6bd17f63ed5466
      name: 'Hiddify: VPS Disk Used'
      type: DEPENDENT
      key: hiddify.api.sys.disk.used
      value_type: FLOAT
      units: G
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.system.disk_used
      - type: JAVASCRIPT
        parameters:
        - return Number(value).toFixed(2);
      master_item:
        key: hiddify.api.status
    - uuid: 08e1dc538cd4432aa38bcbffa723e56d
      name: 'Hiddify: VPS RAM Total'
      type: DEPENDENT
      key: hiddify.api.sys.ram.total
      value_type: FLOAT
      units: B
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.system.ram_total
      - type: JAVASCRIPT
        parameters:
        - return (parseFloat(value) * 1073741824).toFixed(0);
      master_item:
        key: hiddify.api.status
    - uuid: fbd90781446544f083676fbfe737c2d5
      name: 'Hiddify: VPS RAM Used'
      type: DEPENDENT
      key: hiddify.api.sys.ram.used
      value_type: FLOAT
      units: B
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.system.ram_used
      - type: JAVASCRIPT
        parameters:
        - return (parseFloat(value) * 1073741824).toFixed(0);
      master_item:
        key: hiddify.api.status
    - uuid: e56298cc0c1846f3815f143cd13dfc9c
      name: 'Hiddify: Total Unique IPs'
      type: DEPENDENT
      key: hiddify.api.sys.unique_ips
      units: ips
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.stats.system.total_unique_ips
      master_item:
        key: hiddify.api.status
    - uuid: fbec82a9fa324d48b96627776a6661bb
      name: 'Hiddify: Traffic Used Monthly'
      type: DEPENDENT
      key: hiddify.api.traffic.monthly
      units: B
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.usage_history.last_30_days.usage
      master_item:
        key: hiddify.api.status
    - uuid: 29b6b60cc53e4f35818ddb5b8df4aac8
      name: 'Hiddify: Traffic Used Today'
      type: DEPENDENT
      key: hiddify.api.traffic.today
      units: B
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.usage_history.today.usage
      master_item:
        key: hiddify.api.status
    - uuid: 64863d702dc74d2c89b68c8990f86500
      name: 'Hiddify: Total Traffic Used All Time'
      type: DEPENDENT
      key: hiddify.api.traffic.total
      units: B
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.usage_history.total.usage
      master_item:
        key: hiddify.api.status
    - uuid: c4e13f99b65c4ed8abac346cfa78f961
      name: 'Hiddify: Traffic Used Yesterday'
      type: DEPENDENT
      key: hiddify.api.traffic.yesterday
      units: B
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.usage_history.yesterday.usage
      master_item:
        key: hiddify.api.status
    - uuid: 7a657dea14b34482bbeea839de19f3d6
      name: 'Hiddify: Active Users Monthly'
      type: DEPENDENT
      key: hiddify.api.users.monthly
      units: users
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.usage_history.last_30_days.online
      master_item:
        key: hiddify.api.status
    - uuid: 5791a6205b76441a86a9a936d67bfa24
      name: 'Hiddify: Active Users Today'
      type: DEPENDENT
      key: hiddify.api.users.today
      units: users
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.usage_history.today.online
      master_item:
        key: hiddify.api.status
    - uuid: 907ef098902f4f309123a2d2375c9603
      name: 'Hiddify: Total Active Users All Time'
      type: DEPENDENT
      key: hiddify.api.users.total
      units: users
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.usage_history.total.online
      master_item:
        key: hiddify.api.status
    - uuid: 0be8db18b3af4227a85feb4e8270c06a
      name: 'Hiddify: Active Users Yesterday'
      type: DEPENDENT
      key: hiddify.api.users.yesterday
      units: users
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.usage_history.yesterday.online
      master_item:
        key: hiddify.api.status
    - uuid: 941a2ea2914d49458d04e14f0ccf2957
      name: 'Hiddify: Service HAProxy (For Dashboard)'
      type: DEPENDENT
      key: hiddify.service.haproxy.numeric
      valuemap:
        name: Hiddify Status Map
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'return (value.trim() === ''active'') ? 1 : 0;'
      master_item:
        key: systemd.unit.info[hiddify-haproxy.service,ActiveState]
    - uuid: 3131b5f9367f4653bc436c447a254723
      name: 'Hiddify: Service Nginx (For Dashboard)'
      type: DEPENDENT
      key: hiddify.service.nginx.numeric
      valuemap:
        name: Hiddify Status Map
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'return (value.trim() === ''active'') ? 1 : 0;'
      master_item:
        key: systemd.unit.info[hiddify-nginx.service,ActiveState]
    - uuid: b235770ac8794c7295d3657cf713e2e3
      name: 'Hiddify: Service Panel (For Dashboard)'
      type: DEPENDENT
      key: hiddify.service.panel.numeric
      valuemap:
        name: Hiddify Status Map
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'return (value.trim() === ''active'') ? 1 : 0;'
      master_item:
        key: systemd.unit.info[hiddify-panel.service,ActiveState]
    - uuid: fb633db4e5974416b65332caf775f745
      name: 'Hiddify: Service Redis (For Dashboard)'
      type: DEPENDENT
      key: hiddify.service.redis.numeric
      valuemap:
        name: Hiddify Status Map
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'return (value.trim() === ''active'') ? 1 : 0;'
      master_item:
        key: systemd.unit.info[hiddify-redis.service,ActiveState]
    - uuid: 5cf4f983ac1c44e1ab212ccabf974f23
      name: 'Hiddify: Service Singbox (For Dashboard)'
      type: DEPENDENT
      key: hiddify.service.singbox.numeric
      valuemap:
        name: Hiddify Status Map
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'return (value.trim() === ''active'') ? 1 : 0;'
      master_item:
        key: systemd.unit.info[hiddify-singbox.service,ActiveState]
    - uuid: 19a395145cc84753b50406edc334e11c
      name: 'Hiddify: Service Xray (For Dashboard)'
      type: DEPENDENT
      key: hiddify.service.xray.numeric
      valuemap:
        name: Hiddify Status Map
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'return (value.trim() === ''active'') ? 1 : 0;'
      master_item:
        key: systemd.unit.info[hiddify-xray.service,ActiveState]
    - uuid: 37e0e2a08bed4815b6e7b66dbc87769e
      name: 'Hiddify: Port 443 Reality/TLS Status'
      key: net.tcp.service[tcp,,443]
      valuemap:
        name: Hiddify Status Map
      triggers:
      - uuid: f653f537be0944c8bd65fb94bf3bc55a
        expression: last(/Hiddify Manager/net.tcp.service[tcp,,443])=0
        name: 'Hiddify: Port 443 (Reality/TLS) is Not Responding'
        opdata: 'Current port status: {ITEM.LASTVALUE}'
        priority: HIGH
    - uuid: 370adaf0cc8341ee9dac6e119ca6c78b
      name: 'Hiddify: Singbox Core Memory Usage'
      key: proc.mem[hiddify-core,,,,rss]
      units: B
      triggers:
      - uuid: 04a60e8a5bca48bf971f2da0121a4291
        expression: last(/Hiddify Manager/proc.mem[hiddify-core,,,,rss])>1G
        name: 'Hiddify: Singbox process memory usage is unusually high'
        opdata: 'Current RAM: {ITEM.LASTVALUE}'
        priority: AVERAGE
        dependencies:
        - name: 'Hiddify: Core Service (Singbox) is Down'
          expression: last(/Hiddify Manager/systemd.unit.info[hiddify-singbox.service,ActiveState])<>"active"
    - uuid: 5db574e588a940c398d75d662cd7a0a4
      name: 'Hiddify: Service HAProxy'
      key: systemd.unit.info[hiddify-haproxy.service,ActiveState]
      value_type: CHAR
      triggers:
      - uuid: e4ed41b150464485bbb6963012249c70
        expression: last(/Hiddify Manager/systemd.unit.info[hiddify-haproxy.service,ActiveState])<>"active"
        name: 'Hiddify: Load Balancer (HAProxy) is Down'
        opdata: 'Current service state: {ITEM.LASTVALUE}'
        priority: HIGH
    - uuid: d14a95c029c543518865de2d8cd2a620
      name: 'Hiddify: Service Nginx'
      key: systemd.unit.info[hiddify-nginx.service,ActiveState]
      value_type: CHAR
      triggers:
      - uuid: 6f38f3f917e6457cb8c45410872be74c
        expression: last(/Hiddify Manager/systemd.unit.info[hiddify-nginx.service,ActiveState])<>"active"
        name: 'Hiddify: Web Server (Nginx) is Down'
        opdata: 'Current service state: {ITEM.LASTVALUE}'
        priority: HIGH
        dependencies:
        - name: 'Hiddify: Port 443 (Reality/TLS) is Not Responding'
          expression: last(/Hiddify Manager/net.tcp.service[tcp,,443])=0
    - uuid: 509e32434cf6424aa1f774dcef33675f
      name: 'Hiddify: Service Panel'
      key: systemd.unit.info[hiddify-panel.service,ActiveState]
      value_type: CHAR
      triggers:
      - uuid: 08c4ee001f3746528e2b824f2faa75ca
        expression: last(/Hiddify Manager/systemd.unit.info[hiddify-panel.service,ActiveState])<>"active"
        name: 'Hiddify: Management Panel UI is Down'
        opdata: 'Current service state: {ITEM.LASTVALUE}'
        priority: HIGH
    - uuid: 8e99e5d87566416f915c70d2c2721a7e
      name: 'Hiddify: Service Redis'
      key: systemd.unit.info[hiddify-redis.service,ActiveState]
      value_type: CHAR
      triggers:
      - uuid: 0eeaac9e144f4a6e89e8f08fa3e3b3c9
        expression: last(/Hiddify Manager/systemd.unit.info[hiddify-redis.service,ActiveState])<>"active"
        name: 'Hiddify: Database Service (Redis) is Down'
        opdata: 'Current service state: {ITEM.LASTVALUE}'
        priority: HIGH
    - uuid: 24d5f07e927347aba606ebdf1dfe55eb
      name: 'Hiddify: Service Singbox'
      key: systemd.unit.info[hiddify-singbox.service,ActiveState]
      value_type: CHAR
      triggers:
      - uuid: ce3401ab10c64b00bf36e4ce85af822a
        expression: last(/Hiddify Manager/systemd.unit.info[hiddify-singbox.service,ActiveState])<>"active"
        name: 'Hiddify: Core Service (Singbox) is Down'
        opdata: 'Current service state: {ITEM.LASTVALUE}'
        priority: HIGH
        dependencies:
        - name: 'Hiddify: Port 443 (Reality/TLS) is Not Responding'
          expression: last(/Hiddify Manager/net.tcp.service[tcp,,443])=0
    - uuid: 812757f0de1b482f97e9ffb7cdf02d23
      name: 'Hiddify: Service Xray'
      key: systemd.unit.info[hiddify-xray.service,ActiveState]
      value_type: CHAR
      triggers:
      - uuid: 87329e99d3ea464a912d92d35e623ac1
        expression: last(/Hiddify Manager/systemd.unit.info[hiddify-xray.service,ActiveState])<>"active"
        name: 'Hiddify: Core Service (Xray) is Down'
        opdata: 'Current service state: {ITEM.LASTVALUE}'
        priority: HIGH
        dependencies:
        - name: 'Hiddify: Port 443 (Reality/TLS) is Not Responding'
          expression: last(/Hiddify Manager/net.tcp.service[tcp,,443])=0
    - uuid: a84aa822789c4179bcbacf22a581c2c9
      name: 'Hiddify: System Logs Directory Size'
      key: vfs.dir.size[/opt/hiddify-manager/log/system]
      delay: 5m
      units: B
      triggers:
      - uuid: 4cc049c8d1f24b6ea22c5e9f1029ea41
        expression: last(/Hiddify Manager/vfs.dir.size[/opt/hiddify-manager/log/system])>2G
        name: 'Hiddify: Log files directory size exceeds limit'
        opdata: 'Log folder size: {ITEM.LASTVALUE}'
        priority: WARNING
    httptests:
    - uuid: b7c21efa72254c8aba1effad831b9e24
      name: Hiddify Panel Web UI Access
      attempts: '2'
      steps:
      - name: Check Admin Login Page
        url: https://{$HIDDIFY.DOMAIN}/{$HIDDIFY.PROXY.PATH}/admin/
        status_codes: '200'
    tags:
