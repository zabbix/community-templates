          width: '10'
          height: '3'
          fields:
          - type: INTEGER
            name: decimal_places
            value: '0'
          - type: INTEGER
            name: decimal_size
            value: '25'
          - type: ITEM
            name: itemid.0
            value:
              host: Hiddify Manager
              key: hiddify.service.nginx.numeric
          - type: INTEGER
            name: show.0
            value: '2'
          - type: STRING
            name: thresholds.0.color
            value: E65660
          - type: STRING
            name: thresholds.0.threshold
