zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 78d5c63cb3d04094b6573a0af6df17f1
      name: Templates
  templates:
    - uuid: 7a5572db00c64ce287db1e156d74ba6d
      template: Veeam_M365_Backup_JOBS_Monitoring
      name: Veeam_M365_Backup_JOBS_Monitoring
      groups:
        - name: Templates
      items:
        - uuid: a6eb8afe3ac245bf892b2084c791c156
          name: 'Master Dump'
          key: vbo365.jobs.discovery
          history: 1h
          value_type: TEXT
          trends: '0'
      discovery_rules:
        - uuid: 9a46240f63354c2f9bc0b8e4a56cfaa9
          name: 'Discover root'
          type: DEPENDENT
          key: root.discovery
          delay: '0'
          item_prototypes:
            - uuid: 16fcb55cf2fd4ba68a71b4759aacddc7
              name: 'Veeam Job "{#JOB_NAME}" Last Result'
              type: DEPENDENT
              key: 'job.status[{#JOB_ID}]'
              delay: '0'
              value_type: TEXT
              trends: '0'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.JOB_ID=="{#JOB_ID}")].JOB_STATUS'
                  error_handler: DISCARD_VALUE
                - type: JAVASCRIPT
                  parameters:
                    - 'return JSON.parse(value)[0];'
              master_item:
                key: vbo365.jobs.discovery
              trigger_prototypes:
                - uuid: 82b8547023da4ce78c959d4b5f107ea9
                  expression: 'last(/Veeam_M365_Backup_JOBS_Monitoring/job.status[{#JOB_ID}])="Failed"'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Veeam_M365_Backup_JOBS_Monitoring/job.status[{#JOB_ID}])="Warning"'
                  name: 'Last Backup Job {#JOB_NAME} state is Failed'
                  priority: AVERAGE
                  manual_close: 'YES'
                - uuid: 95e380e9bf444b50912102073bd631e3
                  expression: 'last(/Veeam_M365_Backup_JOBS_Monitoring/job.status[{#JOB_ID}])="Warning"'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Veeam_M365_Backup_JOBS_Monitoring/job.status[{#JOB_ID}])="Success"'
                  name: 'Last Backup Job {#JOB_NAME} state is Warning'
                  priority: WARNING
                  manual_close: 'YES'
          master_item:
            key: vbo365.jobs.discovery
          lld_macro_paths:
            - lld_macro: '{#JOB_ID}'
              path: $.JOB_ID
            - lld_macro: '{#JOB_NAME}'
              path: $.JOB_NAME
            - lld_macro: '{#JOB_STATUS}'
              path: $.JOB_STATUS
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[*]'
