      valuemap:
        name: '3X-UI OK/Error Count Map'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - |
          function unwrap(v) {
            try {
              var j = JSON.parse(v);
              return (j && j.obj !== undefined) ? j.obj : j;
            } catch (e) {
              return v;
            }
          }
          function logText(v) {
            var x = unwrap(v);
            var nl = String.fromCharCode(10);
            if (Array.isArray(x)) return x.join(nl);
            if (typeof x === 'string') return x;
            if (x && Array.isArray(x.logs)) return x.logs.join(nl);
            if (x && Array.isArray(x.items)) return x.items.join(nl);
            if (x && x.logs !== undefined) return String(x.logs);
            if (x && x.message !== undefined) return String(x.message);
            return JSON.stringify(x || '');
          }
          function hasAny(text, words) {
            var s = String(text).toLowerCase();
            for (var i = 0; i < words.length; i++) {
              if (s.indexOf(words[i]) >= 0) return true;
            }
            return false;
          }
          function countAny(text, words) {
            var s = String(text).toLowerCase();
            var total = 0;
            for (var i = 0; i < words.length; i++) {
              var pos = 0;
              while (true) {
                pos = s.indexOf(words[i], pos);
                if (pos < 0) break;
                total++;
                pos = pos + words[i].length;
              }
            }
            return total;
          }
          var words = ['error','failed','fatal','panic','exception','cannot','denied'];
          return countAny(logText(value), words);
