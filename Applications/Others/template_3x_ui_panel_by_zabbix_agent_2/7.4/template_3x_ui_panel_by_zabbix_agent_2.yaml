zabbix_export:
  version: '7.4'
  template_groups:
  - uuid: f03ef3defeb54dba838f4b9340f461c0
    name: Templates/Applications
  templates:
  - uuid: 69901a7d8c8d453aa3bfc948c12737b5
    template: '3X-UI Panel by Zabbix agent 2'
    name: '3X-UI Panel by Zabbix agent 2'
    description: |-
      Monitors 3X-UI Panel and Xray-core on Linux using Zabbix agent 2 for local service, process, socket and file checks, and HTTP agent items for the 3X-UI Panel API. Includes dependent items, low-level discovery, triggers, graphs and a host dashboard. Optional high-cardinality and environment-specific checks are disabled by default.
    vendor:
      name: TyranR
      version: 1.11.3
    groups:
    - name: Templates/Applications
    items:
    - uuid: e1fa6bb266c645f391b3d8e708bd8d70
      name: '3X-UI application memory'
      type: DEPENDENT
      key: 3xui.api.app.mem
      history: 30d
      units: B
      description: 'Memory allocated by the 3X-UI application runtime as reported by 3X-UI API.'
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.obj.appStats.mem
        error_handler: CUSTOM_VALUE
        error_handler_params: '0'
      master_item:
        key: 3xui.api.server.status.raw
      tags:
      - tag: component
        value: application
      - tag: scope
        value: metric
    - uuid: d7d4613b23b745f0a0827792688021ac
      name: '3X-UI application threads'
      type: DEPENDENT
      key: 3xui.api.app.threads
      history: 30d
      description: 'Number of goroutines/threads reported by the 3X-UI application runtime.'
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.obj.appStats.threads
        error_handler: CUSTOM_VALUE
        error_handler_params: '0'
      master_item:
        key: 3xui.api.server.status.raw
      tags:
      - tag: component
        value: application
      - tag: scope
        value: metric
    - uuid: a4a8875da8cb4bc6b43ae43054b97af3
      name: '3X-UI application uptime'
      type: DEPENDENT
      key: 3xui.api.app.uptime
      history: 30d
      units: s
      description: '3X-UI application uptime reported by 3X-UI API.'
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.obj.appStats.uptime
        error_handler: CUSTOM_VALUE
        error_handler_params: '0'
      master_item:
        key: 3xui.api.server.status.raw
      tags:
      - tag: component
        value: application
      - tag: scope
        value: metric
    - uuid: ee7155113b0b4ac3a459a9409a2d0dd5
      name: '3X-UI API: availability'
      type: DEPENDENT
      key: 3xui.api.available
      history: 30d
      description: 'Returns 1 when the server status API response is valid JSON and indicates a successful API call.'
      valuemap:
        name: '3X-UI Status Map'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'try{var j=JSON.parse(value); if(j && (j.success===true || j.obj!==undefined)) return 1; return 0;}catch(e){return 0;}'
      master_item:
        key: 3xui.api.server.status.raw
      tags:
      - tag: component
        value: api
      - tag: scope
        value: metric
      triggers:
      - uuid: ba89dcbc5fd5474a81d5a2626c1ac88a
        expression: 'max(/3X-UI Panel by Zabbix agent 2/3xui.api.available,5m)=0'
        name: '3X-UI API is unavailable'
        priority: HIGH
        description: 'The /server/status API call is not returning a valid successful JSON response. Check API URL, Bearer token and network path from Zabbix Server/Proxy to the panel.'
        tags:
        - tag: component
          value: api
        - tag: scope
          value: trigger
    - uuid: 56e0d52a201b4d6f98ebc9c68686d069
      name: '3X-UI API: clients active inbounds raw'
      type: HTTP_AGENT
