      - uuid: e139fd8083d24595909be6116ac5f9a3
        name: '3X-UI: Client [{#CLIENT_EMAIL}]: raw detail'
        type: DEPENDENT
        key: '3xui.client.raw[{#CLIENT_EMAIL}]'
        history: 7d
        value_type: TEXT
        description: 'Raw JSON object for one discovered client, extracted from /panel/api/clients/list. Master item for per-client dependent items.'
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - |
            function unwrap(v) {
              var j = JSON.parse(v);
              return (j && j.obj !== undefined) ? j.obj : j;
            }
            function   listFrom(v) {
              var x = unwrap(v);
              if (Array.isArray(x)) return x;
              if (x && Array.isArray(x.clients))   return x.clients;
              if (x && Array.isArray(x.items)) return x.items;
              if (x && Array.isArray(x.data)) return   x.data;
              if (x && Array.isArray(x.records)) return x.records;
              return [];
            }
            function n(v) {
              var x  =  Number(v);
              return isFinite(x) ? x : 0;
            }
            function enabled(c) {
              return (c.enable === true || c.enable   === 1 || c.enable === 'true' || c.enabled === true || c.enabled === 1 || c.enabled === 'true') ? 1 : 0;
            }
              function expiryMs(c) {
              var e = n(c.expiryTime !== undefined ? c.expiryTime : (c.expiry !== undefined ? c.expiry   : c.expire));
              if (!e || e <= 0) return 0;
              if (e < 100000000000) e = e * 1000;
              return e;
            }
            function   trafficUp(c) {
              var t = c.traffic || c.clientTraffic || c.record || {};
              return n(c.up !== undefined ?  c.up  : t.up);
            }
            function trafficDown(c) {
              var t = c.traffic || c.clientTraffic || c.record || {};
              return   n(c.down !== undefined ? c.down : t.down);
            }
            function trafficLimit(c) {
              var t = c.traffic || c.clientTraffic   || c.record || {};
              return n(c.totalGB !== undefined ? c.totalGB : (c.total !== undefined ? c.total : (c.trafficLimit   !== undefined ? c.trafficLimit : t.total)));
            }
            function quotaPct(c) {
              var lim = trafficLimit(c);
              if   (!lim || lim <= 0) return 0;
              return (trafficUp(c) + trafficDown(c)) * 100 / lim;
            }
            var target = '{#CLIENT_EMAIL}';
              var a = listFrom(value);
            for (var i = 0; i < a.length; i++) {
              var c = a[i] || {};
              var email = String(c.email   || c.name || c.id || '');
              if (email === target) return JSON.stringify(c);
            }
            return '{}';
