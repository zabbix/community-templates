        name: '3X-UI: Inbound [{#INBOUND_REMARK} {#INBOUND_PROTOCOL}/{#INBOUND_PORT}]: transport'
        type: DEPENDENT
        key: '3xui.inbound.transport[{#INBOUND_ID}]'
        history: 30d
        description: 'Inbound transport type for port checks: 1=tcp-like, 2=udp-like. Derived from protocol and streamSettings.network.'
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - |
            function o(v){var j=JSON.parse(v);return (j&&j.obj!==undefined)?j.obj:j;}
            var x=o(value);
            var p=(x.protocol||'').toString().toLowerCase();
            var s=x.streamSettings;
            if (typeof s === 'string') { try { s=JSON.parse(s); } catch(e) { s=null; } }
            var n=(s && s.network!==undefined && s.network!==null) ? String(s.network).toLowerCase() : '';
            /* 1=tcp-like, 2=udp-like. Hysteria and WireGuard are UDP-oriented. */
            if (p==='hysteria' || p==='wireguard' || n==='hysteria' || n==='kcp' || n==='quic') return 2;
            return 1;
        master_item:
          key: '3xui.inbound.raw[{#INBOUND_ID}]'
        tags:
        - tag: component
          value: inbound
        - tag: scope
          value: metric
