    - uuid: a7fe39fabd9a4caf90cfbe0d68653850
      name: '3X-UI: Root disk utilization'
      type: DEPENDENT
      key: 3xui.api.disk.pused
      history: 30d
      value_type: FLOAT
      units: '%'
      description: 'Root filesystem utilization calculated from the 3X-UI API disk counters.'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'function o(v){var j=JSON.parse(v);return (j && j.obj!==undefined)?j.obj:j;} var x=o(value); if(!x.disk||!x.disk.total) return 0; return x.disk.current*100/x.disk.total;'
      master_item:
        key: 3xui.api.server.status.raw
      tags:
      - tag: component
        value: storage
      - tag: scope
        value: metric
      triggers:
