            return JSON.stringify(x || '');
          }
          function hasAny(text, words) {
            var s = String(text).toLowerCase();
            for (var i = 0; i < words.length; i++) {
              if (s.indexOf(words[i]) >= 0) return true;
            }
            return false;
          }
          function countAny(text, words) {
            var s = String(text).toLowerCase();
            var total = 0;
            for (var i = 0; i < words.length; i++) {
              var pos = 0;
              while (true) {
                pos = s.indexOf(words[i], pos);
                if (pos < 0) break;
                total++;
                pos = pos + words[i].length;
              }
            }
            return total;
          }
          var words = ['warn','warning'];
          return countAny(logText(value), words);
