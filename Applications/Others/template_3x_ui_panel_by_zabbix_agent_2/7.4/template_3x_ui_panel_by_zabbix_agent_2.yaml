    macros:
    - macro: '{$3XUI.API.TIMEOUT}'
      value: 10s
      description: 'Timeout for 3X-UI API HTTP agent items.'
    - macro: '{$3XUI.API.TOKEN}'
      type: SECRET_TEXT
      description: 'Bearer API token from 3X-UI Settings -> Security -> API Token. Treat as a full administrator credential.'
    - macro: '{$3XUI.API.URL}'
      value: 'http://127.0.0.1:2053/panel/api'
      description: 'Base 3X-UI Panel API URL. HTTP agent items are executed by Zabbix Server/Proxy, so 127.0.0.1 works only when the server/proxy runs on the same host or API is otherwise reachable from it.'
    - macro: '{$3XUI.BACKUP.CHECK}'
      value: '0'
      description: 'Enable optional backup directory triggers: 1=enabled, 0=disabled. Backup items are disabled by default and should be enabled only after {$3XUI.BACKUP.PATH} is set correctly.'
    - macro: '{$3XUI.BACKUP.MAX.SIZE}'
      value: '1073741824'
      description: 'Maximum expected backup directory size in bytes when backup checks are enabled. Default is 1 GiB.'
    - macro: '{$3XUI.BACKUP.MAXAGE}'
      value: '86400'
      description: 'Maximum allowed latest backup age in seconds when optional backup listing checks are enabled.'
    - macro: '{$3XUI.BACKUP.MIN.COUNT}'
      value: '1'
      description: 'Minimum expected number of files in the backup directory when backup checks are enabled.'
    - macro: '{$3XUI.BACKUP.PATH}'
      value: /etc/x-ui/backup
      description: 'Path to the local 3X-UI backup directory, if backups are stored on disk. Adjust per host before enabling backup items.'
    - macro: '{$3XUI.CLIENT.EXPIRY.HIGH}'
      value: '3'
      description: 'High threshold for client expiry in days. Clients without expiry return -1 and do not trigger expiry alerts.'
    - macro: '{$3XUI.CLIENT.EXPIRY.WARN}'
      value: '7'
      description: 'Warning threshold for client expiry in days. Clients without expiry return -1 and do not trigger expiry alerts.'
    - macro: '{$3XUI.CLIENT.LASTONLINE.CHECK}'
      value: '0'
      description: 'Enable per-client last-online trigger: 1=enabled, 0=disabled. Disabled by default because not every installation expects every client to be regularly online.'
    - macro: '{$3XUI.CLIENT.LASTONLINE.WARN}'
      value: '30'
      description: 'Warning threshold for days since the client was last seen online. Used by optional client LLD triggers when enabled.'
    - macro: '{$3XUI.CLIENT.LLD.ENABLED}'
      value: '0'
      description: 'Enable per-client Low-Level Discovery: 1=enabled, 0=disabled. Disabled by default because client discovery can create many items on large installations.'
    - macro: '{$3XUI.CLIENT.TRAFFIC.HIGH}'
      value: '95'
      description: 'High threshold for per-client traffic quota usage percentage. Only applies when client traffic limit is greater than 0.'
    - macro: '{$3XUI.CLIENT.TRAFFIC.WARN}'
      value: '80'
      description: 'Warning threshold for per-client traffic quota usage percentage. Only applies when client traffic limit is greater than 0.'
    - macro: '{$3XUI.CPU.UTIL.HIGH}'
      value: '90'
      description: 'High CPU utilization threshold in percent.'
    - macro: '{$3XUI.DB.CHECK}'
      value: '1'
      description: 'Enable local 3X-UI database file triggers: 1=enabled, 0=disabled. Disable when the panel does not use a local SQLite database file.'
    - macro: '{$3XUI.DB.MAX.SIZE}'
      value: '1073741824'
      description: 'Maximum expected 3X-UI database file size in bytes. Default is 1 GiB; adjust for large installations.'
    - macro: '{$3XUI.DB.MIN.SIZE}'
      value: '1024'
      description: 'Minimum expected 3X-UI database file size in bytes. Used to detect empty or suspiciously small database files.'
    - macro: '{$3XUI.DB.MTIME.CHECK}'
      value: '0'
      description: 'Enable database modification age trigger: 1=enabled, 0=disabled. Disabled by default because quiet servers may not update the SQLite file frequently.'
    - macro: '{$3XUI.DB.MTIME.MAXAGE}'
      value: '86400'
      description: 'Maximum allowed database file modification age in seconds when {$3XUI.DB.MTIME.CHECK}=1. Default is 86400 seconds.'
    - macro: '{$3XUI.DB.PATH}'
      value: /etc/x-ui/x-ui.db
      description: 'Path to the SQLite database file. If PostgreSQL is used, adjust or disable database file items/triggers.'
    - macro: '{$3XUI.DISK.PUSED.HIGH}'
      value: '90'
      description: 'High root disk utilization threshold in percent.'
    - macro: '{$3XUI.INBOUND.CLIENTS.CHECK}'
      value: '0'
      description: 'Enable per-inbound no-clients trigger: 1=enabled, 0=disabled. Disabled by default because fallback/mtproto/maintenance inbounds may legitimately have no clients.'
    - macro: '{$3XUI.INBOUND.EXPIRY.HIGH}'
      value: '3'
      description: 'High threshold for inbound expiry in days. Inbounds without expiry return a large placeholder value and do not trigger.'
    - macro: '{$3XUI.INBOUND.EXPIRY.WARN}'
      value: '7'
      description: 'Warning threshold for inbound expiry in days. Inbounds without expiry return a large placeholder value and do not trigger.'
    - macro: '{$3XUI.INBOUND.PORT.CHECK}'
      value: '0'
      description: 'Enable inbound local port listening triggers: 1=enabled, 0=disabled. Disabled by default because central panels may expose inbounds belonging to remote nodes, while Zabbix Agent 2 checks only local sockets.'
    - macro: '{$3XUI.INBOUND.PORT.DOWN.TIME}'
      value: 3m
      description: 'Time window for per-inbound port-down triggers. The port problem is raised only when the port is continuously not listening during this period.'
    - macro: '{$3XUI.INBOUND.TRAFFIC.HIGH}'
      value: '95'
      description: 'High threshold for inbound traffic quota usage percentage. Only applies when inbound total traffic limit is greater than 0.'
    - macro: '{$3XUI.INBOUND.TRAFFIC.WARN}'
      value: '80'
      description: 'Warning threshold for inbound traffic quota usage percentage. Only applies when inbound total traffic limit is greater than 0.'
    - macro: '{$3XUI.LOGS.CHECK}'
      value: '0'
      description: 'Enable panel/Xray log pattern triggers: 1=enabled, 0=disabled. Disabled by default because logs can be noisy.'
    - macro: '{$3XUI.LOGS.COUNT}'
      value: '100'
      description: 'Number of recent log lines requested from 3X-UI log API endpoints.'
    - macro: '{$3XUI.LOGS.ERROR.THRESHOLD}'
      value: '1'
      description: 'Number of error-like log patterns required to raise a log trigger when {$3XUI.LOGS.CHECK}=1.'
    - macro: '{$3XUI.MEM.PUSED.HIGH}'
      value: '90'
      description: 'High memory utilization threshold in percent.'
    - macro: '{$3XUI.NODE.DETAIL.CHECK}'
      value: '1'
      description: 'Enable per-node detail API success trigger: 1=enabled, 0=disabled. Uses /panel/api/nodes/get/{id} for discovered nodes.'
    - macro: '{$3XUI.NODE.HEALTH.CHECK}'
      value: '1'
      description: 'Enable per-node unhealthy trigger: 1=enabled, 0=disabled. Disable if the current 3X-UI version does not expose reliable node health/status fields.'
    - macro: '{$3XUI.NODE.HEARTBEAT.CHECK}'
      value: '1'
      description: 'Enable per-node stale heartbeat trigger: 1=enabled, 0=disabled. Disable if the current 3X-UI version does not expose last heartbeat timestamps.'
    - macro: '{$3XUI.NODE.HEARTBEAT.MAXAGE}'
      value: '600'
      description: 'Maximum allowed node heartbeat age in seconds for node stale-heartbeat triggers. Default is 600 seconds.'
    - macro: '{$3XUI.NODE.LLD.ENABLED}'
      value: '0'
      description: 'Enable per-node Low-Level Discovery: 1=enabled, 0=disabled. Enable only on the 3X-UI host that acts as the central/admin panel for remote nodes.'
    - macro: '{$3XUI.NODE.TCP.COUNT.HIGH}'
      value: '10000'
      description: 'High TCP connection count threshold for per-node detail payloads when the API exposes tcpCount.'
    - macro: '{$3XUI.NODE.UDP.COUNT.HIGH}'
      value: '10000'
      description: 'High UDP connection count threshold for per-node detail payloads when the API exposes udpCount.'
    - macro: '{$3XUI.OBSERVATORY.CHECK}'
      value: '0'
      description: 'Enable Xray observatory triggers: 1=enabled, 0=disabled. Disabled by default because observatory is optional and not configured on every 3X-UI installation.'
    - macro: '{$3XUI.OBSERVATORY.DELAY.HIGH}'
      value: '1000'
      description: 'High observatory delay threshold in milliseconds. Used only when {$3XUI.OBSERVATORY.CHECK}=1.'
    - macro: '{$3XUI.OUTBOUND.LLD.ENABLED}'
      value: '0'
      description: 'Enable per-outbound traffic Low-Level Discovery: 1=enabled, 0=disabled. Disabled by default because outbound tags and payload shape may vary by Xray configuration.'
    - macro: '{$3XUI.PANEL.PORT}'
      value: '2053'
      description: 'Local TCP port of the 3X-UI web panel. Adjust to your panel port.'
    - macro: '{$3XUI.PANEL.PORT.CHECK}'
      value: '0'
      description: 'Enable local 3X-UI panel TCP port trigger: 1=enabled, 0=disabled. Disabled by default because panel/API availability is already checked through HTTP API and local panel ports differ between installations.'
    - macro: '{$3XUI.PROCESS.PANEL}'
      value: x-ui
      description: 'Process name used to count the 3X-UI panel process.'
    - macro: '{$3XUI.PROCESS.XRAY}'
      value: xray-linux-amd64
      description: 'Command line substring used to count the Xray process.'
    - macro: '{$3XUI.SERVICE.NAME}'
      value: x-ui.service
      description: 'Systemd unit name used by standard 3X-UI installations.'
    - macro: '{$3XUI.TCP.COUNT.HIGH}'
      value: '10000'
      description: 'High TCP connection count threshold.'
    - macro: '{$3XUI.TLS.CHECK}'
      value: '0'
      description: 'Enable TLS certificate triggers: 1=enabled, 0=disabled. TLS items are disabled by default and should be enabled only after {$3XUI.TLS.HOST} and {$3XUI.TLS.PORT} are set.'
    - macro: '{$3XUI.TLS.EXPIRY.HIGH}'
      value: '3'
      description: 'High threshold for TLS certificate expiry in days.'
    - macro: '{$3XUI.TLS.EXPIRY.WARN}'
      value: '14'
      description: 'Warning threshold for TLS certificate expiry in days.'
    - macro: '{$3XUI.TLS.HOST}'
      value: 3x-ui.example.com
      description: 'Hostname used by optional TLS certificate checks. Set this to the public panel/API hostname before enabling TLS items.'
    - macro: '{$3XUI.TLS.PORT}'
      value: '443'
      description: 'TCP port used by optional TLS certificate checks.'
    - macro: '{$3XUI.XRAY.METRICS.CHECK}'
      value: '0'
      description: 'Enable trigger for missing Xray metrics: 1=enabled, 0=disabled. Disabled by default because Xray metrics are optional and not required for 3X-UI to work.'
    - macro: '{$3XUI.XRAY.RESULT.ERROR.CHECK}'
      value: '1'
      description: 'Enable trigger for error/fatal/panic/failed patterns in /xray/getXrayResult: 1=enabled, 0=disabled.'
