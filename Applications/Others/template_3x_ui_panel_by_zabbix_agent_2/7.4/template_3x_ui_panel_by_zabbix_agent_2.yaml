      - uuid: 84b48eaeb8274fbd8262b02f2b43a555
        name: '3X-UI: Node [{#NODE_NAME}]: Xray version'
        type: DEPENDENT
        key: '3xui.node.xray.version[{#NODE_ID}]'
        history: 30d
        value_type: CHAR
        description: 'Xray version from the node detail payload when present.'
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - |
            function unwrap(v){var j=JSON.parse(v);return (j&&j.obj!==undefined)?j.obj:j;}
            function n(v){var x=Number(v);return  isFinite(x)?x:0;}
            function s(v){if(v===null||v===undefined)return '';return String(v);}
            function pick(x,names){for(var  i=0;i<names.length;i++){var k=names[i]; if(x&&x[k]!==undefined&&x[k]!==null&&x[k]!=='') return x[k];} return  '';}
            function deep(x,names){
              var v=pick(x,names); if(v!=='') return v;
              var nested=[x.node,x.status,x.server,x.system,x.xray,x.panel,x.stats,x.obj];
               for(var i=0;i<nested.length;i++){v=pick(nested[i]||{},names); if(v!=='') return v;}
              return '';
            }
            var x=unwrap(value);  return s(deep(x,['xrayVersion','xray_version','xrayCoreVersion','coreVersion']));
        master_item:
          key: '3xui.node.api.raw[{#NODE_ID}]'
