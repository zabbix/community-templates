      - uuid: df4323a3b37846b189b3edbf32900b76
        name: '3X-UI: Node [{#NODE_NAME}]: health'
        graph_items:
        - color: 1A7C11
          item:
            host: '3X-UI Panel by Zabbix agent 2'
            key: '3xui.node.heartbeat.age[{#NODE_ID}]'
        - sortorder: '1'
          color: 2774A4
          yaxisside: RIGHT
          item:
            host: '3X-UI Panel by Zabbix agent 2'
            key: '3xui.node.health[{#NODE_ID}]'
      - uuid: 17864a1a41a94d739cf73646bb806725
        name: '3X-UI: Node [{#NODE_NAME}]: traffic'
        graph_items:
        - color: 1A7C11
          item:
            host: '3X-UI Panel by Zabbix agent 2'
            key: '3xui.node.traffic.up[{#NODE_ID}]'
        - color: 2774A4
          item:
            host: '3X-UI Panel by Zabbix agent 2'
            key: '3xui.node.traffic.down[{#NODE_ID}]'
      master_item:
        key: 3xui.api.nodes.list.raw
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - |
          function unwrap(v) {
            var j = JSON.parse(v);
            return (j && j.obj !== undefined) ? j.obj : j;
          }
          function listFrom(v)   {
            var x = unwrap(v);
            if (Array.isArray(x)) return x;
            if (x && Array.isArray(x.nodes)) return x.nodes;
              if (x && Array.isArray(x.items)) return x.items;
            if (x && Array.isArray(x.data)) return x.data;
            if (x  &&  Array.isArray(x.records)) return x.records;
            return [];
          }
          function n(v){var x=Number(v);return isFinite(x)?x:0;}
            function s(v){if(v===null||v===undefined)return '';return String(v);}
          function enabled(x){return (x.enable===true||x.enable===1||x.enable==='true'||x.enabled===true||x.enabled===1||x.enabled==='true')?1:0;}
            function nodeId(x){return s(x.id!==undefined?x.id:(x.nodeId!==undefined?x.nodeId:(x.guid!==undefined?x.guid:x.uuid)));}
            function nodeName(x){return s(x.name||x.remark||x.label||x.address||x.host||('node-'+nodeId(x)));}
          function nodeAddress(x){return   s(x.address||x.apiHost||x.host||x.ip||x.url||x.panelUrl||x.nodeUrl||'');}
          function statusText(x){return s(x.status||x.health||x.state||x.nodeStatus||x.connectionStatus||'');}
            function healthyState(x){
            var st=statusText(x).toLowerCase();
            if(!st) return -1;
            if(st==='healthy'||st==='online'||st==='running'||st==='ok'||st==='active'||st==='success'||st==='connected')   return 1;
            return 0;
          }
          function timestampSeconds(v){
            if(v===null||v===undefined||v==='') return 0;
             if(typeof  v==='string' && isNaN(Number(v))) {
              var p=Date.parse(v);
              if(!isNaN(p)) return Math.floor(p/1000);
              }
            var t=n(v);
            if(t<=0) return 0;
            if(t>100000000000) t=Math.floor(t/1000);
            return Math.floor(t);
            }
          function heartbeatSeconds(x){return timestampSeconds(x.lastHeartbeat||x.lastHeartbeatTime||x.last_heartbeat||x.lastOnline||x.lastSeen||x.last_seen||x.heartbeat||x.heartbeatTime||x.lastReportTime||x.updatedAt);}
            function up(x){var t=x.traffic||x.trafficRecord||{};return n(x.up!==undefined?x.up:t.up);}
          function down(x){var   t=x.traffic||x.trafficRecord||{};return n(x.down!==undefined?x.down:t.down);}
          if ('{$3XUI.NODE.LLD.ENABLED}'   !== '1') {
            return JSON.stringify({'data': []});
          }
          var a=listFrom(value);
          var data=[];
          for(var i=0;i<a.length;i++){
              var x=a[i]||{};
            var id=nodeId(x);
            if(!id) continue;
            data.push({
              '{#NODE_ID}': id,
              '{#NODE_NAME}':   nodeName(x),
              '{#NODE_ADDRESS}': nodeAddress(x),
              '{#NODE_ENABLE}': enabled(x)?'1':'0'
            });
          }
          return   JSON.stringify({'data': data});
    - uuid: cf710ffa0b4b4372a377294e4ed0452b
      name: '3X-UI: Xray outbounds traffic discovery'
