          item:
            host: '3X-UI Panel by Zabbix agent 2'
            key: '3xui.inbound.traffic.total[{#INBOUND_ID}]'
      master_item:
        key: 3xui.api.inbounds.slim.raw
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - |
          function unwrap(v) {
            var j = JSON.parse(v);
            return (j && j.obj !== undefined) ? j.obj : j;
          }
          function safeString(v)   {
            if (v === null || v === undefined) return '';
            return String(v);
          }
          var arr = unwrap(value);
          if (!Array.isArray(arr))   {
            if (arr && Array.isArray(arr.items)) arr = arr.items;
            else arr = [];
          }
          var data = [];
          for (var i =   0; i < arr.length; i++) {
            var ib = arr[i] || {};
            var id = ib.id;
            if (id === null || id === undefined   || id === '') continue;
            var remark = safeString(ib.remark || ib.tag || ('inbound-' + id));
            var protocol   = safeString(ib.protocol || 'unknown');
            var port = safeString(ib.port || 0);
            var enabled = (ib.enable ===   true || ib.enabled === true) ? '1' : '0';
            data.push({
              '{#INBOUND_ID}': safeString(id),
              '{#INBOUND_REMARK}':   remark,
              '{#INBOUND_TAG}': safeString(ib.tag || ''),
              '{#INBOUND_PROTOCOL}': protocol,
              '{#INBOUND_PORT}':   port,
              '{#INBOUND_ENABLE}': enabled
            });
          }
          return JSON.stringify({'data': data});
    - uuid: 26db1a347e34471dbda1efeccddd9b90
