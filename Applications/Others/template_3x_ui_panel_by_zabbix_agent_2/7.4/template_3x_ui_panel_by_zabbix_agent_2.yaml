            function toSec(v){var t=n(v); if(t<=0)return 0; if(t>100000000000)t=Math.floor(t/1000);  return  Math.floor(t);}
            var target = '{#CLIENT_EMAIL}';
            var x = unwrap(value);
            var ts=0;
            if (x && !Array.isArray(x)   && x[target] !== undefined) ts=toSec(x[target]);
            var arr=[];
            if(!ts){
             if (Array.isArray(x)) arr=x;
