      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - |
          function unwrap(v){var j=JSON.parse(v);return (j&&j.obj!==undefined)?j.obj:j;}
          function n(v){var x=Number(v);return   isFinite(x)?x:0;}
          function s(v){if(v===null||v===undefined)return '';return String(v);}
          function listFrom(v){
              var x=unwrap(v);
            if(Array.isArray(x)) return x;
            if(x&&Array.isArray(x.outbounds)) return x.outbounds;
              if(x&&Array.isArray(x.traffics)) return x.traffics;
            if(x&&Array.isArray(x.items)) return x.items;
            if(x&&Array.isArray(x.data))   return x.data;
            var arr=[];
            if(x&&typeof x==='object'){
              for(var k in x){ if(!x.hasOwnProperty(k)) continue;   var e=x[k]; if(e&&typeof e==='object'){ e.__tag=k; arr.push(e); } }
            }
            return arr;
          }
          function tag(x){return   s(x.tag||x.outboundTag||x.name||x.__tag||x.email||x.protocol||'');}
          function up(x){return n(x.up!==undefined?x.up:(x.upload!==undefined?x.upload:(x.uplink!==undefined?x.uplink:(x.tx!==undefined?x.tx:0))));}
            function down(x){return n(x.down!==undefined?x.down:(x.download!==undefined?x.download:(x.downlink!==undefined?x.downlink:(x.rx!==undefined?x.rx:0))));}
            if ('{$3XUI.OUTBOUND.LLD.ENABLED}' !== '1') return JSON.stringify({'data': []});
          var a=listFrom(value), data=[],   seen={};
