      - type: JAVASCRIPT
        parameters:
        - |
          function unwrap(v){try{var j=JSON.parse(v);return (j&&j.obj!==undefined)?j.obj:j;}catch(e){return v;}}
          var x=unwrap(value);
          var txt='';
          if(typeof x==='string') txt=x;
          else if(x&&x.result!==undefined) txt=String(x.result);
