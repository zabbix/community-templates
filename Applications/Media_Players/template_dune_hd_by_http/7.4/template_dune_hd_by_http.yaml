                  try {
                      var data = JSON.parse(value);
                      var index = data.audio_track;
                      return data['audio_track.' + index    + '.codec'] || '';
                  }
                  catch (e) {
                      return '';
                  }
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: audio
        - uuid: cdfedf1cbb1a4419bbb01f81bb087fb0
