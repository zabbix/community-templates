        - uuid: 4f09cdc965b84496b1b75febc4123d40
          name: 'Dune: Video height'
          type: DEPENDENT
          key: dune.playback_video_height
          history: 90d
          description: 'Current video height in pixels.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.playback_video_height
              error_handler: DISCARD_VALUE
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: video
        - uuid: 4dfa4ce335ee45129119a414d9e4e7a9
          name: 'Dune: Video resolution'
          type: DEPENDENT
          key: dune.playback_video_resolution
          history: 90d
          value_type: CHAR
          description: 'Current video resolution formatted as WIDTHxHEIGHT.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                      var data = JSON.parse(value);
                      var width = Number(data.playback_video_width);
                      var height =    Number(data.playback_video_height);
                      if (!isFinite(width) || !isFinite(height) || width <= 0 || height <=    0) {
                          return '';
                      }
                      return String(width) + 'x' + String(height);
                  }
                  catch (e) {
                      return    '';
                  }
