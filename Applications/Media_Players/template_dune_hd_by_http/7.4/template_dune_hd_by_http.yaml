zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 7df96b18c2304f27a7fdc291db42a2aa
      name: Templates/Applications
  templates:
    - uuid: 4ac59b33b8f34d53b9a2cd7ca7c891a3
      template: 'Dune HD by HTTP'
      name: 'Dune HD by HTTP'
      description: |
        Basic Zabbix template for monitoring Dune HD media players via HTTP IP Control API.
        
        Tested against Dune HD Pro One 8K Plus response from:
        /cgi-bin/do?cmd=status&result_syntax=json
        
        The template uses one HTTP agent master item and dependent items with JSONPath preprocessing.
        
        Required host configuration:
        - Set the host interface/IP to the Dune media player IP address.
        - Default API port is 80.
        - For Google-certified ATV models, set {$DUNE.API.PORT} to 11080.
        
        The template also includes numeric helper items for graphs:
        - dune.player_state.code maps textual player_state to numeric values.
        - dune.playback_progress_pct calculates playback progress from position and duration.
        
        Version 1.1 adds advanced playback metadata: bitrate, resolution, playback captions, playback URL, selected audio/subtitles, scrambling and watchdog counters.
        
        Version 1.1 dashboard update: Dune information includes the last/current playback title and an approximate last playback end time.
        
        Dashboard cleanup: current now-playing widgets now reset when playback is not active, while Last played title keeps the previous playback title separately.
      vendor:
        name: TyranR
        version: '1.1'
      groups:
        - name: Templates/Applications
      items:
        - uuid: 82b79ad2df05499e8d75f1ea5f765cee
          name: 'Dune: Android screensaver'
          type: DEPENDENT
          key: dune.android_screensaver_active
          history: 7d
          description: 'The dune.android_screensaver_active field appears to behave like an Android/Dune screensaver or shell-screen activity flag on the tested device. It is not used as an availability or health metric. During native playback it may switch to 0, which is expected.'
          valuemap:
            name: 'Dune screensaver state'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.android_app_active
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: application
        - uuid: 9d5f9f6357e84e739cdb660185ab1d18
          name: 'Dune: App version'
          type: DEPENDENT
          key: dune.app_version
          history: 7d
          value_type: CHAR
          description: 'Dune application version.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.app_version
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: application
          triggers:
            - uuid: 5d10c3ade17640d8a755ed5217c9cce9
              expression: 'last(/Dune HD by HTTP/dune.app_version,#1)<>last(/Dune HD by HTTP/dune.app_version,#2) and length(last(/Dune HD by HTTP/dune.app_version))>0'
              name: 'Dune: App version has changed'
              event_name: 'Dune: App version has changed (new version: {ITEM.VALUE})'
              priority: INFO
              description: 'The Dune application version has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
        - uuid: bbe3fd6d05434179b6cb6ace8ea663c6
          name: 'Dune: Current audio track index'
          type: DEPENDENT
          key: dune.audio_track
          history: 90d
          description: 'Current selected audio track index.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.audio_track
              error_handler: DISCARD_VALUE
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: audio
        - uuid: 447642f0a08c448c94cd0768a9b6df35
          name: 'Dune: Commercial serial number'
          type: DEPENDENT
          key: dune.commercial_serial_number
          history: 7d
          value_type: CHAR
          description: 'Dune commercial serial number.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.commercial_serial_number
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: inventory
        - uuid: f630d3af99394cc8a4fb1203fcc0bd59
          name: 'Dune: Current audio'
          type: DEPENDENT
          key: dune.current_audio
          history: 365d
          value_type: CHAR
          description: 'Current selected audio track formatted as language / codec / type.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                      var data = JSON.parse(value);
                      var index = data.audio_track;
                  
                      if (index === undefined || index === null || index === '') {
                          return '';
                      }
                  
                      var lang = data['audio_track.' + index + '.lang'] || '';
                      var codec = data['audio_track.' + index + '.codec'] || '';
                      var type = data['audio_track.' + index + '.type'] || '';
                  
                      var result = [];
                  
                      if (lang) {
                          result.push(lang);
                      }
                  
                      if (codec) {
                          result.push(codec);
                      }
                  
                      if (type && type !== 'normal') {
                          result.push(type);
                      }
                  
                      return result.join(' / ');
                  }
                  catch (e) {
                      return '';
                  }
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: audio
        - uuid: 56bcfdaefcda48f89e494c335229d52d
          name: 'Dune: Current audio codec'
          type: DEPENDENT
          key: dune.current_audio_codec
          history: 365d
