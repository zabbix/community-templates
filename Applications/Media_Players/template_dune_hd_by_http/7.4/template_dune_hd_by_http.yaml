            - tag: component
              value: playback
          triggers:
            - uuid: 9b9ad5c5c330400f8f93f8a218c37b4f
              expression: 'min(/Dune HD by HTTP/dune.playback_is_buffering,5m)=1'
              name: 'Dune: Playback is buffering for too long'
              priority: WARNING
              description: 'Dune reports buffering state continuously for 5 minutes.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: performance
        - uuid: 499dc158d0854b739ebfc068eb8cae1c
          name: 'Dune: Playback mute'
          type: DEPENDENT
          key: dune.playback_mute
          history: 7d
          description: 'Dune mute state. 1 means muted, 0 means not muted.'
          valuemap:
            name: 'Dune flag'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.playback_mute
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: audio
        - uuid: 6671946405564399bf4bb724415a88e1
          name: 'Dune: Playback position'
          type: DEPENDENT
          key: dune.playback_position
          history: 7d
          value_type: FLOAT
          units: s
          description: 'Current playback position in seconds. If unavailable, the value is discarded.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.playback_position
              error_handler: DISCARD_VALUE
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: playback
        - uuid: 93c694f6380b452982a43f902e7cf29d
          name: 'Dune: Playback progress'
          type: DEPENDENT
          key: dune.playback_progress_pct
          history: 7d
          value_type: FLOAT
          units: '%'
          description: 'Playback progress percentage calculated from playback_position and playback_duration. If unavailable or cannot be calculated, the item returns 0.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                      var data = JSON.parse(value);
                      var position = Number(data.playback_position);
                      var duration    = Number(data.playback_duration);
                  
                      if (!isFinite(position) || !isFinite(duration) || duration <= 0 ||  position   < 0) {
                          return 0;
                      }
                  
                      return Math.min(100, Math.max(0, position / duration * 100));
                   }
                  catch   (e) {
                      return 0;
                  }
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: playback
        - uuid: c5aa6e3f12c64d32b34f064664c08926
          name: 'Dune: Playback speed'
          type: DEPENDENT
          key: dune.playback_speed
          history: 7d
          value_type: FLOAT
          description: 'Current playback speed. Dune commonly uses 256 for normal playback and 0 for pause. If unavailable, the value is discarded.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.playback_speed
              error_handler: DISCARD_VALUE
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: playback
        - uuid: 62e3a6a9a629422f9512dd340b67e6ea
          name: 'Dune: Playback state'
          type: DEPENDENT
          key: dune.playback_state
          history: 90d
          value_type: CHAR
          description: 'Current playback state for the dashboard. Returns "stopped" when no playback is active.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                      var data = JSON.parse(value);
                      var state = String(data.player_state || '');
                      var playbackState  = String(data.playback_state || '');
                  
                      var active = state === 'file_playback' ||
                                   state  === 'dvd_playback' ||
                                   state === 'bluray_playback' ||
                                   playbackState === 'playing'  ||
                                   playbackState === 'paused' ||
                                   playbackState === 'initializing';
                  
                       if (!active) {
                          return 'stopped';
                      }
                  
                      return playbackState || state || 'unknown';
                  }
                  catch  (e) {
                      return 'unknown';
                  }
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: playback
        - uuid: 4f6a580a1d08479588cafab79808a70b
          name: 'Dune: Playback URL'
          type: DEPENDENT
          key: dune.playback_url
          history: 1825d
          value_type: TEXT
          description: 'Full playback URL/path reported by Dune. This may include local SMB/NFS paths and media file names. Review before publishing or sharing exports.'
          preprocessing:
