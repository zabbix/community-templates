        - uuid: fe76eef08b924564a4c7c12defb49e09
          name: 'Dune: Last playback ended at'
          type: DEPENDENT
          key: dune.last_playback_ended_at
          history: 1825d
          value_type: CHAR
          description: 'Approximate last playback end time based on the last status sample where playback was still active. Precision depends on {$DUNE.UPDATE.INTERVAL} and Zabbix server/proxy time.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                      var data = JSON.parse(value);
                      var state = String(data.player_state || '');
                      var playbackState = String(data.playback_state || '');
                  
                      var active = state === 'file_playback' ||
                                   state === 'dvd_playback' ||
                                   state === 'bluray_playback' ||
                                   playbackState === 'playing' ||
                                   playbackState === 'paused' ||
                                   playbackState === 'initializing';
                  
                      if (!active) {
                          return '__DISCARD__';
                      }
                  
                      var d = new Date();
                      function pad(n) {
                          return n < 10 ? '0' + n : '' + n;
                      }
                  
                      return d.getFullYear() + '-' +
                             pad(d.getMonth() + 1) + '-' +
                             pad(d.getDate()) + ' ' +
                             pad(d.getHours()) + ':' +
                             pad(d.getMinutes());
                  }
                  catch (e) {
                      return '__DISCARD__';
                  }
            - type: REGEX
              parameters:
                - '^(?!__DISCARD__$).+'
                - \0
              error_handler: DISCARD_VALUE
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: playback
            - tag: scope
              value: history
        - uuid: f7d75720d9834a9584bedf0fdf4f042b
          name: 'Dune: Last playback event'
          type: DEPENDENT
          key: dune.last_playback_event
          history: 30d
          value_type: CHAR
          description: 'Last playback event reported by Dune.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.last_playback_event
              error_handler: DISCARD_VALUE
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: playback
        - uuid: 1a459c1af3ae4bca95997867041689f0
          name: 'Dune: Last played title'
          type: DEPENDENT
          key: dune.last_played_title
          history: 1825d
          value_type: CHAR
          description: 'Last observed playback title. Updates only while playback is active and keeps the last value after playback stops.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.playback_caption
              error_handler: DISCARD_VALUE
            - type: DISCARD_UNCHANGED
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: playback
            - tag: scope
              value: history
        - uuid: 4b47482a11d34f52a743b4c5fe72e28b
          name: 'Dune: Playback caption'
          type: DEPENDENT
          key: dune.playback_caption
          history: 365d
          value_type: CHAR
          description: 'Current now-playing title for the dashboard. Returns "-" when no playback is active so the current playback row is cleared.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                      var data = JSON.parse(value);
                      var state = String(data.player_state || '');
                      var playbackState  = String(data.playback_state || '');
                  
                      var active = state === 'file_playback' ||
                                   state  === 'dvd_playback' ||
                                   state === 'bluray_playback' ||
                                   playbackState === 'playing'  ||
                                   playbackState === 'paused' ||
                                   playbackState === 'initializing';
                  
                       if (!active) {
                          return '-';
                      }
                  
                      return data.playback_caption ? String(data.playback_caption)  : '-';
                  }
                  catch (e) {
                      return '-';
                  }
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: playback
        - uuid: f6c9534f335c43ab8176f59236c027c0
          name: 'Dune: Playback current bitrate'
          type: DEPENDENT
          key: dune.playback_current_bitrate
          history: 90d
          value_type: FLOAT
          units: bps
          description: 'Current playback bitrate reported by Dune, in bits per second. Returns 0 when no playback is active so the dashboard card is cleared.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                      var data = JSON.parse(value);
                      var state = String(data.player_state || '');
                      var playbackState  = String(data.playback_state || '');
                  
                      var active = state === 'file_playback' ||
                                   state  === 'dvd_playback' ||
                                   state === 'bluray_playback' ||
                                   playbackState === 'playing'  ||
                                   playbackState === 'paused' ||
                                   playbackState === 'initializing';
                  
                       if (!active || data.playback_current_bitrate === undefined || data.playback_current_bitrate === null || data.playback_current_bitrate  === '') {
                          return 0;
                      }
                  
                      var bitrate = Number(data.playback_current_bitrate);
                  
                      if (!isFinite(bitrate)  || bitrate < 0) {
                          return 0;
                      }
                  
                      return bitrate;
                  }
                  catch (e) {
                      return 0;
                  }
          master_item:
            key: dune.status.raw
          tags:
            - tag: component
              value: playback
        - uuid: 21510268f5644d5c94045852fb156405
          name: 'Dune: Playback duration'
          type: DEPENDENT
          key: dune.playback_duration
          history: 7d
          value_type: FLOAT
          units: s
          description: 'Current media duration in seconds. If unavailable, the value is discarded.'
          preprocessing:
