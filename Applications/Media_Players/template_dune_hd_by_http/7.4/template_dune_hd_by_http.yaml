  triggers:
    - uuid: 490b4db5ade44f6c96111051828978fd
      expression: 'nodata(/Dune HD by HTTP/dune.status.raw,5m)=1 and max(/Dune HD by HTTP/icmpping,5m)=1'
      name: 'Dune: Failed to fetch status data'
      priority: WARNING
      description: 'Zabbix has not received data from the Dune status API for 5 minutes while the device is reachable by ICMP.'
      manual_close: 'YES'
      dependencies:
        - name: 'Dune: Device is unavailable by ICMP'
          expression: 'max(/Dune HD by HTTP/icmpping,5m)=0'
        - name: 'Dune: HTTP API is unavailable'
          expression: 'max(/Dune HD by HTTP/net.tcp.service[http,,{$DUNE.API.PORT}],5m)=0 and max(/Dune HD by HTTP/icmpping,5m)=1'
      tags:
        - tag: scope
          value: availability
    - uuid: 2bc9b7a28ff04749b3ead4bb42cbbfb6
      expression: 'max(/Dune HD by HTTP/net.tcp.service[http,,{$DUNE.API.PORT}],5m)=0 and max(/Dune HD by HTTP/icmpping,5m)=1'
      name: 'Dune: HTTP API is unavailable'
      priority: WARNING
      description: 'ICMP ping is available, but the Dune HTTP API port is not reachable.'
      manual_close: 'YES'
      dependencies:
        - name: 'Dune: Device is unavailable by ICMP'
          expression: 'max(/Dune HD by HTTP/icmpping,5m)=0'
      tags:
        - tag: scope
          value: availability
