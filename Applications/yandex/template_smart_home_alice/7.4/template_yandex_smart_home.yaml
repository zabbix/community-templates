                  				value: function(value, unit) {
                  					return {value: value, unit: unit, value_mapping: false};
                  				}
                  			},
                  			pm1_density: {
                  				name: 'Загрязнение PM1',
                  				value: function(value, unit) {
                  					return {value: value, unit: 'mcg/m³', value_mapping: false};
                  				}
                  			},
                  			'pm2.5_density': {
                  				name: 'Загрязнение PM2.5',
                  				value: function(value, unit) {
                  					return {value: value, unit: 'mcg/m³', value_mapping: false};
                  				}
                  			},
                  			pm10_density: {
                  				name: 'Загрязнение PM10',
                  				value: function(value, unit) {
                  					return {value: value, unit: 'mcg/m³', value_mapping: false};
                  				}
                  			},
                  			power: {
                  				name: 'Потребляемая мощность',
                  				value: function(value, unit) {
                  					return {value: value, unit: 'W', value_mapping: false};
                  				}
                  			},
                  			pressure: {
                  				name: 'Давление',
                  				value: function(value, unit) {
                  					switch (unit) {
                  						case 'unit.pressure.atm':
                  							return {value: value, unit: 'атм', value_mapping: false};
                  						case 'unit.pressure.pascal':
                  							return {value: value, unit: 'Па', value_mapping: false};
                  						case 'unit.pressure.bar':
                  							return {value: value, unit: 'бар', value_mapping: false};
                  						case 'unit.pressure.mmhg':
                  							return {value: value, unit: 'мм рт. ст.', value_mapping: false};
                  					}
                  
                  					return {value: value, unit: unit, value_mapping: false};
                  				}
                  			},
                  			temperature: {
                  				name: 'Температура',
                  				value: function(value, unit) {
                  					switch (unit) {
                  						case 'unit.temperature.celsius':
                  							return {value: value, unit: '°C', value_mapping: false};
                  						case 'unit.temperature.kelvin':
                  							return {value: value, unit: '°K', value_mapping: false};
                  						case 'unit.temperature.fahrenheit':
                  							return {value: value, unit: '°F', value_mapping: false};
                  					}
                  
                  					return {value: value, unit: '°C', value_mapping: false};
                  				}
                  			},
                  			tvoc: {
                  				name: 'Загрязнение TVOC',
                  				value: function(value, unit) {
                  					return {value: value, unit: 'mcg/m³', value_mapping: false};
                  				}
                  			},
                  			voltage: {
                  				name: 'Напряжение',
                  				value: function(value, unit) {
                  					return {value: value, unit: 'V', value_mapping: false};
                  				}
                  			},
                  			water_level: {
                  				name: 'Уровень воды',
                  				value: function(value, unit) {
                  					return {value: value, unit: '%', value_mapping: false};
                  				}
                  			},
                  			water_meter: {
                  				name: 'Счетчик воды',
                  				value: function(value, unit) {
                  					return {value: value, unit: 'm³', value_mapping: false};
                  				}
                  			}
                  		}
                  	},
                  	
                  	rooms: {},
                  
                  	homes: {},
                  
                  	getField: function (data, path, separator, default_value) {
                  		if (typeof separator === 'undefined') {
                  			separator = '.';
                  		}
                  		var steps = path.split(separator);
                  		for (var i = 0; i < steps.length; i++) {
                  			var step = steps[i];
                  			if (typeof data !== 'object' || data === null || typeof data[step] === 'undefined') {
                  				if (typeof default_value === 'undefined') {
                  					throw 'Required field was not found: "' + path + '". Data: ' + JSON.stringify(data);
                  				}
                  				return default_value;
                  			}
                  
                  			data = data[step];
                  		}
                  
                  		return data;
                  	},
                  
                  	getRooms: function(data) {
                  		var rooms = yandex.getField(data, 'rooms', '.', []);
                  		for (var i = 0; i < rooms.length; i++) {
                  			this.rooms[rooms[i].id] = rooms[i].name;
                  		}
                  	},
                  
                  	getHomes: function(data) {
                  		var homes = yandex.getField(data, 'households', '.', []);
                  		for (var i = 0; i < homes.length; i++) {
                  			this.homes[homes[i].id] = homes[i].name;
                  		}
                  	},
                  
                  	discover: function(data) {
                  		var devices = yandex.getField(data, 'devices', '.', []);
                  
                  		var result = [];
                  
                  		for (var i = 0; i < devices.length; i++) {
                  
                  			if (typeof this.devices[devices[i].type] === 'undefined') {
                  				Zabbix.log(4, '[ YANDEX SMART HOME ] WARNING: Device type "' + devices[i].type + '" is not defined in the script. Device index: ' + i);
                  				continue;
                  			}
                  
                  			var device = {
                  				id: devices[i].id,
                  				name: devices[i].name,
                  				type: this.devices[devices[i].type],
                  				room: this.rooms[devices[i].room] ? this.rooms[devices[i].room] : devices[i].room,
                  				home: this.homes[devices[i].household_id] ? this.homes[devices[i].household_id] : devices[i].household_id,
                  				capabilities: [],
                  				properties: []
                  			}
                  
                  			var capabilities = this.getField(devices[i], 'capabilities', '.', []);
                  			for (var j = 0; j < capabilities.length; j++) {
                  
                  				if (typeof this.capability[capabilities[j].type] === 'undefined') {
                  					Zabbix.log(4, '[ YANDEX SMART HOME ] WARNING: Capability type "' + capabilities[j].type + '" is not defined in the script. Device index: ' + i + '. Capability index: ' + j);
                  					continue;
                  				}
                  
                  				try {
                  					var capability = {
                  						index: j,
                  						type: yandex.capability[capabilities[j].type].instance[capabilities[j].state.instance],
                  						value: this.capability[capabilities[j].type].value(capabilities[j].state.value, capabilities[j].state.instance, yandex.getField(capabilities[j], 'parameters.unit', '.', ''))
                  					}
                  					device.capabilities.push(capability);
                  				} catch (error) {
                  					throw 'Error parsing capability. Device index: ' + i + '. Capability index: ' + j + '. Additional info: ' + error;
                  				}
                  
                  			}
                  
                  			var properties = this.getField(devices[i], 'properties', '.', []);
                  			for (var j = 0; j < properties.length; j++) {
                  
                  				if (properties[j].type != 'devices.properties.float') {
                  					continue;
                  				}
                  
                  				if (typeof this.properties[properties[j].type][properties[j].parameters.instance] === 'undefined') {
                  					Zabbix.log(4, '[ YANDEX SMART HOME ] WARNING: Property type "' + properties[j].type + '" with instance "' + properties[j].parameters.instance + '" is not defined in the script. Device index: ' + i + '. Property index: ' + j);
                  					continue;
                  				}
                  
                  				try {
                  					var property = {
                  						index: j,
                  						type: yandex.properties[properties[j].type][properties[j].parameters.instance].name,
                  						value: this.properties[properties[j].type][properties[j].parameters.instance].value(properties[j].state.value, yandex.getField(properties[j], 'parameters.unit', '.', ''))
                  					}
                  					device.properties.push(property);
                  				} catch (error) {
                  					throw 'Error parsing property. Device index: ' + i + '. Property index: ' + j + '. Additional info: ' + error;
                  				}
                  
                  			 }
                  
                  			result.push(device);
                  		}
                  
                  		return result;
                  	}
                  };
                  
                  try {
                  
                  	var data = JSON.parse(value);
                  	yandex.getRooms(data);
                  	yandex.getHomes(data);
                  
                  	return JSON.stringify(yandex.discover(data));
                  
                  } catch (error) {
                  	error += (String(error).endsWith('.')) ? '' : '.';
                  	Zabbix.log(3, '[ YANDEX SMART HOME ] ERROR: ' + error);
                  
                  	return '[]';
                  }
