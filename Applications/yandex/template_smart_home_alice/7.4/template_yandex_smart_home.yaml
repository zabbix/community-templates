    - uuid: 734a821fe39c4b93a030930799d24830
      template: smart_home_yandex
      name: 'Умный дом с Алисой'
      description: 'Шаблон для мониторинга устройств умного дома, интегрированных с помощью API Яндекса. Позволяет получать сведения обо всех устройствах, комнатах и домах аккаунта одним запросом к методу `/v1.0/user/info` API умного дома Яндекса. Используется как источник данных для обнаружения устройств и для зависимых элементов с их показаниями.'
      wizard_ready: 'YES'
      readme: |
        ## Overview
        
        Шаблон предназначен для мониторинга устройств умного дома Яндекса (платформа «Дом с Алисой») через облачное API Яндекса по протоколу HTTP без использования внешних скриптов.
        
        Сбор данных выполняется одним HTTP-запросом к методу [`/v1.0/user/info`](https://yandex.ru/dev/dialogs/smart-home/doc/ru/reference-alice/user-info) API умного дома. В ответе возвращается список всех устройств, комнат и домов, привязанных к аккаунту Яндекса, а также текущие показания их умений (capabilities) и датчиков (properties). На основе этих данных автоматическое обнаружение (LLD) создаёт элементы данных для каждого устройства, его умения и датчика.
        
        Авторизация запросов выполняется по OAuth-токену, который передаётся в заголовке `Authorization: Bearer <токен>` и задаётся через макрос `{$YANDEX.SMART_HOME.TOKEN}`.
        
        ## Setup
        
        Для работы шаблона необходимо получить OAuth-токен с доступом к API умного дома Яндекса. Токен выпускается через сервис Яндекс OAuth и привязывается к зарегистрированному приложению. Подробности описаны в документации [Отладочный токен](https://yandex.ru/dev/id/doc/ru/tokens/debug-token).
        
        1. Зарегистрируйте приложение на странице [Яндекс OAuth](https://oauth.yandex.ru/client/new):
        
           - в разделе **Доступ к данным** добавьте права **Доступ к устройствам умного дома и сценариям** — для мониторинга достаточно права на просмотр сведений об устройствах умного дома и их показаниях (`iot:view`);
           - в разделе **Redirect URI** в качестве платформы выберите **Веб-сервисы** и укажите Redirect URI `https://oauth.yandex.ru/verification_code`;
           - сохраните приложение и скопируйте его идентификатор **ClientID** из свойств приложения.
        
        2. Войдите в Яндекс под той учётной записью, к данным умного дома которой нужен доступ.
        
        3. Откройте в браузере ссылку авторизации, подставив `ClientID` приложения:
        
           ```text
           https://oauth.yandex.ru/authorize?response_type=token&client_id=<ClientID приложения>
           ```
        
        4. При необходимости нажмите **Разрешить** на странице подтверждения доступа.
        
        5. После подтверждения браузер будет перенаправлен на адрес вида:
        
           ```text
           https://oauth.yandex.ru/verification_code#access_token=<OAuth-токен>&token_type=bearer&expires_in=<время жизни в секундах>
           ```
        
           Скопируйте значение параметра `access_token` — это и есть искомый OAuth-токен. Сохраните его в надёжном месте: сервис Яндекс OAuth не хранит выданные токены в публичном доступе.
        
        6. Укажите полученный токен в поле `Token` мастера настройки (макрос `{$YANDEX.SMART_HOME.TOKEN}`).
