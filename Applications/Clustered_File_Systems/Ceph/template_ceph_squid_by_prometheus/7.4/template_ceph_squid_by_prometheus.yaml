      discovery_rules:
        - uuid: 27da9a319d774db38a245806df1a2e6e
          name: 'Ceph device class capacity discovery'
          type: DEPENDENT
          key: ceph19.device.class.discovery
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: b7d44fbbc7254f0fbac81d6d1aeca600
              name: 'Device class {#DEVICE_CLASS}: Total bytes'
              type: DEPENDENT
              key: 'ceph19.cluster.by_class.total_bytes[{#DEVICE_CLASS}]'
              history: 7d
              value_type: FLOAT
              units: B
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'ceph_cluster_by_class_total_bytes{device_class="{#DEVICE_CLASS}"}'
                    - value
