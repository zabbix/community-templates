zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
    - uuid: 13cc9163654c491d95a73406b9ca8dea
      name: Templates/Cluster/Ceph
    - uuid: 794fdc3c0cd44a0fb6fa23c0c3706b8e
      name: Templates/Storage
  templates:
    - uuid: e9eb0017cb994854a84437008c2f954e
      template: 'Template App Ceph Squid by Prometheus endpoint'
      name: 'Template App Ceph Squid by Prometheus endpoint'
      description: |
        Ceph monitoring via Ceph mgr Prometheus endpoint. Built for Ceph 19.2.x (Squid); omits metrics not exported by the Squid prometheus module. Uses HTTP agent master items and dependent Prometheus-pattern items/LLD.

        Author: Alexander Rydzewski (https://github.com/AlexRydzewski)
        Project: https://github.com/AlexRydzewski/ceph-prometheus-zabbix-monitoring

        References:
        - PG state flags: https://docs.ceph.com/en/latest/rados/operations/pg-states/
        - mgr Prometheus: https://docs.ceph.com/en/latest/mgr/prometheus/
        - Optional Grafana dashboard: https://github.com/AlexRydzewski/ceph-prometheus-zabbix-monitoring/blob/main/grafana/ceph-cluster-overview.json
        - Built-in Zabbix dashboards: Ceph — Cluster health, Pool performance, OSD performance (see README.md)
      groups:
        - name: Templates/Applications
        - name: Templates/Cluster/Ceph
        - name: Templates/Storage
      items:
        - uuid: c1005af195c2407b899343905cd51e60
          name: 'Ceph: OSD blocklist count'
          type: DEPENDENT
          key: ceph19.cluster.osd.blocklist.count
          history: 7d
          value_type: FLOAT
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - ceph_cluster_osd_blocklist_count
                - value
                - ''
          master_item:
            key: ceph19.prometheus.metrics.1m
          tags:
            - tag: component
              value: osd
        - uuid: 56dbefe8e7e54f279b5c6cb3479ef3a9
          name: 'Ceph: Cluster total bytes'
          type: DEPENDENT
          key: ceph19.cluster.total_bytes
          history: 7d
          value_type: FLOAT
          units: B
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - ceph_cluster_total_bytes
                - value
                - ''
          master_item:
            key: ceph19.prometheus.metrics.3m
          tags:
            - tag: component
              value: capacity
        - uuid: 817971da22b640d289ae762d949e11cc
          name: 'Ceph: Cluster used bytes'
          type: DEPENDENT
          key: ceph19.cluster.used_bytes
          history: 7d
          value_type: FLOAT
