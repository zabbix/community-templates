                  value: capacity
                - tag: device_class
                  value: '{#DEVICE_CLASS}'
            - uuid: 967fbfe33a0f41d39a4e79888da00a80
              name: 'Device class {#DEVICE_CLASS}: Used bytes'
              type: DEPENDENT
              key: 'ceph19.cluster.by_class.used_bytes[{#DEVICE_CLASS}]'
              history: 7d
              value_type: FLOAT
              units: B
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'ceph_cluster_by_class_total_used_bytes{device_class="{#DEVICE_CLASS}"}'
                    - value
                    - ''
              master_item:
                key: ceph19.prometheus.metrics.3m
              tags:
                - tag: component
                  value: capacity
                - tag: device_class
                  value: '{#DEVICE_CLASS}'
            - uuid: d0c12747bc1f4b7a852ff30411624303
              name: 'Device class {#DEVICE_CLASS}: Used raw bytes'
              type: DEPENDENT
              key: 'ceph19.cluster.by_class.used_raw_bytes[{#DEVICE_CLASS}]'
              history: 7d
              value_type: FLOAT
              units: B
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'ceph_cluster_by_class_total_used_raw_bytes{device_class="{#DEVICE_CLASS}"}'
                    - value
                    - ''
              master_item:
                key: ceph19.prometheus.metrics.3m
              tags:
                - tag: component
                  value: capacity
                - tag: device_class
                  value: '{#DEVICE_CLASS}'
          master_item:
            key: ceph19.prometheus.metrics.3m
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - "\nvar lines = value.split(/\r?\n/);\nvar data = [];\nvar seen = {};\nfunction parseLabels(s) {\n    var labels = {};\n    var re = /([A-Za-z_][A-Za-z0-9_]*)=\"((?:\\\\.|[^\"\\\\])*)\"/g;\n    var m;\n    while ((m = re.exec(s)) !== null) {\n        labels[m[1]] = m[2].replace(/\\\\\"/g, '\"').replace(/\\\\\\\\/g, '\\\\');\n    }\n    return labels;\n}\nfor (var i = 0; i < lines.length; i++) {\n    var line = lines[i];\n    if (!line || line.charAt(0) === '#') continue;\n    var m = line.match(/^([a-zA-Z_:][a-zA-Z0-9_:]*)(?:\\{([^}]*)\\})?\\s+[-+]?([0-9]*\\.?[0-9]+|NaN|Inf|-Inf)/);\n    if (!m) continue;\n    if (m[1] !== \"ceph_cluster_by_class_total_bytes\") continue;\n    var labels = parseLabels(m[2] || \"\");\n    var row = {};\n    if (labels[\"device_class\"] !== undefined) row[\"{#DEVICE_CLASS}\"] = labels[\"device_class\"];\n    var uniq = JSON.stringify(row);\n    if (!seen[uniq]) { seen[uniq] = true; data.push(row); }\n}\nreturn JSON.stringify(data);"
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
        - uuid: 31f72338c66f4bd887030e77cf5b8497
          name: 'Ceph MGR discovery'
          type: DEPENDENT
          key: ceph19.mgr.discovery
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 35e7980e1b93491dbafa77e2d9a2b045
              name: 'MGR {#CEPH_DAEMON}: Status'
              type: DEPENDENT
              key: 'ceph19.mgr.status[{#CEPH_DAEMON}]'
              history: 7d
              value_type: FLOAT
              valuemap:
                name: 'Ceph MGR status'
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'ceph_mgr_status{ceph_daemon="{#CEPH_DAEMON}"}'
                    - value
                    - ''
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 10m
              master_item:
                key: ceph19.prometheus.metrics.1m
              tags:
                - tag: component
                  value: mgr
                - tag: mgr
                  value: '{#CEPH_DAEMON}'
          master_item:
            key: ceph19.prometheus.metrics.1m
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  
                  var lines = value.split(/\r?\n/);
                  var data = [];
                  var seen = {};
                  function parseLabels(s) {
                      var labels = {};
                      var re = /([A-Za-z_][A-Za-z0-9_]*)="((?:\\.|[^"\\])*)"/g;
                      var m;
                      while ((m = re.exec(s)) !== null) {
                          labels[m[1]] = m[2].replace(/\\"/g, '"').replace(/\\\\/g, '\\');
                      }
                      return labels;
                  }
                  for (var i = 0; i < lines.length; i++) {
                      var line = lines[i];
                      if (!line || line.charAt(0) === '#') continue;
                      var m = line.match(/^([a-zA-Z_:][a-zA-Z0-9_:]*)(?:\{([^}]*)\})?\s+[-+]?([0-9]*\.?[0-9]+|NaN|Inf|-Inf)/);
                      if (!m) continue;
                      var metric = m[1];
                      if (metric !== "ceph_mgr_status") continue;
                      var labels = parseLabels(m[2] || "");
                      var row = {};
                      if (labels["ceph_daemon"] !== undefined) row["{#CEPH_DAEMON}"] = labels["ceph_daemon"];
                      var uniq = JSON.stringify(row);
                      if (!seen[uniq]) {
                          seen[uniq] = true;
                          data.push(row);
                      }
                  }
                  return JSON.stringify(data);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
        - uuid: 6f72cd5a21f4424ca0deb3e66092946f
          name: 'Ceph MGR module discovery'
          type: DEPENDENT
          key: ceph19.mgr.module.discovery
          item_prototypes:
            - uuid: f10dedcffd6d43df9741a7ce6be8e606
              name: 'MGR module {#MGR_MODULE}: Can run'
              type: DEPENDENT
              key: 'ceph19.mgr.module.can_run[{#MGR_MODULE}]'
              history: 7d
              value_type: FLOAT
              preprocessing:
