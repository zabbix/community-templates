                - tag: component
                  value: exporter
          master_item:
            key: ceph19.prometheus.metrics.3m
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - "\nvar lines = value.split(/\r?\n/);\nvar data = [];\nvar seen = {};\nfunction parseLabels(s) {\n    var labels = {};\n    var re = /([A-Za-z_][A-Za-z0-9_]*)=\"((?:\\\\.|[^\"\\\\])*)\"/g;\n    var m;\n    while ((m = re.exec(s)) !== null) {\n        labels[m[1]] = m[2].replace(/\\\\\"/g, '\"').replace(/\\\\\\\\/g, '\\\\');\n    }\n    return labels;\n}\nfor (var i = 0; i < lines.length; i++) {\n    var line = lines[i];\n    if (!line || line.charAt(0) === '#') continue;\n    var m = line.match(/^([a-zA-Z_:][a-zA-Z0-9_:]*)(?:\\{([^}]*)\\})?\\s+[-+]?([0-9]*\\.?[0-9]+|NaN|Inf|-Inf)/);\n    if (!m) continue;\n    if (m[1] !== \"ceph_prometheus_collect_duration_seconds_sum\") continue;\n    var labels = parseLabels(m[2] || \"\");\n    var row = {};\n    if (labels[\"method\"] !== undefined) row[\"{#COLLECT_METHOD}\"] = labels[\"method\"];\n    var uniq = JSON.stringify(row);\n    if (row[\"{#COLLECT_METHOD}\"] !== undefined && !seen[uniq]) { seen[uniq] = true; data.push(row); }\n}\n return JSON.stringify(data);"
            - type: DISCARD_UNCHANGED_HEARTBEAT
