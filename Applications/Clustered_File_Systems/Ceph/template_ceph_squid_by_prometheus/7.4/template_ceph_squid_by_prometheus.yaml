        - uuid: 1ac2623b17c24c5d862b5c910bae690d
          name: 'Ceph: Health status'
          type: DEPENDENT
          key: ceph19.health.status
          history: 7d
          value_type: FLOAT
          description: '0=HEALTH_OK, 1=HEALTH_WARN, 2=HEALTH_ERR, as exported by Ceph prometheus module.'
