# ============================================================================
# kerio_agent.conf - Zabbix Agent UserParameter für Kerio Connect
# ============================================================================
# Ablageort:
#   Linux:   /etc/zabbix/zabbix_agentd.d/kerio_agent.conf
#   Windows: C:\Program Files\Zabbix Agent\zabbix_agentd.d\kerio_agent.conf
#
# SICHERHEITSHINWEIS:
#   Diese UserParameters ersetzen die unsicheren system.run[] Items.
#   Pfade sind hier hardcoded und nicht über Zabbix-Macros manipulierbar.
#   Kein AllowKey=system.run[*] notwendig!
#
#   Pfade ggf. an die lokale Installation anpassen.
# ============================================================================

# ===================== LINUX =====================

# --- Mail Queue ---
UserParameter=kerio.queue.count,find /opt/kerio/mailserver/store/queue -name '*.eml' 2>/dev/null | wc -l

# --- Store-Verzeichnis ---
UserParameter=kerio.store.size,du -sb /opt/kerio/mailserver/store 2>/dev/null | awk '{print $1}'
UserParameter=kerio.store.free,df -B1 /opt/kerio/mailserver/store 2>/dev/null | tail -1 | awk '{print $4}'

# --- Backup ---
# Alter des neuesten Backups in Stunden (-1 = kein Backup gefunden)
UserParameter=kerio.backup.age,export LC_ALL=C; NEWEST=$(find /opt/kerio/mailserver/store/backup -maxdepth 2 -type f \( -name '*.zip' -o -name '*.bak' -o -name '*.tgz' -o -name '*.gz' \) -printf '%T@\n' 2>/dev/null | sort -rn | head -1); if [ -n "$NEWEST" ]; then echo $(( ($(date +%s) - ${NEWEST%%.*}) / 3600 )); else echo -1; fi

# Backup-Verzeichnis Größe
UserParameter=kerio.backup.size,du -sb /opt/kerio/mailserver/store/backup 2>/dev/null | awk '{print $1}' || echo 0

# Anzahl Backup-Dateien
UserParameter=kerio.backup.count,find /opt/kerio/mailserver/store/backup -maxdepth 2 -type f \( -name '*.zip' -o -name '*.bak' -o -name '*.tgz' -o -name '*.gz' \) 2>/dev/null | wc -l

# --- Mailflow (separates Script) ---
UserParameter=kerio.mailflow,/usr/local/bin/kerio_mailstats.sh


