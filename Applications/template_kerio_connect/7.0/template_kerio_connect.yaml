        - $.license_days_left
      master_item:
        key: kerio_connect_check.sh["{HOST.CONN}","{$KERIO.ADMIN.PORT}","{$KERIO.CRED.FILE}"]
      tags:
      - tag: component
        value: mail-server
      - tag: component
