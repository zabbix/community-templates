  triggers:
  - uuid: 8a3bfb7f951344db894ab1527e8de2e7
    expression: last(/Template Kerio Connect Mailflow/kerio.mf.queue_count)>20 and last(/Template Kerio Connect Mailflow/kerio.mf.queue_oldest)>3600
      and max(/Template Kerio Connect Mailflow/kerio.mf.out_5m,1h)=0
    name: 'Kerio Mailflow: Queue blocked, no delivery for 1 hour - keine Zustellung seit 1h ( warten)'
    priority: HIGH
    description: The queue contains messages older than 1 hour and no mail has been delivered. Mail delivery is completely
      blocked. Check DNS, smarthost, firewall.
    tags:
    - tag: component
      value: mailflow
    - tag: scope
