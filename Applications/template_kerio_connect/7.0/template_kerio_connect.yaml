      - tag: target
        value: kerio-connect
      triggers:
      - uuid: dda9bcb11f824b57bd110d5f39392dba
        expression: last(/Template Kerio Connect by External check/kerio.api.license_days_left)<{$KERIO.LICENSE.DAYS.MAX.CRIT}
          and last(/Template Kerio Connect by External check/kerio.api.license_days_left)>=0
        name: 'Kerio Connect: License expires very soon'
        priority: HIGH
        dependencies:
        - name: 'Kerio Connect: License expires soon'
          expression: last(/Template Kerio Connect by External check/kerio.api.license_days_left)<{$KERIO.LICENSE.DAYS.MAX.WARN}
            and last(/Template Kerio Connect by External check/kerio.api.license_days_left)>=0
        tags:
        - tag: component
          value: license
        - tag: scope
          value: security
        - tag: target
          value: kerio-connect
      - uuid: 3cc2d7c8d080422ea3a672f1b68519e1
        expression: last(/Template Kerio Connect by External check/kerio.api.license_days_left)<{$KERIO.LICENSE.DAYS.MAX.WARN}
