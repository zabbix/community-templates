    macros:
    - macro: '{$KERIO.ADMIN.PORT}'
      value: '4040'
      description: Kerio Connect administration port
    - macro: '{$KERIO.BACKUP.AGE.MAX.CRIT}'
      value: '26'
      description: Maximum backup age in hours before alert
    - macro: '{$KERIO.CERT.DAYS.MAX.CRIT}'
      value: '7'
      description: SSL certificate critical days before expiry
    - macro: '{$KERIO.CERT.DAYS.MAX.WARN}'
      value: '30'
      description: SSL certificate warning days before expiry
    - macro: '{$KERIO.LICENSE.DAYS.MAX.CRIT}'
      value: '7'
      description: License critical days before expiry
    - macro: '{$KERIO.LICENSE.DAYS.MAX.WARN}'
      value: '30'
      description: License warning days before expiry
    - macro: '{$KERIO.MAIL.DOMAIN}'
      description: Mail domain for MX record check (z.B. example.com). Leer = MX-Check deaktiviert.
    - macro: '{$KERIO.PUBLIC.HOSTNAME}'
      description: Public FQDN of the mail server (z.B. mail.example.com). Wird für externe Erreichbarkeitstests und MX-Check
        verwendet. Leer = externe Checks deaktiviert.
    - macro: '{$KERIO.QUEUE.MAX.CRIT}'
      value: '200'
      description: Mail queue critical threshold
    - macro: '{$KERIO.QUEUE.MAX.WARN}'
      value: '50'
      description: Mail queue warning threshold
    - macro: '{$KERIO.CRED.FILE}'
      value: /etc/zabbix/kerio_credentials.conf
      description: Path to the credentials file on the Zabbix server/proxy. Override per host for multiple Kerio servers with
        different passwords.
    valuemaps:
    - uuid: 55352a2a7c8e4786836918d94c9bd1a6
      name: Service state
      mappings:
      - value: '0'
        newvalue: Down
      - value: '1'
        newvalue: Up
    tags:
    - tag: class
      value: software
    - tag: target
      value: kerio-connect
  - uuid: dc83a0f25e6e4a59b4e12a7c6f93201b
    template: Template Kerio Connect Mailflow
    name: Kerio Connect Mailflow
    description: 'Kerio Connect mailflow monitoring via log analysis.


      Parses mail.log and security.log to track inbound/outbound volume,

      deferred/bounced/rejected messages, queue status, and baseline deviations.


      Requires kerio_mailstats.sh deployed as UserParameter on the Kerio server.


      Author: Alexander Fox (PlaNet Fox IT Consulting) — https://github.com/linuser

      Version: 3.0'
    groups:
    - name: Templates/Applications
    items:
    - uuid: a79bda7dfaef4664a2aba754ff4866fe
      name: 'Kerio Mailflow: Get statistics'
      type: ZABBIX_ACTIVE
      key: kerio.mailflow
      delay: 300s
      value_type: TEXT
      description: JSON-Ausgabe des kerio_mailstats Scripts mit allen Mailflow-Kennzahlen. Wird alle 5 Minuten abgerufen.
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
      triggers:
      - uuid: b6c2917703e94607b21b39a1c5373dd9
        expression: nodata(/Template Kerio Connect Mailflow/kerio.mailflow,900s)=1
        name: 'Kerio Mailflow: No data from mailstats script'
        priority: WARNING
        description: No data received from kerio_mailstats.sh for 15 minutes. Check script permissions, gawk installation,
          and agent connectivity.
        tags:
        - tag: component
          value: mailflow
        - tag: scope
          value: availability
        - tag: target
          value: kerio-connect
    - uuid: ee390e2268d84725921bf7501ee789b2
      name: 'Kerio Mailflow: Bounced messages, 1h'
      type: DEPENDENT
      key: kerio.mf.bounced_1h
      trends: 90d
      description: Number of bounced messages in the last hour
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.bounced_1h
      master_item:
        key: kerio.mailflow
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
      triggers:
      - uuid: 4153fdeac141416bab66abf7db0f583d
        expression: last(/Template Kerio Connect Mailflow/kerio.mf.bounced_1h)>{$KERIO.MF.BOUNCED.MAX}
        name: 'Kerio Mailflow: High bounce rate ( 1h)'
        priority: AVERAGE
        description: More than {$KERIO.MF.BOUNCED.MAX} messages bounced in the last hour. Check for invalid recipient addresses
          or delivery issues.
        tags:
        - tag: component
          value: mailflow
        - tag: scope
          value: performance
        - tag: target
          value: kerio-connect
    - uuid: 8fc98e59f7294fdba57f7c8f0bc7998c
      name: 'Kerio Mailflow: Deferred messages, 1h'
      type: DEPENDENT
      key: kerio.mf.deferred_1h
      trends: 90d
      description: Number of deferred messages in the last hour
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.deferred_1h
      master_item:
        key: kerio.mailflow
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
      triggers:
      - uuid: 21f06d5ba9964854ac4298620beebde9
        expression: last(/Template Kerio Connect Mailflow/kerio.mf.deferred_1h)>{$KERIO.MF.DEFERRED.MAX}
        name: 'Kerio Mailflow: High deferred message rate ( 1h)'
        priority: AVERAGE
        description: More than {$KERIO.MF.DEFERRED.MAX} messages were deferred in the last hour. Temporary delivery failures
          are accumulating.
        tags:
        - tag: component
          value: mailflow
        - tag: scope
          value: performance
        - tag: target
          value: kerio-connect
    - uuid: 236354fb2839429084ad7551a62171c2
      name: 'Kerio Mailflow: Inbound messages, 1h'
      type: DEPENDENT
      key: kerio.mf.in_1h
      trends: 90d
      description: Number of inbound messages in the last hour
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.in_1h
      master_item:
        key: kerio.mailflow
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
      triggers:
      - uuid: f9c37c8ec4844bc494abcc02231a810a
        expression: avg(/Template Kerio Connect Mailflow/kerio.mf.in_1h,6h)<avg(/Template Kerio Connect Mailflow/kerio.mf.in_1h,7d)*{$KERIO.MF.BASELINE.FACTOR}
          and avg(/Template Kerio Connect Mailflow/kerio.mf.in_1h,7d)>{$KERIO.MF.BASELINE.MIN}
        name: 'Kerio Mailflow: Inbound volume unusually low'
        priority: WARNING
        description: The MX record for the mail domain cannot be resolved. Without a valid MX record, no external email can
          be delivered to this domain.
        tags:
        - tag: component
          value: mailflow
        - tag: scope
          value: performance
        - tag: target
          value: kerio-connect
      - uuid: 83dde713984546b98104d27ded1a6bd4
        expression: avg(/Template Kerio Connect Mailflow/kerio.mf.in_1h,2h)>avg(/Template Kerio Connect Mailflow/kerio.mf.in_1h,7d)*{$KERIO.MF.BASELINE.HIGH}
          and avg(/Template Kerio Connect Mailflow/kerio.mf.in_1h,7d)>{$KERIO.MF.BASELINE.MIN}
        name: 'Kerio Mailflow: Inbound volume unusually high'
        priority: WARNING
        description: Inbound mail volume exceeds {$KERIO.MF.BASELINE.HIGH}x the 7-day average. This may indicate a spam wave
          or misconfigured forwarding.
        tags:
        - tag: component
          value: mailflow
        - tag: scope
          value: security
        - tag: target
          value: kerio-connect
    - uuid: e93712f965224a13be4ea69a19c439fc
      name: 'Kerio Mailflow: Inbound messages, 5m'
      type: DEPENDENT
      key: kerio.mf.in_5m
      trends: 90d
      description: Number of inbound messages in the last 5 minutes
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.in_5m
      master_item:
        key: kerio.mailflow
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
      triggers:
      - uuid: 2fb5487a4d8948a8b3f01342c1156a9c
        expression: max(/Template Kerio Connect Mailflow/kerio.mf.in_5m,1h)=0
        name: 'Kerio Mailflow: No inbound mail for 1 hour'
        priority: AVERAGE
        description: No inbound email registered in the last hour. SMTP may be reachable but mail flow is disrupted.
        tags:
        - tag: component
          value: mailflow
        - tag: scope
          value: availability
        - tag: target
          value: kerio-connect
    - uuid: 2c0eb32e34114d1aa1883f7da99dc8ef
      name: 'Kerio Mailflow: Inbound messages, today'
      type: DEPENDENT
      key: kerio.mf.in_today
      description: Number of inbound messages since midnight
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.in_today
      master_item:
        key: kerio.mailflow
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
    - uuid: 2d48bdf6469043bd9e9b126fb3707f6f
      name: 'Kerio Mailflow: Outbound messages, 1h'
      type: DEPENDENT
      key: kerio.mf.out_1h
      trends: 90d
      description: Number of outbound/delivered messages in the last hour
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.out_1h
      master_item:
        key: kerio.mailflow
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
    - uuid: ec4ddd656d464b01ab5bd369f20d60fb
      name: 'Kerio Mailflow: Outbound messages, 5m'
      type: DEPENDENT
      key: kerio.mf.out_5m
      trends: 90d
      description: Number of outbound/delivered messages in the last 5 minutes
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.out_5m
      master_item:
        key: kerio.mailflow
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
      triggers:
      - uuid: 0924be647637424a8394ccbd83b5b453
        expression: max(/Template Kerio Connect Mailflow/kerio.mf.out_5m,1h)=0
        name: 'Kerio Mailflow: No outbound mail for 1 hour'
        priority: WARNING
        description: 'No outbound email delivered.


          Please check:

          - SMTP Relay / Smarthost

          - DNS Auflösung

          - mail queue

          - Zertifikate

          - Ausgehende Firewall-Regeln

          '
        tags:
        - tag: component
          value: mailflow
        - tag: scope
          value: availability
        - tag: target
          value: kerio-connect
    - uuid: 6be5331fda74421cb3ac59a85a4c0e85
      name: 'Kerio Mailflow: Outbound messages, today'
      type: DEPENDENT
      key: kerio.mf.out_today
      description: Number of outbound/delivered messages since midnight
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.out_today
      master_item:
        key: kerio.mailflow
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
    - uuid: 70a0c01246bf4e5ea47ee344f36c7e98
      name: 'Kerio Mailflow: Queue count'
      type: DEPENDENT
      key: kerio.mf.queue_count
      trends: 90d
      description: Current number of messages in the mail queue
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.queue_count
      master_item:
        key: kerio.mailflow
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
      triggers:
      - uuid: 971753f9b46a47599358c3f77501790d
        expression: last(/Template Kerio Connect Mailflow/kerio.mf.queue_count)>{$KERIO.MF.QUEUE.MAX}
        name: 'Kerio Mailflow: Queue is too large ()'
        priority: HIGH
        description: 'The mail queue exceeds {$KERIO.MF.QUEUE.MAX} messages. Possible causes: destination server unreachable,
          DNS failure, smarthost down, firewall blocking outbound SMTP.'
        tags:
        - tag: component
          value: mailflow
        - tag: scope
          value: performance
        - tag: target
          value: kerio-connect
      - uuid: d4d499e586da4da5b0ff9d7e4f5f0be6
        expression: last(/Template Kerio Connect Mailflow/kerio.mf.queue_count)>min(/Template Kerio Connect Mailflow/kerio.mf.queue_count,30m)
          and change(/Template Kerio Connect Mailflow/kerio.mf.queue_count)>0 and min(/Template Kerio Connect Mailflow/kerio.mf.queue_count,30m)>10
        name: 'Kerio Mailflow: Queue is growing (aktuell )'
        priority: AVERAGE
        description: The mail queue has been growing for at least 30 minutes. Even if the count is not critical yet, steady
          growth indicates a delivery problem.
        tags:
        - tag: component
          value: mailflow
        - tag: scope
          value: performance
        - tag: target
          value: kerio-connect
    - uuid: 7f3e137fa39646248463535ff9ebb48d
      name: 'Kerio Mailflow: Queue oldest message age'
      type: DEPENDENT
      key: kerio.mf.queue_oldest
      trends: 90d
      units: s
      description: Age of the oldest message in the mail queue in seconds
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.queue_oldest_sec
      master_item:
        key: kerio.mailflow
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
      triggers:
      - uuid: 6d9729b1dc5c4fd59faa965bc3e2d4fe
        expression: last(/Template Kerio Connect Mailflow/kerio.mf.queue_oldest)>{$KERIO.MF.QUEUE.OLDEST.MAX}
        name: 'Kerio Mailflow: Oldest message in queue is too old ()'
        priority: AVERAGE
        description: The oldest message in the queue has been waiting too long for delivery.
        tags:
        - tag: component
          value: mailflow
        - tag: scope
          value: performance
        - tag: target
          value: kerio-connect
    - uuid: dc128557a68f44b7b6d1d2a959afe12e
      name: 'Kerio Mailflow: Rejected messages, 1h'
      type: DEPENDENT
      key: kerio.mf.rejected_1h
      trends: 90d
      description: Number of rejected messages in the last hour (from security log)
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.rejected_1h
      master_item:
        key: kerio.mailflow
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
      triggers:
      - uuid: ef685dfd0ea241418ce9b55196e9916e
        expression: last(/Template Kerio Connect Mailflow/kerio.mf.rejected_1h)>{$KERIO.MF.REJECTED.MAX}
        name: 'Kerio Mailflow: High rejected message rate ( 1h)'
        priority: WARNING
        description: More than {$KERIO.MF.REJECTED.MAX} messages were rejected in the last hour (spam, blacklist, authentication
          failures).
        tags:
        - tag: component
          value: mailflow
        - tag: scope
          value: security
        - tag: target
          value: kerio-connect
    macros:
    - macro: '{$KERIO.MF.BASELINE.FACTOR}'
      value: '0.3'
      description: 'Faktor für Baseline-Vergleich: Alarm wenn aktueller Wert unter X% vom Durchschnitt (0.3 = 30%)'
    - macro: '{$KERIO.MF.BASELINE.HIGH}'
      value: '3'
      description: Alert when hourly volume exceeds this factor of the 7-day average (3 = 300%)
    - macro: '{$KERIO.MF.BASELINE.MIN}'
      value: '10'
      description: Mindest-Durchschnitt (Mails/h über 7d) damit Baseline-Trigger aktiv wird. Verhindert Fehlalarme auf Low-Traffic-Servern.
    - macro: '{$KERIO.MF.BOUNCED.MAX}'
      value: '20'
      description: Alert when more than X bounced messages per hour
    - macro: '{$KERIO.MF.DEFERRED.MAX}'
      value: '50'
      description: Alert when more than X deferred messages per hour
    - macro: '{$KERIO.MF.NO.IN.TIME}'
      value: '3600'
      description: 'Alert when no inbound mail for X seconds (default: 3600 = 1h)'
    - macro: '{$KERIO.MF.NO.OUT.TIME}'
      value: '3600'
      description: 'Alert when no outbound mail for X seconds (default: 3600 = 1h)'
    - macro: '{$KERIO.MF.QUEUE.MAX}'
      value: '100'
      description: Alert when mail queue exceeds X messages
    - macro: '{$KERIO.MF.QUEUE.OLDEST.MAX}'
      value: '1800'
      description: 'Alert when oldest message in queue exceeds X seconds (default: 1800 = 30min)'
    - macro: '{$KERIO.MF.REJECTED.MAX}'
      value: '100'
      description: Alert when more than X rejected messages per hour
    tags:
    - tag: class
      value: software
    - tag: target
      value: kerio-connect
