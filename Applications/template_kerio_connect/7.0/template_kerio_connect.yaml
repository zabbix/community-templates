zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: 83a06ae5b2684ffb873b25aa9a65e59d
    name: Templates/Applications
  templates:
  - uuid: e66688c930e1482b9d7fe19133bf889f
    template: Template Kerio Connect by External check
    name: Kerio Connect by External check
    description: 'Kerio Connect mail server monitoring via External check scripts and Zabbix agent.


      Monitors service availability, ports, API statistics, mail queue, store/backup,

      SSL certificates, logs, and mailflow.


      Tested with Kerio Connect 10.x on Debian 12 and Windows Server.


      Setup:

      1. Deploy kerio_connect_check.sh and kerio_check_ssl.sh to ExternalScripts directory

      2. Create credentials file /etc/zabbix/kerio_credentials.conf (chmod 600)

      3. Deploy kerio_agent.conf and kerio_mailstats.sh to the Kerio server

      4. See README.md for full installation instructions


      Author: Alexander Fox (PlaNet Fox IT Consulting) — https://github.com/linuser

      Version: 3.0'
    groups:
    - name: Templates/Applications
    items:
    - uuid: 63c06d87ace64de999b4e183491c944a
      name: 'Kerio Connect: Domains total'
      type: DEPENDENT
      key: kerio.api.domains_total
      trends: 90d
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.domains_total
      master_item:
        key: kerio_connect_check.sh["{HOST.CONN}","{$KERIO.ADMIN.PORT}","{$KERIO.CRED.FILE}"]
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
    - uuid: b01a3bc5147f4e2c831275165f8676e6
      name: 'Kerio Connect: IMAP connections'
      type: DEPENDENT
      key: kerio.api.imap_connections
      trends: 90d
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.imap_connections
      master_item:
        key: kerio_connect_check.sh["{HOST.CONN}","{$KERIO.ADMIN.PORT}","{$KERIO.CRED.FILE}"]
      tags:
      - tag: component
        value: mail-server
      - tag: target
        value: kerio-connect
    - uuid: 0547ffd7539248c5889871183ebe7953
