      name: 'Kerio Connect: MX record is not resolvable auflösbar'
      type: SIMPLE
      key: net.dns.record[,{$KERIO.MAIL.DOMAIN},MX]
      delay: 600s
      trends: 90d
      status: DISABLED
      description: The MX record for the mail domain cannot be resolved. Without a valid MX record, no external email can
        be delivered to this domain.
      tags:
