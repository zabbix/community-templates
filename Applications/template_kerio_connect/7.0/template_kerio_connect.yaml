    - tag: target
      value: kerio-connect
  - uuid: ffbf986ced484ed79cbd20a98da41d8c
    expression: last(/Template Kerio Connect Mailflow/kerio.mf.queue_count)>{$KERIO.MF.QUEUE.MAX}*5 and last(/Template Kerio
      Connect Mailflow/kerio.mf.queue_oldest)>7200
    name: 'Kerio Mailflow: Queue is critically full (, oldest >2h)'
    priority: HIGH
    description: The MX record for the mail domain cannot be resolved. Without a valid MX record, no external email can be
      delivered to this domain.
    dependencies:
