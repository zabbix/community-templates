  triggers:
    - uuid: 5beac572f3e0473396433f7091a22c96
      expression: |
        max(/Mattermost by HTTP/mattermost.api.status,3m)=0
        and
        last(/Mattermost by HTTP/web.test.fail[Mattermost Site Availability])=0
      name: 'Mattermost API is unavailable'
      priority: HIGH
      tags:
        - tag: application
          value: mattermost
        - tag: class
          value: software
        - tag: component
          value: api
    - uuid: e29516235fa34f27887e6b7dd7afb621
      expression: 'avg(/Mattermost by HTTP/web.test.time[Mattermost API Response Time,Ping API,resp],5m)>{$MM.API.RESPONSE.CRIT}'
      name: 'Mattermost API response time is high'
      priority: HIGH
      dependencies:
        - name: 'Mattermost API is unavailable'
          expression: |
            max(/Mattermost by HTTP/mattermost.api.status,3m)=0
            and
            last(/Mattermost by HTTP/web.test.fail[Mattermost Site Availability])=0
      tags:
        - tag: application
          value: mattermost
        - tag: class
          value: software
        - tag: component
          value: api
    - uuid: 156f799536274324bee42e8c4cca1caf
      expression: 'min(/Mattermost by HTTP/web.test.fail[Mattermost Site Availability],3m)<>0'
      name: 'Mattermost website is unavailable'
      priority: HIGH
      manual_close: 'YES'
      tags:
        - tag: application
          value: mattermost
        - tag: class
          value: software
        - tag: component
          value: website
    - uuid: 88ebebf5ca33406fbf013f660c868246
      expression: 'avg(/Mattermost by HTTP/web.test.time[Mattermost Site Availability,Mattermost_Site_Web_Check,resp],5m)>{$MM.WEB.RESPONSE.WARN}'
      name: 'Mattermost website response time is high'
      priority: AVERAGE
      dependencies:
        - name: 'Mattermost website is unavailable'
          expression: 'min(/Mattermost by HTTP/web.test.fail[Mattermost Site Availability],3m)<>0'
      tags:
        - tag: application
          value: mattermost
        - tag: class
          value: software
        - tag: component
          value: website
    - uuid: 3f5fc69821ed4db583be3b8b941757aa
      expression: 'last(/Mattermost by HTTP/web.test.rspcode[Mattermost Site Availability,Mattermost_Site_Web_Check])<>200'
      name: 'Mattermost website returned invalid HTTP code'
      priority: HIGH
      dependencies:
        - name: 'Mattermost website is unavailable'
          expression: 'min(/Mattermost by HTTP/web.test.fail[Mattermost Site Availability],3m)<>0'
      tags:
        - tag: application
          value: mattermost
        - tag: class
          value: software
        - tag: component
          value: website
    - uuid: 317bd0374ae544fb8fcf1c850a011d39
      expression: |
        max(/Mattermost by HTTP/mattermost.websocket.connections,15m)=0
        and
        last(/Mattermost by HTTP/mattermost.api.status)=1
      name: 'Mattermost websocket connections are zero'
      priority: WARNING
      tags:
        - tag: application
          value: mattermost
        - tag: class
          value: software
        - tag: component
          value: websocket
