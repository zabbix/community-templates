zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: a1b2c3d4e5f6478899aabbccddeeff00
      name: Templates/Applications
  templates:
    - uuid: 1122334455664a889900aabbccddeeff
      template: 'Mattermost by HTTP'
      name: 'Mattermost by HTTP'
      description: |
        Mattermost monitoring via REST API.
        
        Features:
                - API availability monitoring
                - Analytics monitoring
                - Users/channels/posts metrics
                - Optimized dependent items
                - Low API overhead
                - Bearer token authentication
        
        Author: Soroush Mehmandoust
        Version: 1.0
        Zabbix Version: 7.0+
        Mattermost Version: 11.x+
      groups:
        - name: Templates/Applications
      items:
        - uuid: 5b5bff4b6aa44ecc8b2b2d7c2841b131
          name: 'Mattermost Analytics Raw Data'
          type: HTTP_AGENT
          key: mattermost.analytics.raw
          history: 7d
          value_type: TEXT
          trends: '0'
          timeout: '{$MM.TIMEOUT}'
          url: '{$MM.URL}/api/v4/analytics/old?type=standard'
          headers:
            - name: Authorization
              value: 'Bearer {$MM.TOKEN}'
          tags:
            - tag: application
              value: mattermost
            - tag: component
              value: analytics
        - uuid: d579a21dabab418c8da2cc53f4f081a0
          name: 'Mattermost API Status'
          type: HTTP_AGENT
          key: mattermost.api.status
          history: 7d
          trends: '0'
          valuemap:
            name: 'Mattermost Health'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                    var obj = JSON.parse(value);
                    return (obj.status && String(obj.status).trim() === "OK") ? 1 : 0;
                  } catch (e) {
                    return (String(value).trim() === "OK") ? 1 : 0;
                  }
          timeout: '{$MM.TIMEOUT}'
          url: '{$MM.URL}/api/v4/system/ping'
          headers:
            - name: Authorization
              value: 'Bearer {$MM.TOKEN}'
          tags:
            - tag: application
              value: mattermost
            - tag: component
              value: api
        - uuid: f0d72f19d9b24aa8b63b74c0e9022cd4
          name: 'Private Channels'
          type: DEPENDENT
          key: mattermost.channels.private
          delay: '0'
          history: 90d
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.name==''channel_private_count'')].value.first()'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
          master_item:
            key: mattermost.analytics.raw
          tags:
            - tag: application
              value: mattermost
            - tag: component
              value: channels
        - uuid: d2cfd2b7395e458d8401778992882b7d
          name: 'Public Channels'
          type: DEPENDENT
          key: mattermost.channels.public
          delay: '0'
          history: 90d
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.name==''channel_open_count'')].value.first()'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
          master_item:
            key: mattermost.analytics.raw
          tags:
            - tag: application
              value: mattermost
            - tag: component
              value: channels
        - uuid: 5289dfad5dae4392b9246f60f87871ad
          name: 'Master DB Connections'
          type: DEPENDENT
          key: mattermost.db.master.connections
          delay: '0'
          history: 90d
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[?(@.name==''total_master_db_connections'')].value.first()'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
          master_item:
            key: mattermost.analytics.raw
          tags:
            - tag: application
              value: mattermost
            - tag: component
              value: database
          triggers:
            - uuid: fbebd53276434e43971ba30f7c131e2e
              expression: 'avg(/Mattermost by HTTP/mattermost.db.master.connections,5m)>{$MM.DB.CONNECTIONS.CRIT}'
              name: 'High number of Mattermost DB connections'
              priority: HIGH
              tags:
                - tag: application
                  value: mattermost
                - tag: class
                  value: software
                - tag: component
                  value: database
        - uuid: 13201989a1024d3a9baef6ddff5370c3
          name: 'Playbooks Active Runs'
          type: DEPENDENT
          key: mattermost.playbooks.active.runs
          delay: '0'
          history: 90d
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                       var activeRuns = 0;
                       if (data && Array.isArray(data.items)) {
                           for (var i = 0; i < data.items.length; i++) {
                               activeRuns += data.items[i].active_runs || 0;
                           }
                       }
                       return activeRuns;
          master_item:
            key: mattermost.playbooks.raw
          tags:
            - tag: application
              value: mattermost
            - tag: component
              value: playbooks
          triggers:
            - uuid: 70cfe4d32a50476a95aa8231aa10f638
              expression: 'last(/Mattermost by HTTP/mattermost.playbooks.active.runs)>{$MM.PLAYBOOKS.ACTIVE.WARN}'
              name: 'High number of active playbook runs'
              priority: WARNING
              tags:
                - tag: application
                  value: mattermost
                - tag: class
                  value: software
                - tag: component
                  value: playbooks
        - uuid: ea87555621c8484eb4d6d5dc58b369d4
          name: 'Playbooks Count'
          type: DEPENDENT
          key: mattermost.playbooks.count
          delay: '0'
          history: 90d
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.total_count
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
          master_item:
            key: mattermost.playbooks.raw
          tags:
            - tag: application
              value: mattermost
            - tag: component
              value: playbooks
        - uuid: 6cf4e531bcc447cdb065e6e7641cee16
