      expression: 'change(/Template UNV NVR/nvr.device.code)<>0 or change(/Template UNV NVR/nvr.device.model)<>0 or change(/Template UNV NVR/nvr.device.hardware)<>0 or change(/Template UNV NVR/nvr.device.type)<>0 or change(/Template UNV NVR/nvr.device.manufacturer)<>0 or change(/Template UNV NVR/nvr.device.proto)<>0 or change(/Template UNV NVR/nvr.device.serial)<>0'
      recovery_mode: NONE
