          triggers:
            - uuid: 2f1944e479fc47e687e204a4ab10c462
              expression: 'last(/Template UNV NVR/nvr.device.name,#1)<>last(/Template UNV NVR/nvr.device.name,#2)'
              recovery_mode: NONE
              name: 'Device name changed'
              event_name: 'Device name changed: {?last(/{HOST.HOST}/nvr.device.name,#2)} → {?last(/{HOST.HOST}/nvr.device.name,#1)}'
              priority: INFO
              type: MULTIPLE
              manual_close: 'YES'
        - uuid: b48b5382f77f4578b51c09c62974acfd
          name: 'Proto Name'
          type: DEPENDENT
          key: nvr.device.proto
          value_type: TEXT
          inventory_link: CHASSIS
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.Response.Data.ProtoName
            - type: JAVASCRIPT
              parameters:
                - |
                  var decoded = atob(value);
                  
                  if (decoded instanceof Uint8Array) {
                      var result = "";
                      for (var i = 0; i < decoded.length; i++) {
                          result += String.fromCharCode(decoded[i]);
                      }
                      return result;
                  }
                  
                  return decoded;
          master_item:
            key: nvr.device.raw
