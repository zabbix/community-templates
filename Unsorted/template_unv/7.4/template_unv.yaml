      discovery_rules:
        - uuid: 577f33c88c474a81b9bea2d54905f45f
          name: 'LLD Camera'
          type: DEPENDENT
          key: nvr.camera.discovery
          lifetime: 90d
          host_prototypes:
            - uuid: 49d76bd36b1542c1b4925c820b38c099
              host: '{#NVR}_cam{#ID_SAFE}'
              name: '{#NVR}_cam{#ID}: {#NAME}'
              inventory_mode: AUTOMATIC
              group_links:
                - group:
                    name: Cameras
                - group:
                    name: 'Template UNVIEW NVR'
              group_prototypes:
                - name: '{#CAMERA_GROUP}'
              templates:
                - name: 'Template UNV Camera'
              macros:
                - macro: '{$CAMERA.MODEL}'
                  value: '{#MODEL}'
                  description: 'Модель камеры (удалить)'
                - macro: '{$CAMERA.SERIAL}'
                  value: '{#SERIAL}'
                  description: 'Серийный номер камеры (удалить)'
                - macro: '{$CHANNEL.ID}'
                  value: '{#ID}'
                  description: 'Номер канала на регистраторе'
                - macro: '{$CHANNEL.NVR}'
                  value: '{#NVR}'
                  description: 'Регистратор куда подключена камера'
              custom_interfaces: 'YES'
              interfaces:
                - ip: '{#CAMERA_IP}'
                  port: '{#CAMERA_PORT}'
          master_item:
            key: nvr.channels.full
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  
                  if (!data.channels) {
                      return JSON.stringify({ data: [] });
                  }
                  
                  function sanitize(str) {
                      return String(str).replace(/[^a-zA-Z0-9._-]/g, "_");
                  }
                  
                  var out = [];
                  
                  for (var i = 0; i < data.channels.length; i++) {
                      var ch = data.channels[i];
                  
                      out.push({
                          "{#ID}": ch.id,
                          "{#ID_SAFE}": sanitize(ch.id),
                          "{#NAME}": ch.device_name,
                          "{#NAME_SAFE}": sanitize(ch.device_name),
                          "{#NVR}": ch.nvr,
                          "{#CAMERA_GROUP}": ch.camera_group,
                          "{#MODEL}": ch.model,
                          "{#MODEL_SAFE}": sanitize(ch.model),
                          "{#SERIAL}": ch.serial,
                          "{#SERIAL_SAFE}": sanitize(ch.serial),
                          "{#CAMERA_IP}": sanitize(ch.ip),
                          "{#CAMERA_PORT}": sanitize(ch.port)
                      });
                  }
                  
                  return JSON.stringify({ data: out });
      macros:
        - macro: '{$CAMERA.GROUP}'
          value: Cameras
          description: 'Заменить в NVR хосте на группу, в которую должны быть добавлены все камеры'
        - macro: '{$CAMERA.ICON.DEFAULT}'
          value: '189'
          description: 'ID иконки камеры'
        - macro: '{$NVR.ICON.DEFAULT}'
          value: '16'
        - macro: '{$NVR.PASSWORD}'
          type: SECRET_TEXT
          description: Password
        - macro: '{$NVR.SCHEMA}'
          value: http
          description: 'HTTP or HTTPS'
        - macro: '{$NVR.USERNAME}'
          value: admin
          description: Login
        - macro: '{$TEMPLATE_UNVIEW_NVR.API_TOKEN}'
          type: SECRET_TEXT
      valuemaps:
        - uuid: 75a13b6539fc4decb4335e6d3954df21
          name: 'NVR Device Type'
          mappings:
            - value: '0'
              newvalue: IPC
            - value: '1'
              newvalue: NVR
            - value: '2'
              newvalue: DVR
            - value: '3'
              newvalue: VMS
        - uuid: 1cc3eac207184e60ae56ba7605209c1f
          name: 'Status code'
          mappings:
            - value: '0'
              newvalue: OK
            - type: DEFAULT
              newvalue: ERROR
