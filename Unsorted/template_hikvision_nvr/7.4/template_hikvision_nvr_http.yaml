        - uuid: 1f8349eb724d47d0b333a6c4a1bdde35
          name: 'System contact'
          type: DEPENDENT
          key: hikvision_nvr.system_contact
          value_type: CHAR
          inventory_link: CONTACT
          preprocessing:
