          master_item:
            key: hikvision_nvr.get_info
          tags:
            - tag: component
              value: network
        - uuid: d02359d4e38341a4ab40302b813cfa5b
          name: 'Memory available'
          type: DEPENDENT
          key: hikvision_nvr.memory.available
          value_type: FLOAT
          units: B
          description: 'Available memory in MB'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.DeviceStatus.MemoryList.Memory.memoryAvailable
              error_handler: DISCARD_VALUE
            - type: REGEX
              parameters:
                - '([0-9.]+)'
                - \1
            - type: MULTIPLIER
              parameters:
                - '1048576'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: hikvision_nvr.get_status
          tags:
            - tag: component
              value: memory
        - uuid: 8aaf28ad8f944b9cb95119f766bf7523
          name: 'Memory usage'
          type: DEPENDENT
          key: hikvision_nvr.memory.usage
