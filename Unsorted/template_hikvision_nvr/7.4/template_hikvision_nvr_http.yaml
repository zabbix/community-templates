          tags:
            - tag: component
              value: system
        - uuid: bd50ccb5f8894990a7bebad49d9b64e9
          name: 'Serial number'
          type: DEPENDENT
          key: hikvision_nvr.serial_number
          value_type: CHAR
          inventory_link: SERIALNO_A
          preprocessing:
            - type: JSONPATH
