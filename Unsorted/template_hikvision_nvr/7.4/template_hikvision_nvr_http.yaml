zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: d37f71c7e3f7469bab645852a69a2018
      name: 'Templates/Video surveillance'
  templates:
    - uuid: bd94b65cadee47f5968776f7595d99f4
      template: 'Hikvision NVR by HTTP'
      name: 'Hikvision NVR by HTTP'
      description: |
        This template is designed for the effortless deployment of Hikvision NVRs monitoring by Zabbix via HTTP and doesn't require any external scripts.
        
        Sample device overview page:
        https://www.hikvision.com/en/products/IP-Products/Network-Cameras/
        
        Setup:
        1. Add IP address as zabbix-agent (for ping)
        
        2. Set the hostname or IP address of the Hikvision ISAPI host in the '{$HIKVISION_ISAPI_HOST}' macro.
        
        3. Set the user name and password in the '{$PASSWORD}' and '{$USER}' macros.
        
        4. Change other macros according to your NVR configuration if necessary.
        Copied and modified from Hikvision template
        
        Tested on Hikvision DS-7616NI-K2/16P
      templates:
        - name: 'ICMP Ping'
      groups:
        - name: 'Templates/Video surveillance'
      items:
        - uuid: 2cb5e6d63c3d427081dfd25695fb7f2b
          name: 'CPU utilization'
          type: DEPENDENT
          key: hikvision_nvr.cpu.util
          value_type: FLOAT
          units: '%'
          description: 'CPU utilization in %'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.DeviceStatus.CPUList.CPU.cpuUtilization
              error_handler: DISCARD_VALUE
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: hikvision_nvr.get_status
          tags:
            - tag: component
              value: cpu
          triggers:
            - uuid: 534fd234ef2b49f69f38ef33d8844dea
              expression: 'min(/Hikvision NVR by HTTP/hikvision_nvr.cpu.util,5m)>{$CPU.UTIL.CRIT}'
              name: 'Hikvision: High CPU utilization'
              event_name: 'Hikvision: High CPU utilization (over {$CPU.UTIL.CRIT}% for 5m)'
              opdata: 'Current utilization: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'The CPU utilization is too high. The system might be slow to respond.'
              tags:
                - tag: scope
                  value: performance
        - uuid: c5840e52059e42ae90c4cfb30a4e6208
          name: 'Current device time'
          type: DEPENDENT
          key: hikvision_nvr.current_device_time
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.DeviceStatus.currentDeviceTime
              error_handler: DISCARD_VALUE
          master_item:
            key: hikvision_nvr.get_status
          tags:
            - tag: component
              value: system
        - uuid: 45c72a0d522f413d846f7262c4e4684a
