            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var out = [];
                  
                  var hdds = data.storage && data.storage.hddList && data.storage.hddList.hdd ? data.storage.hddList.hdd : [];
                  if (!Array.isArray(hdds)) {
                      hdds = [hdds];
                  }
                  
                  hdds.forEach(function(disk) {
