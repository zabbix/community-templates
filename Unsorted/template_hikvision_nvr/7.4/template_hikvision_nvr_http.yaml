        - uuid: 2b570db14deb4bf6b0dfcfc91dca1c68
          name: 'Firmware version'
          type: DEPENDENT
          key: hikvision_nvr.firmware_version
          value_type: CHAR
          inventory_link: SOFTWARE_APP_A
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.DeviceInfo.firmwareVersion
              error_handler: DISCARD_VALUE
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 24h
          master_item:
            key: hikvision_nvr.get_info
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 773b4d93194243f48cda5fa2ed7e76fd
              expression: 'last(/Hikvision NVR by HTTP/hikvision_nvr.firmware_version,#1)<>last(/Hikvision NVR by HTTP/hikvision_nvr.firmware_version,#2) and length(last(/Hikvision NVR by HTTP/hikvision_nvr.firmware_version))>0'
              name: 'Hikvision: Version has changed'
              event_name: 'Hikvision: Version has changed (new version: {ITEM.VALUE})'
              priority: INFO
              description: 'Hikvision camera version has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
        - uuid: 7dbabaec74eb430692d2538bfad080c9
          name: 'Get device info'
          type: HTTP_AGENT
          key: hikvision_nvr.get_info
          history: '0'
          value_type: TEXT
          authtype: DIGEST
          username: '{$USER}'
          password: '{$PASSWORD}'
          description: 'Used to get the device information'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '{"html":{"head":{"title":"Connection error"}}}'
            - type: XML_TO_JSON
              error_handler: CUSTOM_VALUE
              error_handler_params: '{"html":{"head":{"title":"Connection error"}}}'
          url: 'http://{$HIKVISION_ISAPI_HOST}:{$HIKVISION_ISAPI_PORT}/ISAPI/System/deviceInfo'
          status_codes: '200,401'
          tags:
            - tag: component
              value: raw
        - uuid: c1fd75600fd94884b4e3bd70327fee7d
          name: 'Get device info: Login status'
          type: DEPENDENT
          key: hikvision_nvr.get_info.login_status
          valuemap:
            name: 'Login status'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  
                  if ("html" in data){
                  	if (data.html.head.title === "Document Error: Unauthorized")
                  		{return 1}
                  	else if (data.html.head.title === "Connection error")
                  		{return 2}
                  }
                  return 0;
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: hikvision_nvr.get_info
          tags:
            - tag: component
              value: system
        - uuid: 7f07c53d7cf4493d9b706585bcfbd954
          name: 'Get system status'
          type: HTTP_AGENT
          key: hikvision_nvr.get_status
          history: '0'
          value_type: TEXT
          authtype: DIGEST
          username: '{$USER}'
          password: '{$PASSWORD}'
          description: 'It is used to get the status information of the device'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '{"html":{"head":{"title":"Connection error"}}}'
            - type: XML_TO_JSON
              error_handler: CUSTOM_VALUE
              error_handler_params: '{"html":{"head":{"title":"Connection error"}}}'
          url: 'http://{$HIKVISION_ISAPI_HOST}:{$HIKVISION_ISAPI_PORT}/ISAPI/System/status'
          status_codes: '200,401'
          tags:
            - tag: component
              value: raw
        - uuid: 95cd16e115374fd98d15d01e74810022
          name: 'Get system status: Login status'
          type: DEPENDENT
          key: hikvision_nvr.get_status.login_status
          valuemap:
            name: 'Login status'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  
                  if ("html" in data){
                  	if (data.html.head.title === "Document Error: Unauthorized")
                  		{return 1}
                  	else if (data.html.head.title === "Connection error")
                  		{return 2}
                  }
                  return 0;
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          master_item:
            key: hikvision_nvr.get_status
          tags:
            - tag: component
              value: system
        - uuid: 75c2822b5e744ccc87d856a417492e01
          name: MACaddress
          type: DEPENDENT
          key: hikvision_nvr.mac_address
          value_type: CHAR
          inventory_link: MACADDRESS_A
          preprocessing:
