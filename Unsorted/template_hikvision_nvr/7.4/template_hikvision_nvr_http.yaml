        - uuid: c2a91302a6fa49998d34e6e46e58e1ce
          name: Uptime
          type: DEPENDENT
          key: hikvision_nvr.uptime
          trends: '0'
          units: uptime
          description: 'The system uptime expressed in the following format: "N days, hh:mm:ss".'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.DeviceStatus.deviceUpTime
              error_handler: DISCARD_VALUE
          master_item:
            key: hikvision_nvr.get_status
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 6de7a12a1b1943718f48bff560b5abaa
              expression: 'last(/Hikvision NVR by HTTP/hikvision_nvr.uptime)<10m'
              name: 'Hikvision: NVR has been restarted'
              event_name: 'Hikvision: NVR has been restarted (uptime < 10m)'
              priority: INFO
              description: 'Uptime is less than 10 minutes.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
      discovery_rules:
        - uuid: 3ea58a005b904776ba58fe61c9b8b362
          name: 'Cameras discovery'
          type: HTTP_AGENT
          key: hikvision_nvr.channels.discovery
          delay: 1h
          authtype: DIGEST
          username: '{$USER}'
          password: '{$PASSWORD}'
          item_prototypes:
            - uuid: 6500055b4d804264b7bb17c2e9825cf5
              name: 'Camera status discovery: Camera {#CAM_ID}'
              type: HTTP_AGENT
              key: 'hikvision_nvr.camera.status[{#CAM_ID}.info]'
              delay: 5m
              value_type: TEXT
              authtype: DIGEST
              username: '{$USER}'
              password: '{$PASSWORD}'
              description: 'Used to get the cameras information'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '{"html":{"head":{"title":"Connection error"}}}'
                - type: XML_TO_JSON
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '{"html":{"head":{"title":"Connection error"}}}'
              url: 'http://{$HIKVISION_ISAPI_HOST}:{$HIKVISION_ISAPI_PORT}/ISAPI/ContentMgmt/InputProxy/channels/{#CAM_ID}/status'
              status_codes: '200,401'
              tags:
                - tag: component
                  value: raw
            - uuid: 5b5827ff43c14354bbe19e81cedab77b
              name: 'Camera {#CAM_ID}: Connection'
              type: DEPENDENT
              key: 'hikvision_nvr.camera[{#CAM_ID}.connection]'
              value_type: CHAR
              valuemap:
                name: 'Online status'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.InputProxyChannelStatus.chanDetectResult
              master_item:
                key: 'hikvision_nvr.camera.status[{#CAM_ID}.info]'
              tags:
                - tag: component
                  value: camera
            - uuid: 66fb7cc1fb934eb1868c7692ed61eb04
              name: 'Camera discovery: Camera {#CAM_ID}'
              type: HTTP_AGENT
              key: 'hikvision_nvr.camera[{#CAM_ID}.info]'
              delay: 5m
              value_type: TEXT
              authtype: DIGEST
              username: '{$USER}'
              password: '{$PASSWORD}'
              description: 'Used to get the cameras information'
              preprocessing:
                - type: CHECK_NOT_SUPPORTED
                  parameters:
                    - '-1'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '{"html":{"head":{"title":"Connection error"}}}'
                - type: XML_TO_JSON
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '{"html":{"head":{"title":"Connection error"}}}'
              url: 'http://{$HIKVISION_ISAPI_HOST}:{$HIKVISION_ISAPI_PORT}/ISAPI/ContentMgmt/InputProxy/channels'
              status_codes: '200,401'
              tags:
                - tag: component
                  value: raw
            - uuid: dd775beab40f4893acea801e0e3b5aeb
              name: 'Camera {#CAM_ID}: IP Address'
              type: DEPENDENT
              key: 'hikvision_nvr.camera[{#CAM_ID}.ip]'
              value_type: TEXT
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.InputProxyChannelList.InputProxyChannel[{#JSON_ID}].sourceInputPortDescriptor.ipAddress'
              master_item:
                key: 'hikvision_nvr.camera[{#CAM_ID}.info]'
              tags:
                - tag: component
                  value: camera
            - uuid: e4bcffd5dade4be58c52ba081801bc57
              name: 'Camera {#CAM_ID}: Name'
              type: DEPENDENT
              key: 'hikvision_nvr.camera[{#CAM_ID}.name]'
              value_type: TEXT
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.InputProxyChannelList.InputProxyChannel[{#JSON_ID}].name'
              master_item:
                key: 'hikvision_nvr.camera[{#CAM_ID}.info]'
              tags:
                - tag: component
                  value: camera
            - uuid: 07b4c95e445b472fa22fe4c216f7b613
              name: 'Camera {#CAM_ID}: Proxy protocol'
              type: DEPENDENT
              key: 'hikvision_nvr.camera[{#CAM_ID}.proxy.protocol]'
              value_type: TEXT
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.InputProxyChannelList.InputProxyChannel[{#JSON_ID}].sourceInputPortDescriptor.proxyProtocol'
              master_item:
                key: 'hikvision_nvr.camera[{#CAM_ID}.info]'
              tags:
                - tag: component
                  value: camera
            - uuid: 7fe549223ae54f2db8c57f0cc560aaf3
              name: 'Camera {#CAM_ID}: status'
              type: DEPENDENT
              key: 'hikvision_nvr.camera[{#CAM_ID}.status]'
              value_type: CHAR
              valuemap:
                name: 'Online status'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.InputProxyChannelStatus.online
              master_item:
                key: 'hikvision_nvr.camera.status[{#CAM_ID}.info]'
              tags:
                - tag: component
                  value: camera
          trigger_prototypes:
            - uuid: f5b71f8cb6154c2994372ace3edbf260
              expression: |
                last(/Hikvision NVR by HTTP/hikvision_nvr.camera[{#CAM_ID}.status])=0
                and last(/Hikvision NVR by HTTP/hikvision_nvr.camera[{#CAM_ID}.connection])<>"notExist"
              name: 'Hikvision: Camera {#CAM_ID} is offline'
              event_name: 'Hikvision: Camera {#CAM_ID} is offline. Check status.'
              priority: HIGH
              description: 'SMART status of HDD is not normal.'
              tags:
                - tag: scope
                  value: high
          url: 'http://{$HIKVISION_ISAPI_HOST}:{$HIKVISION_ISAPI_PORT}/ISAPI/ContentMgmt/InputProxy/channels'
          status_codes: '200,401'
          preprocessing:
            - type: XML_TO_JSON
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var out = [];
                  
                  var channels = data.InputProxyChannelList.InputProxyChannel;
                  if (!Array.isArray(channels)) {
                      channels = [channels];
                  }
                  
                  channels.forEach(function (cam) {
                      out.push({
                          "{#CAM_ID}": cam.id,
                          "{#JSON_ID}": parseInt(cam.id, 10) - 1,
                          "{#CAM_NAME}": cam.name,
                          "{#CAM_IP}": cam.sourceInputPortDescriptor.ipAddress,
                          "{#CAM_PORT}": cam.sourceInputPortDescriptor.managePortNo,
                          "{#CAM_PROT}": cam.sourceInputPortDescriptor.proxyProtocol
                      });
                  });
                  
                  return JSON.stringify(out);
