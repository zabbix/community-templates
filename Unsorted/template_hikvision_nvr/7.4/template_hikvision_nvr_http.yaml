          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 47c217190034460fa528079c821bb72b
              expression: 'last(/Hikvision NVR by HTTP/hikvision_nvr.serial_number,#1)<>last(/Hikvision NVR by HTTP/hikvision_nvr.serial_number,#2) and length(last(/Hikvision NVR by HTTP/hikvision_nvr.serial_number))>0'
              name: 'Hikvision: NVR has been replaced'
              event_name: 'Hikvision: NVR has been replaced (new serial number received)'
              priority: INFO
              description: 'NVR serial number has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
