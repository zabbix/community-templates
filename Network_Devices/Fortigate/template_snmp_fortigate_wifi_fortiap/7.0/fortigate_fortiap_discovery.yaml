zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 7df96b18c230490a9a0a9e2307226338
      name: Templates
  host_groups:
    - uuid: 5c8f2b1a3d4e4f6a8b8c9d0e1f2a3b4c
      name: 'Managed FortiAPs'
  templates:
    # --- PARENT TEMPLATE ---
    - uuid: 81db7e8f92024e3688e299c10167d384
      template: 'SNMP Fortigate Wifi Access Points'
      name: 'SNMP Fortigate Wifi Access Points'
      description: |
        FortiAP Monitoring via FortiGate Controller.
        Based on work by Alexander Bakaldin (https://github.com/abakaldin).
      groups:
        - name: Templates
      discovery_rules:
        - uuid: 1fb7206268f3462f825db144e96461aa
          name: 'Fortigate Wifi Access Points Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#WTP_ID},.1.3.6.1.4.1.12356.101.14.4.4.1.1,{#WTP_NAME},.1.3.6.1.4.1.12356.101.14.4.3.1.3]'
          key: fgWcWtpDiscovery
          delay: 1h
          host_prototypes:
            - uuid: b7e3a9c12b5d44e8b9a2c3b4d5e6f7a8
              host: '{#WTP_NAME}'
              name: 'FortiAP: {#WTP_NAME}'
              group_links:
                - group:
                    name: 'Managed FortiAPs'
              templates:
                - name: 'SNMP FortiAP Instance'
              macros:
                - macro: '{$WTP_INDEX}'
                  value: '{#SNMPINDEX}'
                - macro: '{$WTP_ID}'
                  value: '{#WTP_ID}'
              inventory_mode: AUTOMATIC

    # --- CHILD TEMPLATE ---
    - uuid: c5d6e7f8a9b041d2a3f4a5b6c7d8e9f0
      template: 'SNMP FortiAP Instance'
      name: 'SNMP FortiAP Instance'
      groups:
        - name: Templates
      items:
        - uuid: d05988aff76c49e2aadb0ec6e1ea7f13
          name: 'AP Name'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.12356.101.14.4.3.1.3.{$WTP_INDEX}'
          key: 'fgWcWtpConfigWtpName'
          delay: 300s
          history: 1w
          trends: '0'
          value_type: CHAR
          tags:
            - tag: Application
              value: 'AP Info'
        - uuid: 738354e727cb47c3b566f86a5d8fed1f
          name: 'Profile Name'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.12356.101.14.4.4.1.11.{$WTP_INDEX}'
          key: 'fgWcWtpSessionWtpProfileName'
          delay: 1h
          history: 1w
          trends: '0'
          value_type: CHAR
          tags:
            - tag: Application
              value: 'AP Info'
        - uuid: e9432bff425b48588f8b4f67995e47ab
          name: 'Sw Version'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.12356.101.14.4.4.1.14.{$WTP_INDEX}'
          key: 'fgWcWtpSessionWtpSwVersion'
          delay: 1h
          history: 1w
          trends: '0'
          value_type: CHAR
          tags:
            - tag: Application
              value: 'AP Info'
        - uuid: 06c34ed435f34abc954db0d122fc2ecd
          name: 'Connection State'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.12356.101.14.4.4.1.7.{$WTP_INDEX}'
          key: 'fgWcWtpSessionConnectionState'
          delay: 60s
          history: 1w
          valuemap:
            name: fgWcWtpSessionConnectionState
          tags:
            - tag: Application
              value: 'AP Status'
          triggers:
            - uuid: 1b9b95937b664cdf90a02e38d5a5123d
              expression: 'last(/SNMP FortiAP Instance/fgWcWtpSessionConnectionState,#3)<>2'
              name: 'FortiAP {$WTP_ID} is Offline'
              priority: HIGH
        - uuid: 113f44434da64fcca8eeb6a18b1b756c
          name: 'CPU Usage'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.12356.101.14.4.4.1.20.{$WTP_INDEX}'
          key: 'fgWcWtpSessionWtpCpuUsage'
          delay: 60s
          history: 1w
          units: '%'
          tags:
            - tag: Application
              value: 'AP Performance'
        - uuid: 736ae41193ff470a946c9479118bfa05
          name: 'Memory Usage'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.12356.101.14.4.4.1.21.{$WTP_INDEX}'
          key: 'fgWcWtpSessionWtpMemoryUsage'
          delay: 60s
          history: 1w
          units: '%'
          tags:
            - tag: Application
              value: 'AP Performance'
        - uuid: 88c1fdf5390d4f2a93185a21e015e4b0
          name: 'Connected Clients'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.12356.101.14.4.4.1.17.{$WTP_INDEX}'
          key: 'fgWcWtpSessionWtpStationCount'
          delay: 60s
          history: 1w
          tags:
            - tag: Application
              value: 'AP Stats'
        - uuid: 05900282ae464ae9987423f7c6879c6d
          name: 'Uptime'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.4.1.12356.101.14.4.4.1.8.{$WTP_INDEX}'
          key: 'fgWcWtpSessionWtpUpTime'
          delay: 60s
          history: 1w
          units: uptime
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: Application
              value: 'AP Info'
      dashboards:
        - uuid: cfc1e0706cc149b4a31d11beb9f853da
          name: 'FortiAP Overview'
          pages:
            - widgets:
                - type: item
                  width: '21'
                  height: '3'
                  fields:
                    - type: INTEGER
                      name: decimal_size
                      value: '5'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'SNMP FortiAP Instance'
                        key: fgWcWtpConfigWtpName
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: show.2
                      value: '4'
                    - type: INTEGER
                      name: units_size
                      value: '15'
                    - type: INTEGER
                      name: value_size
                      value: '20'
                - type: graph
                  'y': '3'
                  width: '72'
                  height: '5'
                  fields:
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'SNMP FortiAP Instance'
                        key: fgWcWtpSessionWtpMemoryUsage
                    - type: STRING
                      name: reference
                      value: SDNTO
                    - type: INTEGER
                      name: source_type
                      value: '1'
                - type: graph
                  'y': '8'
                  width: '72'
                  height: '5'
                  fields:
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'SNMP FortiAP Instance'
                        key: fgWcWtpSessionWtpCpuUsage
                    - type: STRING
                      name: reference
                      value: DJDGJ
                    - type: INTEGER
                      name: source_type
                      value: '1'
                - type: item
                  x: '21'
                  width: '21'
                  height: '3'
                  fields:
                    - type: INTEGER
                      name: decimal_size
                      value: '5'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'SNMP FortiAP Instance'
                        key: fgWcWtpSessionWtpSwVersion
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: show.2
                      value: '4'
                    - type: INTEGER
                      name: units_size
                      value: '15'
                    - type: INTEGER
                      name: value_size
                      value: '20'
                - type: item
                  x: '42'
                  width: '16'
                  height: '3'
                  fields:
                    - type: INTEGER
                      name: decimal_size
                      value: '5'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'SNMP FortiAP Instance'
                        key: fgWcWtpSessionWtpUpTime
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: show.2
                      value: '4'
                    - type: INTEGER
                      name: units_size
                      value: '15'
                    - type: INTEGER
                      name: value_size
                      value: '20'
                - type: honeycomb
                  name: 'Connected Clients'
                  x: '58'
                  width: '14'
                  height: '3'
                  fields:
                    - type: STRING
                      name: items.0
                      value: 'Connected Clients'
                    - type: STRING
                      name: reference
                      value: GAVMT
      valuemaps:
        - uuid: 95b0187d2bc343a297d407e91dc14534
          name: fgWcWtpSessionConnectionState
          mappings:
            - value: '0'
              newvalue: other
            - value: '1'
              newvalue: offLine
            - value: '2'
              newvalue: onLine
            - value: '3'
              newvalue: downloadingImage
            - value: '4'
              newvalue: connectedImage
