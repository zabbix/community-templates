        - uuid: 31253dfbef0b4849b4f51e0bc815935b
          name: 'Interfaces (VLAN)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFDESCR},IF-MIB::ifDescr, {#IFTYPE},IF-MIB::ifType]'
          key: vlan.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFDESCR}'
                value: '^(Trusted|Optional|B01.*Port|eth[0-9]+).*'
                operator: NOT_MATCHES_REGEX
                formulaid: A
              - macro: '{#IFTYPE}'
                value: ^6$
                formulaid: B
          description: |
            Discover VLAN interfaces (ifType = 6 with service/application names).
            WatchGuard incorrectly reports VLANs as ifType=6 instead of ifType=135. This discovery rule identifies VLAN interfaces by excluding physical interface name patterns (Trusted-, Optional-, Port patterns) and capturing all other ifType=6 interfaces which are typically named after services or applications.
          item_prototypes:
            - uuid: 82253dfbef0b4849b4f51e0bc815936c
              name: 'VLAN: {#IFDESCR} Errors In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
              key: 'vlan.ifInErrors[{#IFDESCR}]'
              delay: 2m
              history: 30d
              description: 'Inbound errors on VLAN interface {#IFDESCR}'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: VLAN
                - tag: Metrics
                  value: Errors
                - tag: Name
                  value: '{#IFDESCR}'
              trigger_prototypes:
                - uuid: 93253dfbef0b4849b4f51e0bc815937d
                  expression: 'last(/Watchguard Firewall/vlan.ifInErrors[{#IFDESCR}]) > {$WATCHGUARD_INTERFACE_ERROR_THRESHOLD}'
                  name: 'VLAN {#IFDESCR} Inbound Errors'
                  priority: HIGH
                  tags:
                    - tag: Component
                      value: Interface
                    - tag: InterfaceType
                      value: VLAN
                    - tag: Metrics
                      value: Errors
                - uuid: a4253dfbef0b4849b4f51e0bc815938e
                  expression: 'last(/Watchguard Firewall/vlan.ifInErrors[{#IFDESCR}]) > {$WATCHGUARD_INTERFACE_WARNING_THRESHOLD}'
                  name: 'VLAN {#IFDESCR} Inbound Warning'
                  priority: AVERAGE
                  tags:
                    - tag: Component
                      value: Interface
                    - tag: InterfaceType
                      value: VLAN
                    - tag: Metrics
                      value: Errors
            - uuid: b5253dfbef0b4849b4f51e0bc815939f
              name: 'VLAN: {#IFDESCR} Bytes In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInOctets.{#SNMPINDEX}'
