        - uuid: 923e85e3335046db9f3078f89cf5f1d2
          name: 'VPN Policy: SA Table'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.3097.6.5.1.2.1.20,1.3.6.1.4.1.3097.6.5.1.2.1.21,1.3.6.1.4.1.3097.6.5.1.2.1.24,1.3.6.1.4.1.3097.6.5.1.2.1.25,1.3.6.1.4.1.3097.6.5.1.2.1.28,1.3.6.1.4.1.3097.6.5.1.2.1.29]'
          key: vpn.policy.sa.table.raw
          delay: 5m
          history: '3600'
          value_type: TEXT
          trends: '0'
          description: |
            SNMP walk of the active Gateway VPN (policy-based) Security Associations table.
            OID field map (WATCHGUARD-IPSEC-TUNNEL-MIB - 1.3.6.1.4.1.3097.6.5.1.2.1):
              .20.{idx} = wgIpsecTunnelSelectorRemoteIPOne (remote subnet address)
              .21.{idx} = wgIpsecTunnelSelectorRemoteIPTwo (remote subnet mask / range end)
              .24.{idx} = wgIpsecTunnelSelectorLocalIPOne  (local subnet address)
              .25.{idx} = wgIpsecTunnelSelectorLocalIPTwo  (local subnet mask / range end)
              .28.{idx} = wgIpsecTunnelInKbytes  (Counter64, kilobytes received)
              .29.{idx} = wgIpsecTunnelOutKbytes (Counter64, kilobytes transmitted)
            Rows with remoteIPOne = 0.0.0.0 are empty table slots and are discarded.
            Multiple SA rows with identical selector tuples are aggregated (summed) into one entry.
            Subnet masks are converted to CIDR prefix length (e.g. 255.255.255.0 -> /24; 0.0.0.0 -> /32 for host).
            Output dict keyed by "localCIDR-remoteCIDR":
              { "10.210.23.16/32-192.168.196.192/26": { localCIDR, remoteCIDR, kbytesIn, kbytesOut, saCount }, ... }
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var r = {};
                  try {
                    var p = JSON.parse(value);
                    Object.keys(p).forEach(function(k) {
                      var oid = k.replace(/^\./, '');
                      var val = String(p[k]).replace(/^\w+:\s*/, '').replace(/^"|"$/g, '').trim();
                      r[oid] = val;
                    });
                  } catch(e) {
                    value.split('\n').forEach(function(l) {
                      l = l.trim(); if (!l) return;
                      var m = l.match(/^\.?([\d.]+)\s*=\s*(?:[A-Za-z0-9]+:\s*)?(.+)$/);
                      if (!m) return;
                      r[m[1]] = m[2].trim().replace(/^"|"$/g, '');
                    });
                  }
                  var t = {};
                  Object.keys(r).forEach(function(oid) {
                    var m = oid.match(/^1\.3\.6\.1\.4\.1\.3097\.6\.5\.1\.2\.1\.(\d+)\.(\d+)$/);
                    if (!m) return;
                    var f = parseInt(m[1]), i = m[2];
                    if (!t[i]) t[i] = {};
                    var v = String(r[oid]).replace(/^[A-Za-z0-9]+:\s*/, '').trim();
                    if      (f === 20) t[i].remoteOne = v;
                    else if (f === 21) t[i].remoteTwo = v;
                    else if (f === 24) t[i].localOne  = v;
                    else if (f === 25) t[i].localTwo  = v;
                    else if (f === 28) t[i].kbytesIn  = parseInt(v) || 0;
                    else if (f === 29) t[i].kbytesOut = parseInt(v) || 0;
                  });
                  function maskToCidr(mask) {
                    if (!mask || mask === '0.0.0.0') return 32;
                    return mask.split('.').reduce(function(c, o) {
                      var n = parseInt(o), bits = 0;
                      while (n) { n &= n-1; bits++; }
                      return c+bits;
                    }, 0);
                  }
                  var out = {};
                  Object.keys(t).forEach(function(i) {
                    var x = t[i];
                    if (!x.remoteOne || x.remoteOne === '0.0.0.0') return;
                    var lo = x.localOne  || '0.0.0.0';
                    var lt = x.localTwo  || '0.0.0.0';
                    var ro = x.remoteOne;
                    var rt = x.remoteTwo || '0.0.0.0';
                    var lCidr = lo + '/' + maskToCidr(lt);
                    var rCidr = ro + '/' + maskToCidr(rt);
                    var key = lCidr + '-' + rCidr;
                    if (out[key]) {
                      out[key].kbytesIn  += x.kbytesIn  || 0;
                      out[key].kbytesOut += x.kbytesOut || 0;
                      out[key].saCount   += 1;
                    } else {
                      out[key] = { localCIDR: lCidr, remoteCIDR: rCidr, kbytesIn: x.kbytesIn || 0, kbytesOut: x.kbytesOut || 0, saCount: 1 };
                    }
                  });
                  return JSON.stringify(out);
          tags:
            - tag: Component
              value: VPN
