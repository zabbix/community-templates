        - uuid: 8d357e4124b942139b0bec1be7683d9e
          name: 'VPN Tunnels (Policy Based) - GwVPNs'
          type: DEPENDENT
          key: gwvpn.discovery
          delay: '0'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#REMOTECIDR}'
                value: '{$VPN_POLICY_IGNORE_REGEX}'
                operator: NOT_MATCHES_REGEX
                formulaid: A
          lifetime: 1d
          description: |
            WatchGuard GwVPN discovery using the SA table master item (vpn.policy.sa.table.raw).
            Discovers active policy-based VPN tunnels from the WATCHGUARD-IPSEC-TUNNEL-MIB SA table,
            identified by their unique selector tuple (local subnet + remote subnet).
            Each discovered entry maps to a single VPN policy and survives SA rekeys because the
            selector addresses are stable — only the SA row index changes on rekey.
            Macros provided: {#SUBNETPAIR}, {#LOCALCIDR}, {#REMOTECIDR}
          item_prototypes:
            - uuid: 80cbecccd49c492183c93cf674032333
              name: 'GwVPN: {#LOCALCIDR}-{#REMOTECIDR} Bytes In'
              type: DEPENDENT
              key: 'vpn.gw.kbytesIn[{#SUBNETPAIR}]'
              delay: '0'
              history: 7d
              trends: 90d
              units: bps
              description: 'Inbound traffic for GwVPN {#LOCALCIDR}-{#REMOTECIDR}. Source: wgIpsecTunnelInKbytes (.28), aggregated across all SAs with matching selector.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var m = JSON.parse(value); var p = m["{#SUBNETPAIR}"]; return p ? p.kbytesIn || 0 : 0;'
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
                - type: JAVASCRIPT
                  parameters:
                    - 'return Math.max(0, parseFloat(value));'
                - type: MULTIPLIER
                  parameters:
                    - '8192'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              master_item:
                key: vpn.policy.sa.table.raw
              tags:
                - tag: Component
                  value: GwVPN
                - tag: 'VPN Subnets'
                  value: '{#LOCALCIDR}-{#REMOTECIDR}'
                - tag: 'VPN Type'
                  value: 'VPN Policy'
            - uuid: 5b0daab671554cfe8c0a7a796ac84542
              name: 'GwVPN: {#LOCALCIDR}-{#REMOTECIDR} Bytes Out'
              type: DEPENDENT
              key: 'vpn.gw.kbytesOut[{#SUBNETPAIR}]'
              delay: '0'
              history: 7d
              trends: 90d
              units: bps
              description: 'Outbound traffic for GwVPN {#LOCALCIDR}-{#REMOTECIDR}. Source: wgIpsecTunnelOutKbytes (.29), aggregated across all SAs with matching selector.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var m = JSON.parse(value); var p = m["{#SUBNETPAIR}"]; return p ? p.kbytesOut || 0 : 0;'
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
                - type: JAVASCRIPT
                  parameters:
                    - 'return Math.max(0, parseFloat(value));'
                - type: MULTIPLIER
                  parameters:
                    - '8192'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              master_item:
                key: vpn.policy.sa.table.raw
              tags:
                - tag: Component
                  value: GwVPN
                - tag: 'VPN Subnets'
                  value: '{#LOCALCIDR}-{#REMOTECIDR}'
                - tag: 'VPN Type'
                  value: 'VPN Policy'
            - uuid: e6c8bb5a293c4f1ba7b0f6c52ff147c6
              name: 'GwVPN: {#LOCALCIDR}-{#REMOTECIDR} Status'
              type: DEPENDENT
              key: 'vpn.gw.status[{#SUBNETPAIR}]'
              delay: '0'
              history: 7d
              trends: 90d
              description: 'Tunnel presence status for GwVPN {#LOCALCIDR}-{#REMOTECIDR}. 1=SA present in table, 0=SA absent. Source: vpn.policy.sa.table.raw master item.'
              valuemap:
                name: vpn.status
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var m = JSON.parse(value); return m.hasOwnProperty("{#SUBNETPAIR}") ? 1 : 0;'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              master_item:
                key: vpn.policy.sa.table.raw
              tags:
                - tag: Component
                  value: GwVPN
                - tag: 'VPN Subnets'
                  value: '{#LOCALCIDR}-{#REMOTECIDR}'
                - tag: 'VPN Type'
                  value: 'VPN Policy'
              trigger_prototypes:
                - uuid: ea501e1e0f9a4c62abb872512d507c19
                  expression: 'max(/Watchguard Firewall/vpn.gw.status[{#SUBNETPAIR}],24h)=0'
                  name: 'GwVPN: {#LOCALCIDR}-{#REMOTECIDR} SA absent for 24 hours'
                  priority: WARNING
                  description: 'GwVPN {#LOCALCIDR}-{#REMOTECIDR} has had no active Security Association in the SA table for 24 hours. The tunnel may be down or unused.'
                  manual_close: 'YES'
                  tags:
                    - tag: Component
                      value: GwVPN
                    - tag: Condition
                      value: Idle
                    - tag: 'VPN Subnets'
                      value: '{#LOCALCIDR}-{#REMOTECIDR}'
                    - tag: 'VPN Type'
                      value: 'VPN Policy'
          graph_prototypes:
            - uuid: 94c42e99a42f4e9d9392c8aa4e517bfb
              name: 'GwVPN: {#LOCALCIDR}-{#REMOTECIDR} Traffic'
              width: '600'
              height: '340'
              ymin_type_1: FIXED
              graph_items:
                - color: 00FF00
                  calc_fnc: ALL
                  item:
                    host: 'Watchguard Firewall'
                    key: 'vpn.gw.kbytesIn[{#SUBNETPAIR}]'
                - sortorder: '1'
                  color: 0080FF
                  calc_fnc: ALL
                  item:
                    host: 'Watchguard Firewall'
                    key: 'vpn.gw.kbytesOut[{#SUBNETPAIR}]'
          master_item:
            key: vpn.policy.sa.table.raw
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var mapping = JSON.parse(value);
                  var discovered = [];
                  Object.keys(mapping).forEach(function(key) {
                    var t = mapping[key];
                    discovered.push({
                      '{#SUBNETPAIR}':  key,
                      '{#LOCALCIDR}':   t.localCIDR,
                      '{#REMOTECIDR}':  t.remoteCIDR
                    });
                  });
                  return JSON.stringify(discovered);
        - uuid: 42354dfbef0b4849b4f51e0bc81594ed
          name: 'Interfaces (LAG/Link Aggregation)'
