              widgets:
                - type: item
                  name: 'Device name'
                  width: '31'
                  height: '3'
                  fields:
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Alcatel-Lucent Enterprise OmniSwitch AOS 6.x'
                        key: sysName
                    - type: INTEGER
                      name: show.0
                      value: '2'
                    - type: INTEGER
                      name: show.1
                      value: '4'
                - type: item
                  'y': '3'
                  width: '72'
                  fields:
