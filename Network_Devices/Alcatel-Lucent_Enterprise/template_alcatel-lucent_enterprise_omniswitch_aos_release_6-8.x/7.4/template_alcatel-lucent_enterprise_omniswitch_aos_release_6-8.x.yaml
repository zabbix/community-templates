                  calc_fnc: ALL
                  item:
                    host: 'Alcatel-Lucent Enterprise OmniSwitch AOS 6.x'
                    key: 'cpu1hrmax.slot.[{#SNMPVALUE}]'
            - uuid: 46197399468348e6ae14a2be169d31ba
