              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.2.1.47.1.1.1.1.13.{#SNMPINDEX}'
              key: 'devicemodel.slot.[{#SNMPINDEX}]'
              delay: '300'
              history: 7d
              value_type: TEXT
              tags:
                - tag: Application
                  value: System
            - uuid: 3b1abc7fffba424597fb1100a5f1ac6d
