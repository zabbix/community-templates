              value_type: TEXT
              tags:
                - tag: Application
                  value: System
            - uuid: cd77b78d120c4459804796a2037e3b47
              name: 'Temperature on slot {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.6486.800.1.1.1.3.1.1.3.1.4.{#SNMPVALUE}'
              key: 'temperature.slot.[{#SNMPINDEX}]'
              delay: 60s
              history: 7d
              units: °C
              tags:
                - tag: Application
                  value: System
              trigger_prototypes:
                - uuid: 9a44e0d2085449679b94f7518aa4032b
                  expression: 'last(/Alcatel-Lucent Enterprise OmniSwitch AOS 6.x/temperature.slot.[{#SNMPINDEX}])>65'
                  name: 'Temperature on slot {#SNMPINDEX} >60 °C'
                  priority: AVERAGE
          graph_prototypes:
            - uuid: ba33b4b6ec224fd88895f0ad46ea6ec4
              name: 'Temperature on slot {#SNMPINDEX}'
              ymin_type_1: FIXED
              ymax_type_1: FIXED
              graph_items:
                - color: 1A7C11
                  calc_fnc: ALL
                  item:
                    host: 'Alcatel-Lucent Enterprise OmniSwitch AOS 6.x'
                    key: 'temperature.slot.[{#SNMPINDEX}]'
      macros:
