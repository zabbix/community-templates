zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: bb860a19b96c4faab46b87c6602ee9b3
      name: Infoblox
  templates:
    - uuid: 06717afcbc654fddaf40d92339d2bd05
      template: 'Infoblox Grid Manager'
      name: 'Infoblox Grid Manager'
      groups:
        - name: Infoblox
      items:
        - uuid: c51d6ecc4a59403180847c713278f9fe
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          history: 1w
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 1eaa35c316964c78b9dc5946605272a7
              expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              name: 'Unavailable by ICMP ping'
              priority: HIGH
              description: 'Last three attempts returned timeout. Please check device connectivity.'
              tags:
                - tag: scope
                  value: availability
        - uuid: 1fecdefd2d86459da0cd124172e6a0b0
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          history: 1w
          value_type: FLOAT
          units: '%'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: eddaa71a0f244be38b4fde402f3ca5e7
              expression: 'min(/Infoblox Grid Manager/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/Infoblox Grid Manager/icmppingloss,5m)<100'
              name: 'High ICMP ping loss'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              dependencies:
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 33e2b1aaf5214e8f87273cfd6e223336
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          history: 1w
          value_type: FLOAT
          units: s
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: c8851dcbc53a4aca92ddd1d99e9e3cb5
              expression: 'avg(/Infoblox Grid Manager/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'High ICMP ping response time'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              dependencies:
                - name: 'High ICMP ping loss'
                  expression: 'min(/Infoblox Grid Manager/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/Infoblox Grid Manager/icmppingloss,5m)<100'
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 7c4e75be098144fea208b7ba41a33af1
          name: 'BGP extension presence (peers total)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.15.900.1.1.0]'
          key: infoblox.bgp.presence
          delay: 15m
          history: 7d
          units: peers
          description: 'Presence check for Infoblox BGP4 anycast SNMP extension. Uses total peers OID; if unsupported, preprocessing converts to -1. This item gates BGP LLD.'
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '-1'
          tags:
            - tag: component
              value: bgp
        - uuid: 1ff2bd73f41f4257a1434fd69a71b68c
          name: 'CPU temperature'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.17.0]'
          key: infoblox.cpu.temp
          delay: 5m
          history: 30d
          value_type: FLOAT
          units: C
          description: 'CPU temperature in degrees Celsius (ibCPUTemperature).'
          tags:
            - tag: component
              value: cpu
            - tag: component
              value: thermal
          triggers:
            - uuid: 779d43c7ebbc4b01a97c728dd637618b
              expression: 'max(/Infoblox Grid Manager/infoblox.cpu.temp,5m)>{$INFOBLOX.CPU_TEMP.WARN}'
              name: 'High CPU temperature'
              event_name: 'High CPU temperature (>{$INFOBLOX.CPU_TEMP.WARN}°C)'
              priority: WARNING
              description: 'CPU temperature is above the configured warning threshold.'
              dependencies:
                - name: 'No SNMP data collection'
                  expression: 'max(/Infoblox Grid Manager/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              tags:
                - tag: component
                  value: thermal
                - tag: scope
                  value: performance
        - uuid: 283642aee2314fb49771d774f57f6a45
          name: 'CPU utilization'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.8.1.1.0]'
          key: infoblox.cpu.util
          delay: 5m
          history: 30d
          value_type: FLOAT
          units: '%'
          description: 'CPU utilization percentage from ibSystemMonitorCpuUsage.'
          tags:
            - tag: component
              value: cpu
            - tag: component
              value: system
          triggers:
            - uuid: fb9d7894988d4fcfbbec3bba3b6d68e5
              expression: 'min(/Infoblox Grid Manager/infoblox.cpu.util,5m)>{$INFOBLOX.CPU_UTIL.WARN}'
              name: 'High CPU utilization'
              event_name: 'High CPU utilization (>{$INFOBLOX.CPU_UTIL.WARN}% for 5m)'
              priority: WARNING
              description: 'CPU utilization is above the configured warning threshold.'
              dependencies:
                - name: 'No SNMP data collection'
                  expression: 'max(/Infoblox Grid Manager/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              tags:
                - tag: component
                  value: cpu
                - tag: scope
                  value: performance
        - uuid: c8c56f5b84b24ccd9c8071529461b036
          name: 'Grid Master VIP'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.15.0]'
          key: infoblox.grid.master.vip
          delay: 5m
          history: 90d
          value_type: CHAR
          description: 'Virtual IP address of the Grid Master (ibGridMasterVIP).'
          tags:
            - tag: component
              value: grid
        - uuid: 77d9cd12b04d4349ba49300967493711
          name: 'Grid replication state'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.16.0]'
          key: infoblox.grid.replication.state
          delay: 5m
          history: 90d
          value_type: CHAR
          description: 'Overall grid replication state reported by the appliance (ibGridReplicationState). Typical value: ONLINE.'
          tags:
            - tag: component
              value: grid
            - tag: component
              value: replication
          triggers:
            - uuid: 1e5882aeb3634b339d40308457d8318b
              expression: 'find(/Infoblox Grid Manager/infoblox.grid.replication.state,,"iregexp","ONLINE")=0'
              name: 'Grid replication is not ONLINE'
              event_name: 'Grid replication is not ONLINE (state: {ITEM.VALUE})'
              priority: AVERAGE
              description: 'Grid replication state is not ONLINE. Investigate grid replication/communication issues.'
              dependencies:
                - name: 'No SNMP data collection'
                  expression: 'max(/Infoblox Grid Manager/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              tags:
                - tag: component
                  value: replication
                - tag: scope
                  value: availability
        - uuid: 8cfdc352c0834ae1a2aa14660f793348
          name: 'Grid role'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.12.0]'
          key: infoblox.grid.role
          delay: 5m
          history: 90d
          value_type: TEXT
          description: 'Grid role/status of this appliance (ibGridStatus), e.g. Grid Master, Grid Member, or independent.'
          tags:
            - tag: component
              value: grid
            - tag: component
              value: system
          triggers:
            - uuid: 9c3f505f105e49a18d29531bdf24926b
              expression: 'length(last(/Infoblox Grid Manager/infoblox.grid.role))>0 and find(/Infoblox Grid Manager/infoblox.grid.role,,"iregexp","master")=0'
              name: 'Host is not reporting as Grid Master'
              event_name: 'Host is not reporting as Grid Master (role: {ITEM.VALUE})'
              priority: WARNING
              description: 'This template is intended to be linked to the Grid Master. Grid role does not contain ''master''.'
              dependencies:
                - name: 'No SNMP data collection'
                  expression: 'max(/Infoblox Grid Manager/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              tags:
                - tag: component
                  value: grid
                - tag: scope
                  value: notice
        - uuid: 6f4a097b60ea4552bb9cc19aa4b6ab9d
          name: 'HA status'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.13.0]'
          key: infoblox.ha.status
          delay: 5m
          history: 90d
          value_type: TEXT
          description: 'High-availability configuration/status (ibHAStatus). Indicates whether the node is in an HA pair and whether it is active/passive.'
          tags:
            - tag: component
              value: ha
            - tag: component
              value: system
          triggers:
            - uuid: 37e876cd152a4d589ec4cad0ead28d95
              expression: 'length(last(/Infoblox Grid Manager/infoblox.ha.status))>0 and find(/Infoblox Grid Manager/infoblox.ha.status,,"iregexp","(fail|down|degrad|split|offline|unknown|error)")=1'
              name: 'HA status indicates a problem'
              event_name: 'HA status indicates a problem (status: {ITEM.VALUE})'
              priority: WARNING
              description: 'HA status contains keywords suggesting a problem (fail/down/degraded/etc). Tune the regex if your ibHAStatus strings differ.'
              dependencies:
                - name: 'No SNMP data collection'
                  expression: 'max(/Infoblox Grid Manager/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              tags:
                - tag: component
                  value: ha
                - tag: scope
                  value: availability
        - uuid: c4d5229fa1084aee98e29ffd8b641fae
          name: 'Infoblox hardware ID'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.5.0]'
          key: infoblox.hw.id
          delay: 1h
          history: 30d
          value_type: CHAR
          description: 'Hardware identifier reported by Infoblox (ibHardwareId). Useful for inventory tracking and support cases.'
          tags:
            - tag: component
              value: system
            - tag: role
              value: inventory
        - uuid: 404a5d8287bf4499a73111ba32d3d650
          name: 'Infoblox hardware model'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.4.0]'
          key: infoblox.hw.model
          delay: 1h
          history: 30d
          value_type: CHAR
          description: 'Infoblox platform hardware model string (ibHardwareType). For physical appliances this is typically the model (e.g., IB-1516).'
          tags:
            - tag: component
              value: system
            - tag: role
              value: inventory
        - uuid: 5a06be6763e64749a06333865d7d1b06
          name: 'Infoblox serial number'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.6.0]'
          key: infoblox.hw.serial
          delay: 1h
          history: 30d
          value_type: CHAR
          description: 'Serial number of the Infoblox platform (ibSerialNumber).'
          tags:
            - tag: component
              value: system
            - tag: role
              value: inventory
        - uuid: a978b613022446cf902c18094ce43f1b
          name: 'Memory utilization'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.8.2.1.0]'
          key: infoblox.mem.util
          delay: 5m
          history: 30d
          value_type: FLOAT
          units: '%'
          description: 'Memory utilization percentage from ibSystemMonitorMemUsage.'
          tags:
            - tag: component
              value: memory
            - tag: component
              value: system
          triggers:
            - uuid: 99454ae6da264ecd95a8c3a38a34b77b
              expression: 'min(/Infoblox Grid Manager/infoblox.mem.util,5m)>{$INFOBLOX.MEM_UTIL.WARN}'
              name: 'High memory utilization'
              event_name: 'High memory utilization (>{$INFOBLOX.MEM_UTIL.WARN}% for 5m)'
              priority: WARNING
              description: 'Memory utilization is above the configured warning threshold.'
              dependencies:
                - name: 'No SNMP data collection'
                  expression: 'max(/Infoblox Grid Manager/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              tags:
                - tag: component
                  value: memory
                - tag: scope
                  value: capacity
        - uuid: 532c430c66384fccb3806797afea813b
          name: 'NIOS version'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.7.0]'
          key: infoblox.nios.version
          delay: 1h
          history: 30d
          value_type: CHAR
          description: 'Infoblox NIOS software version (ibNiosVersion).'
          tags:
            - tag: component
              value: system
            - tag: role
              value: inventory
        - uuid: 7964d93baa58474a9d6704ffd4de0ea3
          name: 'Swap utilization'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.8.3.1.0]'
          key: infoblox.swap.util
          delay: 5m
          history: 30d
          value_type: FLOAT
          units: '%'
          description: 'Swap utilization percentage from ibSystemMonitorSwapUsage.'
          tags:
            - tag: component
              value: memory
            - tag: component
              value: system
          triggers:
            - uuid: bfa2119bdba045a4af7a2cd8e593b557
              expression: 'min(/Infoblox Grid Manager/infoblox.swap.util,5m)>{$INFOBLOX.SWAP_UTIL.WARN}'
              name: 'High swap utilization'
              event_name: 'High swap utilization (>{$INFOBLOX.SWAP_UTIL.WARN}% for 5m)'
              priority: WARNING
              description: 'Swap utilization is above the configured warning threshold.'
              dependencies:
                - name: 'No SNMP data collection'
                  expression: 'max(/Infoblox Grid Manager/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              tags:
                - tag: component
                  value: memory
                - tag: scope
                  value: capacity
        - uuid: c7ff660e02d84588afb53830d5ba2827
          name: 'WAPI networks (raw JSON)'
          type: HTTP_AGENT
          key: infoblox.wapi.network.get
          delay: 15m
          history: 1h
          value_type: TEXT
          authtype: BASIC
          username: '{$INFOBLOX.WAPI.USER}'
          password: '{$INFOBLOX.WAPI.PASSWORD}'
          description: 'Fetches IPv4 network objects via Infoblox WAPI (network). Used as master for dependent LLD and dependent per-network utilization items so only one WAPI call is made per polling interval.'
          url: '{$INFOBLOX.WAPI.URL}/network?_return_fields=network,network_view,dhcp_utilization,dhcp_utilization_status,dynamic_hosts,static_hosts,total_hosts&_max_results=10000'
          headers:
            - name: Content-Type
              value: application/json
          tags:
            - tag: component
              value: dhcp
            - tag: component
              value: wapi
          triggers:
            - uuid: f6070f42e7d745308ab5e3fb56efb9f6
              expression: 'nodata(/Infoblox Grid Manager/infoblox.wapi.network.get,30m)=1'
              name: 'WAPI network collection failed'
              event_name: 'WAPI network collection failed (no data for 30m)'
              priority: WARNING
              description: 'No data is being collected from WAPI network endpoint. Check HTTPS connectivity and WAPI credentials.'
              dependencies:
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              tags:
                - tag: component
                  value: wapi
                - tag: scope
                  value: availability
        - uuid: 3e1e80da7731427cb07f05d6f4a2f4e5
          name: 'WAPI member service status (raw JSON)'
          type: HTTP_AGENT
          key: infoblox.wapi.restartservicestatus.get
          delay: 15m
          history: 1h
          value_type: TEXT
          authtype: BASIC
          username: '{$INFOBLOX.WAPI.USER}'
          password: '{$INFOBLOX.WAPI.PASSWORD}'
          description: 'Fetches per-member runtime service status via WAPI restartservicestatus. This provides a Grid Master view of whether DNS/DHCP/Reporting are OK, offline, disabled, pending restart, etc. Used as master for dependent LLD and dependent per-member status items.'
          url: '{$INFOBLOX.WAPI.URL}/restartservicestatus?_max_results=10000'
          headers:
            - name: Content-Type
              value: application/json
          tags:
            - tag: component
              value: grid
            - tag: component
              value: service_status
            - tag: component
              value: wapi
          triggers:
            - uuid: 53b843498a024d728ecb726222772e3c
              expression: 'nodata(/Infoblox Grid Manager/infoblox.wapi.restartservicestatus.get,30m)=1'
              name: 'WAPI member service status collection failed'
              event_name: 'WAPI member service status collection failed (no data for 30m)'
              priority: WARNING
              description: 'No data is being collected from WAPI restartservicestatus endpoint. Member service status will be stale/unknown.'
              dependencies:
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              tags:
                - tag: component
                  value: wapi
                - tag: scope
                  value: availability
        - uuid: 12693143db724251b9516dabcf74df9d
          name: 'WAPI shared networks (raw JSON)'
          type: HTTP_AGENT
          key: infoblox.wapi.sharednetwork.get
          delay: 15m
          history: 1h
          value_type: TEXT
          authtype: BASIC
          username: '{$INFOBLOX.WAPI.USER}'
          password: '{$INFOBLOX.WAPI.PASSWORD}'
          description: |
            Fetches DHCP shared network objects via Infoblox WAPI (sharednetwork). Used as master for dependent LLD and dependent per-shared-network items so only one WAPI call is made per polling interval.
            
            Note: In practice dhcp_utilization is commonly returned as 0-1000 where 965 = 96.5%. The dependent items scale it to percent.
          url: '{$INFOBLOX.WAPI.URL}/sharednetwork?_return_fields=name,network_view,dhcp_utilization,dhcp_utilization_status,dynamic_hosts,static_hosts,total_hosts&_max_results=10000'
          headers:
            - name: Content-Type
              value: application/json
          tags:
            - tag: component
              value: dhcp
            - tag: component
              value: wapi
          triggers:
            - uuid: a298db2a671a4c788ce8b89dc93a997c
              expression: 'nodata(/Infoblox Grid Manager/infoblox.wapi.sharednetwork.get,30m)=1'
              name: 'WAPI shared network collection failed'
              event_name: 'WAPI shared network collection failed (no data for 30m)'
              priority: WARNING
              description: 'No data is being collected from WAPI sharednetwork endpoint. Check HTTPS connectivity and WAPI credentials.'
              dependencies:
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              tags:
                - tag: component
                  value: wapi
                - tag: scope
                  value: availability
        - uuid: d393fc87f7984de3a07bfa7b2f068bfc
          name: 'System contact'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'system.contact[sysContact.0]'
          delay: 15m
          history: 2w
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            The textual identification of the contact person for this managed node.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
            - tag: role
              value: inventory
        - uuid: f4c09a8fe341436b93439964092862c4
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'system.descr[sysDescr.0]'
          delay: 15m
          history: 2w
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            A textual description of the entity. This value should include the full name and version identification of the system's hardware type, software operating-system, and networking software.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
            - tag: role
              value: inventory
        - uuid: 792cf29490d04ea88c4825f20e2a623d
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'system.location[sysLocation.0]'
          delay: 15m
          history: 2w
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            The physical location of this node.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
            - tag: role
              value: inventory
        - uuid: dffb454cf36c4ab487e23995fee8f30a
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: system.name
          delay: 15m
          history: 2w
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            An administratively-assigned name for this managed node. By convention, this is the node's fully-qualified domain name.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
            - tag: role
              value: inventory
        - uuid: 0cc27546bfd64c7a8d2436cda82a005a
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: 5m
          history: 2w
          value_type: FLOAT
          trends: 0d
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            The time (in hundredths of a second) since the network management portion of the system was last re-initialized.
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 8cb736de6317475ca8d664f5d8244e18
              expression: 'last(/Infoblox Grid Manager/system.net.uptime[sysUpTime.0])>0 and last(/Infoblox Grid Manager/system.net.uptime[sysUpTime.0])<10m'
              name: 'Host has been restarted'
              event_name: 'Host has been restarted (uptime < 10m)'
              priority: INFO
              description: 'The device reports a low sysUpTime, indicating a recent restart of the network management subsystem.'
              dependencies:
                - name: 'No SNMP data collection'
                  expression: 'max(/Infoblox Grid Manager/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: notice
        - uuid: 7a3726c57f214ec1aaaf3703a7f755f2
          name: 'System object ID'
          type: SNMP_AGENT
