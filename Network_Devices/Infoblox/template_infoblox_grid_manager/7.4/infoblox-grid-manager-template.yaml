        - uuid: 6a0bd195b5a144d2be394e3f4f2519f6
          name: 'WAPI grid members discovery'
          type: DEPENDENT
          key: infoblox.wapi.member.discovery
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'Discovers grid members (nodes) from WAPI restartservicestatus and creates per-member dependent status items for DNS/DHCP/Reporting runtime states.'
          item_prototypes:
            - uuid: a3eb4b8c1b804b5fbdb58ed868a8b4c1
              name: 'Member {#MEMBER}: DHCP status'
              type: DEPENDENT
              key: 'infoblox.wapi.member.dhcp_status[{#MEMBER}]'
              history: 90d
              value_type: CHAR
              description: 'DHCP runtime service status for this grid member from WAPI restartservicestatus.dhcp_status.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var member = '{#MEMBER}';
                      var obj;
                      try { obj = JSON.parse(value); } catch (e) { return 'UNKNOWN'; }
                      var rows = obj && obj.result ? obj.result : obj;
                      if (!Array.isArray(rows)) return 'UNKNOWN';
                      for (var i = 0; i < rows.length; i++) {
                        var r = rows[i];
                        if (!r) continue;
                        if (r.member !== undefined && String(r.member).trim() === member) {
                          var v = r.dhcp_status;
                          if (v === undefined || v === null || String(v).length === 0) return 'UNKNOWN';
                          return String(v);
                        }
                      }
                      return 'UNKNOWN';
              master_item:
                key: infoblox.wapi.restartservicestatus.get
              tags:
                - tag: component
                  value: wapi
                - tag: node
                  value: '{#MEMBER}'
                - tag: node_scope
                  value: grid_member
                - tag: scope
                  value: node
                - tag: service
                  value: dhcp
              trigger_prototypes:
                - uuid: faef9e1ff357461da0b9c95fa6ddc259
                  expression: 'last(/Infoblox Grid Manager/infoblox.wapi.member.dhcp_status[{#MEMBER}])<>"UNKNOWN" and find(/Infoblox Grid Manager/infoblox.wapi.member.dhcp_status[{#MEMBER}],,"iregexp","(fail|error|down|offline)")=1'
                  name: 'Member {#MEMBER}: DHCP status problem'
                  event_name: 'Member {#MEMBER}: DHCP status problem (status: {ITEM.VALUE})'
                  priority: WARNING
                  description: 'Grid member DHCP runtime service status indicates a problem (fail/error/down/offline) as reported by the Grid Master via WAPI restartservicestatus.'
                  manual_close: 'YES'
                  dependencies:
                    - name: 'Unavailable by ICMP ping'
                      expression: 'max(/Infoblox Grid Manager/icmpping,#3)=0'
                    - name: 'WAPI member service status collection failed'
                      expression: 'nodata(/Infoblox Grid Manager/infoblox.wapi.restartservicestatus.get,30m)=1'
                  tags:
                    - tag: component
                      value: dhcp
                    - tag: scope
                      value: availability
            - uuid: 7f3fddf4fb804b2c8f0d0c6b25a8d0a5
              name: 'Member {#MEMBER}: DNS status'
              type: DEPENDENT
              key: 'infoblox.wapi.member.dns_status[{#MEMBER}]'
              history: 90d
              value_type: CHAR
              description: 'DNS runtime service status for this grid member from WAPI restartservicestatus.dns_status.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var member = '{#MEMBER}';
                      var obj;
                      try { obj = JSON.parse(value); } catch (e) { return 'UNKNOWN'; }
                      var rows = obj && obj.result ? obj.result : obj;
                      if (!Array.isArray(rows)) return 'UNKNOWN';
                      for (var i = 0; i < rows.length; i++) {
