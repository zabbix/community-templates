        - uuid: 0acb1a2b280c4b7a86f87e18978a396a
          name: 'Node service status discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#NODE_SERVICE_ID},1.3.6.1.4.1.7779.3.1.1.2.1.10.1.1,{#NODE_SERVICE_STATUS},1.3.6.1.4.1.7779.3.1.1.2.1.10.1.2,{#NODE_SERVICE_DESC},1.3.6.1.4.1.7779.3.1.1.2.1.10.1.3]'
          key: infoblox.node.service.discovery
          delay: 5m
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'Discovers system/hardware service checks (disk, memory, fans, power, etc.) via ibMemberNodeServiceStatusTable.'
          item_prototypes:
            - uuid: 3bc25e10b93c43e8a665b18d829f546c
              name: 'Health {#NODE_SERVICE_NAME}: Details'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.10.1.3.{#SNMPINDEX}]'
              key: 'infoblox.node.service.desc[{#SNMPINDEX}]'
              delay: 5m
              history: 90d
              value_type: TEXT
              description: 'Human-readable details for this node service check (ibMemberNodeServiceDesc).'
              tags:
                - tag: check
                  value: '{#NODE_SERVICE_NAME}'
                - tag: component
                  value: health
                - tag: service_id
                  value: '{#NODE_SERVICE_ID}'
            - uuid: 5add0ef88006403d9e25dbb72c59eaf5
              name: 'Health {#NODE_SERVICE_NAME}: Status'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.7779.3.1.1.2.1.10.1.2.{#SNMPINDEX}]'
              key: 'infoblox.node.service.status[{#SNMPINDEX}]'
              delay: 5m
              history: 90d
              description: 'Current state for this node service (ibMemberNodeServiceStatus).'
              valuemap:
                name: 'Infoblox::ServiceState'
              tags:
                - tag: check
                  value: '{#NODE_SERVICE_NAME}'
                - tag: component
                  value: health
                - tag: service_id
                  value: '{#NODE_SERVICE_ID}'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  
                  var obj = JSON.parse(value);
                  var rows = obj.data ? obj.data : obj;
                  var out = [];
                  
                  var ipRe = /^(?:\d{1,3}\.){3}\d{1,3}$/;
                  var genericRe = /(does not exist|no .*information available)/i;
                  
                  // Infoblox documented names for ibMemberNodeServiceStatusTable (NIOS may include extra IDs by version).
                  // Source: infoblox_snmp_doc.txt section "ibServiceName Values for ibMemberNodeServiceStatusTable".
                  var idMap = {
                    '9': 'Node status',
                    '10': 'Disk usage',
                    '11': 'LAN port',
                    '12': 'LAN2 port',
                    '13': 'HA port',
                    '14': 'MGMT port',
                    '15': 'LCD',
                    '16': 'Memory',
                    '17': 'Replication service',
                    '18': 'Database capacity',
                    '19': 'RAID array',
                    '20': 'RAID Disk 1',
                    '21': 'RAID Disk 2',
                    '22': 'RAID Disk 3',
                    '23': 'RAID Disk 4',
                    '24': 'RAID Disk 5',
                    '25': 'RAID Disk 6',
                    '26': 'RAID Disk 7',
                    '27': 'RAID Disk 8',
                    '28': 'Fan 1',
                    '29': 'Fan 2',
                    '30': 'Fan 3',
                    '31': 'Fan 4',
                    '32': 'Fan 5',
                    '33': 'Fan 6',
                    '34': 'Fan 7',
                    '35': 'Fan 8',
                    '36': 'Power supply 1',
                    '37': 'Power supply 2',
                    '38': 'NTP synchronization',
                    '39': 'CPU temperature',
                    '40': 'CPU temperature',
                    '41': 'System temperature',
                    '42': 'RAID battery',
                    '43': 'CPU usage',
                    '44': 'OSPF',
                    '45': 'BGP',
                    '46': 'Multi-Grid management',
                    '47': 'Grid in Master Grid',
                    '48': 'Network capacity',
                    '49': 'Reporting service',
                    '50': 'DNS Cache Acceleration service',
                    '51': 'OSPF6',
                    '57': 'Cloud API service'
                  };
                  
                  function tidy(s) {
                    if (s === null || s === undefined) return '';
                    s = ('' + s).trim();
                    if (s.startsWith('The ')) s = s.substring(4);
                    if (s.endsWith('.')) s = s.substring(0, s.length - 1);
                    return s.trim();
                  }
                  
                  function deriveNameFromDesc(desc) {
                    if (!desc) return '';
                    var name = '';
                    if (desc.indexOf(':') !== -1) {
                      name = tidy(desc.split(':')[0]);
                    } else if (desc.indexOf(' - ') !== -1) {
                      var rhs = tidy(desc.split(' - ')[1]);
                      if (rhs.indexOf(' is ') !== -1) name = tidy(rhs.split(' is ')[0]);
                      else name = rhs;
                    } else if (desc.indexOf(' is ') !== -1) {
                      name = tidy(desc.split(' is ')[0]);
                    } else {
                      name = desc;
                    }
                  
                    if (ipRe.test(desc)) return 'node-ip';
                    return name;
                  }
                  
                  // First pass: compute best-effort friendly names.
                  for (var i = 0; i < rows.length; i++) {
                    var r = rows[i];
                    var id = r['{#NODE_SERVICE_ID}'];
                    if (id === undefined || id === null) id = '';
                    id = '' + id;
                  
                    var desc = tidy(r['{#NODE_SERVICE_DESC}']);
                    var mapped = idMap[id] ? idMap[id] : '';
                    var derived = deriveNameFromDesc(desc);
                  
                    var name = derived;
                  
                    // If we only have a generic/empty description, prefer the documented mapping (when available).
                    if (name.length === 0) name = mapped;
                    if (mapped.length > 0 && genericRe.test(desc)) name = mapped;
                  
                    if (name.length === 0) name = 'service-' + id;
                  
                    r['{#NODE_SERVICE_NAME}'] = name;
                    out.push(r);
                  }
                  
                  // Second pass: ensure names are unique (avoid multiple rows collapsing to same name).
                  var counts = {};
                  for (var j = 0; j < out.length; j++) {
                    var n = out[j]['{#NODE_SERVICE_NAME}'];
                    counts[n] = (counts[n] ? counts[n] + 1 : 1);
                  }
                  for (var k = 0; k < out.length; k++) {
                    var r2 = out[k];
                    var n2 = r2['{#NODE_SERVICE_NAME}'];
                    if (counts[n2] > 1) {
                      var id2 = r2['{#NODE_SERVICE_ID}'];
                      if (id2 === undefined || id2 === null) id2 = '';
                      id2 = '' + id2;
                      r2['{#NODE_SERVICE_NAME}'] = n2 + ' (' + id2 + ')';
                    }
                  }
                  
                  return JSON.stringify(out);
                  
