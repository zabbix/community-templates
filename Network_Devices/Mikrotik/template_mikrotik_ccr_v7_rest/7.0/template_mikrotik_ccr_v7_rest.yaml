                - tag: interface
                  value: '{#ETHNAME}'

            - uuid: 04f6ade0b21d499b8f3459012f0f0e51
              name: 'Ethernet {#ETHNAME}: SFP TX bias current'
              type: DEPENDENT
              key: 'routeros.eth.sfp.tx_bias[{#ETHNAME}]'
              value_type: FLOAT
              units: mA
