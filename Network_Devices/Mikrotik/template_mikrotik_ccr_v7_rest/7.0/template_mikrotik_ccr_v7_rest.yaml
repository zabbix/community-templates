                    - '$[0]["sfp-tx-bias-current"]'
                  error_handler: DISCARD_VALUE
              tags:
                - tag: component
                  value: sfp
                - tag: interface
                  value: '{#ETHNAME}'

            - uuid: 48b28c6a34cd43abb43e0b2b220d54b3
              name: 'Ethernet {#ETHNAME}: SFP TX power'
              type: DEPENDENT
              key: 'routeros.eth.sfp.tx_power[{#ETHNAME}]'
