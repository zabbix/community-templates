        - uuid: ce28fadd92c74ac6a4dbb465435f5c49
          name: 'High Availability (HA) Status'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#HANAME},1.3.6.1.4.1.8741.1.8.1.1,{#HASTATUS},1.3.6.1.4.1.8741.1.8.1.2,{#HAPEERIP},1.3.6.1.4.1.8741.1.8.1.3]'
          key: ha.discovery
          delay: 5m
          filter:
            conditions:
              - macro: '{#HASTATUS}'
                value: '^[1-3]$'
                formulaid: A
          description: |
            Discovers High Availability configurations for SonicWall firewalls in clustered deployments.
            HA provides redundancy and failover capabilities for mission-critical network security.
            This discovery rule identifies:
            - HA cluster members and their roles (active/passive)
            - Peer synchronisation status and health
            - Failover detection and state transitions
            - Cluster configuration consistency
            Monitors enterprise HA deployments for maximum uptime and seamless failover operations.
          item_prototypes:
            - uuid: 598841f1f15d4b489c9952247318c5c1
              name: 'HA: {#HANAME} Peer IP'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.8.1.3.{#SNMPINDEX}'
              key: 'ha.peer.ip[{#HANAME}]'
              delay: 10m
              value_type: TEXT
              trends: '0'
              preprocessing:
                - type: DISCARD_UNCHANGED
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: ha
                - tag: hacluster
                  value: '{#HANAME}'
            - uuid: 80502b42f74b46029f1bb5c2d97a9156
              name: 'HA: {#HANAME} Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.8.1.2.{#SNMPINDEX}'
              key: 'ha.status[{#HANAME}]'
              valuemap:
                name: sonicwall.ha.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: ha
                - tag: hacluster
                  value: '{#HANAME}'
              trigger_prototypes:
                - uuid: 6aa13db08951429aac75fb7e2882d1d0
                  expression: 'last(/Sonicwall Firewall/ha.status[{#HANAME}],#1)<>last(/Sonicwall Firewall/ha.status[{#HANAME}],#2)'
                  name: 'HA: {#HANAME} Status Changed'
                  priority: HIGH
                  description: 'High Availability cluster "{#HANAME}" status changed from {ITEM.LASTVALUE2} to {ITEM.LASTVALUE1}. This may indicate failover or cluster reconfiguration.'
                  tags:
                    - tag: component
                      value: ha
                    - tag: hacluster
                      value: '{#HANAME}'
            - uuid: c21ed6aeabb64ffa8d48611a32bef32f
              name: 'HA: {#HANAME} Sync Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.8.1.4.{#SNMPINDEX}'
              key: 'ha.sync.status[{#HANAME}]'
              valuemap:
                name: sonicwall.ha.sync.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: ha
                - tag: hacluster
                  value: '{#HANAME}'
              trigger_prototypes:
                - uuid: 33a73ca06a314f4daa5615837c97850e
                  expression: 'last(/Sonicwall Firewall/ha.sync.status[{#HANAME}]) <> 1'
                  name: 'HA: {#HANAME} Synchronisation Failed'
                  priority: WARNING
                  description: 'High Availability cluster "{#HANAME}" synchronisation is not in sync. Check cluster connectivity and configuration consistency.'
                  tags:
                    - tag: component
                      value: ha
                    - tag: hacluster
                      value: '{#HANAME}'
        - uuid: 0023542110334559b1ef0cd816939384
          name: 'Hardware Sensors'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SENSORNAME},1.3.6.1.4.1.8741.1.7.1.1,{#SENSORTYPE},1.3.6.1.4.1.8741.1.7.1.2,{#SENSORSTATUS},1.3.6.1.4.1.8741.1.7.1.3]'
          key: hardware.sensors.discovery
          delay: 10m
          filter:
            conditions:
              - macro: '{#SENSORTYPE}'
                value: '^[1-4]$'
                formulaid: A
          description: |
            Discovers hardware sensors for SonicWall appliances including temperature, fan, power supply, and voltage monitoring.
            Hardware sensors provide critical insight into device health and environmental conditions.
            This discovery rule identifies:
            - Temperature sensors (CPU, chassis, ambient)
            - Fan status and speed monitoring
            - Power supply health and voltage levels
            - Critical hardware component status
            Essential for proactive maintenance and preventing hardware-related downtime in enterprise environments.
          item_prototypes:
            - uuid: 6f5617f7146741ae97c0291b1d3c1792
              name: 'Sensor: {#SENSORNAME} Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.7.1.3.{#SNMPINDEX}'
              key: 'sensor.status[{#SENSORNAME}]'
              delay: 2m
              valuemap:
                name: sonicwall.sensor.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: hardware
                - tag: sensor
                  value: '{#SENSORNAME}'
                - tag: sensortype
                  value: '{#SENSORTYPE}'
              trigger_prototypes:
                - uuid: ac3441a59a65447391f3bd5c5f4c31ec
                  expression: 'last(/Sonicwall Firewall/sensor.status[{#SENSORNAME}]) <> 1'
                  name: 'Hardware: {#SENSORNAME} Sensor Critical'
                  priority: HIGH
                  description: 'Hardware sensor "{#SENSORNAME}" is reporting critical status. Check device environmental conditions and hardware health immediately.'
                  tags:
                    - tag: component
                      value: hardware
                    - tag: sensor
                      value: '{#SENSORNAME}'
            - uuid: a10aada088fb43ce8998d31f3229be27
              name: 'Sensor: {#SENSORNAME} Value'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.7.1.4.{#SNMPINDEX}'
              key: 'sensor.value[{#SENSORNAME}]'
              delay: 2m
              units: '{#SENSORTYPE:regex("1"):regsub("1", "°C")}{#SENSORTYPE:regex("2"):regsub("2", "RPM")}{#SENSORTYPE:regex("3"):regsub("3", "V")}{#SENSORTYPE:regex("4"):regsub("4", "W")}'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: hardware
                - tag: sensor
                  value: '{#SENSORNAME}'
                - tag: sensortype
                  value: '{#SENSORTYPE}'
              trigger_prototypes:
                - uuid: b897e5ca9aeb41e599e5717241d23fa5
                  expression: 'last(/Sonicwall Firewall/sensor.value[{#SENSORNAME}]) > {$SONICWALL_TEMPERATURE_CRITICAL} and {#SENSORTYPE} = "1"'
                  name: 'Hardware: {#SENSORNAME} Temperature Critical'
                  priority: HIGH
                  description: 'Temperature sensor "{#SENSORNAME}" is reporting critical temperature: {ITEM.LASTVALUE}°C > {$SONICWALL_TEMPERATURE_CRITICAL}°C'
                  tags:
                    - tag: component
                      value: hardware
                    - tag: sensor
                      value: '{#SENSORNAME}'
                - uuid: 185daf9e77664c42b980ad53f05e076c
                  expression: 'last(/Sonicwall Firewall/sensor.value[{#SENSORNAME}]) > {$SONICWALL_TEMPERATURE_WARNING} and {#SENSORTYPE} = "1"'
                  name: 'Hardware: {#SENSORNAME} Temperature Warning'
                  priority: WARNING
                  description: 'Temperature sensor "{#SENSORNAME}" is reporting elevated temperature: {ITEM.LASTVALUE}°C > {$SONICWALL_TEMPERATURE_WARNING}°C'
                  tags:
                    - tag: component
                      value: hardware
                    - tag: sensor
                      value: '{#SENSORNAME}'
        - uuid: 8857ec72720e45ae9b3c0badc3d8e5f1
          name: 'Interfaces (LAG/Bonded)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFDESCR},IF-MIB::ifDescr,{#IFTYPE},IF-MIB::ifType]'
          key: lag.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#IFTYPE}'
                value: ^(161|166)$
                formulaid: A
          description: |
            Discover bonded or aggregated interfaces on the firewall, such as Link Aggregation Groups (LAGs) or PortChannel  interfaces.
              
            This rule targets interfaces with:
             - `ifType = 161` (IEEE 802.3ad Link Aggregation)
             - `ifType  = 166` (MPLS Tunnel — occasionally used for VPN encapsulation in LAG contexts)
              
            These interfaces:
              - Represent logical bundles of physical links
             - Are often used for uplinks, high-availability paths, or VPN redundancy   - Report aggregate traffic and error metrics across all member ports
            
             Note:
             - LAG interfaces may coexist with  Ethernet or Fibre entries; no deduplication is applied.
             - SonicWall interface naming is inconsistent across models  — validate `ifDescr` labels per deployment.
          item_prototypes:
            - uuid: c72f0151f79c418e89c8838f2d961678
              name: 'LAG: {#IFDESCR} Errors In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
              key: 'lag.ifInErrors[{#IFDESCR}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: LAG
                - tag: Metrics
                  value: Errors
              trigger_prototypes:
                - uuid: 70c4c487c4bf47fbbfa9ef726caec3bc
                  expression: 'count(/Sonicwall Firewall/lag.ifInErrors[{#IFDESCR}],5m,"gt",{$SONICWALL_INTERFACE_ERROR})>2'
                  name: 'LAG {#IFDESCR} Inbound Errors'
                  priority: AVERAGE
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: 0ed5af57dfe04b55afc3e7e0db859163
              name: 'LAG: {#IFDESCR} Bytes In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInOctets.{#SNMPINDEX}'
              key: 'lag.ifInOctets[{#IFDESCR}]'
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: LAG
                - tag: Metrics
                  value: Traffic
            - uuid: 069d7489a9f244758cc7b6cda5ffa535
              name: 'LAG: {#IFDESCR} Errors Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutErrors.{#SNMPINDEX}'
              key: 'lag.ifOutErrors[{#IFDESCR}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: LAG
                - tag: Metrics
                  value: Errors
              trigger_prototypes:
                - uuid: 33ed21d43f414eb5a2948c79c0b79c26
                  expression: 'count(/Sonicwall Firewall/lag.ifOutErrors[{#IFDESCR}],5m,"gt",{$SONICWALL_INTERFACE_ERROR})>2'
                  name: 'LAG {#IFDESCR} Outbound Errors'
                  priority: AVERAGE
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: b4ba7bc8fbf746cabe9e45187e7410ce
              name: 'LAG: {#IFDESCR} Bytes Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutOctets.{#SNMPINDEX}'
              key: 'lag.ifOutOctets[{#IFDESCR}]'
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: LAG
                - tag: Metrics
                  value: Traffic
            - uuid: 196f611499b94fb894049bc6cd2eda70
              name: 'LAG: {#IFDESCR} Status'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOperStatus.{#SNMPINDEX}'
              key: 'lag.status[{#IFDESCR}]'
              valuemap:
                name: sonicwall.interface.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: LAG
                - tag: Metrics
                  value: State
              trigger_prototypes:
                - uuid: e9c18edffa4f4676a9326199a9f828c6
                  expression: '(count(/Sonicwall Firewall/lag.status[{#IFDESCR}],{$SONICWALL_FLAPPING_TIMEFRAME})>1 or change(/Sonicwall Firewall/lag.status[{#IFDESCR}])>0) and nodata(/Sonicwall Firewall/lag.status[{#IFDESCR}],120s)=0'
                  name: 'LAG {#IFDESCR} status changed'
                  priority: WARNING
                  manual_close: 'YES'
                  tags:
                    - tag: Condition
                      value: Flap/Config
          graph_prototypes:
            - uuid: 931a7ef6afcc4b9aaa149555942b8df1
              name: 'LAG: {#IFDESCR} Traffic'
              graph_items:
                - color: 199C0D
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'lag.ifInOctets[{#IFDESCR}]'
                - sortorder: '1'
                  color: 0080FF
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'lag.ifOutOctets[{#IFDESCR}]'
                - sortorder: '2'
                  drawtype: FILLED_REGION
                  color: FF0000
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
