                  color: FF0000
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vpn.route.ifInErrors[{#VPNNAME}]'
                - sortorder: '3'
                  drawtype: FILLED_REGION
                  color: CC6600
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vpn.route.ifOutErrors[{#VPNNAME}]'
        - uuid: 934a1ea08f044e449d8d69bba309a9bf
          name: 'VPN Tunnel Pairs'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#VPNNAME},1.3.6.1.2.1.2.2.1.2,{#VPNADMINSTATE},1.3.6.1.2.1.2.2.1.7,{#IFTYPE},1.3.6.1.2.1.2.2.1.3,{#VPNOPERSTATE},IF-MIB::ifOperStatus]'
          key: vpn.tunnel.pairs.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFTYPE}'
                value: ^131$
                formulaid: A
              - macro: '{#VPNADMINSTATE}'
                value: ^1$
                formulaid: B
              - macro: '{#VPNNAME}'
                value: '.*(TUN[0-9]+|_PRI|_SEC|PRIMARY|BACKUP|[0-9]+).*'
                formulaid: C
          description: |
            Discovers VPN tunnels with redundancy pair naming patterns.
            
            Identifies tunnels with names containing:
             - TUN followed by numbers (TUN0, TUN1, TUN2, etc.)
            - _PRI or _SEC suffixes  
            - PRIMARY or BACKUP suffixes
            - Numeric  suffixes
            
            This enables monitoring of individual tunnels in redundancy pairs.
          item_prototypes:
            - uuid: a45b2fb190154f559e8e7abcb409c9cf
              name: 'VPN Tunnel Pair: {#VPNPAIR} Status Monitor'
              type: CALCULATED
              key: 'vpn.tunnel.pair.status[{#VPNPAIR}]'
              delay: 5m
              trends: 90d
              params: 'last(//vpn.route.status[{#VPNNAME}])'
              description: 'Individual tunnel status from discovered VPN tunnel pairs. This monitors the operational status of each tunnel that matches the redundancy pair naming patterns, providing visibility into tunnel availability for failover scenarios. '
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: VPN
                - tag: 'Pair Name'
                  value: '{#VPNPAIR}'
                - tag: 'Tunnel Type'
                  value: 'Redundancy Pair'
              trigger_prototypes:
                - uuid: b56c30c291264f669f8f8bccb509dadf
                  expression: 'last(/Sonicwall Firewall/vpn.tunnel.pair.status[{#VPNPAIR}]) = 0'
                  name: 'VPN Tunnel Pair: {#VPNPAIR} - All Tunnels Down'
                  priority: DISASTER
                  description: 'Both tunnels in pair {#VPNPAIR} are down, indicating complete connectivity loss. This is a critical failover scenario requiring immediate attention. '
                  manual_close: 'YES'
                  tags:
                    - tag: Component
                      value: VPN
                    - tag: Condition
                      value: 'Complete Failure'
                    - tag: 'Pair Name'
                      value: '{#VPNPAIR}'
                - uuid: c67d41d392374c779080acecc609ebef
                  expression: '(last(/Sonicwall Firewall/vpn.tunnel.pair.status[{#VPNPAIR}]) = 1 or last(/Sonicwall Firewall/vpn.tunnel.pair.status[{#VPNPAIR}]) = 10) and change(/Sonicwall Firewall/vpn.tunnel.pair.status[{#VPNPAIR}]) <> 0 '
                  name: 'VPN Tunnel Pair: {#VPNPAIR} - Failover Detected'
                  priority: WARNING
                  description: 'Tunnel failover detected in pair {#VPNPAIR}. Status meanings: - 1 = Primary only (secondary failed) - 10 = Secondary only (primary failed) - 11 = Both active (normal) Investigate the failed tunnel and BGP convergence. '
                  manual_close: 'YES'
                  tags:
                    - tag: Component
                      value: VPN
                    - tag: Condition
                      value: Failover
                    - tag: 'Pair Name'
                      value: '{#VPNPAIR}'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  // Group tunnel names into pairs based on naming patterns
                  var data = JSON.parse(value);
                  var pairs = {};
                  
                  for  (var i = 0; i < data.length; i++) {
                      var item = data[i];
                      var vpnname = item["{#VPNNAME}"] || "";
                       
                      // Skip if no VPN name
                      if (!vpnname) continue;
                      
                      var pairBase = "";
                      
                      // Handle  TUNx patterns (TUN0->TUN, TUN1->TUN, etc.)
                      if (vpnname.match(/TUN[0-9]+/)) {
                          pairBase = vpnname.replace(/TUN[0-9]+/,  "TUN");
                      }
                      // Handle _PRI/_SEC patterns
                      else if (vpnname.match(/_PRI$|_SEC$/)) {
                          pairBase  = vpnname.replace(/_PRI$|_SEC$/, "");
                      }
                      // Handle PRIMARY/BACKUP patterns
                      else if (vpnname.match(/PRIMARY$|BACKUP$/))  {
                          pairBase = vpnname.replace(/PRIMARY$|BACKUP$/, "");
                      }
                      // Handle numeric suffixes (SITE1->SITE,  SITE2->SITE)
                      else if (vpnname.match(/[0-9]+$/)) {
                          pairBase = vpnname.replace(/[0-9]+$/, "");
                       }
                      
                      // Only add if we found a valid pair pattern
                      if (pairBase) {
                          var pairKey = pairBase  + "_PAIR";
                          if (!pairs[pairKey]) {
                              pairs[pairKey] = {
                                  "{#VPNPAIR}":  pairBase,
                                  "{#TUNNELS}": []
                              };
                          }
                          pairs[pairKey]["{#TUNNELS}" ].push(vpnname);
                      }
                  }
                  
                  // Convert to array and filter pairs with 2+ members
                  var result = [];
                  for (var key  in pairs) {
                      if (pairs[key]["{#TUNNELS}"].length >= 2) {
                          result.push(pairs[key]);
                      }
                  }
                  
                   return JSON.stringify(result);
        - uuid: f6bb4d46dd22461c83472971b98a07c2
          name: 'Interfaces (VTI)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#VTINAME},IF-MIB::ifDescr, {#IFTYPE},IF-MIB::ifType]'
          key: vti.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#IFTYPE}'
                value: ^(131)$
                formulaid: A
          description: |
            Discover route-based VPN interfaces (ifType=131).
              
            These interfaces represent Virtual Tunnel Interfaces  (VTI) — persistent Layer-3 interfaces configured with IPs and routed using static or dynamic protocols  (e.g., BGP).
              
            VTIs are the configuration layer and always exist. However, traffic counters may be idle if tunnels  are unused.
              
            Note: These are distinct from the tunnel interfaces associated with active IPsec Security Associations  (SAs).
            Do not assume this discovery overlaps with route-based TUNNEL metrics; especially with more than one Phase  2 SA.
          item_prototypes:
            - uuid: c07868e00c92478a92098e28c7ef58fb
              name: 'VTI: {#VTINAME} Bytes In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInOctets.{#SNMPINDEX}'
              key: 'vti.bytesIn[{#VTINAME}]'
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VTI
                - tag: Metrics
                  value: Traffic
            - uuid: b50e7769e7384bc190dc24773b45a2c4
              name: 'VTI: {#VTINAME} Bytes Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutOctets.{#SNMPINDEX}'
              key: 'vti.bytesOut[{#VTINAME}]'
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VTI
                - tag: Metrics
                  value: Traffic
            - uuid: f6aee31a88024fb490f2b94098327380
              name: 'VTI: {#VTINAME} Errors In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
              key: 'vti.errorsIn[{#VTINAME}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VTI
                - tag: Metrics
                  value: Errors
              trigger_prototypes:
                - uuid: 36326c71d1654a30aa3fbad79539eeda
                  expression: 'count(/Sonicwall Firewall/vti.errorsIn[{#VTINAME}],5m,"gt",{$SONICWALL_VPN_ERROR})>2'
                  name: 'VTI: {#VTINAME} Inbound Errors'
                  priority: HIGH
                  tags:
                    - tag: Condition
                      value: Threshold
                - uuid: bc04567371fe42b7839411dfc8da4f50
                  expression: 'count(/Sonicwall Firewall/vti.errorsIn[{#VTINAME}],5m,"gt",{$SONICWALL_VPN_WARNING_THRESHOLD})>2'
                  name: 'VTI: {#VTINAME} Inbound Warning'
                  priority: AVERAGE
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: 09ffdad6ae16442a9b10ba37c2b89842
              name: 'VTI: {#VTINAME} Errors Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutErrors.{#SNMPINDEX}'
              key: 'vti.errorsOut[{#VTINAME}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VTI
                - tag: Metrics
                  value: Errors
              trigger_prototypes:
                - uuid: 893bc0b990d64e118039f0d8e6b6bbf0
                  expression: 'count(/Sonicwall Firewall/vti.errorsOut[{#VTINAME}],5m,"gt",{$SONICWALL_VPN_ERROR})>2'
                  name: 'VTI: {#VTINAME} Outbound Errors'
                  priority: HIGH
                  tags:
                    - tag: Condition
                      value: Threshold
                - uuid: f6c4bd1e1ccb48e9a86586b9ff5c2a5f
                  expression: 'count(/Sonicwall Firewall/vti.errorsOut[{#VTINAME}],5m,"gt",{$SONICWALL_VPN_WARNING_THRESHOLD})>2'
                  name: 'VTI: {#VTINAME} Outbound Warning'
                  priority: AVERAGE
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: 7b173c18fc024e99a84e389f9706e21a
              name: 'VTI: {#VTINAME} Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}'
              key: 'vti.ifOperStatus[{#VTINAME}]'
              valuemap:
                name: sonicwall.vpn.route.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VTI
                - tag: Metrics
                  value: State
              trigger_prototypes:
                - uuid: f094bd2abb4a40a48fdfdf1aa71cb382
                  expression: '(count(/Sonicwall Firewall/vti.ifOperStatus[{#VTINAME}],{$SONICWALL_FLAPPING_TIMEFRAME})>1 or change(/Sonicwall Firewall/vti.ifOperStatus[{#VTINAME}])>0) and nodata(/Sonicwall Firewall/vti.ifOperStatus[{#VTINAME}],120s)=0'
                  name: 'VTI: {#VTINAME} status changed'
                  priority: AVERAGE
                  manual_close: 'YES'
                  tags:
                    - tag: Condition
                      value: Config
          graph_prototypes:
            - uuid: ac9b24f725a5471d9f3befefa3a5f43a
              name: 'VTI: {#VTINAME} Traffic'
              graph_items:
                - color: 199C0D
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vti.bytesIn[{#VTINAME}]'
                - sortorder: '1'
                  color: 0080FF
                  calc_fnc: ALL
                  item:
