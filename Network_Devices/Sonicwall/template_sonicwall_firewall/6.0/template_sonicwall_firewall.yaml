        - uuid: 776cea823ebd460dac46fed8a3338894
          name: 'VPN Policy: SA Table'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.8741.1.3.2.1.1]'
          key: vpn.policy.sa.table
          delay: 5m
          history: 1h
          value_type: TEXT
          trends: '0'
          description: |
            An SNMP walk of the ACTIVE policy-based VPN Security Associations table
            
            Notice:
            VPN Security Associations (SAs) are frequently renegotiated or re-keyed, which causes the SA index to change. For this reason, the polling interval is set to 5 minutes - so if our discovery rule runs, it will have up-to-date SA data to begin with. Polling less frequently increases the risk of missing statistics for active policy-based tunnels, while polling more frequently may be considered overly aggressive.
          tags:
            - tag: Component
              value: VPN
            - tag: VPN
              value: Policy
      discovery_rules:
        - uuid: 58ebb24e494d4e7eb3437d95f9abfe58
          name: Processors
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#CPUFWID},HOST-RESOURCES-MIB::hrProcessorLoad]'
          key: cpu.discovery
          delay: 1h
          description: 'Discover the processors of the firewall device'
          item_prototypes:
            - uuid: 503d76e0ce784d088c7768b3e14e7ff6
              name: 'CPU Utilisation {#CPUFWID}'
              type: SNMP_AGENT
              snmp_oid: 'HOST-RESOURCES-MIB::hrProcessorLoad.{#CPUFWID}'
              key: 'hrProcessorLoad[{#CPUFWID}]'
              units: '%'
              description: 'The average, over the last minute, of the percentage of time that this processor was not idle. Implementations may approximate this one minute smoothing period if necessary.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: System
                - tag: CPU
                  value: Utilisation
              trigger_prototypes:
                - uuid: 891cd55755a648caba85846b80759bee
                  expression: |
                    avg(/Sonicwall Firewall/hrProcessorLoad[{#CPUFWID}],5m)>{$SONICWALL_CPU_ERROR}
                    and
                    count(/Sonicwall Firewall/hrProcessorLoad[{#CPUFWID}],5m,"gt",{$SONICWALL_CPU_ERROR}) > 3
                  name: 'CPU {#CPUFWID} Utilisation over {$SONICWALL_CPU_ERROR}%'
                  priority: HIGH
                  description: 'CPU {#CPUFWID} on {HOST.NAME} is over {$SONICWALL_CPU_ERROR}%'
                  tags:
                    - tag: Condition
                      value: Threshold
          graph_prototypes:
            - uuid: 282f59dcf7854b6cab11bde4636e56f5
              name: 'Processor Utilisation{#CPUFWID}'
              width: '600'
              height: '340'
              ymin_type_1: FIXED
              ymax_type_1: FIXED
              graph_items:
