                max(/Sonicwall Firewall/vpn.policy.bytes.out[{#LOCALSUBNET}-{#REMOTESUBNET}],30d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD}
              name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) - Idle for 1 month'
              status: DISABLED
              priority: WARNING
              description: |
                This trigger monitors policy-based VPN tunnel "{#VPNNAME}" ({#LOCALSUBNET}-{#REMOTESUBNET}).
                It fires  when both inbound and outbound traffic have been below the threshold for a continuous 30-day period.
                  
