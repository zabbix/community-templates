            - uuid: 3c1bb76ca478444db54d7f394e046c23
              name: 'VPN Route: {#VPNNAME} Errors In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
