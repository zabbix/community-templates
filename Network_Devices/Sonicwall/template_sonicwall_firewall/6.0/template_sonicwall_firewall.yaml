                  value: VPN
                - tag: Metrics
                  value: Traffic
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Type'
                  value: Route
            - uuid: 803ca2150a6940d38363649cfa3e019d
              name: 'VPN Route: {#VPNNAME} Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}'
              key: 'vpn.route.status[{#VPNNAME}]'
              delay: 5m
              valuemap:
                name: sonicwall.vpn.route.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '21600'
              tags:
                - tag: Component
                  value: VPN
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Type'
                  value: Route
              trigger_prototypes:
                - uuid: 7e5b193f9d734c2ea2745793eebfe8fc
                  expression: |
                    (count(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}],{$SONICWALL_FLAPPING_TIMEFRAME})>1 and change(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}])>0)
                    and nodata(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}],120s)=0
                  name: 'VPN Route: {#VPNNAME} Flapping Detected'
                  priority: WARNING
                  description: |
                    The VPN route tunnel "{#VPNNAME}" has changed status more than {$SONICWALL_FLAPPING_CHANGE_THRESHOLD} times in the last {$SONICWALL_FLAPPING_TIMEFRAME}.
                    This indicates tunnel instability and requires investigation.
                    
                    Possible causes:
                    - Network connectivity issues
                    - SonicWall firmware bugs
                    - Routing configuration problems
                    - Hardware issues
                    - Authentication/certificate problems
                    
                    Check tunnel logs and network connectivity to the remote endpoint.
                  manual_close: 'YES'
                  tags:
                    - tag: Component
                      value: VPN
                    - tag: Condition
                      value: Flapping
                    - tag: 'VPN Type'
                      value: Route
