                  value: VPN
                - tag: Metrics
                  value: Errors
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Type'
                  value: Route
            - uuid: 4a06318935bd4a8d803dd9109db9ba7e
