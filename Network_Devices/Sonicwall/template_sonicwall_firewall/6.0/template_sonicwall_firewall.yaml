        - uuid: d2640a528715449a88ff9ecbcd2086e5
          name: 'Interfaces (VLAN)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFDESCR},IF-MIB::ifDescr, {#IFTYPE},IF-MIB::ifType]'
          key: vlan.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFTYPE}'
                value: ^(53|135)$
                formulaid: A
          description: |
            Discover VLAN-tagged interfaces, including both Layer 2 and Layer 3 subinterfaces configured on physical  or virtual ports.
            
            This rule targets:
             - `ifType = 53` (propVirtual — common for VLAN-tagged Layer  2)
             - `ifType = 135` (l3ipvlan — Layer 3 subinterface with VLAN ID)
            
            These interfaces typically  appear as:
             - `X0.V10`, `X2.V50`, etc. (e.g., `interface.vlan`)
             - Tagged subinterfaces used for segmentation,  guest networks, or zone isolation
            
            Notes:
             - SonicWall reports some VLANs as independent `ifIndex` values, allowing  direct SNMP polling
             - If these interfaces are not routable, traffic counters may show zero despite being active
              - This rule does not apply to VLANs on VTI tunnels or PortShield bridges — use dedicated discovery  rules for those
          item_prototypes:
            - uuid: 2a15151dc9bb4deaab667f5e44dc963b
              name: 'VLAN: {#IFDESCR} Errors In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
              key: 'vlan.ifInErrors[{#IFDESCR}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: Errors
              trigger_prototypes:
                - uuid: a62f49f6073740658b7c9b19f3d43ef4
                  expression: 'count(/Sonicwall Firewall/vlan.ifInErrors[{#IFDESCR}],5m,"gt",{$SONICWALL_VLAN_WARNING})>2'
                  name: 'VLAN {#IFDESCR} Inbound Errors'
                  priority: WARNING
                  description: 'Inbound errors on VLAN {#IFDESCR} exceeded warning threshold ({ITEM.LASTVALUE} > {$SONICWALL_VLAN_WARNING}/s)'
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: 10866c4d787342cba3ebfa2360488962
              name: 'VLAN: {#IFDESCR} Bytes In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInOctets.{#SNMPINDEX}'
              key: 'vlan.ifInOctets[{#IFDESCR}]'
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: Traffic
              trigger_prototypes:
                - uuid: 84dad1350c2740a1b3e4c298ba98dbee
                  expression: 'avg(/Sonicwall Firewall/vlan.ifInOctets[{#IFDESCR}],5m) <= {$SONICWALL_VLAN_NO_TRAFFIC} and nodata(/Sonicwall Firewall/vlan.ifInOctets[{#IFDESCR}],120s)=0'
                  name: 'VLAN {#IFDESCR} No Data In'
                  priority: INFO
                  description: 'The VLAN {#IFDESCR} has had {$SONICWALL_VLAN_NO_TRAFFIC} bytes of traffic Inbound over the past 5mins'
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: 3ec81e3336ea4d57885ff531ad3630d0
              name: 'VLAN: {#IFDESCR} Errors Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutErrors.{#SNMPINDEX}'
              key: 'vlan.ifOutErrors[{#IFDESCR}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: Errors
              trigger_prototypes:
                - uuid: f9492c04fd4c42919b71178695288620
                  expression: 'count(/Sonicwall Firewall/vlan.ifOutErrors[{#IFDESCR}],5m,"gt",{$SONICWALL_VLAN_WARNING})>2'
                  name: 'VLAN {#IFDESCR} Outbound Errors'
                  priority: WARNING
                  description: 'Outbound errors on VLAN {#IFDESCR} exceeded threshold ({ITEM.LASTVALUE} > {$SONICWALL_VLAN_WARNING}/s)'
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: f82c20ffb87143afb0f0606bfe47f98e
              name: 'VLAN: {#IFDESCR} Bytes Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutOctets.{#SNMPINDEX}'
              key: 'vlan.ifOutOctets[{#IFDESCR}]'
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: Traffic
              trigger_prototypes:
                - uuid: 7f0f471f05204627b58b4017b45c6573
                  expression: 'avg(/Sonicwall Firewall/vlan.ifOutOctets[{#IFDESCR}],5m) <= {$SONICWALL_VLAN_NO_TRAFFIC} and nodata(/Sonicwall Firewall/vlan.ifOutOctets[{#IFDESCR}],120s)=0'
                  name: 'VLAN {#IFDESCR} No Data Out'
                  priority: INFO
                  description: 'The VLAN {#IFDESCR} has had {$SONICWALL_VLAN_NO_TRAFFIC} bytes of traffic Outbound over the past 5mins'
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: 8d5922eadc904e529e9c8f5499c8832c
              name: 'VLAN: {#IFDESCR} Status'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOperStatus.{#SNMPINDEX}'
              key: 'vlan.status[{#IFDESCR}]'
              valuemap:
                name: sonicwall.interface.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: State
          graph_prototypes:
            - uuid: 2b7646f0fbf341c2983e8d62b13562b6
              name: 'VLAN: {#IFDESCR} Traffic'
              graph_items:
                - color: 199C0D
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vlan.ifInOctets[{#IFDESCR}]'
                - sortorder: '1'
                  color: 0080FF
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vlan.ifOutOctets[{#IFDESCR}]'
                - sortorder: '2'
                  drawtype: FILLED_REGION
                  color: FF0000
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vlan.ifInErrors[{#IFDESCR}]'
                - sortorder: '3'
                  drawtype: FILLED_REGION
                  color: CC6600
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vlan.ifOutErrors[{#IFDESCR}]'
        - uuid: 7f2a3b4c5d6e4890abcd1234567890ef
          name: 'VPN Tunnels (L2TP Based)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#L2TPNAME},IF-MIB::ifDescr,{#IFTYPE},IF-MIB::ifType,{#IFOPERSTATUS},IF-MIB::ifOperStatus,{#IFADMINSTATUS},IF-MIB::ifAdminStatus]'
          key: vpn.l2tp.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFADMINSTATUS}'
                value: ^1$
                formulaid: A
              - macro: '{#IFTYPE}'
                value: ^131$
                formulaid: B
              - macro: '{#L2TPNAME}'
                value: '^.*[lL]2[tT][pP].*$'
                formulaid: C
          description: |
            Discovers L2TP VPN tunnel interfaces (ifType=131) by filtering interface descriptions containing "L2TP".
            L2TP (Layer 2 Tunneling Protocol) creates point-to-point tunnels for VPN connections, commonly used for remote access scenarios.
            This discovery rule identifies:
            - Active tunnel interfaces (adminStatus=1)
            - Interface type 131 (tunnel interfaces)
            - Descriptions containing L2TP identifiers
            Provides traffic statistics, operational status monitoring, and error tracking for L2TP tunnel performance analysis.
          item_prototypes:
            - uuid: bf6a7b8c9d0e4234af056789012345f3
              name: 'VPN L2TP: {#L2TPNAME} Errors In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
              key: 'vpn.l2tp.ifInErrors[{#L2TPNAME}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: l2tp
            - uuid: 8f3a4b5c6d7e4901acde2345678901f0
              name: 'VPN L2TP: {#L2TPNAME} Bytes In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInOctets.{#SNMPINDEX}'
              key: 'vpn.l2tp.ifInOctets[{#L2TPNAME}]'
              units: B
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: l2tp
            - uuid: cf7a8b9c0d1e4345a0167890123456f4
              name: 'VPN L2TP: {#L2TPNAME} Errors Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutErrors.{#SNMPINDEX}'
              key: 'vpn.l2tp.ifOutErrors[{#L2TPNAME}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: l2tp
            - uuid: 9f4a5b6c7d8e4012adef3456789012f1
              name: 'VPN L2TP: {#L2TPNAME} Bytes Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutOctets.{#SNMPINDEX}'
              key: 'vpn.l2tp.ifOutOctets[{#L2TPNAME}]'
              units: B
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: l2tp
            - uuid: af5a6b7c8d9e4123aef04567890123f2
              name: 'VPN L2TP: {#L2TPNAME} Status'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOperStatus.{#SNMPINDEX}'
              key: 'vpn.l2tp.status[{#L2TPNAME}]'
              delay: 5m
              valuemap:
                name: sonicwall.vpn.route.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: l2tp
              trigger_prototypes:
                - uuid: df8a9b0c1d2e4456a1278901234567f5
                  expression: 'last(/Sonicwall Firewall/vpn.l2tp.status[{#L2TPNAME}],#1)<>last(/Sonicwall Firewall/vpn.l2tp.status[{#L2TPNAME}],#2)'
                  name: 'VPN L2TP: {#L2TPNAME} Status Changed'
                  priority: WARNING
                  description: 'L2TP tunnel "{#L2TPNAME}" operational status has changed from {ITEM.LASTVALUE2} to {ITEM.LASTVALUE1}.'
                  tags:
                    - tag: component
                      value: vpn
                    - tag: vpntype
                      value: l2tp
          trigger_prototypes:
            - uuid: ef9a0b1c2d3e4567a2389012345678f6
              expression: 'avg(/Sonicwall Firewall/vpn.l2tp.ifInErrors[{#L2TPNAME}],5m) > {$SONICWALL_VPN_WARNING_THRESHOLD} and last(/Sonicwall Firewall/vpn.l2tp.status[{#L2TPNAME}]) = 2'
              name: 'VPN L2TP: {#L2TPNAME} Inbound Errors High'
              status: DISABLED
              priority: WARNING
              description: |
                L2TP tunnel "{#L2TPNAME}" is experiencing elevated inbound errors (>{$SONICWALL_VPN_WARNING_THRESHOLD} errors/sec averaged over 5 minutes).
                
                This may indicate network connectivity issues, MTU problems, or tunnel configuration mismatches.
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: l2tp
            - uuid: f0ab1c2d3e4f4678a3490123456789f7
              expression: 'avg(/Sonicwall Firewall/vpn.l2tp.ifOutErrors[{#L2TPNAME}],5m) > {$SONICWALL_VPN_WARNING_THRESHOLD} and last(/Sonicwall Firewall/vpn.l2tp.status[{#L2TPNAME}]) = 2'
              name: 'VPN L2TP: {#L2TPNAME} Outbound Errors High'
              status: DISABLED
              priority: WARNING
              description: |
                L2TP tunnel "{#L2TPNAME}" is experiencing elevated outbound errors (>{$SONICWALL_VPN_WARNING_THRESHOLD} errors/sec averaged over 5 minutes).
                
                This may indicate network connectivity issues, MTU problems, or tunnel configuration mismatches.
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: l2tp
          graph_prototypes:
            - uuid: 01bc2d3e4f5a4789a4501234567890f8
              name: 'VPN L2TP: {#L2TPNAME} Traffic'
              graph_items:
                - color: 199C0D
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vpn.l2tp.ifInOctets[{#L2TPNAME}]'
                - sortorder: '1'
                  color: 00BFFF
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vpn.l2tp.ifOutOctets[{#L2TPNAME}]'
                - sortorder: '2'
                  drawtype: FILLED_REGION
                  color: FF0000
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vpn.l2tp.ifInErrors[{#L2TPNAME}]'
                - sortorder: '3'
                  drawtype: FILLED_REGION
                  color: CC6600
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vpn.l2tp.ifOutErrors[{#L2TPNAME}]'
        - uuid: ed64d4de43794fc68c4b7d0f8d1455b9
          name: 'VPN Tunnels (Policy Based)'
          type: DEPENDENT
          key: vpn.policy.discovery
          delay: '0'
          lifetime: 1d
          filter:
            conditions:
              - macro: '{#VPNNAME}'
                value: '{$SONICWALL_VPN_IGNORE_REGEX}'
                operator: NOT_MATCHES_REGEX
                formulaid: A
          master_item:
            key: vpn.policy.sa.table
          description: |
            Discovers policy-based VPN tunnels from the vpn.policy.sa.table master item.

            Uses the SA table master walk (1.3.6.1.4.1.8741.1.3.2.1.1.1) and identifies
            tunnels by stable subnet pairs (localStart-remoteStart) rather than the volatile
            SA index. This means tunnel data persists correctly across Phase 2 SA renegotiation
            and rekey events, which change the SA index and would otherwise cause SNMP_AGENT
            item prototypes to lose data or poll the wrong SA.

            Matches the proven WatchGuard master item + DEPENDENT lookup architecture.

            OID field map:
              .3.{idx} = local IP start
              .5.{idx} = remote IP start
              .8.{idx} = SA status
              .9.{idx} = bytes in
              .11.{idx} = bytes out
              .14.{idx} = tunnel name
          item_prototypes:
            - uuid: c7c78b549316466cb3bb4ddd21048476
              name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) Bytes In'
              type: DEPENDENT
              key: 'vpn.policy.bytes.in[{#LOCALSUBNET}-{#REMOTESUBNET}]'
              delay: '0'
              trends: 90d
              units: bps
              master_item:
                key: vpn.policy.sa.table
              description: 'Inbound bytes for VPN tunnel ({#LOCALSUBNET} to {#REMOTESUBNET}). Looks up SA by subnet pair from master walk — stable across SA rekeys.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var data=JSON.parse(value); var lIp="{#LOCALSUBNET}".replace("/24",""); var rIp="{#REMOTESUBNET}".replace("/24",""); var t={}; Object.keys(data).forEach(function(oid){var m=oid.match(/^1\.3\.6\.1\.4\.1\.8741\.1\.3\.2\.1\.1\.1\.(\d+)\.(\d+)$/); if(!m)return; var f=parseInt(m[1]),i=m[2]; if(!t[i])t[i]={}; if(f===3)t[i].l=data[oid]; else if(f===5)t[i].r=data[oid]; else if(f===9)t[i].v=parseInt(data[oid])||0;}); for(var i in t){if(t[i].l===lIp&&t[i].r===rIp)return t[i].v||0;} return null;'
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: VPN
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Subnets'
                  value: '{#LOCALSUBNET}-{#REMOTESUBNET}'
                - tag: 'VPN Type'
                  value: Policy
            - uuid: 8359fd27a05146d99f5955ba2f494b8b
              name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) Bytes Out'
              type: DEPENDENT
              key: 'vpn.policy.bytes.out[{#LOCALSUBNET}-{#REMOTESUBNET}]'
              delay: '0'
              trends: 90d
              units: bps
              master_item:
                key: vpn.policy.sa.table
              description: 'Outbound bytes for VPN tunnel ({#LOCALSUBNET} to {#REMOTESUBNET}). Looks up SA by subnet pair from master walk — stable across SA rekeys.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var data=JSON.parse(value); var lIp="{#LOCALSUBNET}".replace("/24",""); var rIp="{#REMOTESUBNET}".replace("/24",""); var t={}; Object.keys(data).forEach(function(oid){var m=oid.match(/^1\.3\.6\.1\.4\.1\.8741\.1\.3\.2\.1\.1\.1\.(\d+)\.(\d+)$/); if(!m)return; var f=parseInt(m[1]),i=m[2]; if(!t[i])t[i]={}; if(f===3)t[i].l=data[oid]; else if(f===5)t[i].r=data[oid]; else if(f===11)t[i].v=parseInt(data[oid])||0;}); for(var i in t){if(t[i].l===lIp&&t[i].r===rIp)return t[i].v||0;} return null;'
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: VPN
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Subnets'
                  value: '{#LOCALSUBNET}-{#REMOTESUBNET}'
                - tag: 'VPN Type'
                  value: Policy
            - uuid: a9b5c8e2d41f4c6eb7a38f5921046d8a
              name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) Status'
              type: DEPENDENT
              key: 'vpn.policy.status[{#LOCALSUBNET}-{#REMOTESUBNET}]'
              delay: '0'
              master_item:
                key: vpn.policy.sa.table
              description: 'SA status for VPN tunnel ({#LOCALSUBNET} to {#REMOTESUBNET}). Looks up SA by subnet pair from master walk — stable across SA rekeys.'
              valuemap:
                name: sonicwall.vpn.policy.status.valuemap
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var data=JSON.parse(value); var lIp="{#LOCALSUBNET}".replace("/24",""); var rIp="{#REMOTESUBNET}".replace("/24",""); var t={}; Object.keys(data).forEach(function(oid){var m=oid.match(/^1\.3\.6\.1\.4\.1\.8741\.1\.3\.2\.1\.1\.1\.(\d+)\.(\d+)$/); if(!m)return; var f=parseInt(m[1]),i=m[2]; if(!t[i])t[i]={}; if(f===3)t[i].l=data[oid]; else if(f===5)t[i].r=data[oid]; else if(f===8)t[i].v=parseInt(data[oid]);}); for(var i in t){if(t[i].l===lIp&&t[i].r===rIp)return t[i].v;} return null;'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: VPN
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Subnets'
                  value: '{#LOCALSUBNET}-{#REMOTESUBNET}'
                - tag: 'VPN Type'
                  value: Policy
          trigger_prototypes:
            - uuid: 1a669e15dc4a4f379b3d7e854c699a20
              expression: |
                max(/Sonicwall Firewall/vpn.policy.bytes.in[{#LOCALSUBNET}-{#REMOTESUBNET}],1d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD} and
                max(/Sonicwall Firewall/vpn.policy.bytes.out[{#LOCALSUBNET}-{#REMOTESUBNET}],1d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD}
              name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) - Idle for 1 day'
              status: DISABLED
              description: |
                This trigger monitors policy-based VPN tunnel "{#VPNNAME}" ({#LOCALSUBNET}-{#REMOTESUBNET}).
                It fires  when both inbound and outbound traffic have been below the threshold for a continuous 1-day period.
                  
                Note:  Some tunnels may be configured with keepalives or routing protocols that do not generate significant traffic.  
                This trigger is for debugging purposes and intended to highlight short-term idle tunnels for review.
                
                This  trigger requires consistent data - it will not fire if there are gaps in data collection.
