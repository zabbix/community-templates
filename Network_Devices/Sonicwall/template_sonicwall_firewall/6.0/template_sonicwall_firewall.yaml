              key: 'vpn.route.ifInOctets[{#VPNNAME}]'
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: VPN
                - tag: Metrics
                  value: Traffic
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Type'
                  value: Route
            - uuid: d203b3c848c04e94aaa799ba6af8dac0
              name: 'VPN Route: {#VPNNAME} Errors Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutErrors.{#SNMPINDEX}'
