        - uuid: 776cea823ebd460dac46fed8a3338894
          name: 'VPN Policy: SA Table'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.8741.1.3.2.1.1]'
          key: vpn.policy.sa.table
          delay: 5m
          history: '3600'
          value_type: TEXT
          trends: '0'
          description: |
            An SNMP walk of the ACTIVE policy-based VPN Security Associations table
            
            Notice:
            VPN Security Associations (SAs) are frequently renegotiated or re-keyed, which causes the SA index to change. For this reason, the polling interval is set to 5 minutes - so if our discovery rule runs, it will have up-to-date SA data to begin with. Polling less frequently increases the risk of missing statistics for active policy-based tunnels, while polling more frequently may be considered overly aggressive.
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var r={};
                  try {
                    // walk[] JSON format: keys may have leading dot, values may have type prefix
                    var p=JSON.parse(value);
                    Object.keys(p).forEach(function(k){
                      var oid=k.replace(/^\./,'');
                      var val=String(p[k]).replace(/^\w+:\s*/,'').replace(/^"|"$/g,'').trim();
                      r[oid]=val;
                    });
                  } catch(e) {
                    // Raw SNMP text format: ".1.3.6.1... = Type: value\n..."
                    value.split('\n').forEach(function(l){
                      l=l.trim(); if(!l) return;
                      var m=l.match(/^\.?([\d.]+)\s*=\s*(?:[A-Za-z0-9]+:\s*)?(.+)$/);
                      if(!m) return;
                      r[m[1]]=m[2].trim().replace(/^"|"$/g,'');
                    });
                  }
                  return JSON.stringify(r);
          tags:
            - tag: Component
              value: VPN
            - tag: VPN
              value: Policy
