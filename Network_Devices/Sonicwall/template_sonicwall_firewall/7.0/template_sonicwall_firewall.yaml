                    var f=parseInt(m[1]),i=m[2];
                    if(!t[i]) t[i]={};
                    var v=String(data[oid]);
                    if(f===2) t[i].username=v;      // User login name
                    else if(f===3) t[i].clientip=v; // Client tunnel IP
                    else if(f===4) t[i].logintime=v;// Login timestamp
                    else if(f===9) t[i].status=v;   // Session status
                  });
                  // Filter active sessions and deduplicate
                  var seen={};
                  var r=[];
                  Object.keys(t).forEach(function(i){
                    var x=t[i];
                    if(x.username && x.clientip && (x.status==="1" || x.status==="active")){
                      var key=x.username+'|'+x.clientip;
                      if(!seen[key]){
                        seen[key]=true;
                        r.push({
                          '{#USERNAME}':x.username,
                          '{#CLIENTIP}':x.clientip,
                          '{#LOGINTIME}':x.logintime || 'Unknown'
                        });
                      }
                    }
                  });
                  return JSON.stringify(r);
