              units: bps
              description: 'Inbound bytes for user VPN session "{#USERNAME}" from {#PEERGATEWAY} (tunnel IP: {#CLIENTIP}). Decrypted (inbound) traffic from user to firewall.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var data=JSON.parse(value); var name="{#USERNAME}"; var cip="{#CLIENTIP}"; var t={}; Object.keys(data).forEach(function(oid){var m=oid.match(/^1\.3\.6\.1\.4\.1\.8741\.1\.3\.2\.1\.1\.1\.(\d+)\.(\d+)$/); if(!m)return; var f=parseInt(m[1]),i=m[2]; if(!t[i])t[i]={}; if(f===14)t[i].n=data[oid]; else if(f===3)t[i].src=data[oid]; else if(f===2)t[i].peer=data[oid]; else if(f===11)t[i].v=parseInt(data[oid])||0;}); for(var i in t){var clientIP=t[i].src; if(!clientIP||clientIP==="0.0.0.0")clientIP=t[i].peer; if(t[i].n===name&&clientIP===cip)return t[i].v||0;} return null;'
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
                - type: MULTIPLIER
                  parameters:
                    - '8'
              master_item:
                key: vpn.policy.sa.table
              tags:
                - tag: Component
                  value: VPN
                - tag: Username
                  value: '{#USERNAME}'
                - tag: 'VPN Type'
                  value: User
            - uuid: b2c3d4e5f6a74b8c9d0e1f2a3b4c5d6e
              name: 'VPN User: {#USERNAME} ({#CLIENTIP}) Bytes Out'
              type: DEPENDENT
              key: 'vpn.user.bytes.out[{#USERNAME}-{#CLIENTIP}]'
              delay: '0'
              trends: 30d
              units: bps
              description: 'Outbound bytes for user VPN session "{#USERNAME}" from {#PEERGATEWAY} (tunnel IP: {#CLIENTIP}). Encrypted (outbound) traffic from firewall to user.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var data=JSON.parse(value); var name="{#USERNAME}"; var cip="{#CLIENTIP}"; var t={}; Object.keys(data).forEach(function(oid){var m=oid.match(/^1\.3\.6\.1\.4\.1\.8741\.1\.3\.2\.1\.1\.1\.(\d+)\.(\d+)$/); if(!m)return; var f=parseInt(m[1]),i=m[2]; if(!t[i])t[i]={}; if(f===14)t[i].n=data[oid]; else if(f===2)t[i].c=data[oid]; else if(f===9)t[i].v=parseInt(data[oid])||0;}); for(var i in t){if(t[i].n===name&&t[i].c===cip)return t[i].v||0;} return null;'
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
                - type: MULTIPLIER
                  parameters:
                    - '8'
              master_item:
                key: vpn.policy.sa.table
              tags:
                - tag: Component
                  value: VPN
                - tag: Username
                  value: '{#USERNAME}'
                - tag: 'VPN Type'
                  value: User
            - uuid: c3d4e5f6a7b84c9d8e1f2a3b4c5d6e7f
              name: 'VPN User: {#USERNAME} ({#CLIENTIP}) Status'
              type: DEPENDENT
              key: 'vpn.user.status[{#USERNAME}-{#CLIENTIP}]'
              delay: '0'
              description: |
                Calculated connection status for user VPN session "{#USERNAME}" (tunnel IP: {#CLIENTIP}).

                2 = Active — SA entry present and traffic recorded (bytes in + out > 0)
                1 = Idle   — SA entry present but no traffic, OR SA has expired between poll cycles
              valuemap:
                name: sonicwall.vpn.user.status.valuemap
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var data=JSON.parse(value); var name="{#USERNAME}"; var cip="{#CLIENTIP}"; var t={}; Object.keys(data).forEach(function(oid){var m=oid.match(/^1\.3\.6\.1\.4\.1\.8741\.1\.3\.2\.1\.1\.1\.(\d+)\.(\d+)$/); if(!m)return; var f=parseInt(m[1]),i=m[2]; if(!t[i])t[i]={}; if(f===14)t[i].n=data[oid]; else if(f===2)t[i].c=data[oid]; else if(f===11)t[i].bi=parseInt(data[oid])||0; else if(f===9)t[i].bo=parseInt(data[oid])||0;}); for(var i in t){if(t[i].n===name&&t[i].c===cip){return ((t[i].bi||0)+(t[i].bo||0))>0?2:1;}} return 1;'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              master_item:
                key: vpn.policy.sa.table
              tags:
                - tag: Component
                  value: VPN
                - tag: Username
                  value: '{#USERNAME}'
                - tag: 'VPN Type'
                  value: User
            - uuid: d5e6f7a8b9c04e5f8a7b8c9d0e1f2a3b
              name: 'VPN User: {#USERNAME} ({#CLIENTIP}) Session Lifetime'
              type: DEPENDENT
              key: 'vpn.user.session.lifetime[{#USERNAME}-{#CLIENTIP}]'
              delay: '0'
              units: s
              description: 'Session lifetime (age) for user VPN session "{#USERNAME}" from {#PEERGATEWAY} (tunnel IP: {#CLIENTIP}). Shows how long the SA has been established in seconds.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var data=JSON.parse(value); var name="{#USERNAME}"; var cip="{#CLIENTIP}"; var t={}; Object.keys(data).forEach(function(oid){var m=oid.match(/^1\.3\.6\.1\.4\.1\.8741\.1\.3\.2\.1\.1\.1\.(\d+)\.(\d+)$/); if(!m)return; var f=parseInt(m[1]),i=m[2]; if(!t[i])t[i]={}; if(f===14)t[i].n=data[oid]; else if(f===3)t[i].src=data[oid]; else if(f===2)t[i].peer=data[oid]; else if(f===7)t[i].v=parseInt(data[oid])||0;}); for(var i in t){var clientIP=t[i].src; if(!clientIP||clientIP==="0.0.0.0")clientIP=t[i].peer; if(t[i].n===name&&clientIP===cip)return t[i].v||0;} return null;'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '1800'
              master_item:
                key: vpn.policy.sa.table
              tags:
                - tag: Component
                  value: VPN
                - tag: Username
                  value: '{#USERNAME}'
                - tag: 'VPN Type'
                  value: User
          graph_prototypes:
            - uuid: d4e5f6a7b8c94d0e8f2a3b4c5d6e7f8a
              name: 'VPN User: {#USERNAME} ({#CLIENTIP}) Traffic'
              graph_items:
                - color: 00FF00
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vpn.user.bytes.in[{#USERNAME}-{#CLIENTIP}]'
                - sortorder: '1'
                  color: 0080FF
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vpn.user.bytes.out[{#USERNAME}-{#CLIENTIP}]'
          master_item:
            key: vpn.policy.sa.table
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data=JSON.parse(value);
                  var t={};
                  Object.keys(data).forEach(function(oid){
                    var m=oid.match(/^1\.3\.6\.1\.4\.1\.8741\.1\.3\.2\.1\.1\.1\.(\d+)\.(\d+)$/);
                    if(!m) return;
                    var f=parseInt(m[1]),i=m[2];
                    if(!t[i]) t[i]={};
                    var v=String(data[oid]);
                    if(f===2)  t[i].peer=v;        // Remote gateway IP
                    else if(f===3)  t[i].src=v;    // Local subnet start (.3)  
                    else if(f===5)  t[i].dst=v;    // Remote subnet start (.5)
                    else if(f===7)  t[i].age=v;    // SA create time/age
                    else if(f===14) t[i].name=v;   // Username or policy name
                  });
                  
                  var r=[];
                  Object.keys(t).forEach(function(i){
                    var x=t[i];
                    if(!x.name) return;
                    
                    // Skip entries that look like policy tunnel names rather than usernames.
                    // Be conservative - only exclude obvious policy tunnel naming patterns.
                    var name = x.name.toLowerCase();
                    var isPolicyName = /\bvpn\b/.test(name) ||           // Contains "VPN" 
                                       /\btunnel\b/.test(name) ||        // Contains "Tunnel"
                                       /-vpn-/.test(name) ||             // Pattern like "site-vpn-location"
                                       /_vpn_/.test(name) ||             // Pattern like "site_vpn_location"
                                       /^[a-z]{2,4}-[a-z]+/.test(name);  // Pattern like "ABC-SiteName" or "CORP-Branch"
                    
                    if(isPolicyName) return; // Skip policy-based SAs
                    
                    // For user sessions, try to identify the client IP.
                    // Check if .3 (src) looks like a single IP rather than 0.0.0.0 or subnet.
                    var clientIP = x.src;
                    if(!clientIP || clientIP === '0.0.0.0') {
                      clientIP = x.peer; // Fallback to peer gateway IP
                    }
                    
                    if(clientIP) {
                      r.push({
                        '{#USERNAME}': x.name,
                        '{#CLIENTIP}': clientIP,
                        '{#PEERGATEWAY}': x.peer || '',
                        '{#DEBUG_SRC}': x.src || '',
                        '{#DEBUG_DST}': x.dst || ''
                      });
                    }
                  });
                  return JSON.stringify(r);
        - uuid: 12cd3e4f5a6a4890a5612345678901f9
          name: 'VPN Tunnels (PPTP Based)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#PPTPNAME},IF-MIB::ifDescr,{#IFTYPE},IF-MIB::ifType,{#IFOPERSTATUS},IF-MIB::ifOperStatus,{#IFADMINSTATUS},IF-MIB::ifAdminStatus]'
          key: vpn.pptp.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFADMINSTATUS}'
                value: ^1$
                formulaid: A
              - macro: '{#IFTYPE}'
                value: ^131$
                formulaid: B
              - macro: '{#PPTPNAME}'
                value: '^.*[pP][pP][tT][pP].*$'
                formulaid: C
          description: |
            Discovers PPTP VPN tunnel interfaces (ifType=131) by filtering interface descriptions containing "PPTP".
            PPTP (Point-to-Point Tunneling Protocol) creates secure tunnel connections for VPN access, commonly used in legacy VPN deployments.      
            This discovery rule identifies:
            - Active tunnel interfaces (adminStatus=1)
            - Interface type 131 (tunnel interfaces)
            - Descriptions containing PPTP identifiers        
            Provides traffic statistics, operational status monitoring, and error tracking for PPTP tunnel performance analysis.
          item_prototypes:
            - uuid: 56aa7a8a9a0a4234a9056789012345fd
              name: 'VPN PPTP: {#PPTPNAME} Errors In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
              key: 'vpn.pptp.ifInErrors[{#PPTPNAME}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: pptp
            - uuid: 23de4f5a6a7a4901a6723456789012fa
              name: 'VPN PPTP: {#PPTPNAME} Bytes In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInOctets.{#SNMPINDEX}'
              key: 'vpn.pptp.ifInOctets[{#PPTPNAME}]'
              units: B
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: pptp
            - uuid: 67aa8a9a0a1a4345a0167890123456fe
              name: 'VPN PPTP: {#PPTPNAME} Errors Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutErrors.{#SNMPINDEX}'
              key: 'vpn.pptp.ifOutErrors[{#PPTPNAME}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: pptp
            - uuid: 34ef5a6a7a8a4012a7834567890123fb
              name: 'VPN PPTP: {#PPTPNAME} Bytes Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutOctets.{#SNMPINDEX}'
              key: 'vpn.pptp.ifOutOctets[{#PPTPNAME}]'
              units: B
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: pptp
            - uuid: 45fa6a7a8a9a4123a8945678901234fc
              name: 'VPN PPTP: {#PPTPNAME} Status'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOperStatus.{#SNMPINDEX}'
              key: 'vpn.pptp.status[{#PPTPNAME}]'
              delay: 5m
              valuemap:
                name: sonicwall.vpn.route.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: pptp
              trigger_prototypes:
                - uuid: 78aa9a0a1a2a4456a1278901234567ff
                  expression: 'last(/Sonicwall Firewall/vpn.pptp.status[{#PPTPNAME}],#1)<>last(/Sonicwall Firewall/vpn.pptp.status[{#PPTPNAME}],#2)'
                  name: 'VPN PPTP: {#PPTPNAME} Status Changed'
                  priority: WARNING
                  description: 'PPTP tunnel "{#PPTPNAME}" operational status has changed from {ITEM.LASTVALUE2} to {ITEM.LASTVALUE1}.'
                  tags:
                    - tag: component
                      value: vpn
                    - tag: vpntype
                      value: pptp
          trigger_prototypes:
            - uuid: 89aa0a1a2a3a4567a2389012345678f0
              expression: 'avg(/Sonicwall Firewall/vpn.pptp.ifInErrors[{#PPTPNAME}],5m) > {$SONICWALL_VPN_WARNING_THRESHOLD} and last(/Sonicwall Firewall/vpn.pptp.status[{#PPTPNAME}]) = 2'
              name: 'VPN PPTP: {#PPTPNAME} Inbound Errors High'
              status: DISABLED
              priority: WARNING
              description: |
                PPTP tunnel "{#PPTPNAME}" is experiencing elevated inbound errors (>{$SONICWALL_VPN_WARNING_THRESHOLD} errors/sec averaged over 5 minutes).
                
                This may indicate network connectivity issues, authentication problems, or tunnel configuration mismatches.
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: pptp
            - uuid: 9aaa1a2a3a4a4678a3490123456789f1
              expression: 'avg(/Sonicwall Firewall/vpn.pptp.ifOutErrors[{#PPTPNAME}],5m) > {$SONICWALL_VPN_WARNING_THRESHOLD} and last(/Sonicwall Firewall/vpn.pptp.status[{#PPTPNAME}]) = 2'
              name: 'VPN PPTP: {#PPTPNAME} Outbound Errors High'
              status: DISABLED
              priority: WARNING
              description: |
                PPTP tunnel "{#PPTPNAME}" is experiencing elevated outbound errors (>{$SONICWALL_VPN_WARNING_THRESHOLD} errors/sec averaged over 5 minutes).
                
                This may indicate network connectivity issues, authentication problems, or tunnel configuration mismatches.
              tags:
                - tag: component
                  value: vpn
                - tag: vpntype
                  value: pptp
          graph_prototypes:
