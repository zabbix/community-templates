        - uuid: ed64d4de43794fc68c4b7d0f8d1455b9
          name: 'VPN Tunnels (Policy Based)'
          type: DEPENDENT
          key: vpn.policy.discovery
          delay: '0'
          filter:
            conditions:
              - macro: '{#VPNNAME}'
                value: '{$SONICWALL_VPN_IGNORE_REGEX}'
                operator: NOT_MATCHES_REGEX
                formulaid: A
              - macro: '{#LOCALSUBNET}'
                value: '0\.0\.0\.0'
                operator: NOT_MATCHES_REGEX
                formulaid: B
              - macro: '{#REMOTESUBNET}'
                value: '0\.0\.0\.0'
                operator: NOT_MATCHES_REGEX
                formulaid: C
            evaltype: AND
          lifetime: 1d
          description: |
            Discovers policy-based VPN tunnels from the vpn.policy.sa.table master item.
            
            Uses the SA table master walk (1.3.6.1.4.1.8741.1.3.2.1.1.1) and identifies
            tunnels by stable subnet pairs (localStart-remoteStart) rather than the volatile
            SA index. This means tunnel data persists correctly across Phase 2 SA renegotiation
            and rekey events, which change the SA index and would otherwise cause SNMP_AGENT
            item prototypes to lose data or poll the wrong SA.
            
            Matches the proven WatchGuard master item + DEPENDENT lookup architecture.
            
            OID field map (sonicSAStatTable):
              .2.{idx}  = sonicSAStatPeerGateway      - remote gateway IP
              .3.{idx}  = sonicSAStatSrcAddrBegin     - local subnet start
              .4.{idx}  = sonicSAStatSrcAddrEnd       - local subnet end
              .5.{idx}  = sonicSAStatDstAddrBegin     - remote subnet start
              .6.{idx}  = sonicSAStatDstAddrEnd       - remote subnet end
              .7.{idx}  = sonicSAStatCreateTime       - SA age (DisplayString)
              .8.{idx}  = sonicSAStatEncryptPktCount  - packets out
              .9.{idx}  = sonicSAStatEncryptByteCount - bytes out
              .10.{idx} = sonicSAStatDecryptPktCount  - packets in
              .11.{idx} = sonicSAStatDecryptByteCount - bytes in
              .12.{idx} = sonicSAStatInFragPktCount   - inbound fragmented packets
              .13.{idx} = sonicSAStatOutFragPktCount  - outbound fragmented packets
              .14.{idx} = sonicSAStatUserName         - policy name (policy SA) or username (user SA)
          item_prototypes:
            - uuid: c7c78b549316466cb3bb4ddd21048476
              name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) Bytes In'
              type: DEPENDENT
              key: 'vpn.policy.bytes.in[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}]'
              delay: '0'
              trends: 90d
              units: bps
              description: 'Inbound bytes for Phase 2 SA "{#VPNNAME}" ({#LOCALSUBNET} → {#REMOTESUBNET}). Keyed by name+local+remote to uniquely identify each subnet pair SA within a multi-SA policy.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var data=JSON.parse(value); var name="{#VPNNAME}"; var loc="{#LOCALSUBNET}"; var rem="{#REMOTESUBNET}"; var t={}; Object.keys(data).forEach(function(oid){var m=oid.match(/^1\.3\.6\.1\.4\.1\.8741\.1\.3\.2\.1\.1\.1\.(\d+)\.(\d+)$/); if(!m)return; var f=parseInt(m[1]),i=m[2]; if(!t[i])t[i]={}; if(f===14)t[i].n=data[oid]; else if(f===3)t[i].l=data[oid]; else if(f===5)t[i].r=data[oid]; else if(f===11)t[i].v=parseInt(data[oid])||0;}); for(var i in t){if(t[i].n===name&&t[i].l===loc&&t[i].r===rem)return t[i].v||0;} return null;'
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
                - type: MULTIPLIER
                  parameters:
                    - '8'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              master_item:
                key: vpn.policy.sa.table
              tags:
                - tag: Component
                  value: VPN
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Subnets'
                  value: '{#LOCALSUBNET}-{#REMOTESUBNET}'
                - tag: 'VPN Type'
                  value: Policy
            - uuid: 8359fd27a05146d99f5955ba2f494b8b
              name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) Bytes Out'
              type: DEPENDENT
              key: 'vpn.policy.bytes.out[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}]'
              delay: '0'
              trends: 90d
              units: bps
              description: 'Outbound bytes for Phase 2 SA "{#VPNNAME}" ({#LOCALSUBNET} → {#REMOTESUBNET}). Keyed by name+local+remote to uniquely identify each subnet pair SA within a multi-SA policy.'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var data=JSON.parse(value); var name="{#VPNNAME}"; var loc="{#LOCALSUBNET}"; var rem="{#REMOTESUBNET}"; var t={}; Object.keys(data).forEach(function(oid){var m=oid.match(/^1\.3\.6\.1\.4\.1\.8741\.1\.3\.2\.1\.1\.1\.(\d+)\.(\d+)$/); if(!m)return; var f=parseInt(m[1]),i=m[2]; if(!t[i])t[i]={}; if(f===14)t[i].n=data[oid]; else if(f===3)t[i].l=data[oid]; else if(f===5)t[i].r=data[oid]; else if(f===9)t[i].v=parseInt(data[oid])||0;}); for(var i in t){if(t[i].n===name&&t[i].l===loc&&t[i].r===rem)return t[i].v||0;} return null;'
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
                - type: MULTIPLIER
                  parameters:
                    - '8'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              master_item:
                key: vpn.policy.sa.table
              tags:
                - tag: Component
                  value: VPN
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Subnets'
                  value: '{#LOCALSUBNET}-{#REMOTESUBNET}'
                - tag: 'VPN Type'
                  value: Policy
            - uuid: a9b5c8e2d41f4c6eb7a38f5921046d8a
              name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) Status'
              type: DEPENDENT
              key: 'vpn.policy.status[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}]'
              delay: '0'
              description: |
                Calculated SA status for Phase 2 SA "{#VPNNAME}" ({#LOCALSUBNET} → {#REMOTESUBNET}).

                Keyed by name+local+remote to uniquely identify each subnet pair SA within a
                multi-SA policy. A site-to-site policy has one Phase 1 (the named policy) and
                one Phase 2 SA per configured subnet pair — each appears as a separate entry
                in the sonicSAStatTable walk.

                Value logic:
                  2 = Up   — SA entry found for this name+subnet pair with traffic
                  1 = Idle — SA entry found but zero bytes, OR SA has expired (no current entry)
              valuemap:
                name: sonicwall.vpn.policy.status.valuemap
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var data=JSON.parse(value); var name="{#VPNNAME}"; var loc="{#LOCALSUBNET}"; var rem="{#REMOTESUBNET}"; var t={}; Object.keys(data).forEach(function(oid){var m=oid.match(/^1\.3\.6\.1\.4\.1\.8741\.1\.3\.2\.1\.1\.1\.(\d+)\.(\d+)$/); if(!m)return; var f=parseInt(m[1]),i=m[2]; if(!t[i])t[i]={}; if(f===14)t[i].n=data[oid]; else if(f===3)t[i].l=data[oid]; else if(f===5)t[i].r=data[oid]; else if(f===11)t[i].bi=parseInt(data[oid])||0; else if(f===9)t[i].bo=parseInt(data[oid])||0;}); for(var i in t){if(t[i].n===name&&t[i].l===loc&&t[i].r===rem){return ((t[i].bi||0)+(t[i].bo||0))>0?2:1;}} return 1;'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              master_item:
                key: vpn.policy.sa.table
              tags:
                - tag: Component
                  value: VPN
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Subnets'
                  value: '{#LOCALSUBNET}-{#REMOTESUBNET}'
                - tag: 'VPN Type'
                  value: Policy
          trigger_prototypes:
            - uuid: d05411fdce0242bba10d243fbae2c9c5
              expression: |
                max(/Sonicwall Firewall/vpn.policy.bytes.in[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],1h) > 0 or
                max(/Sonicwall Firewall/vpn.policy.bytes.out[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],1h) > 0
              name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) - INTERMITTENT'
              priority: INFO
              description: |
                VPN tunnel "{#VPNNAME}" ({#LOCALSUBNET}-{#REMOTESUBNET}) shows INTERMITTENT activity.
                
                Traffic detected within the last hour but not in recent 15 minutes. This may indicate
                periodic or low-frequency usage patterns.
                
                Status: INTERMITTENT [DARK GREEN]
                Criteria: Active traffic counters > 0 within 1 hour, but not within 15 minutes
              manual_close: 'YES'
              tags:
                - tag: VPN-Status
                  value: INTERMITTENT
                - tag: VPN-Traffic
                  value: Periodic
            - uuid: 2d7090cde23d452c82355c1c54c73d1b
              expression: |
                max(/Sonicwall Firewall/vpn.policy.bytes.in[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],1d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD} and
                max(/Sonicwall Firewall/vpn.policy.bytes.out[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],1d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD}
              name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) - IDLE'
              priority: INFO
              description: |
                VPN tunnel "{#VPNNAME}" ({#LOCALSUBNET}-{#REMOTESUBNET}) is IDLE.
                
                No significant traffic detected for 24 hours. The tunnel may be configured but
                not actively used, or experiencing temporary downtime.
                
                Status: IDLE [BLUE]
                Criteria: No traffic for 24 hours (below threshold)
                
                Note: Some tunnels have keepalives or routing protocols that generate minimal traffic.
              dependencies:
                - name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) - INTERMITTENT'
                  expression: |
                    max(/Sonicwall Firewall/vpn.policy.bytes.in[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],1h) > 0 or
                    max(/Sonicwall Firewall/vpn.policy.bytes.out[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],1h) > 0
              manual_close: 'YES'
              tags:
                - tag: VPN-Status
                  value: IDLE
                - tag: VPN-Traffic
                  value: None
            - uuid: 762c2a5aa56245369f4b4801244b7f96
              expression: |
                max(/Sonicwall Firewall/vpn.policy.bytes.in[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],7d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD} and
                max(/Sonicwall Firewall/vpn.policy.bytes.out[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],7d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD}
              name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) - INACTIVE'
              priority: WARNING
              description: |
                VPN tunnel "{#VPNNAME}" ({#LOCALSUBNET}-{#REMOTESUBNET}) is INACTIVE.
                
                No significant traffic for 1 week. This tunnel may be misconfigured, experiencing
                connectivity issues, or no longer needed.
                
                Status: INACTIVE [GRAY]
                Criteria: No traffic for 1 week (below threshold)
                
                Recommended Action: Review tunnel configuration and necessity.
              dependencies:
                - name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) - IDLE'
                  expression: |
                    max(/Sonicwall Firewall/vpn.policy.bytes.in[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],1d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD} and
                    max(/Sonicwall Firewall/vpn.policy.bytes.out[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],1d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD}
              manual_close: 'YES'
              tags:
                - tag: VPN-Status
                  value: INACTIVE
                - tag: VPN-Traffic
                  value: None
            - uuid: 901cbd93c99e4d10827132e8e33de97c
              expression: |
                max(/Sonicwall Firewall/vpn.policy.bytes.in[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],30d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD} and
                max(/Sonicwall Firewall/vpn.policy.bytes.out[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],30d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD}
              name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) - STALE'
              priority: WARNING
              description: |
                VPN tunnel "{#VPNNAME}" ({#LOCALSUBNET}-{#REMOTESUBNET}) is STALE.
                
                No significant traffic for 1 month. This tunnel is likely abandoned or no longer
                functional and should be reviewed for decommissioning.
                
                Status: STALE [RED]
                Criteria: No traffic for 1 month (below threshold)
                
                Recommended Action: Consider disabling or removing this tunnel configuration.
              dependencies:
                - name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) - INACTIVE'
                  expression: |
                    max(/Sonicwall Firewall/vpn.policy.bytes.in[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],7d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD} and
                    max(/Sonicwall Firewall/vpn.policy.bytes.out[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}],7d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD}
              manual_close: 'YES'
              tags:
                - tag: VPN-Status
                  value: STALE
                - tag: VPN-Traffic
                  value: Abandoned
          graph_prototypes:
            - uuid: 08086b07da6b4c23933ab5fb2dfc9d5e
              name: 'VPN Policy: {#VPNNAME} ({#LOCALSUBNET}-{#REMOTESUBNET}) Traffic'
              graph_items:
                - color: 00FF00
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vpn.policy.bytes.in[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}]'
                - sortorder: '1'
                  color: 0080FF
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vpn.policy.bytes.out[{#VPNNAME},{#LOCALSUBNET},{#REMOTESUBNET}]'
          master_item:
            key: vpn.policy.sa.table
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data=JSON.parse(value);
                  var t={};
                  Object.keys(data).forEach(function(oid){
                    var m=oid.match(/^1\.3\.6\.1\.4\.1\.8741\.1\.3\.2\.1\.1\.1\.(\d+)\.(\d+)$/);
                    if(!m) return;
                    var f=parseInt(m[1]),i=m[2];
                    if(!t[i]) t[i]={};
                    var v=String(data[oid]);
                    if(f===3) t[i].local=v;
                    else if(f===5) t[i].remote=v;
                    else if(f===14) t[i].name=v;
                  });
                  // Deduplicate by name+local+remote — multiple SA indices can exist
                  // for the same subnet pair during rekey/renegotiation.
                  var seen={};
                  var r=[];
                  Object.keys(t).forEach(function(i){
                    var x=t[i];
                    if(x.name&&x.local&&x.remote){
                      var key=x.name+'|'+x.local+'|'+x.remote;
                      if(!seen[key]){
                        seen[key]=true;
                        r.push({
                          '{#VPNNAME}':x.name,
                          '{#LOCALSUBNET}':x.local,
                          '{#REMOTESUBNET}':x.remote
                        });
                      }
                    }
                  });
                  return JSON.stringify(r);
        - uuid: 6f03ff4cb25a444fa9b6c5b4cbf51b9e
          name: 'SSL-VPN User Sessions'
          type: DEPENDENT
          key: vpn.sslvpn.users.discovery
          delay: '0'
          status: DISABLED
          filter:
            conditions:
              - macro: '{#USERNAME}'
                value: '{$SONICWALL_SSLVPN_USER_IGNORE_REGEX}'
                operator: NOT_MATCHES_REGEX
                formulaid: A
          lifetime: 2h
          description: |
            Discovers active SSL-VPN user sessions from dedicated user session table.
            
            Provides clean separation from policy-based VPN tunnels with dedicated
            user session metrics including login duration, client details, and data transfer.
            
            Shorter 2h lifetime since SSL-VPN sessions are typically more transient than
            site-to-site tunnels.
            
            Uses dedicated SSL-VPN user table instead of filtering the SA table,
            providing more accurate and detailed user session information.
          item_prototypes:
            - uuid: 0bc7a155d1314742be22b10b0ee032c4
              name: 'SSL-VPN User: {#USERNAME} ({#CLIENTIP}) Bytes In'
              type: DEPENDENT
              key: 'vpn.sslvpn.user.bytes.in[{#USERNAME}-{#CLIENTIP}]'
              delay: 5m
              trends: 30d
              units: bps
              description: 'Inbound bytes for SSL-VPN user session "{#USERNAME}" from client IP {#CLIENTIP}'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - 'var d=JSON.parse(value),n="{#USERNAME}",ip="{#CLIENTIP}",t={}; Object.keys(d).forEach(function(oid){var m=oid.match(/^1\\.3\\.6\\.1\\.4\\.1\\.8741\\.1\\.3\\.8\\.1\\.1\\.(\\d+)\\.(\\d+)$/); if(!m)return; var f=parseInt(m[1]),i=m[2]; if(!t[i])t[i]={}; if(f===2)t[i].u=d[oid]; else if(f===3)t[i].c=d[oid]; else if(f===5)t[i].v=parseInt(d[oid])||0;}); for(var i in t){if(t[i].u===n&&t[i].c===ip)return t[i].v||0;} return null;'
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
                - type: MULTIPLIER
                  parameters:
                    - '8'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '1800'
              master_item:
                key: vpn.sslvpn.users.table
              tags:
                - tag: Component
                  value: VPN
                - tag: Username
                  value: '{#USERNAME}'
                - tag: 'VPN Type'
