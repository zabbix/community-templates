                - sortorder: '2'
                  drawtype: FILLED_REGION
                  color: FF0000
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vpn.pptp.ifInErrors[{#PPTPNAME}]'
                - sortorder: '3'
                  drawtype: FILLED_REGION
                  color: CC6600
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vpn.pptp.ifOutErrors[{#PPTPNAME}]'
        - uuid: 5b8828f520044cb4aee1248934790d9b
          name: 'VPN Tunnels (Route Based)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#VPNNAME},1.3.6.1.2.1.2.2.1.2,{#VPNADMINSTATE},1.3.6.1.2.1.2.2.1.7,{#IFTYPE},1.3.6.1.2.1.2.2.1.3,{#VPNOPERSTATE},IF-MIB::ifOperStatus]'
          key: vpn.route.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFTYPE}'
                value: ^131$
                formulaid: A
              - macro: '{#VPNADMINSTATE}'
                value: ^1$
                formulaid: B
              - macro: '{#VPNNAME}'
                value: '{$SONICWALL_VPN_IGNORE_REGEX}'
                operator: NOT_MATCHES_REGEX
                formulaid: C
          description: |
            Discover dynamically instantiated route-based VPN TUNNEL interfaces (ifType=131).
              
            These represent  the runtime IPsec tunnel state associated with route-based VPN SAs. The encryption domain is always 0.0.0.0/0 (match  any), and SAs are tied to these tunnels.
              
            These interfaces provide:
             - Real-time flap monitoring
             - Byte and  error counters
             - Accurate tunnel usage insights
              
            This intentionally overlaps with VTI monitoring. Each layer  serves a different purpose:
             - VTI: persistent configuration and routing layer
             - TUNNEL: dynamic SA interface  for traffic visibility
          item_prototypes:
            - uuid: 3c1bb76ca478444db54d7f394e046c23
              name: 'VPN Route: {#VPNNAME} Errors In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
              key: 'vpn.route.ifInErrors[{#VPNNAME}]'
              units: bps
              description: 'Errors In counter not exposed during testing - Bug in the Sonicwall Firmware?'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: VPN
                - tag: Metrics
                  value: Errors
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Type'
                  value: Route
            - uuid: 4a06318935bd4a8d803dd9109db9ba7e
              name: 'VPN Route: {#VPNNAME} Bytes In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInOctets.{#SNMPINDEX}'
              key: 'vpn.route.ifInOctets[{#VPNNAME}]'
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: VPN
                - tag: Metrics
                  value: Traffic
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Type'
                  value: Route
            - uuid: d203b3c848c04e94aaa799ba6af8dac0
              name: 'VPN Route: {#VPNNAME} Errors Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutErrors.{#SNMPINDEX}'
              key: 'vpn.route.ifOutErrors[{#VPNNAME}]'
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: VPN
                - tag: Metrics
                  value: Errors
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Type'
                  value: Route
            - uuid: 5c4f71c24d51433fa572275b0726f2f1
              name: 'VPN Route: {#VPNNAME} Bytes Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutOctets.{#SNMPINDEX}'
              key: 'vpn.route.ifOutOctets[{#VPNNAME}]'
              units: bps
              description: 'Bytes Out counter not exposed during testing - Bug in the Sonicwall Firmware?'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: VPN
                - tag: Metrics
                  value: Traffic
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Type'
                  value: Route
            - uuid: 803ca2150a6940d38363649cfa3e019d
              name: 'VPN Route: {#VPNNAME} Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}'
              key: 'vpn.route.status[{#VPNNAME}]'
              delay: 5m
              valuemap:
                name: sonicwall.vpn.route.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '21600'
              tags:
                - tag: Component
                  value: VPN
                - tag: 'VPN Name'
                  value: '{#VPNNAME}'
                - tag: 'VPN Type'
                  value: Route
              trigger_prototypes:
                - uuid: 7e5b193f9d734c2ea2745793eebfe8fc
                  expression: |
                    (count(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}],{$SONICWALL_FLAPPING_TIMEFRAME})>1 and change(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}])>0)
                    and nodata(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}],120s)=0
                  name: 'VPN Route: {#VPNNAME} Flapping Detected'
                  priority: WARNING
                  description: |
                    The VPN route tunnel "{#VPNNAME}" has changed status more than {$SONICWALL_FLAPPING_CHANGE_THRESHOLD} times in the last {$SONICWALL_FLAPPING_TIMEFRAME}.
                    This indicates tunnel instability and requires investigation.
                    
                    Possible causes:
                    - Network connectivity issues
                    - SonicWall firmware bugs
                    - Routing configuration problems
                    - Hardware issues
                    - Authentication/certificate problems
                    
                    Check tunnel logs and network connectivity to the remote endpoint.
                  manual_close: 'YES'
                  tags:
                    - tag: Component
                      value: VPN
                    - tag: Condition
                      value: Flapping
                    - tag: 'VPN Type'
                      value: Route
          trigger_prototypes:
            - uuid: 1a669e15dc4a4f379b3d7e854c699a10
              expression: |
                last(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}]) = 2 and
                max(/Sonicwall Firewall/vpn.route.ifInOctets[{#VPNNAME}],1d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD} and
                max(/Sonicwall Firewall/vpn.route.ifOutOctets[{#VPNNAME}],1d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD}
              name: 'VPN Route: {#VPNNAME} - Idle for 1 day'
              status: DISABLED
              description: |
                This trigger monitors route-based VPN tunnel "{#VPNNAME}".
                It fires when both inbound and outbound  traffic have been below the threshold for a continuous 1-day period while the tunnel status is Active.
                  
                Note:  Some tunnels may be configured with keepalives or routing protocols that do not generate significant traffic.  
                This trigger is for debugging purposes and intended to highlight short-term idle tunnels for review.
                
                This  trigger requires consistent data - it will not fire if there are gaps in data collection.
              manual_close: 'YES'
              tags:
                - tag: Condition
                  value: 'Suspected Idle'
            - uuid: 2b669e15dc4a4f379b3d7e854c699a11
              expression: |
                last(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}]) = 2 and
                max(/Sonicwall Firewall/vpn.route.ifInOctets[{#VPNNAME}],30d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD} and
                max(/Sonicwall Firewall/vpn.route.ifOutOctets[{#VPNNAME}],30d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD}
              name: 'VPN Route: {#VPNNAME} - Idle for 1 month'
              status: DISABLED
              priority: WARNING
              description: |
                This trigger monitors route-based VPN tunnel "{#VPNNAME}".
                It fires when both inbound and outbound  traffic have been below the threshold for a continuous 30-day period while the tunnel status is Active.
                  
                 Note: Some tunnels may be configured with keepalives or routing protocols that do not generate significant traffic.  
                This trigger is for debugging purposes and intended to highlight daily idle tunnels for review.
                
                This trigger  requires consistent data - it will not fire if there are gaps in data collection.
              manual_close: 'YES'
              tags:
                - tag: Condition
                  value: 'Long Term Idle'
            - uuid: 3c669e15dc4a4f379b3d7e854c699a12
              expression: |
                last(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}]) = 2 and
                max(/Sonicwall Firewall/vpn.route.ifInOctets[{#VPNNAME}],7d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD} and
                max(/Sonicwall Firewall/vpn.route.ifOutOctets[{#VPNNAME}],7d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD} and
                nodata(/Sonicwall Firewall/vpn.route.ifInOctets[{#VPNNAME}],7d) = 0 and
                nodata(/Sonicwall Firewall/vpn.route.ifOutOctets[{#VPNNAME}],7d) = 0
              name: 'VPN Route: {#VPNNAME} - Idle for 1 week'
              priority: INFO
              description: |
                This trigger monitors route-based VPN tunnel "{#VPNNAME}".
                It fires when both inbound and outbound  traffic have been below the threshold for a continuous 1-week period while the tunnel status is Active.
                  
                 Note: Some tunnels may be configured with keepalives or routing protocols that do not generate significant traffic.  
                This trigger is intended to highlight weekly idle tunnels for review and potential decommissioning.
                
                This  trigger requires 7 days of consistent data collection before it can fire, preventing false alarms on newly monitored  tunnels.
                
                This trigger requires consistent data - it will not fire if there are gaps in data collection.
              manual_close: 'YES'
              tags:
                - tag: Condition
                  value: Idle
            - uuid: 4d669e15dc4a4f379b3d7e854c699a13
              expression: |
                last(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}]) = 2 and
                max(/Sonicwall Firewall/vpn.route.ifInOctets[{#VPNNAME}],365d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD} and
                max(/Sonicwall Firewall/vpn.route.ifOutOctets[{#VPNNAME}],365d) <= {$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD}
              name: 'VPN Route: {#VPNNAME} - Idle for 1 year'
              status: DISABLED
              priority: AVERAGE
              description: |
                This trigger monitors route-based VPN tunnel "{#VPNNAME}".
                It fires when both inbound and outbound  traffic have been below the threshold for a continuous 30-day period while the tunnel status is Active.
                  
                 Note: Some tunnels may be configured with keepalives or routing protocols that do not generate significant traffic.  
                This trigger is informational and intended to highlight long-term idle tunnels for review and potential decommissioning.
                 
                This trigger requires consistent data - it will not fire if there are gaps in data collection.
              manual_close: 'YES'
              tags:
                - tag: Condition
                  value: 'No Longer Used'
            - uuid: b2f59c886b324cd88518d38dca6c0244
              expression: |
                avg(/Sonicwall Firewall/vpn.route.ifInErrors[{#VPNNAME}],5m) > {$SONICWALL_VPN_CRITICAL_THRESHOLD} and
                last(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}]) = 2
              name: 'VPN Route: {#VPNNAME} Inbound Errors (Critical)'
              status: DISABLED
              priority: HIGH
              description: |
                The VPN tunnel is experiencing a high rate of inbound errors (>{$SONICWALL_VPN_CRITICAL_THRESHOLD} errors/sec averaged over 5 minutes).
                This may indicate network issues, MTU problems, encryption failures, or hardware problems.
                
                Note: This trigger is disabled by default as error counters may not be exposed on all SonicWall firmware versions.
              tags:
                - tag: Condition
                  value: Threshold
            - uuid: 0b5b79c341af4a4382c02676b245dd38
              expression: |
                avg(/Sonicwall Firewall/vpn.route.ifInErrors[{#VPNNAME}],5m) > {$SONICWALL_VPN_WARNING_THRESHOLD} and
                last(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}]) = 2
              name: 'VPN Route: {#VPNNAME} Inbound Errors (Warning)'
              status: DISABLED
              priority: AVERAGE
              description: |
                The VPN tunnel is experiencing elevated inbound errors (>{$SONICWALL_VPN_WARNING_THRESHOLD} errors/sec averaged over 5 minutes).
                Monitor for increasing error rates or impact on tunnel performance.
                
                Note: This trigger is disabled by default as error counters may not be exposed on all SonicWall firmware versions.
              tags:
                - tag: Component
                  value: VPN
                - tag: VPN
                  value: Route
            - uuid: 1379731bc5b0416abb4fd261fac82c79
              expression: |
                avg(/Sonicwall Firewall/vpn.route.ifOutErrors[{#VPNNAME}],5m) > {$SONICWALL_VPN_CRITICAL_THRESHOLD} and
                last(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}]) = 2
              name: 'VPN Route: {#VPNNAME} Outbound Errors (Critical)'
              status: DISABLED
              priority: HIGH
              description: |
                The VPN tunnel is experiencing a high rate of outbound errors (>{$SONICWALL_VPN_CRITICAL_THRESHOLD} errors/sec averaged over 5 minutes).
                This may indicate network issues, MTU problems, encryption failures, or hardware problems.
                
                Note: This trigger is disabled by default as error counters may not be exposed on all SonicWall firmware versions.
              tags:
                - tag: Condition
                  value: Threshold
            - uuid: e8c4770f6c18443a89d3009bef1a2ce2
              expression: |
                avg(/Sonicwall Firewall/vpn.route.ifOutErrors[{#VPNNAME}],5m) > {$SONICWALL_VPN_WARNING_THRESHOLD} and
                last(/Sonicwall Firewall/vpn.route.status[{#VPNNAME}]) = 2
              name: 'VPN Route: {#VPNNAME} Outbound Errors (Warning)'
              status: DISABLED
              priority: AVERAGE
              description: |
                The VPN tunnel is experiencing elevated outbound errors (>{$SONICWALL_VPN_WARNING_THRESHOLD} errors/sec averaged over 5 minutes).
                Monitor for increasing error rates or impact on tunnel performance.
                
                Note: This trigger is disabled by default as error counters may not be exposed on all SonicWall firmware versions.
              tags:
                - tag: Condition
                  value: Threshold
          graph_prototypes:
            - uuid: dc809c23462c460ebb13a0ade5159b38
              name: 'VPN Route: {#VPNNAME} Traffic'
              graph_items:
                - color: 199C0D
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
