          description: |
            LEGACY: Discovers user-initiated VPN SA entries from policy SA table filtering.
            
            STATUS: DISABLED by default - use dedicated "SSL-VPN User Sessions" discovery instead.
            
            This discovery rule attempts to distinguish user sessions from policy-based
            tunnels by filtering sonicSAStatUserName (.14) patterns from the SA table,
            but this approach has limitations since it mixes different VPN types.
            
            Enable only if dedicated user session tables are not available on your SonicWall model.
          item_prototypes:
