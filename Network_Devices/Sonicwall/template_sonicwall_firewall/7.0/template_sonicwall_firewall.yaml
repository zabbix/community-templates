          description: 'Threshold for input/output errors on VPN interfaces before triggering an error-level alert.'
        - macro: '{$SONICWALL_VPN_IGNORE_REGEX}'
          value: '^(?i:BACKEND|TEST|MONITORING).*'
          description: 'Regex to exclude VPN tunnels (by name) from policy-based discovery. Adjust for tunnel naming conventions.'
        - macro: '{$SONICWALL_VPN_USER_IGNORE_REGEX}'
          value: '^$'
          description: 'Regex to exclude specific usernames from user VPN discovery (e.g. service accounts, test users). Primary filtering is done by policy name pattern matching, so this is typically left empty unless you need to exclude specific individual usernames.'
        - macro: '{$SONICWALL_SSLVPN_USER_IGNORE_REGEX}'
          value: '^(?i:admin|test|monitoring|backup|sync|service).*'
          description: 'Regex to exclude specific usernames from SSL-VPN user session discovery (e.g. admin accounts, service users, test accounts). Common patterns include administrative and automated accounts.'
        - macro: '{$SONICWALL_IPSEC_USER_IGNORE_REGEX}'
          value: '^(?i:admin|test|monitoring|backup|sync|service).*'
          description: 'Regex to exclude specific usernames/groups from IPSec VPN user session discovery (e.g. admin accounts, service users). Used for WAN GroupVPN and Mobile Connect IPSec sessions.'
        - macro: '{$SONICWALL_L2TP_USER_IGNORE_REGEX}'
          value: '^(?i:admin|test|monitoring|backup|sync|service).*'
          description: 'Regex to exclude specific usernames from L2TP VPN user session discovery (e.g. admin accounts, service users, test accounts). Used for L2TP/IPSec user sessions.'
        - macro: '{$SONICWALL_PPTP_USER_IGNORE_REGEX}'
          value: '^(?i:admin|test|monitoring|backup|sync|service).*'
          description: 'Regex to exclude specific usernames from PPTP VPN user session discovery (e.g. admin accounts, service users, test accounts). Used for legacy PPTP user sessions.'
        - macro: '{$SONICWALL_SSTP_USER_IGNORE_REGEX}'
          value: '^(?i:admin|test|monitoring|backup|sync|service).*'
          description: 'Regex to exclude specific usernames from SSTP VPN user session discovery (e.g. admin accounts, service users, test accounts). Used for Windows SSTP client connections.'
        - macro: '{$SONICWALL_VPN_TRAFFIC_IDLE_THRESHOLD}'
          value: '1'
          description: 'Minimum expected average VPN traffic (bps) over 3 hours before considering a tunnel idle.'
        - macro: '{$SONICWALL_VPN_TRAFFIC_IDLE_TIMEFRAME}'
          value: 7d
          description: 'Timeframe for monitoring VPN tunnel idle status. Adjust based on business requirements (e.g., 1h, 7d, 30d).'
        - macro: '{$SONICWALL_VPN_WARNING_THRESHOLD}'
          value: '100'
          description: 'Threshold for VPN tunnel error rate (errors per second) that triggers a warning alert.'
