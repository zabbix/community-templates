              expression: 'avg(/Sonicwall Firewall/vpn.l2tp.ifInErrors[{#L2TPNAME}],5m) > {$SONICWALL_VPN_WARNING_THRESHOLD} and last(/Sonicwall Firewall/vpn.l2tp.status[{#L2TPNAME}]) = 2'
              name: 'VPN L2TP: {#L2TPNAME} Inbound Errors High'
