        - uuid: ce28fadd92c74ac6a4dbb465435f5c49
          name: 'High Availability (HA) Status'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#HANAME},1.3.6.1.4.1.8741.1.8.1.1,{#HASTATUS},1.3.6.1.4.1.8741.1.8.1.2,{#HAPEERIP},1.3.6.1.4.1.8741.1.8.1.3]'
          key: ha.discovery
          delay: 5m
          filter:
            conditions:
              - macro: '{#HASTATUS}'
                value: '^[1-3]$'
                formulaid: A
          description: |
            Discovers High Availability configurations for SonicWall firewalls in clustered deployments.
            HA provides redundancy and failover capabilities for mission-critical network security.
            This discovery rule identifies:
            - HA cluster members and their roles (active/passive)
            - Peer synchronisation status and health
            - Failover detection and state transitions
            - Cluster configuration consistency
            Monitors enterprise HA deployments for maximum uptime and seamless failover operations.
          item_prototypes:
            - uuid: 598841f1f15d4b489c9952247318c5c1
              name: 'HA: {#HANAME} Peer IP'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.8.1.3.{#SNMPINDEX}'
              key: 'ha.peer.ip[{#HANAME}]'
              delay: 10m
              value_type: TEXT
              trends: '0'
              preprocessing:
                - type: DISCARD_UNCHANGED
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: ha
                - tag: hacluster
                  value: '{#HANAME}'
            - uuid: 80502b42f74b46029f1bb5c2d97a9156
              name: 'HA: {#HANAME} Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.8.1.2.{#SNMPINDEX}'
              key: 'ha.status[{#HANAME}]'
              valuemap:
                name: sonicwall.ha.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: ha
                - tag: hacluster
                  value: '{#HANAME}'
              trigger_prototypes:
                - uuid: 6aa13db08951429aac75fb7e2882d1d0
                  expression: 'last(/Sonicwall Firewall/ha.status[{#HANAME}],#1)<>last(/Sonicwall Firewall/ha.status[{#HANAME}],#2)'
                  name: 'HA: {#HANAME} Status Changed'
                  priority: HIGH
                  description: 'High Availability cluster "{#HANAME}" status changed from {ITEM.LASTVALUE2} to {ITEM.LASTVALUE1}. This may indicate failover or cluster reconfiguration.'
                  tags:
                    - tag: component
                      value: ha
                    - tag: hacluster
                      value: '{#HANAME}'
            - uuid: c21ed6aeabb64ffa8d48611a32bef32f
              name: 'HA: {#HANAME} Sync Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.8.1.4.{#SNMPINDEX}'
              key: 'ha.sync.status[{#HANAME}]'
              valuemap:
                name: sonicwall.ha.sync.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: ha
                - tag: hacluster
                  value: '{#HANAME}'
              trigger_prototypes:
                - uuid: 33a73ca06a314f4daa5615837c97850e
                  expression: 'last(/Sonicwall Firewall/ha.sync.status[{#HANAME}]) <> 1'
                  name: 'HA: {#HANAME} Synchronisation Failed'
                  priority: WARNING
                  description: 'High Availability cluster "{#HANAME}" synchronisation is not in sync. Check cluster connectivity and configuration consistency.'
                  tags:
                    - tag: component
                      value: ha
                    - tag: hacluster
                      value: '{#HANAME}'
        - uuid: 0023542110334559b1ef0cd816939384
          name: 'Hardware Sensors'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SENSORNAME},1.3.6.1.4.1.8741.1.7.1.1,{#SENSORTYPE},1.3.6.1.4.1.8741.1.7.1.2,{#SENSORSTATUS},1.3.6.1.4.1.8741.1.7.1.3]'
          key: hardware.sensors.discovery
          delay: 10m
          filter:
            conditions:
              - macro: '{#SENSORTYPE}'
                value: '^[1-4]$'
                formulaid: A
          description: |
            Discovers hardware sensors for SonicWall appliances including temperature, fan, power supply, and voltage monitoring.
            Hardware sensors provide critical insight into device health and environmental conditions.
            This discovery rule identifies:
            - Temperature sensors (CPU, chassis, ambient)
            - Fan status and speed monitoring
            - Power supply health and voltage levels
            - Critical hardware component status
            Essential for proactive maintenance and preventing hardware-related downtime in enterprise environments.
          item_prototypes:
            - uuid: 6f5617f7146741ae97c0291b1d3c1792
              name: 'Sensor: {#SENSORNAME} Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.7.1.3.{#SNMPINDEX}'
              key: 'sensor.status[{#SENSORNAME}]'
              delay: 2m
              valuemap:
                name: sonicwall.sensor.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: hardware
                - tag: sensor
                  value: '{#SENSORNAME}'
                - tag: sensortype
                  value: '{#SENSORTYPE}'
              trigger_prototypes:
                - uuid: ac3441a59a65447391f3bd5c5f4c31ec
                  expression: 'last(/Sonicwall Firewall/sensor.status[{#SENSORNAME}]) <> 1'
                  name: 'Hardware: {#SENSORNAME} Sensor Critical'
                  priority: HIGH
                  description: 'Hardware sensor "{#SENSORNAME}" is reporting critical status. Check device environmental conditions and hardware health immediately.'
                  tags:
                    - tag: component
                      value: hardware
                    - tag: sensor
                      value: '{#SENSORNAME}'
            - uuid: a10aada088fb43ce8998d31f3229be27
              name: 'Sensor: {#SENSORNAME} Value'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.7.1.4.{#SNMPINDEX}'
              key: 'sensor.value[{#SENSORNAME}]'
              delay: 2m
              units: '{#SENSORTYPE:regex("1"):regsub("1", "°C")}{#SENSORTYPE:regex("2"):regsub("2", "RPM")}{#SENSORTYPE:regex("3"):regsub("3", "V")}{#SENSORTYPE:regex("4"):regsub("4", "W")}'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: hardware
                - tag: sensor
                  value: '{#SENSORNAME}'
                - tag: sensortype
                  value: '{#SENSORTYPE}'
              trigger_prototypes:
                - uuid: b897e5ca9aeb41e599e5717241d23fa5
                  expression: 'last(/Sonicwall Firewall/sensor.value[{#SENSORNAME}]) > {$SONICWALL_TEMPERATURE_CRITICAL} and {#SENSORTYPE} = "1"'
                  name: 'Hardware: {#SENSORNAME} Temperature Critical'
                  priority: HIGH
                  description: 'Temperature sensor "{#SENSORNAME}" is reporting critical temperature: {ITEM.LASTVALUE}°C > {$SONICWALL_TEMPERATURE_CRITICAL}°C'
                  tags:
                    - tag: component
                      value: hardware
                    - tag: sensor
                      value: '{#SENSORNAME}'
                - uuid: 185daf9e77664c42b980ad53f05e076c
                  expression: 'last(/Sonicwall Firewall/sensor.value[{#SENSORNAME}]) > {$SONICWALL_TEMPERATURE_WARNING} and {#SENSORTYPE} = "1"'
                  name: 'Hardware: {#SENSORNAME} Temperature Warning'
                  priority: WARNING
                  description: 'Temperature sensor "{#SENSORNAME}" is reporting elevated temperature: {ITEM.LASTVALUE}°C > {$SONICWALL_TEMPERATURE_WARNING}°C'
                  tags:
                    - tag: component
                      value: hardware
                    - tag: sensor
                      value: '{#SENSORNAME}'
        - uuid: 8857ec72720e45ae9b3c0badc3d8e5f1
          name: 'Interfaces (LAG/Bonded)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFDESCR},IF-MIB::ifDescr,{#IFTYPE},IF-MIB::ifType]'
          key: lag.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#IFTYPE}'
                value: ^(161|166)$
                formulaid: A
          description: |
            Discover bonded or aggregated interfaces on the firewall, such as Link Aggregation Groups (LAGs) or PortChannel  interfaces.
              
            This rule targets interfaces with:
             - `ifType = 161` (IEEE 802.3ad Link Aggregation)
             - `ifType  = 166` (MPLS Tunnel — occasionally used for VPN encapsulation in LAG contexts)
              
            These interfaces:
              - Represent logical bundles of physical links
             - Are often used for uplinks, high-availability paths, or VPN redundancy   - Report aggregate traffic and error metrics across all member ports
            
             Note:
             - LAG interfaces may coexist with  Ethernet or Fibre entries; no deduplication is applied.
             - SonicWall interface naming is inconsistent across models  — validate `ifDescr` labels per deployment.
          item_prototypes:
            - uuid: c72f0151f79c418e89c8838f2d961678
              name: 'LAG: {#IFDESCR} Errors In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
              key: 'lag.ifInErrors[{#IFDESCR}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: LAG
                - tag: Metrics
                  value: Errors
              trigger_prototypes:
                - uuid: 70c4c487c4bf47fbbfa9ef726caec3bc
                  expression: 'count(/Sonicwall Firewall/lag.ifInErrors[{#IFDESCR}],5m,"gt",{$SONICWALL_INTERFACE_ERROR})>2'
                  name: 'LAG {#IFDESCR} Inbound Errors'
                  priority: AVERAGE
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: 0ed5af57dfe04b55afc3e7e0db859163
              name: 'LAG: {#IFDESCR} Bytes In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInOctets.{#SNMPINDEX}'
              key: 'lag.ifInOctets[{#IFDESCR}]'
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: LAG
                - tag: Metrics
                  value: Traffic
            - uuid: 069d7489a9f244758cc7b6cda5ffa535
              name: 'LAG: {#IFDESCR} Errors Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutErrors.{#SNMPINDEX}'
              key: 'lag.ifOutErrors[{#IFDESCR}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: LAG
                - tag: Metrics
                  value: Errors
              trigger_prototypes:
                - uuid: 33ed21d43f414eb5a2948c79c0b79c26
                  expression: 'count(/Sonicwall Firewall/lag.ifOutErrors[{#IFDESCR}],5m,"gt",{$SONICWALL_INTERFACE_ERROR})>2'
                  name: 'LAG {#IFDESCR} Outbound Errors'
                  priority: AVERAGE
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: b4ba7bc8fbf746cabe9e45187e7410ce
              name: 'LAG: {#IFDESCR} Bytes Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutOctets.{#SNMPINDEX}'
              key: 'lag.ifOutOctets[{#IFDESCR}]'
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: LAG
                - tag: Metrics
                  value: Traffic
            - uuid: 196f611499b94fb894049bc6cd2eda70
              name: 'LAG: {#IFDESCR} Status'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOperStatus.{#SNMPINDEX}'
              key: 'lag.status[{#IFDESCR}]'
              valuemap:
                name: sonicwall.interface.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: LAG
                - tag: Metrics
                  value: State
              trigger_prototypes:
                - uuid: e9c18edffa4f4676a9326199a9f828c6
                  expression: '(count(/Sonicwall Firewall/lag.status[{#IFDESCR}],{$SONICWALL_FLAPPING_TIMEFRAME})>1 or change(/Sonicwall Firewall/lag.status[{#IFDESCR}])>0) and nodata(/Sonicwall Firewall/lag.status[{#IFDESCR}],120s)=0'
                  name: 'LAG {#IFDESCR} status changed'
                  priority: WARNING
                  manual_close: 'YES'
                  tags:
                    - tag: Condition
                      value: Flap/Config
          graph_prototypes:
            - uuid: 931a7ef6afcc4b9aaa149555942b8df1
              name: 'LAG: {#IFDESCR} Traffic'
              graph_items:
                - color: 199C0D
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'lag.ifInOctets[{#IFDESCR}]'
                - sortorder: '1'
                  color: 0080FF
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'lag.ifOutOctets[{#IFDESCR}]'
                - sortorder: '2'
                  drawtype: FILLED_REGION
                  color: FF0000
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'lag.ifInErrors[{#IFDESCR}]'
                - sortorder: '3'
                  drawtype: FILLED_REGION
                  color: CC6600
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'lag.ifOutErrors[{#IFDESCR}]'
        - uuid: e718ca094d27466a9518b54a5f609b18
          name: 'Security Service Modules'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SERVICENAME},1.3.6.1.4.1.8741.1.9.1.1,{#SERVICETYPE},1.3.6.1.4.1.8741.1.9.1.2,{#SERVICESTATUS},1.3.6.1.4.1.8741.1.9.1.3]'
          key: security.services.discovery
          delay: 10m
          filter:
            conditions:
              - macro: '{#SERVICESTATUS}'
                value: '^[1-3]$'
                formulaid: A
          description: |
            Discovers advanced security service modules and licensing features for SonicWall firewalls.
            Security services provide comprehensive threat protection and content filtering capabilities.
            This discovery rule identifies:
            - Gateway Anti-Virus (GAV) service status and performance
            - Intrusion Prevention System (IPS) module health
            - Content Filtering Service (CFS) operational state
            - Anti-Spyware and Advanced Threat Protection (ATP)
            - Capture Security Center integration status
            - Licensing and subscription service health
            Critical for monitoring enterprise security posture and service availability.
          item_prototypes:
            - uuid: 7a56364ab0124477b4ef86ad5549624f
              name: 'Security Service: {#SERVICENAME} License Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.9.1.4.{#SNMPINDEX}'
              key: 'security.service.license[{#SERVICENAME}]'
              delay: 1h
              valuemap:
                name: sonicwall.license.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: security
                - tag: service
                  value: '{#SERVICENAME}'
                - tag: servicetype
                  value: '{#SERVICETYPE}'
              trigger_prototypes:
                - uuid: 4c450eb27893429e80477573a8445861
                  expression: 'last(/Sonicwall Firewall/security.service.license[{#SERVICENAME}]) <> 1'
                  name: 'Security Service: {#SERVICENAME} License Invalid'
                  priority: WARNING
                  description: 'Security service "{#SERVICENAME}" license is expired, invalid, or not activated. Service functionality may be limited.'
                  tags:
                    - tag: component
                      value: security
                    - tag: service
                      value: '{#SERVICENAME}'
            - uuid: e0c91a8c812940ee95008563a51b507f
              name: 'Security Service: {#SERVICENAME} Performance Score'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.9.1.6.{#SNMPINDEX}'
              key: 'security.service.performance[{#SERVICENAME}]'
              delay: 10m
              units: '%'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: security
                - tag: service
                  value: '{#SERVICENAME}'
                - tag: servicetype
                  value: '{#SERVICETYPE}'
              trigger_prototypes:
                - uuid: faf2a0addcbe49eaa73389680b2fcd9b
                  expression: 'last(/Sonicwall Firewall/security.service.performance[{#SERVICENAME}]) < {$SONICWALL_SECURITY_PERFORMANCE_WARNING}'
                  name: 'Security Service: {#SERVICENAME} Performance Degraded'
                  priority: WARNING
                  description: 'Security service "{#SERVICENAME}" performance is below threshold: {ITEM.LASTVALUE}% < {$SONICWALL_SECURITY_PERFORMANCE_WARNING}%'
                  tags:
                    - tag: component
                      value: security
                    - tag: service
                      value: '{#SERVICENAME}'
            - uuid: fd93e1e7dfe84171b8f824b7abcafbf7
              name: 'Security Service: {#SERVICENAME} Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.9.1.3.{#SNMPINDEX}'
              key: 'security.service.status[{#SERVICENAME}]'
              delay: 5m
              valuemap:
                name: sonicwall.service.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: security
                - tag: service
                  value: '{#SERVICENAME}'
                - tag: servicetype
                  value: '{#SERVICETYPE}'
              trigger_prototypes:
                - uuid: 83dc0541d32e478691673f9bc4577046
                  expression: 'last(/Sonicwall Firewall/security.service.status[{#SERVICENAME}]) <> 1'
                  name: 'Security Service: {#SERVICENAME} Offline'
                  priority: HIGH
                  description: 'Security service "{#SERVICENAME}" is offline or not functioning. This may compromise network security protection.'
                  tags:
                    - tag: component
                      value: security
                    - tag: service
                      value: '{#SERVICENAME}'
            - uuid: a16a31742773452ea30b3c4f7867b79c
              name: 'Security Service: {#SERVICENAME} Threats Blocked'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.8741.1.9.1.5.{#SNMPINDEX}'
              key: 'security.service.threats.blocked[{#SERVICENAME}]'
              delay: 5m
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
              tags:
                - tag: component
                  value: security
                - tag: service
                  value: '{#SERVICENAME}'
                - tag: servicetype
                  value: '{#SERVICETYPE}'
        - uuid: d2640a528715449a88ff9ecbcd2086e5
          name: 'Interfaces (VLAN)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFDESCR},IF-MIB::ifDescr, {#IFTYPE},IF-MIB::ifType]'
          key: vlan.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFTYPE}'
                value: ^(53|135)$
                formulaid: A
          description: |
            Discover VLAN-tagged interfaces, including both Layer 2 and Layer 3 subinterfaces configured on physical  or virtual ports.
            
            This rule targets:
             - `ifType = 53` (propVirtual — common for VLAN-tagged Layer  2)
             - `ifType = 135` (l3ipvlan — Layer 3 subinterface with VLAN ID)
            
            These interfaces typically  appear as:
             - `X0.V10`, `X2.V50`, etc. (e.g., `interface.vlan`)
             - Tagged subinterfaces used for segmentation,  guest networks, or zone isolation
            
            Notes:
             - SonicWall reports some VLANs as independent `ifIndex` values, allowing  direct SNMP polling
             - If these interfaces are not routable, traffic counters may show zero despite being active
              - This rule does not apply to VLANs on VTI tunnels or PortShield bridges — use dedicated discovery  rules for those
          item_prototypes:
            - uuid: 2a15151dc9bb4deaab667f5e44dc963b
              name: 'VLAN: {#IFDESCR} Errors In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
              key: 'vlan.ifInErrors[{#IFDESCR}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: Errors
              trigger_prototypes:
                - uuid: a62f49f6073740658b7c9b19f3d43ef4
                  expression: 'count(/Sonicwall Firewall/vlan.ifInErrors[{#IFDESCR}],5m,"gt",{$SONICWALL_VLAN_WARNING})>2'
                  name: 'VLAN {#IFDESCR} Inbound Errors'
                  priority: WARNING
                  description: 'Inbound errors on VLAN {#IFDESCR} exceeded warning threshold ({ITEM.LASTVALUE} > {$SONICWALL_VLAN_WARNING}/s)'
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: 10866c4d787342cba3ebfa2360488962
              name: 'VLAN: {#IFDESCR} Bytes In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInOctets.{#SNMPINDEX}'
              key: 'vlan.ifInOctets[{#IFDESCR}]'
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: Traffic
              trigger_prototypes:
                - uuid: 84dad1350c2740a1b3e4c298ba98dbee
                  expression: 'avg(/Sonicwall Firewall/vlan.ifInOctets[{#IFDESCR}],5m) <= {$SONICWALL_VLAN_NO_TRAFFIC} and nodata(/Sonicwall Firewall/vlan.ifInOctets[{#IFDESCR}],120s)=0'
                  name: 'VLAN {#IFDESCR} No Data In'
                  priority: INFO
                  description: 'The VLAN {#IFDESCR} has had {$SONICWALL_VLAN_NO_TRAFFIC} bytes of traffic Inbound over the past 5mins'
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: 3ec81e3336ea4d57885ff531ad3630d0
              name: 'VLAN: {#IFDESCR} Errors Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutErrors.{#SNMPINDEX}'
              key: 'vlan.ifOutErrors[{#IFDESCR}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: Errors
              trigger_prototypes:
                - uuid: f9492c04fd4c42919b71178695288620
                  expression: 'count(/Sonicwall Firewall/vlan.ifOutErrors[{#IFDESCR}],5m,"gt",{$SONICWALL_VLAN_WARNING})>2'
                  name: 'VLAN {#IFDESCR} Outbound Errors'
                  priority: WARNING
                  description: 'Outbound errors on VLAN {#IFDESCR} exceeded threshold ({ITEM.LASTVALUE} > {$SONICWALL_VLAN_WARNING}/s)'
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: f82c20ffb87143afb0f0606bfe47f98e
              name: 'VLAN: {#IFDESCR} Bytes Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutOctets.{#SNMPINDEX}'
              key: 'vlan.ifOutOctets[{#IFDESCR}]'
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: Traffic
              trigger_prototypes:
                - uuid: 7f0f471f05204627b58b4017b45c6573
                  expression: 'avg(/Sonicwall Firewall/vlan.ifOutOctets[{#IFDESCR}],5m) <= {$SONICWALL_VLAN_NO_TRAFFIC} and nodata(/Sonicwall Firewall/vlan.ifOutOctets[{#IFDESCR}],120s)=0'
                  name: 'VLAN {#IFDESCR} No Data Out'
                  priority: INFO
                  description: 'The VLAN {#IFDESCR} has had {$SONICWALL_VLAN_NO_TRAFFIC} bytes of traffic Outbound over the past 5mins'
                  tags:
                    - tag: Condition
                      value: Threshold
            - uuid: 8d5922eadc904e529e9c8f5499c8832c
              name: 'VLAN: {#IFDESCR} Status'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOperStatus.{#SNMPINDEX}'
              key: 'vlan.status[{#IFDESCR}]'
              valuemap:
                name: sonicwall.interface.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: State
          graph_prototypes:
            - uuid: 2b7646f0fbf341c2983e8d62b13562b6
              name: 'VLAN: {#IFDESCR} Traffic'
              graph_items:
                - color: 199C0D
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vlan.ifInOctets[{#IFDESCR}]'
                - sortorder: '1'
                  color: 0080FF
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vlan.ifOutOctets[{#IFDESCR}]'
                - sortorder: '2'
                  drawtype: FILLED_REGION
                  color: FF0000
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vlan.ifInErrors[{#IFDESCR}]'
                - sortorder: '3'
                  drawtype: FILLED_REGION
                  color: CC6600
                  calc_fnc: ALL
                  item:
                    host: 'Sonicwall Firewall'
                    key: 'vlan.ifOutErrors[{#IFDESCR}]'
        - uuid: 7f2a3b4c5d6e4890abcd1234567890ef
          name: 'VPN Tunnels (L2TP Based)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#L2TPNAME},IF-MIB::ifDescr,{#IFTYPE},IF-MIB::ifType,{#IFOPERSTATUS},IF-MIB::ifOperStatus,{#IFADMINSTATUS},IF-MIB::ifAdminStatus]'
          key: vpn.l2tp.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFADMINSTATUS}'
                value: ^1$
                formulaid: A
              - macro: '{#IFTYPE}'
                value: ^131$
                formulaid: B
              - macro: '{#L2TPNAME}'
                value: '^.*[lL]2[tT][pP].*$'
                formulaid: C
          description: |
            Discovers L2TP VPN tunnel interfaces (ifType=131) by filtering interface descriptions containing "L2TP".
            L2TP (Layer 2 Tunneling Protocol) creates point-to-point tunnels for VPN connections, commonly used for remote access scenarios.
            This discovery rule identifies:
            - Active tunnel interfaces (adminStatus=1)
            - Interface type 131 (tunnel interfaces)
            - Descriptions containing L2TP identifiers
            Provides traffic statistics, operational status monitoring, and error tracking for L2TP tunnel performance analysis.
          item_prototypes:
            - uuid: bf6a7b8c9d0e4234af056789012345f3
              name: 'VPN L2TP: {#L2TPNAME} Errors In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
              key: 'vpn.l2tp.ifInErrors[{#L2TPNAME}]'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: vpn
