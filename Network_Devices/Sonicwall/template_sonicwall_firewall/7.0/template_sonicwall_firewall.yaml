              expression: 'avg(/Sonicwall Firewall/vpn.l2tp.ifOutErrors[{#L2TPNAME}],5m) > {$SONICWALL_VPN_WARNING_THRESHOLD} and last(/Sonicwall Firewall/vpn.l2tp.status[{#L2TPNAME}]) = 2'
