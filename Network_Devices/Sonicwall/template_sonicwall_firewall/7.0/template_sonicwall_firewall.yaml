                    if(f===2) t[i].groupname=v;        // Interface/Group name (WAN GroupVPN)
                    else if(f===3) t[i].realuser=v;    // Potential actual authenticated username
                    else if(f===4) t[i].clientip=v;    // Tunnel IP assigned
                    else if(f===5) t[i].field5=v;      // Unknown field - explore
                    else if(f===6) t[i].field6=v;      // Unknown field - explore  
