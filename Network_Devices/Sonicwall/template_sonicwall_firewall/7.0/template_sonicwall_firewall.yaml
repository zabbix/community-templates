                          '{#GROUPNAME}':groupname,
                          '{#CLIENTIP}':x.clientip,
                          '{#FIELD5}':x.field5||'',
                          '{#FIELD6}':x.field6||'',
                          '{#FIELD7}':x.field7||'',
                          '{#FIELD8}':x.field8||'',
                          '{#FIELD9}':x.field9||'',
                          '{#FIELD11}':x.field11||''
                        });
