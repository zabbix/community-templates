  templates:
    - uuid: 30fc7a362e3e490b94ed0bc4962df186
      template: 'Ubiquiti Unifi SNMPv3'
      name: 'Ubiquiti Unifi SNMPv3'
      vendor: 
        name: 'Ubiquiti'
        version: '7.0'
      description: |
        How to set up SNMPv3 on the Unifi controller:
        Ubiquity Controller > Settings > Services > SNMP v3 > enable, set username and password

        How to setup SNMPv3 in Zabbix:
        Zabbix > Macro >
        {$SNMP_USERNAME} <= username set in controller
        {$SNMP_AUTHPASS} & {$SNMP_PRIVPASS} <= password set in controller
      groups:
        - name: Templates
      items:
        - uuid: 185f5a81714a4d7586956efd36e0830e
