      discovery_rules:
        - uuid: 477373a3c63d41fc832fbd8900d9b4fa
          name: 'Wifi Virtual Interfaces'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#UNIFIVAPESSID},.1.3.6.1.4.1.41112.1.6.1.2.1.6, {#UNIVAPRADIO},.1.3.6.1.4.1.41112.1.6.1.2.1.9]'
          key: unifiVapEssId
          delay: 30s
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: d2279ac27bba4c2abbca52dc3218ca7d
              name: 'WIFI Channel {#UNIFIVAPESSID} on {#UNIVAPRADIO}{#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.41112.1.6.1.2.1.4.{#SNMPINDEX}'
              key: 'unifiVapChannel[{#UNIFIVAPESSID},{#UNIVAPRADIO},{#SNMPINDEX}]'
              tags:
                - tag: Application
                  value: 'Virtual Interfaces'
            - uuid: 403be02f4aab47e39ee47eb86d662263
              name: 'Users {#UNIFIVAPESSID} (total)'
              type: CALCULATED
              key: 'unifiVapNumStations.total[{#UNIFIVAPESSID}]'
              delay: 30s
              units: Users
              params: 'sum(last_foreach(//unifiVapNumStations[{#UNIFIVAPESSID},*,*]))'
              tags:
                - tag: Application
                  value: 'Virtual Interfaces'
                - tag: SSID
                  value: '{#UNIFIVAPESSID}'
            - uuid: 8b2ff05b149b4dfda7c5587e3e4d8f6f
              name: 'Users {#UNIFIVAPESSID} on {#UNIVAPRADIO}{#SNMPINDEX}'
              type: SNMP_AGENT
