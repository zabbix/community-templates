          item_prototypes:
            - uuid: 2d01c25c7c2845858b675aa10a7b3f98
              name: 'Gateway Address {#GWSTATUSNAME}'
              type: DEPENDENT
              key: 'opns.gw.status.address[{#GWSTATUSNAME}]'
              value_type: TEXT
              preprocessing:
