        - uuid: 984a9170893d488f8c3140b9d3a5c7c2
          name: 'Meta Gatewaystatus'
          type: HTTP_AGENT
          key: opns.meta.gateway.status
          history: 1d
          value_type: TEXT
          authtype: BASIC
          username: '{$OPNS.KEY}'
          password: '{$OPNS.SECRET}'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.items
          url: 'https://{HOST.IP}/api/routes/gateway/status'
          tags:
