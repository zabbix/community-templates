        - uuid: d15b7b8cdec9486a97450b16166eaf81
          name: 'Meta Firewall States'
          type: HTTP_AGENT
          key: opns.meta.fw.states
          history: 1d
          value_type: TEXT
          authtype: BASIC
          username: '{$OPNS.KEY}'
          password: '{$OPNS.SECRET}'
          url: 'https://{HOST.IP}/api/diagnostics/firewall/pfStates'
          tags:
