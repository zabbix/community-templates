              master_item:
                key: opns.meta.gateway.status
              tags:
                - tag: Gateway
                  value: '{#GWSTATUSNAME}'
            - uuid: c05e44967fcc418bbf48c52c937422fd
              name: 'Gateway RTTd {#GWSTATUSNAME}'
              type: DEPENDENT
              key: 'opns.gw.status.stddev[{#GWSTATUSNAME}]'
              value_type: FLOAT
              units: ms
              preprocessing:
                - type: JSONPATH
