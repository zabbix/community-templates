                  - macro: '{#IFALIAS}'
                    value: ^$
                    operator: NOT_MATCHES_REGEX
                    formulaid: A
              operations:
                - operationobject: ITEM_PROTOTYPE
                  operator: REGEXP
                  tags:
                    - tag: description
                      value: '{#IFALIAS}'
                - operationobject: TRIGGER_PROTOTYPE
                  operator: REGEXP
                  tags:
                    - tag: description
                      value: '{#IFALIAS}'
        - uuid: a6e915ed24e74e878ba96959bf3b2c9f
          name: 'Storage discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#STORAGEDESCR},1.3.6.1.2.1.25.2.3.1.3]'
          key: vfs.storage.discovery
          delay: 1h
          description: 'Walks hrStorageDescr. Confirmed on this device: index 1 = Total Memory, index 2 = Flash.'
          item_prototypes:
            - uuid: d3afe98678f040329b5b01b2d57e5900
              name: '{#STORAGEDESCR}: Utilization'
              type: CALCULATED
              key: 'vfs.storage.pused[hrStorage.{#SNMPINDEX}]'
              delay: 5m
              history: 7d
              value_type: FLOAT
              trends: 90d
              units: '%'
              params: 'last(//vfs.storage.used[hrStorageUsed.{#SNMPINDEX}])/last(//vfs.storage.total[hrStorageSize.{#SNMPINDEX}])*100'
              description: 'Allocation unit size cancels out in the ratio, so raw used/total is accurate regardless of hrStorageAllocationUnits.'
              tags:
                - tag: component
                  value: memory
              trigger_prototypes:
                - uuid: f528e0db4e4f4b8293d3558864744f60
                  expression: 'last(/IBM RackSwitch G8264-T by SNMP/vfs.storage.pused[hrStorage.{#SNMPINDEX}])>{$MEM_UTIL_CRIT}'
                  name: '{#STORAGEDESCR}: High utilization'
                  priority: WARNING
                  tags:
                    - tag: component
                      value: memory
            - uuid: bf2968d31588482ebad5cc4c24dae2cb
              name: '{#STORAGEDESCR}: Total'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.25.2.3.1.5.{#SNMPINDEX}'
              key: 'vfs.storage.total[hrStorageSize.{#SNMPINDEX}]'
              delay: 1h
              history: 7d
              trends: 90d
              units: B
              description: 'hrStorageSize is a count of hrStorageAllocationUnits, confirmed as 1024 bytes on this device for both Total Memory and Flash; multiplied to raw bytes via preprocessing so Zabbix auto-scales the display (KB/MB/GB).'
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '1024'
              tags:
                - tag: component
                  value: memory
            - uuid: da57f468b4c44d4ab650851f9e009a8d
              name: '{#STORAGEDESCR}: Used'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.25.2.3.1.6.{#SNMPINDEX}'
              key: 'vfs.storage.used[hrStorageUsed.{#SNMPINDEX}]'
              delay: 5m
              history: 7d
              trends: 90d
              units: B
              description: 'hrStorageUsed is a count of hrStorageAllocationUnits, confirmed as 1024 bytes on this device for both Total Memory and Flash; multiplied to raw bytes via preprocessing so Zabbix auto-scales the display (KB/MB/GB).'
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '1024'
              tags:
                - tag: component
                  value: memory
