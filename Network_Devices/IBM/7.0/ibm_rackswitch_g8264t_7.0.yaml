          description: 'IBM-GbTOR-G8264T-MIB::hwBoardRevision -- vendor-private OID, confirmed against a live walk of this device (2026-07-17). See template description.'
          tags:
            - tag: component
              value: hardware
        - uuid: 4289aead84704d168b7909f55dbd6e1b
