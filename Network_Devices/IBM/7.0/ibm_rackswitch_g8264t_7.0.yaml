      macros:
        - macro: '{$CPU_UTIL_CRIT}'
          value: '90'
          description: 'CPU load % threshold (per core) for the High load trigger.'
        - macro: '{$FAN_RPM_MIN}'
          value: '100'
          description: 'Minimum fan RPM before a fan is considered failed. Sourced from IBM-GbTOR-G8264T-MIB::hwGlobalHealthStatus''s own documented threshold ("OK requires fans running at >= 100 RPMs"), not a guess.'
        - macro: '{$IFCONTROL}'
          value: '1'
          description: 'Set to 0 with context, e.g. {$IFCONTROL:"Ethernet1"}=0, to disable link-down alerting for a specific interface.'
        - macro: '{$IF_DISCARD_CRIT}'
          value: '10'
          description: 'Discard rate threshold (discards/sec) for the High discard rate trigger.'
        - macro: '{$IF_ERR_CRIT}'
          value: '10'
          description: 'Error rate threshold (errors/sec) for the High error rate trigger.'
        - macro: '{$IF_UTIL_CRIT}'
          value: '90'
          description: 'Bandwidth utilization % threshold (of ifHighSpeed) for the High inbound/outbound bandwidth utilization triggers.'
        - macro: '{$MEM_UTIL_CRIT}'
          value: '90'
          description: 'Memory/Flash utilization % threshold for the High utilization trigger.'
        - macro: '{$TEMP_CRIT}'
          value: '100'
          description: 'Temperature (C) at which a sensor is considered critical. Sourced from IBM-GbTOR-G8264T-MIB::hwGlobalHealthStatus''s own documented threshold ("critical: temp >= 100 C"), not a guess.'
        - macro: '{$TEMP_WARN}'
          value: '85'
          description: 'Temperature (C) at which a sensor is considered elevated/noncritical. Sourced from IBM-GbTOR-G8264T-MIB::hwGlobalHealthStatus''s own documented threshold ("noncritical: temp >= 85 and < 100 C"), not a guess.'
