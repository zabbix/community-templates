      discovery_rules:
        - uuid: 2aeceeb3271f4ddd8feff7441cca8cc0
          name: 'CPU core discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#CPULOADSNAPSHOT},1.3.6.1.2.1.25.3.3.1.2]'
          key: cpu.discovery
          delay: 1h
          description: 'Walks hrProcessorLoad (HOST-RESOURCES-MIB) directly -- that table only ever contains processor entries, so no additional filtering needed. 4 cores confirmed present on this device. Note: {#SNMPINDEX} (auto-populated, = hrDeviceIndex) is used as the core identifier below, not a custom macro -- the discovery[] base-OID macro is intentionally named {#CPULOADSNAPSHOT} and left unused in naming, since Zabbix binds it to hrProcessorLoad''s *value* (the load % at discovery time), not the row index. An earlier version of this template mistakenly used that value-bound macro as if it were the core number.'
          item_prototypes:
            - uuid: aca296c6d69d4a6b940cf4be093b30b9
              name: 'CPU {#SNMPINDEX}: Load'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.25.3.3.1.2.{#SNMPINDEX}'
              key: 'system.cpu.load[hrProcessorLoad.{#SNMPINDEX}]'
              history: 7d
              trends: 90d
              units: '%'
              tags:
                - tag: component
                  value: cpu
              trigger_prototypes:
                - uuid: 4e590ed323554548ad8c1022dfee46da
                  expression: 'min(/IBM RackSwitch G8264-T by SNMP/system.cpu.load[hrProcessorLoad.{#SNMPINDEX}],5m)>{$CPU_UTIL_CRIT}'
                  name: 'CPU {#SNMPINDEX}: High load'
                  priority: WARNING
                  tags:
                    - tag: component
                      value: cpu
        - uuid: b13fec30719f4974badda69b5e777745
          name: 'Interface discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFDESCR},1.3.6.1.2.1.2.2.1.2,{#IFALIAS},1.3.6.1.2.1.31.1.1.1.18,{#IFTYPE},1.3.6.1.2.1.2.2.1.3]'
          key: net.if.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFTYPE}'
                value: ^53$
                operator: NOT_MATCHES_REGEX
                formulaid: A
          description: 'Base table walked is ifDescr (IF-MIB). {#IFTYPE}=53 (propVirtual) is filtered out -- on this platform that value corresponds to the internal "IP128" management pseudo-interface, not a physical/logical link worth alerting on.'
          item_prototypes:
            - uuid: e9d302aee26040a286b84fe1b7747811
              name: 'Interface {#IFDESCR}({#IFALIAS}): Admin status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.7.{#SNMPINDEX}'
              key: 'net.if.admin.status[ifAdminStatus.{#SNMPINDEX}]'
              delay: 1h
              history: 7d
              trends: '0'
              description: 'ifAdminStatus (IF-MIB): 1=up 2=down 3=testing'
              valuemap:
                name: 'IF-MIB::ifAdminStatus'
              tags:
                - tag: component
                  value: interfaces
                - tag: interface
                  value: '{#IFDESCR}'
            - uuid: 80d563ed81d64da4b0d83fed7502426a
              name: 'Interface {#IFDESCR}({#IFALIAS}): Inbound discards'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.13.{#SNMPINDEX}'
              key: 'net.if.in.discards[ifInDiscards.{#SNMPINDEX}]'
              history: 7d
              trends: 90d
              units: discards/s
              description: 'ifInDiscards (IF-MIB): packets discarded despite no errors, typically buffer/queue drops rather than a physical link problem.'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: interfaces
                - tag: interface
                  value: '{#IFDESCR}'
            - uuid: 72fe2824f63c49bea7bb5d9c78a79e4d
