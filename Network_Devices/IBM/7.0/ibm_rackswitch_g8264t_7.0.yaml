            - uuid: 4d57bda4989e410ba9540db0259a29fd
              name: 'Interface {#IFDESCR}({#IFALIAS}): High speed'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.15.{#SNMPINDEX}'
              key: 'net.if.speed[ifHighSpeed.{#SNMPINDEX}]'
              delay: 1h
              history: 7d
              trends: 90d
              units: bps
              description: 'ifHighSpeed is reported in Mbps; converted to bps via preprocessing.'
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '1000000'
              tags:
                - tag: component
                  value: interfaces
                - tag: interface
                  value: '{#IFDESCR}'
              trigger_prototypes:
                - uuid: 75b6304114894f318676019f13385ebe
                  expression: '{$IFCONTROL:"{#IFDESCR}"}=1 and change(/IBM RackSwitch G8264-T by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])<0'
                  name: 'Interface {#IFDESCR}({#IFALIAS}): Link speed decreased'
                  priority: INFO
                  description: 'Negotiated speed dropped since the last poll -- often an early sign of a marginal cable/optic before it fails outright. Informational only; does not auto-resolve if speed later recovers, since change() compares consecutive polls, not a sustained state.'
                  tags:
                    - tag: component
                      value: interfaces
                    - tag: interface
                      value: '{#IFDESCR}'
            - uuid: 2a79ddc22df349c7be9a48bcf0169eb7
              name: 'Interface {#IFDESCR}({#IFALIAS}): Operational status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}'
              key: 'net.if.status[ifOperStatus.{#SNMPINDEX}]'
              history: 7d
              trends: '0'
              description: 'ifOperStatus (IF-MIB): 1=up 2=down 3=testing 4=unknown 5=dormant 6=notPresent 7=lowerLayerDown'
              valuemap:
                name: 'IF-MIB::ifOperStatus'
              tags:
                - tag: component
                  value: interfaces
                - tag: interface
                  value: '{#IFDESCR}'
          trigger_prototypes:
            - uuid: 83b310cbb5dd4accae9970cd98a76c82
              expression: '{$IFCONTROL:"{#IFDESCR}"}=1 and last(/IBM RackSwitch G8264-T by SNMP/net.if.admin.status[ifAdminStatus.{#SNMPINDEX}])=1 and (min(/IBM RackSwitch G8264-T by SNMP/net.if.in.discards[ifInDiscards.{#SNMPINDEX}],5m)>{$IF_DISCARD_CRIT} or min(/IBM RackSwitch G8264-T by SNMP/net.if.out.discards[ifOutDiscards.{#SNMPINDEX}],5m)>{$IF_DISCARD_CRIT})'
              name: 'Interface {#IFDESCR}({#IFALIAS}): High discard rate'
              priority: WARNING
              description: 'Discards without errors usually mean queue/buffer congestion (oversubscription) rather than a physical fault -- check for a saturated uplink or QoS policy before assuming the port itself is bad.'
              tags:
                - tag: component
                  value: interfaces
                - tag: interface
                  value: '{#IFDESCR}'
            - uuid: c07a13b349904037ad59efb44793c651
              expression: '{$IFCONTROL:"{#IFDESCR}"}=1 and last(/IBM RackSwitch G8264-T by SNMP/net.if.admin.status[ifAdminStatus.{#SNMPINDEX}])=1 and (min(/IBM RackSwitch G8264-T by SNMP/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)>{$IF_ERR_CRIT} or min(/IBM RackSwitch G8264-T by SNMP/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)>{$IF_ERR_CRIT})'
              name: 'Interface {#IFDESCR}({#IFALIAS}): High error rate'
              priority: WARNING
              tags:
                - tag: component
                  value: interfaces
                - tag: interface
                  value: '{#IFDESCR}'
            - uuid: 62611e8d68764ccb8ce5fc3a046fef1f
              expression: '{$IFCONTROL:"{#IFDESCR}"}=1 and last(/IBM RackSwitch G8264-T by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=1 and last(/IBM RackSwitch G8264-T by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0 and avg(/IBM RackSwitch G8264-T by SNMP/net.if.in[ifHCInOctets.{#SNMPINDEX}],5m)/last(/IBM RackSwitch G8264-T by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])*100>{$IF_UTIL_CRIT}'
              name: 'Interface {#IFDESCR}({#IFALIAS}): High inbound bandwidth utilization'
              priority: WARNING
              description: 'Gated on ifOperStatus=up and speed>0 to avoid a divide-by-zero/false-positive read while the link is down.'
              tags:
                - tag: component
                  value: interfaces
                - tag: interface
                  value: '{#IFDESCR}'
            - uuid: 8f0331ae44f7431d8d6fe78d42309094
              expression: '{$IFCONTROL:"{#IFDESCR}"}=1 and last(/IBM RackSwitch G8264-T by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=1 and last(/IBM RackSwitch G8264-T by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0 and avg(/IBM RackSwitch G8264-T by SNMP/net.if.out[ifHCOutOctets.{#SNMPINDEX}],5m)/last(/IBM RackSwitch G8264-T by SNMP/net.if.speed[ifHighSpeed.{#SNMPINDEX}])*100>{$IF_UTIL_CRIT}'
              name: 'Interface {#IFDESCR}({#IFALIAS}): High outbound bandwidth utilization'
              priority: WARNING
              description: 'Gated on ifOperStatus=up and speed>0 to avoid a divide-by-zero/false-positive read while the link is down.'
              tags:
                - tag: component
                  value: interfaces
                - tag: interface
                  value: '{#IFDESCR}'
            - uuid: eaaf56d4e0064f38879c8e221d3fb855
              expression: '{$IFCONTROL:"{#IFDESCR}"}=1 and last(/IBM RackSwitch G8264-T by SNMP/net.if.admin.status[ifAdminStatus.{#SNMPINDEX}])=1 and last(/IBM RackSwitch G8264-T by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/IBM RackSwitch G8264-T by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/IBM RackSwitch G8264-T by SNMP/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))'
              name: 'Interface {#IFDESCR}({#IFALIAS}): Link down'
              priority: AVERAGE
              description: 'Fires only if the port is administratively up. Disable per-port via a context macro override, e.g. {$IFCONTROL:"Ethernet1"} = 0.'
              tags:
                - tag: component
                  value: interfaces
                - tag: interface
                  value: '{#IFDESCR}'
          graph_prototypes:
