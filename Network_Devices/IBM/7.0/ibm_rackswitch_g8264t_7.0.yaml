zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 129173a663144d8cb6e6d5c7a9060fc6
      name: 'Templates/Network devices'
  templates:
    - uuid: 0b7aeef456d9406aa1fc01a77da22cac
      template: 'IBM RackSwitch G8264-T by SNMP'
      name: 'IBM RackSwitch G8264-T by SNMP'
      description: |
        Monitoring template for IBM/Lenovo RackSwitch G8264-T (IBM Networking OS / BLADE OS) via standard SNMP.
        
        Built and verified against a real snmpwalk of this device for the standard-MIB items:
         - System identity/uptime (SNMPv2-MIB)
         - Interface table incl. HC counters, high-speed, alias (IF-MIB / IF-MIB extended table)
         - CPU load per core, x4 (HOST-RESOURCES-MIB::hrProcessorLoad)
         - Memory and Flash utilization (HOST-RESOURCES-MIB::hrStorage)
        
        Environmental and hardware-inventory items (fans, temperature sensors, power supplies,
        serial/part numbers, boot/image info) come from the vendor-private IBM-GbTOR-G8264T-MIB
        (enterprises.20301.100.100.14, the "tor-switch" subtree), plus one legacy summary object
        under enterprises.20301.2.7.13.1.3.1 ("hardware.health"). OIDs were hand-derived from the
        vendor's published MIB and confirmed against a real snmpwalk of the enterprises.20301.100.100.14
        branch on this device (8 fans, 4 temperature sensors, 2 PSUs all present and responding).
        Verified against one specific unit/firmware (7.9.15) -- if you deploy this template against
        other G8264-T units, spot check a walk of that branch too in case hardware revisions differ.
        
        Still not built:
         - ENTITY-MIB chassis/entity inventory (none returned by the standard walk, and no
           ENTITY-MIB objects are re-exposed on the vendor branch either).
         - SFP inventory (IBM-GbTOR-G8264T-MIB::ibmnosSfpInfoTable, enterprises.20301.100.100.14.22).
           Deliberately left out: this device's SNMP agent only answers sequential walk/GETNEXT
           queries against this specific table -- confirmed with both `snmpwalk` (works) and a plain
           `snmpget` on an exact instance OID (fails with "No Such Instance", even for rows the walk
           just showed data for). Zabbix's regular SNMP items poll with a single GET, so they can
           never read this table on this firmware; only LLD discovery (which walks) can see it. If
           you need this data, it would require an external UserParameter script (snmpbulkwalk) on
           a Zabbix agent/proxy with network access to the device -- outside the scope of this template.
        
        Requires: host's SNMP interface configured with valid community (v1/v2c) or SNMPv3 credentials.
        No MIBs need to be loaded on the Zabbix server -- all items use numeric OIDs.
        
        Recommended: also link "Template ICMP Ping" to the host for basic reachability.
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: 7218ae7fc601493a858bf148c5877f6e
          name: 'Hardware: Board revision'
          type: SNMP_AGENT
