          value_type: CHAR
          trends: '0'
          description: 'IBM-GbTOR-G8264T-MIB::hardwareManufacturingDate -- vendor-private OID, confirmed against a live walk of this device (2026-07-17). See template description. Raw value on this unit was "1323"; decoded via preprocessing assuming a YYWW (year+ISO week) date code, a common convention for board manufacture dates but NOT confirmed by vendor documentation -- cross-check against a physical date-code label on the unit if you need certainty. If a future firmware/unit reports a different format, this regex will fail to match and the item will go unsupported; adjust or remove the preprocessing step in that case.'
