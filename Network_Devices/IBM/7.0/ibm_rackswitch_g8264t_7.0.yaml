          snmp_oid: 1.3.6.1.4.1.20301.100.100.14.42.0
          key: hardware.boottime
          delay: 5m
          history: 7d
          value_type: CHAR
          trends: '0'
          description: 'IBM-GbTOR-G8264T-MIB::hwBootTime -- formatted timestamp + boot reason string (e.g. "13:53:13 Mon Dec 29, 2025(power cycle)"), kept as text rather than parsed. Vendor-private OID, confirmed against a live walk of this device (2026-07-17). See template description.'
