            - uuid: 5e6537fdfe7f4998b107ac9e81769544
              name: '{#IFNAME}({#IFALIAS}): Bits received'
              type: DEPENDENT
              key: 'net.if.in[ifHCInOctets.{#SNMPINDEX}]'
              units: bps
              description: |
                MIB: IF-MIB
                The total number of octets received on the interface, including framing characters. This object is a 64-bit version of ifInOctets. Discontinuities in the value of this counter can occur at re-initialization of the management system, and at other times as indicated by the value of ifCounterDiscontinuityTime.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}'
                    - '0'
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              master_item:
                key: net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 5706a09cfe454fa6ad390fb7841027bf
              name: '{#IFNAME}({#IFALIAS}): MTU'
              type: DEPENDENT
              key: 'net.if.mtu[ifMTU.{#SNMPINDEX}]'
              value_type: TEXT
              description: |
                MIB: IF-MIB
                Interface MTU size
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.2.2.1.4.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 254a4322f8a3401683dca5917f74ebf9
              name: '{#IFNAME}({#IFALIAS}): Name'
              type: DEPENDENT
              key: 'net.if.name[ifName.{#SNMPINDEX}]'
              value_type: TEXT
              description: |
                MIB: IF-MIB
                Interface name
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.31.1.1.1.1.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 94b2b32deaa24f2f97cd8ccce65ba15c
              name: '{#IFNAME}({#IFALIAS}): Oper Status'
              type: DEPENDENT
              key: 'net.if.oper.status[ifOperStatus.{#SNMPINDEX}]'
              value_type: TEXT
              description: |
                MIB: IF-MIB
                Operational Status
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
                - type: STR_REPLACE
                  parameters:
                    - '1'
                    - up
                - type: STR_REPLACE
                  parameters:
                    - '2'
                    - down
              master_item:
                key: net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
              trigger_prototypes:
                - uuid: 807f3e1f3ff04a47ad8919e7c95596d8
                  expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/Cisco C9500/net.if.oper.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/Cisco C9500/net.if.oper.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/Cisco C9500/net.if.oper.status[ifOperStatus.{#SNMPINDEX}],#2))'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Cisco C9500/net.if.oper.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0'
                  name: 'Interface {#IFNAME}({#IFALIAS}): Link down'
                  opdata: 'Current state: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: |
                    This trigger expression works as follows:
                    1. It can be triggered if the operations status is down.
                    2. `{$IFCONTROL:"{#IFNAME}"}=1` - a user can redefine context macro to value - 0. That marks this interface as not important. No new trigger will be fired if this interface is down.
                    3. `{TEMPLATE_NAME:METRIC.diff()}=1` - the trigger fires only if the operational status was up to (1) sometime before (so, do not fire for the 'eternal off' interfaces.)
                    
                    WARNING: if closed manually - it will not fire again on the next poll, because of .diff.
                  manual_close: 'YES'
            - uuid: 5d0bb897860447ee8ddf53c7114fd7bc
              name: '{#IFNAME}({#IFALIAS}): Number of Broadcast Packets Sent'
              type: DEPENDENT
              key: 'net.if.out.broadcast[ifHCOutBroadcastPkts.{#SNMPINDEX}]'
              units: Pkts/s
              description: |
                MIB: IF-MIB
                The total number of broadcast packets sent by the interface.
              preprocessing:
