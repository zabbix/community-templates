                  parameters:
                    - '1.3.6.1.2.1.31.1.1.1.18.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: a5f4bb30b4634b3cba01d464f6ab9eb5
              name: '{#IFNAME}({#IFALIAS}): Description'
              type: DEPENDENT
              key: 'net.if.descr[ifDescr.{#SNMPINDEX}]'
              value_type: TEXT
              description: |
                MIB: IF-MIB
                Interface description
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.2.2.1.2.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 38793deabd2140329b99d937d7ab0a18
              name: '{#IFNAME}({#IFALIAS}): Number of Broadcast Packets Received'
              type: DEPENDENT
              key: 'net.if.in.broadcast[ifHCInBroadcastPkts.{#SNMPINDEX}]'
              units: Pkts/s
              description: |
                MIB: IF-MIB
                The total number of broadcast packets received by the interface.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.31.1.1.1.9.{#SNMPINDEX}'
                    - '0'
                - type: CHANGE_PER_SECOND
              master_item:
                key: net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 45ca84b0a3ef4264bafa9ff57e74d408
              name: '{#IFNAME}({#IFALIAS}): Number of Multicast Packets Received'
              type: DEPENDENT
              key: 'net.if.in.multicast[ifHCInMulticastPkts.{#SNMPINDEX}]'
              units: Pkts/s
              description: |
                MIB: IF-MIB
                The total number of multicast packets received by the interface.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.31.1.1.1.8.{#SNMPINDEX}'
                    - '0'
                - type: CHANGE_PER_SECOND
              master_item:
                key: net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
