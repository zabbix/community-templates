                - 1.3.6.1.2.1.2.2.1.8
                - '0'
                - '{#IFNAME}'
                - 1.3.6.1.2.1.31.1.1.1.1
                - '0'
                - '{#IFINMULTICASTPKTS}'
                - 1.3.6.1.2.1.31.1.1.1.2
                - '0'
