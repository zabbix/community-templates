            - uuid: b42a5a816941440ea1cbf5831da05fa9
              name: '{#IFNAME}({#IFALIAS}): Number of Unicast Packets Received'
              type: DEPENDENT
              key: 'net.if.in.unicast[ifHCInUnicastPkts.{#SNMPINDEX}]'
              units: Pkts/s
              description: |
                MIB: IF-MIB
