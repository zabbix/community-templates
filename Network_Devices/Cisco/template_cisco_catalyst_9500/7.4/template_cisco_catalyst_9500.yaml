                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 35544793170746089c97b7e01ad80172
              name: '{#IFNAME}({#IFALIAS}): Number of Unicast Packets Sent'
              type: DEPENDENT
              key: 'net.if.out.unicast[ifHCOutUnicastPkts.{#SNMPINDEX}]'
              units: Pkts/s
              description: |
                MIB: IF-MIB
                The total number of unicast packets sent by the interface.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.31.1.1.1.11.{#SNMPINDEX}'
