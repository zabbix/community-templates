            - uuid: 7a0e693a8fa2457e82cf45556ab676fd
              name: '{#IFNAME}({#IFALIAS}): Total Traffic'
              type: CALCULATED
              key: 'net.if.traffic[TotalTraffic.{#SNMPINDEX}]'
              delay: 20s
              units: bps
              params: 'last(//net.if.in[ifHCInOctets.{#SNMPINDEX}])+last(//net.if.out[ifHCOutOctets.{#SNMPINDEX}])'
              description: |
                {#IFNAME}
