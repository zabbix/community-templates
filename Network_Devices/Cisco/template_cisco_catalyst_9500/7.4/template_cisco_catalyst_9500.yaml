            - uuid: d80d5820e38c4318bfb136aa2ab7dd38
              name: '{#IFNAME}({#IFALIAS}): Speed'
              type: DEPENDENT
              key: 'net.if.speed[ifHighSpeed.{#SNMPINDEX}]'
              units: bps
              description: |
