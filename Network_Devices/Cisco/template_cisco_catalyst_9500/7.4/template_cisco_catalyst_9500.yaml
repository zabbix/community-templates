      discovery_rules:
        - uuid: b0e337a9404746c3a433ba880ebbd9f1
          name: 'Network interfaces discovery'
          type: DEPENDENT
          key: net.if.discovery
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'Discovering interfaces from IF-MIB.'
          item_prototypes:
            - uuid: 315be502d8984a49a21ca145052052df
              name: '{#IFNAME}({#IFALIAS}): Admin Status'
              type: DEPENDENT
              key: 'net.if.admin.status[ifAdminStatus.{#SNMPINDEX}]'
              value_type: TEXT
              description: |
                MIB: IF-MIB
                Administrative status
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.2.2.1.7.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
                - type: STR_REPLACE
                  parameters:
                    - '1'
                    - enabled
                - type: STR_REPLACE
                  parameters:
                    - '2'
                    - disabled
              master_item:
                key: net.if.walk
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: f00621969cde49a886ebd17af37bdda4
              name: '{#IFNAME}({#IFALIAS}): Alias'
              type: DEPENDENT
              key: 'net.if.alias[ifAlias.{#SNMPINDEX}]'
              value_type: TEXT
              description: |
                MIB: IF-MIB
                Interface alias name
              preprocessing:
