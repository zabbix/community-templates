            - uuid: 7d2683b6dfb946f5a8b4ae7568a2d692
              name: '{#IFNAME}({#IFALIAS}): Physical Address'
              type: DEPENDENT
              key: 'net.if.physaddress[ifPhysAddress.{#SNMPINDEX}]'
              value_type: TEXT
