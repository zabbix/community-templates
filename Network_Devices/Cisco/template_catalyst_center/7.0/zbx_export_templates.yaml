    - uuid: 36bff6c29af64692839d077febfc7079
      name: 'Templates/Network Devices'
  templates:
    - uuid: 4656adf004bc448b91c5efe79fa85dc1
      template: 'Cisco Catalyst Center - Access by HTTP'
      name: 'Cisco Catalyst Center - Access by HTTP'
      description: 'Version 26.04.05.'
      vendor:
        name: mbechc
        version: 26.04.05
      groups:
        - name: 'Templates/Network Controllers'
        - name: 'Templates/Network Devices'
      items:
        - uuid: bd3db8417d534be793cb373d5611d725
          name: 'Access Device Health'
          type: HTTP_AGENT
          key: catc.access.health.master
          value_type: TEXT
          trends: '0'
          authtype: BASIC
          username: '{$CATC.USER}'
          password: '{$CATC.PASS}'
          url: '{$CATC.PROXY.URL}/dna/intent/api/v1/device-health'
          query_fields:
            - name: deviceRole
              value: ACCESS
            - name: limit
              value: '{$CATC.ACCESS.BULK.LIMIT}'
          headers:
            - name: X-CatC-Host
              value: '{$CATC.HOST}'
            - name: X-CatC-Port
              value: '{$CATC.PORT}'
            - name: X-Forwarded-Proto
              value: '{$CATC.PROTO}'
          tags:
            - tag: CatC-Domain
              value: Access
            - tag: Format
              value: JSON
      discovery_rules:
        - uuid: 269ba1e657c346c58ba8c131053ed0f5
          name: 'Discover Access Switches'
          type: DEPENDENT
          key: catc.access.discovery
          delay: '0'
          item_prototypes:
            - uuid: ccdce0d91f5046a394eceb1aa239df4d
              name: 'Access Switch Reachability: {#SWNAME}'
              type: DEPENDENT
              key: 'catc.access.reachability[{#SWUUID}]'
              delay: '0'
              value_type: CHAR
              trends: '0'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.response[?(@.uuid == "{#SWUUID}")].reachabilityHealth.first()'
              master_item:
                key: catc.access.health.master
              tags:
                - tag: CatC-Device-Type
                  value: AccessSwitch
                - tag: CatC-Domain
                  value: Access
                - tag: CatC-Model
                  value: '{#SWMODEL}'
                - tag: CatC-Site
                  value: '{#SWSITE}'
              trigger_prototypes:
                - uuid: 7204dfd1e21b43248f8aab0f4161c464
                  expression: 'last(/Cisco Catalyst Center - Access by HTTP/catc.access.reachability[{#SWUUID}],#3)="UNREACHABLE"'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Cisco Catalyst Center - Access by HTTP/catc.access.reachability[{#SWUUID}],#3)="REACHABLE"'
                  name: 'Access Switch Reachability: {#SWNAME}'
                  priority: WARNING
                  manual_close: 'YES'
          master_item:
            key: catc.access.health.master
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var src = JSON.parse(value);
                  var out = [];
                  
                  function val(v) {
                      if  (v === null || typeof v === "undefined") {
                          return "";
                       }
                  
                      // LLD macro values must be primitive-like, not objects/arrays.
                       if (typeof v === "object") {
                          return "";
                      }
                  
                       return String(v);
                  }
                  
                  if (!src.response || !Array.isArray(src.response))  {
                      return JSON.stringify(out);
                  }
                  
                  for (var i = 0; i < src.response.length;  i++) {
                      var d = src.response[i];
                  
                      // Keep only ACCESS role devices.
                       var role = (d.role || d.deviceRole || "").toString().toUpperCase();
                       if (role && role !== "ACCESS") {
                          continue;
                      }
                  
                       // Optional extra guard: keep only switch family if present.
                      var  family = (d.deviceFamily || "").toString().toUpperCase();
                      if (family  && family !== "SWITCHES_AND_HUBS") {
                          continue;
                      }
                  
                       out.push({
                          "{#SWUUID}": val(d.uuid),
                          "{#SWNAME}" : val(d.name || d.hostname || d.ipAddress || d.uuid),
                          "{#SWIP}" : val(d.ipAddress || d.managementIpAddress),
                          "{#SWMAC}": val(d.macAddress),
                           "{#SWSITE}": val(d.siteHierarchy || d.siteName || d.location),
                           "{#SWROLE}": val(d.role || d.deviceRole),
                          "{#SWFAMILY}" : val(d.deviceFamily),
                          "{#SWTYPE}": val(d.deviceType),
                           "{#SWMODEL}": val(d.model),
                          "{#SWOSVERSION}": val(d.osVersion),
                   
                          "{#SWREACHABILITY}": val(d.reachabilityHealth),
                          " {#SWOVERALLHEALTH}": val(d.overallHealth),
                          "{#SWISSUECOUNT}" : val(d.issueCount),
                  
                          "{#SWCPUUTIL}": val(d.cpuUtilization ||  d.cpuUlitilization),
                          "{#SWCPUHEALTH}": val(d.cpuHealth),
                  
                           "{#SWMEMUTIL}": val(d.memoryUtilization),
                          "{#SWMEMHEALTH}" : val(d.memoryUtilizationHealth),
                  
                          "{#SWINTLINKHEALTH}": val(d.interDeviceLinkAvailHealth),
                           "{#SWINTLINKFABRIC}": val(d.interDeviceLinkAvailFabric),
                           "{#SWINTERRHEALTH}": val(d.interfaceLinkErrHealth),
                  
                           "{#SWMAXTEMP}": val(d.maxTemperature),
                          "{#SWAVGTEMP}": val(d.avgTemperature),
                   
                          "{#SWWANLINKUTIL}": val(d.wanLinkUtilization),
                          "{#SWPACKETPOOLHEALTH}" : val(d.packetPoolHealth),
                          "{#SWWQEPOOLHEALTH}": val(d.wqePoolsHealth),
                           "{#SWFREEMEMBUFHEALTH}": val(d.freeMemoryBufferHealth),
                           "{#SWFREETIMERSCORE}": val(d.freeTimerScore)
                      });
                  }
                  
                  return  JSON.stringify(out);
