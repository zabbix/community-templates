          delay: '0'
          item_prototypes:
            - uuid: 70a66f2c39974dd4bf3c78cffab5e9db
              name: 'WirelessController Reachability: {#WLCNAME}'
              type: DEPENDENT
              key: 'catc.wlc.reachability[{#WLCUUID}]'
              delay: '0'
              value_type: CHAR
              trends: '0'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.response[?(@.uuid == "{#WLCUUID}")].reachabilityHealth.first()'
              master_item:
                key: catc.wlc.health.master
              tags:
                - tag: CatC-Device-Type
                  value: WirelessController
                - tag: CatC-Domain
                  value: 'Wireless Controller'
                - tag: CatC-Model
                  value: '{#WLCMODEL}'
                - tag: CatC-Site
                  value: '{#WLCSITE}'
              trigger_prototypes:
                - uuid: 46b2b41a86e14853bba90acb4f40f123
                  expression: 'last(/Cisco Catalyst Center - WLC by HTTP/catc.wlc.reachability[{#WLCUUID}],#3)="UNREACHABLE"'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Cisco Catalyst Center - WLC by HTTP/catc.wlc.reachability[{#WLCUUID}],#3)="REACHABLE"'
                  name: 'WirelessController Reachability: {#WLCNAME}'
                  priority: WARNING
                  manual_close: 'YES'
          master_item:
            key: catc.wlc.health.master
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var src = JSON.parse(value);
                  var out = [];
                  
                  function val(v) {
                      if  (v === null || typeof v === "undefined") return "";
                      if (typeof  v === "object") return "";
                      return String(v);
                  }
                  
                  if (!src.response  || !Array.isArray(src.response)) {
                      return JSON.stringify(out);
                   }
                  
                  for (var i = 0; i < src.response.length; i++) {
                      var d = src.response[i];
                       var role = (d.role || d.deviceRole || "").toString().toUpperCase();
                       if (role && role !== "WLC") { continue; }
                  
                  var family = (d.deviceFamily  || "").toString().toUpperCase().replace(/[\s-]+/g, "_");
                  if (family  && family !== "WIRELESS_CONTROLLER") {
                      continue;
                  }
                      out.push({
                           "{#WLCUUID}": val(d.uuid),
                          "{#WLCNAME}": val(d.name  || d.hostname || d.ipAddress || d.managementIpAddress || d.uuid),
                           "{#WLCSITE}": val(d.siteHierarchy || d.siteName || d.location),
                           "{#WLCTYPE}": val(d.deviceType),
                          "{#WLCMODEL}": val(d.model)
                       });
                  }
                  
                  return JSON.stringify(out);
