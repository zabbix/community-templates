                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var rows = (data && data.response && Array.isArray(data.response))  ? data.response : [];
                      var row = null;
                      for (var i = 0; i < rows.length;  i++) {
                          if (String(rows[i].siteId || "") === String("{#SITEID}" )) {
