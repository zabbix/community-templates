        - name: 'Templates/Network Devices'
      items:
        - uuid: 41e33a123de7442e9d6681bba70b88d9
          name: 'AP Device Health'
          type: HTTP_AGENT
          key: catc.ap.health.master
          value_type: TEXT
          trends: '0'
          authtype: BASIC
          username: '{$CATC.USER}'
          password: '{$CATC.PASS}'
          url: '{$CATC.PROXY.URL}/dna/intent/api/v1/device-health'
          query_fields:
            - name: deviceRole
              value: AP
            - name: limit
              value: '{$CATC.AP.BULK.LIMIT}'
          headers:
            - name: X-CatC-Host
              value: '{$CATC.HOST}'
            - name: X-CatC-Port
              value: '{$CATC.PORT}'
            - name: X-Forwarded-Proto
              value: '{$CATC.PROTO}'
          tags:
            - tag: CatC-Domain
              value: Wireless
            - tag: Format
              value: JSON
      discovery_rules:
        - uuid: e6029501e84d4be5ba2ea44b2fa269ca
          name: 'Discover Access Points'
          type: DEPENDENT
          key: catc.ap.discovery
          delay: '0'
          item_prototypes:
            - uuid: 8c1875ca41da4d50ac214f082777338d
              name: 'AP Reachability: {#APNAME}'
              type: DEPENDENT
              key: 'catc.ap.reachability[{#APUUID}]'
              delay: '0'
              value_type: CHAR
              trends: '0'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.response[?(@.uuid == "{#APUUID}")].reachabilityHealth.first()'
              master_item:
                key: catc.ap.health.master
              tags:
                - tag: CatC-Device-Type
                  value: AccessPoint
                - tag: CatC-Domain
                  value: Wireless
                - tag: CatC-Site
                  value: '{#APSITE}'
                - tag: CatC-WLC
                  value: '{#APWLC}'
              trigger_prototypes:
                - uuid: b1a9fcd178114a78a537663886846483
                  expression: 'last(/Cisco Catalyst Center - Wireless by HTTP/catc.ap.reachability[{#APUUID}],#3)="DOWN"'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Cisco Catalyst Center - Wireless by HTTP/catc.ap.reachability[{#APUUID}],#3)="UP"'
                  name: 'AP Reachability: {#APNAME}'
                  priority: WARNING
                  manual_close: 'YES'
          master_item:
            key: catc.ap.health.master
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var src = JSON.parse(value);
                  var out = [];
                  
                  if (!src.response || !Array.isArray(src.response))  {
                      return JSON.stringify(out);
                  }
                  
                  for (var i = 0; i < src.response.length;  i++) {
                      var d = src.response[i];
                  
                      // Keep only APs.
                      var  role = (d.role || d.deviceRole || "").toString().toUpperCase();
                       if (role && role !== "AP") {
                          continue;
                      }
                  
                      out.push({
                           "{#APUUID}": String(d.uuid || ""),
                          "{#APNAME}":  String(d.name || d.hostname || d.managementIpAddress || d.uuid || "" ),
                          "{#APSITE}": String(d.siteHierarchy || d.siteName || d.location  || ""),
                          "{#APWLC}": String(d.wlcName || d.associatedWlcName  || d.controllerName || d.associatedWlcIp || ""),
                          "{#APIP}" : String(d.managementIpAddress || "")
                      });
                  }
                  
                  return JSON.stringify(out);
