                  value: '{#SITENAME}'
                - tag: CatC-Site-Path
                  value: '{#SITEPATH}'
          master_item:
            key: catc.site.health.master
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                      var src = JSON.parse(value);
                      var out = [];
                  
                      function  val(v) {
                          if (v === null || typeof v === "undefined") return  "";
                          if (typeof v === "object") return "";
                          return  String(v);
                      }
                  
                      function hasHealthData(s) {
                          return !(
                               s.networkHealthAverage === null &&
                              s.numberOfNetworkDevice  === null &&
                              s.numberOfClients === null &&
                              s.healthyNetworkDevicePercentage  === null &&
                              s.healthyClientsPercentage === null &&
                               s.clientHealthWired === null &&
                              s.clientHealthWireless  === null
                          );
                      }
                  
                      var rows = [];
                      if (Array.isArray(src.response))  rows = src.response;
                      else if (src.response && Array.isArray(src.response.sites))  rows = src.response.sites;
                      else if (Array.isArray(src.sites)) rows  = src.sites;
                  
                      for (var i = 0; i < rows.length; i++) {
                          var  s = rows[i];
                          if (!s || typeof s !== "object") continue;
                           if (!hasHealthData(s)) continue;
                  
                          var id = val(s.siteId  || s.id || s.groupId || s.uuid);
                          var name = val(s.siteName ||  s.name || s.groupName || s.displayName || id).trim();
                          var parent  = val(s.parentSiteName).trim();
                          var path = parent ? (parent +  " / " + name) : name;
                  
                          out.push({
                              "{#SITEID}" : id,
                              "{#SITENAME}": name,
                              "{#SITEPATH}":  path,
                              "{#SITEPARENT}": parent,
                              "{#SITETYPE}" : val(s.siteType)
                          });
                      }
                  
                      return JSON.stringify(out);
                   } catch (e) {
                      return JSON.stringify([]);
                  }
    - uuid: 738019ebc4d94ee8b49d1f972a2e871c
      template: 'Cisco Catalyst Center - Wireless by HTTP'
      name: 'Cisco Catalyst Center - Wireless by HTTP'
      description: 'Version 26.04.05.'
      vendor:
