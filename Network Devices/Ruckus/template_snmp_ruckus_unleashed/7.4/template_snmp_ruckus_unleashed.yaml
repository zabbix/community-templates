zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 36bff6c29af64692839d077febfc7079
      name: 'Templates/Network devices'
  templates:
    - uuid: a19f1d3ddc234e06b4d7c9303fdbdb62
      template: 'Ruckus UnLeashed by SNMP'
      name: 'Ruckus UnLeashed by SNMP'
      description: |
        Monitoring Ruckus Unleashed APs via SNMP
        
        You can discuss this template or leave feedback on GitHub https://github.com/astraliens/zabbix-template-ruckus-unleashed
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: 86e7132fbc2542b3bfe102657ed645fa
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          delay: '60'
          history: 7d
          valuemap:
            name: 'Service state'
          tags:
            - tag: Application
              value: ICMP
          triggers:
            - uuid: 33f269d9d1c643a1ad6c20ca6cea2c9c
              expression: 'max(/Ruckus UnLeashed by SNMP/icmpping,#3)=0'
              name: '{HOST.NAME} is unavailable by ICMP'
              priority: AVERAGE
        - uuid: 09f59d2a195f4897801e5783af6761de
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          delay: '60'
          history: 7d
          value_type: FLOAT
          units: '%'
          tags:
            - tag: Application
              value: ICMP
          triggers:
            - uuid: 6d731e71798c4846abba2c17daf9e8ac
              expression: 'min(/Ruckus UnLeashed by SNMP/icmppingloss,5m)>20'
              name: 'Ping loss is too high on {HOST.NAME}'
              priority: WARNING
              dependencies:
                - name: '{HOST.NAME} is unavailable by ICMP'
                  expression: 'max(/Ruckus UnLeashed by SNMP/icmpping,#3)=0'
        - uuid: 82888319d0384189b74c74647d9ee9c3
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          delay: '60'
          history: 7d
          value_type: FLOAT
          units: s
          tags:
            - tag: Application
              value: ICMP
          triggers:
            - uuid: 8f7501d664fc4a9ab4d02c3ec0d3eeb6
              expression: 'avg(/Ruckus UnLeashed by SNMP/icmppingsec,5m)>0.5'
              name: 'Response time is too high on {HOST.NAME}'
              priority: WARNING
              dependencies:
                - name: '{HOST.NAME} is unavailable by ICMP'
                  expression: 'max(/Ruckus UnLeashed by SNMP/icmpping,#3)=0'
        - uuid: b0dba53abc054034bc685bbbe1c1ef26
          name: IP
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.2.0
          key: ruckusUnleashedSystemAPIP
          delay: '3600'
          history: 90d
          value_type: CHAR
          tags:
            - tag: Application
              value: General
        - uuid: ac30fc52d3ee4cd0a0e82431fd51fba0
          name: 'Total APs Capacity'
          type: CALCULATED
          key: ruckusUnleashedSystemAPsLoad
          history: 90d
          value_type: FLOAT
          units: '%'
          params: 'round(100 * last(//ruckusUnleashedSystemStatsTotalAP) / last(//ruckusUnleashedSystemLicensedAPs),1)'
          tags:
            - tag: Application
              value: 'Acces Points'
        - uuid: 9c4dc812cd4043ebb91ce7f43deed6f3
          name: 'Max Access Point Supported'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.12.0
          key: ruckusUnleashedSystemLicensedAPs
          delay: '3600'
          history: 90d
          tags:
            - tag: Application
              value: General
        - uuid: 392c90de73d847848d5a8303fe04a4a3
          name: 'Max Connections'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.13.0
          key: ruckusUnleashedSystemMaxSta
          delay: '3600'
          history: 90d
          tags:
            - tag: Application
              value: General
        - uuid: 18ffd48fa3a34d2886c9cd7da3e69f11
          name: Model
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.9.0
          key: ruckusUnleashedSystemModel
          delay: '3600'
          history: 90d
          value_type: CHAR
          tags:
            - tag: Application
              value: General
        - uuid: e8c19cd90ba840119debd406fcc3bbd9
          name: 'Serial Number'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.15.0
          key: ruckusUnleashedSystemSerialNumber
          delay: '3600'
          history: 90d
          value_type: CHAR
          tags:
            - tag: Application
              value: General
        - uuid: 39a0dfd1c59d40fe9d181b6113eabfd5
          name: 'Total Users Capacity'
          type: CALCULATED
          key: ruckusUnleashedSystemStaLoad
          history: 90d
          value_type: FLOAT
          units: '%'
          params: 'round(100 * last(//ruckusUnleashedSystemStatsTotalNumSta) / last(//ruckusUnleashedSystemMaxSta),1)'
          tags:
            - tag: Application
              value: 'Acces Points'
          triggers:
            - uuid: 4b25e528e58e41d4a24273bfea0bd9aa
              expression: 'last(/Ruckus UnLeashed by SNMP/ruckusUnleashedSystemStaLoad,#3)>=80'
              name: 'Too many users connected'
              priority: AVERAGE
        - uuid: 1f026e983d9c41cf92c6b74c2de9b642
          name: 'CPU Utilized'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.13.0
          key: ruckusUnleashedSystemStatsCPUUtil
          delay: '60'
          history: 90d
          tags:
            - tag: Application
              value: 'Acces Points'
          triggers:
            - uuid: 83a1235be9864d80b37376a86acb19d0
              expression: 'last(/Ruckus UnLeashed by SNMP/ruckusUnleashedSystemStatsCPUUtil,#3)>=85'
              name: 'High CPU Usage'
              priority: HIGH
              manual_close: 'YES'
        - uuid: 8539325f87734da094cfc43f1ac87927
          name: 'Memory Utilization'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.14.0
          key: ruckusUnleashedSystemStatsMemoryUtil
          delay: '3600'
          history: 90d
          value_type: FLOAT
          units: '%'
          tags:
            - tag: Application
              value: 'Acces Points'
          triggers:
            - uuid: c19f03c2545b4c3080ce4f3f59cabdbb
              expression: 'last(/Ruckus UnLeashed by SNMP/ruckusUnleashedSystemStatsMemoryUtil,#2)>=92'
              name: 'High Memory Usage'
              priority: HIGH
              manual_close: 'YES'
        - uuid: 6ee47ae242e74808afc1d0638a8720a8
          name: 'Number of Access Point'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.1.0
          key: ruckusUnleashedSystemStatsNumAP
          delay: '30'
          history: 90d
          tags:
            - tag: Application
              value: 'Acces Points'
          triggers:
            - uuid: 9d8947c1eac84aa6a3e724179455858b
              expression: 'last(/Ruckus UnLeashed by SNMP/ruckusUnleashedSystemStatsNumAP)<>20'
              name: 'Rukus Access Point Offline'
              status: DISABLED
              priority: AVERAGE
        - uuid: c302dab54b8146b6837ae610720717d2
          name: 'Users Connected'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.2.0
          key: ruckusUnleashedSystemStatsNumSta
          delay: '30'
          history: 90d
          units: Users
          tags:
            - tag: Application
              value: 'Acces Points'
        - uuid: c7b957588a94470881ac26bca87459bd
          name: 'Number of Registered Access Points'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.15.0
          key: ruckusUnleashedSystemStatsTotalAP
          delay: '30'
          history: 90d
          tags:
            - tag: Application
              value: 'Acces Points'
        - uuid: 7f65705b24e349d8a8ad91fa9ab2a260
          name: 'Total Users Connected'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.30.0
          key: ruckusUnleashedSystemStatsTotalNumSta
          delay: '30'
          history: 90d
          units: Users
          tags:
            - tag: Application
              value: 'Acces Points'
        - uuid: 26613cafab324d4c964944c8aa64be06
          name: 'Associations Failed'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.16.0
          key: ruckusUnleashedSystemStatsWLANTotalAssocFail
          delay: '3600'
          history: 90d
          tags:
            - tag: Application
              value: 'Acces Points'
        - uuid: d747c95a8c4e4fb4ba1652980ef6b1bc
          name: 'WLAN Total Rx Bytes'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.6.0
          key: ruckusUnleashedSystemStatsWLANTotalRxBytes
          delay: '30'
          history: 90d
          units: bps
          description: 'Total received bytes of wireless interfaces'
          preprocessing:
            - type: CHANGE_PER_SECOND
          tags:
            - tag: component
              value: network
        - uuid: f2bbe5d409ea4950a51e1120ea4b2026
          name: 'WLAN Total Tx Bytes'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.9.0
          key: ruckusUnleashedSystemStatsWLANTotalTxBytes
          delay: '30'
          history: 90d
          units: bps
          description: 'Total transmitted bytes of wireless interfaces'
          preprocessing:
            - type: CHANGE_PER_SECOND
          tags:
            - tag: component
              value: network
        - uuid: f035d2c915804363b8ea052be2778241
          name: 'WLAN Total Tx Fail'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.11.0
          key: ruckusUnleashedSystemStatsWLANTotalTxFail
          delay: '30'
          history: 90d
          units: packet
          description: 'Total transmitted fail packets of wireless interfaces'
          preprocessing:
            - type: CHANGE_PER_SECOND
          tags:
            - tag: component
              value: network
        - uuid: d477800171034695bcfae3b4041bdd3a
          name: 'WLAN Total Tx Retry'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.15.12.0
          key: ruckusUnleashedSystemStatsWLANTotalTxRetry
          delay: '30'
          history: 90d
          units: packet
          description: 'Total transmitted retry packets of wireless interfaces'
          preprocessing:
            - type: CHANGE_PER_SECOND
          tags:
            - tag: component
              value: network
        - uuid: 643da7550cc34a279c595f62eb819924
          name: 'Firmware Version'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.18.0
          key: ruckusUnleashedSystemVersion
          delay: '3600'
          history: 90d
          value_type: CHAR
          tags:
            - tag: Application
              value: General
        - uuid: 7f8ffc3f69804adaba88ae9296105d41
          name: 'Device name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.1.0
          key: sysName
          delay: '3600'
          history: 90d
          value_type: CHAR
          tags:
            - tag: Application
              value: General
        - uuid: f65b6ead3bcc434892ca68511a9950cd
          name: 'Device uptime'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.25053.1.15.1.1.1.1.8.0
          key: sysUpTime
          delay: '3600'
          history: 7d
          units: uptime
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: Application
              value: General
      discovery_rules:
        - uuid: f3e125440d854b51a2298d7ac6d43d79
          name: 'Ruckus APs List'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.2.6]'
          key: 'AP-[{#SNMPINDEX}]'
          delay: '3600'
          lifetime: 1d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 1d8284bfcc1348e4be1880fd11c022a9
              name: 'AP Name ({#SNMPINDEX})'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.2.6.{#SNMPINDEX}'
              key: 'ruckusUnleashedWLANAPDescription[{#SNMPINDEX}]'
              history: 90d
              value_type: TEXT
              description: 'AP Name'
              tags:
                - tag: AP
                  value: '{#SNMPVALUE}'
                - tag: Application
                  value: 'Acces Points'
            - uuid: 3b0d1554f4a3441486a2b3a075d7a3e2
              name: 'AP MAC Addr [{#SNMPVALUE}]'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.1.6.{#SNMPINDEX}'
              key: 'ruckusUnleashedWLANAPMacAddr[{#SNMPINDEX}]'
              history: 90d
              value_type: TEXT
              description: 'AP Mac Address'
              tags:
                - tag: AP
                  value: '{#SNMPVALUE}'
                - tag: Application
                  value: 'Acces Points'
            - uuid: cdcb6b140143458eac67607cbbc3d7fa
              name: 'AP Model [{#SNMPVALUE}]'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.4.6.{#SNMPINDEX}'
              key: 'ruckusUnleashedWLANAPModel[{#SNMPINDEX}]'
              history: 90d
              value_type: TEXT
              description: 'Model name'
              tags:
                - tag: AP
                  value: '{#SNMPVALUE}'
                - tag: Application
                  value: 'Acces Points'
            - uuid: e5cad0f2265146c594ca0be0567bbc4b
              name: 'AP Role [{#SNMPVALUE}]'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.9.6.{#SNMPINDEX}'
              key: 'ruckusUnleashedWLANAPRole[{#SNMPINDEX}]'
              history: 90d
              description: 'AP role, master or member AP'
              valuemap:
                name: 'AP Role'
              tags:
                - tag: AP
                  value: '{#SNMPVALUE}'
                - tag: Application
                  value: 'Acces Points'
              trigger_prototypes:
                - uuid: 2d751fa967eb4971b9728ac38d273f4d
                  expression: 'last(/Ruckus UnLeashed by SNMP/ruckusUnleashedWLANAPRole[{#SNMPINDEX}],#1)<>last(/Ruckus UnLeashed by SNMP/ruckusUnleashedWLANAPRole[{#SNMPINDEX}],#2)'
                  name: 'Acces Point {#SNMPVALUE} Role Changed'
                  priority: AVERAGE
                  manual_close: 'YES'
            - uuid: c1e006746747492885c310be750cf3ed
              name: 'AP State [{#SNMPVALUE}]'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.3.6.{#SNMPINDEX}'
              key: 'ruckusUnleashedWLANAPStatus[{#SNMPINDEX}]'
              delay: 30s
              history: 90d
              description: 'The connection status with Unleashed.'
              valuemap:
                name: RuckusAPStatus
              tags:
                - tag: AP
                  value: '{#SNMPVALUE}'
                - tag: Application
                  value: 'Acces Points'
              trigger_prototypes:
                - uuid: ea050d902b754a32b64eac70b319fb94
                  expression: 'last(/Ruckus UnLeashed by SNMP/ruckusUnleashedWLANAPStatus[{#SNMPINDEX}])=0'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Ruckus UnLeashed by SNMP/ruckusUnleashedWLANAPStatus[{#SNMPINDEX}])=1'
                  name: 'Acces Point {#SNMPVALUE} Disconnected'
                  priority: AVERAGE
                  manual_close: 'YES'
            - uuid: 059790940d8549a685c0a024764e3fc3
              name: 'AP Uptime [{#SNMPVALUE}]'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.25053.1.15.2.1.1.2.1.1.6.6.{#SNMPINDEX}'
              key: 'ruckusUnleashedWLANAPUptime[{#SNMPINDEX}]'
              history: 90d
              units: uptime
              description: 'Model name'
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '0.01'
              tags:
                - tag: AP
                  value: '{#SNMPVALUE}'
                - tag: Application
                  value: 'Acces Points'
              trigger_prototypes:
                - uuid: b005cd0416ac4d8e94f47cc7f06a716c
                  expression: 'last(/Ruckus UnLeashed by SNMP/ruckusUnleashedWLANAPUptime[{#SNMPINDEX}])<10m'
                  name: 'Acces Point {#SNMPVALUE} Restarted'
                  priority: INFO
                  description: 'The host uptime is less than 10 minutes'
                  manual_close: 'YES'
      dashboards:
        - uuid: ba0742b91b0a48148679f7e6d72a25f4
          name: Overview
          pages:
            - widgets:
                - type: item
                  name: 'Device Name'
                  width: '36'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'Device Name'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Ruckus UnLeashed by SNMP'
                        key: sysName
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: value_size
                      value: '35'
                - type: item
                  name: Uptime
                  'y': '3'
                  width: '36'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: INTEGER
                      name: decimal_places
                      value: '0'
                    - type: STRING
                      name: description
                      value: Uptime
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Ruckus UnLeashed by SNMP'
                        key: sysUpTime
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: show.2
                      value: '4'
                    - type: INTEGER
                      name: value_size
                      value: '35'
                - type: gauge
                  name: 'CPU utilization'
                  'y': '6'
                  width: '18'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'CPU usage'
                    - type: INTEGER
                      name: desc_size
                      value: '10'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Ruckus UnLeashed by SNMP'
                        key: ruckusUnleashedSystemStatsCPUUtil
                    - type: STRING
                      name: max
                      value: '100'
                    - type: STRING
                      name: min
                      value: '0'
                    - type: INTEGER
                      name: scale_size
                      value: '10'
                    - type: STRING
                      name: thresholds.0.color
                      value: 0EC9AC
                    - type: STRING
                      name: thresholds.0.threshold
                      value: '0'
                    - type: STRING
                      name: thresholds.1.color
                      value: FFD54F
                    - type: STRING
                      name: thresholds.1.threshold
                      value: '70'
                    - type: STRING
                      name: thresholds.2.color
                      value: FF465C
                    - type: STRING
                      name: thresholds.2.threshold
                      value: '90'
                    - type: INTEGER
                      name: th_show_arc
                      value: '1'
                    - type: INTEGER
                      name: th_show_labels
                      value: '1'
                    - type: STRING
                      name: units
                      value: '%'
                - type: svggraph
                  name: 'WLAN RX/TX'
                  'y': '9'
                  width: '72'
                  height: '5'
                  fields:
                    - type: INTEGER
                      name: ds.0.color_palette
                      value: '0'
                    - type: STRING
                      name: ds.0.items.0
                      value: 'WLAN Total Rx Bytes'
                    - type: STRING
                      name: ds.0.items.1
                      value: 'WLAN Total Tx Bytes'
                    - type: STRING
                      name: ds.0.items.2
                      value: 'WLAN Total Tx Fail'
                    - type: STRING
                      name: ds.0.items.3
                      value: 'WLAN Total Tx Retry'
                    - type: INTEGER
                      name: ds.0.width
                      value: '2'
                    - type: INTEGER
                      name: legend_statistic
                      value: '1'
                    - type: STRING
                      name: reference
                      value: HBEIC
                    - type: INTEGER
                      name: righty
                      value: '0'
                - type: gauge
                  name: 'Memory usage'
                  x: '18'
                  'y': '6'
                  width: '18'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'Memory usage'
                    - type: INTEGER
                      name: desc_size
                      value: '10'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Ruckus UnLeashed by SNMP'
                        key: ruckusUnleashedSystemStatsMemoryUtil
                    - type: STRING
                      name: max
                      value: '100'
                    - type: STRING
                      name: min
                      value: '0'
                    - type: INTEGER
                      name: scale_size
                      value: '10'
                    - type: STRING
                      name: thresholds.0.color
                      value: 0EC9AC
                    - type: STRING
                      name: thresholds.0.threshold
                      value: '0'
                    - type: STRING
                      name: thresholds.1.color
                      value: FFD54F
                    - type: STRING
                      name: thresholds.1.threshold
                      value: '70'
                    - type: STRING
                      name: thresholds.2.color
                      value: FF465C
                    - type: STRING
                      name: thresholds.2.threshold
                      value: '90'
                    - type: INTEGER
                      name: th_show_arc
                      value: '1'
                    - type: INTEGER
                      name: th_show_labels
                      value: '1'
                    - type: STRING
                      name: units
                      value: '%'
                - type: item
                  name: Firmware
                  x: '36'
                  width: '36'
                  height: '3'
                  fields:
                    - type: INTEGER
                      name: decimal_places
                      value: '0'
                    - type: STRING
                      name: description
                      value: Firmware
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Ruckus UnLeashed by SNMP'
                        key: ruckusUnleashedSystemVersion
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: show.2
                      value: '4'
