  triggers:
    - uuid: e1b8dc975fa54abd8747ff716e195bc6
      expression: '(last(/D-Link DGS_DXS Switch by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/D-Link DGS_DXS Switch by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/D-Link DGS_DXS Switch by SNMP/system.hw.uptime[hrSystemUptime.0])=0 and last(/D-Link DGS_DXS Switch by SNMP/system.net.uptime[sysUpTime.0])<10m)'
      name: 'D-Link DES_DGS Switch: Host has been restarted'
      event_name: 'D-Link DES_DGS Switch: {HOST.NAME} has been restarted (uptime < 10m)'
      priority: WARNING
      description: 'Uptime is less than 10 minutes.'
      manual_close: 'YES'
      dependencies:
        - name: 'D-Link DES_DGS Switch: No SNMP data collection'
          expression: 'max(/D-Link DGS_DXS Switch by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
      tags:
        - tag: scope
          value: notice
  graphs:
    - uuid: 86e29ffad3b74e27bc4eae8fae355e6e
      name: 'D-Link DES_DGS Switch: CPU utilization'
      ymin_type_1: FIXED
      ymax_type_1: FIXED
      graph_items:
        - drawtype: GRADIENT_LINE
          color: 199C0D
          item:
            host: 'D-Link DGS_DXS Switch by SNMP'
            key: 'system.cpu.util[agentCPUutilizationIn1min.0]'
