zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: cdce88f4196c45bfa225b57ddba7445e
      name: 'Halley template'
    - uuid: 611c8e314c0748c0928d5d7bc615a33b
      name: Imported
    - uuid: 36bff6c29af64692839d077febfc7079
      name: 'Templates/Network devices'
  templates:
    - uuid: c7b4329aab144231ad4b584a0f2d6b08
      template: 'Watchguard Firewall'
      name: 'Watchguard Firewall'
      description: |
        ## Overview
        
        An updated Watchguard template that uses the updated SNMP OIDs after the v12.0 update.
        
        
         
        
        
        Template pulls:
        
        
        Active Connections  
        Available Memory  
        CPU Utilization  
        Device Description  
        Device Location  
        Device Name  
        Device Uptime  
        Free Memory  
        Total Bytes Received  
        Total Bytes Sent  
        Total Memory  
        Bandwidth Utilization  
        Access Rules
        
        
         
        
        
        Discovery Rules:
        
        
        Access Rules  
        Network Interfaces
        
        
        
        ## Author
        
        klheuser
      groups:
        - name: 'Halley template'
        - name: Imported
        - name: 'Templates/Network devices'
      items:
        - uuid: f2010ba0c43a48bcb1ca3b62a5751023
          name: 'Available Memory'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2021.4.6.0
          key: memAvailReal
          history: 90d
          tags:
            - tag: Application
              value: Memory
        - uuid: ee061475b5ea4822a3bd5a4f4b086e13
          name: 'Free Memory'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2021.4.11.0
          key: memTotalFree
          history: 90d
          tags:
            - tag: Application
              value: Memory
        - uuid: 366cced06a414b44a00302c3af35d9bd
          name: 'Total Memory'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2021.4.5.0
          key: memTotalReal
          delay: 1h
          history: 90d
          tags:
            - tag: Application
              value: Memory
        - uuid: e489d2c3a51a49a4a2d8cf98400bcf4d
          name: 'Device description'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.1.0
          key: sysDescr
          delay: '30'
          history: 1w
          value_type: CHAR
          description: 'A textual description of the entity.  This value should include the full name and version identification of the system''s hardware type, software operating-system, and networking software.'
          inventory_link: HARDWARE
          tags:
            - tag: Application
              value: General
        - uuid: 2bbb284ef6e94427851b1874300b731c
          name: 'Device location'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.6.0
          key: sysLocation
          delay: '30'
          history: 1w
          value_type: CHAR
          description: 'The physical location of this node (e.g., `telephone closet, 3rd floor'').  If the location is unknown, the value is the zero-length string.'
          inventory_link: LOCATION
          tags:
            - tag: Application
              value: General
        - uuid: 1d85a140b67d425593da06cd672c9c7b
          name: 'Device name'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.5.0
          key: sysName
          delay: '30'
          history: 1w
          value_type: CHAR
          description: 'An administratively-assigned name for this managed node. By convention, this is the node''s fully-qualified domain name.  If the name is unknown, the value is the zero-length string.'
          inventory_link: NAME
          tags:
            - tag: Application
              value: General
        - uuid: d417cbe1b9c840a4b936d2f7b123e84b
          name: 'Device uptime'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.3.0
          key: sysUpTime
          delay: '30'
          history: 1w
          units: uptime
          description: 'The time since the network management portion of the system was last re-initialized.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: Application
              value: General
        - uuid: ec1f075523084a0e96920835bb201aac
          name: 'CPU Utilization'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3097.6.3.77.0
          key: wgSystemCpuUtil1
          history: 90d
          value_type: FLOAT
          tags:
            - tag: Application
              value: General
        - uuid: dfa0694f88624a46960c8c152dc1db85
          name: 'Active Connections'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3097.6.3.80.0
          key: wgSystemCurrActiveConns
          history: 90d
          tags:
            - tag: Application
              value: General
        - uuid: 2c1287ba72d74b589f08a5f84fce975a
          name: 'Total Bytes Received'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3097.6.3.9.0
          key: wgSystemTotalRecvBytes
          history: 90d
          tags:
            - tag: Application
              value: 'Traffic rules'
        - uuid: 47492cf200e94ca48104cd0ea3edfdd1
          name: 'Total Bytes Sent'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.3097.6.3.10.0
          key: wgSystemTotalSendBytes
          history: 90d
          tags:
            - tag: Application
              value: 'Traffic rules'
      discovery_rules:
        - uuid: a13b1ae707a9492e81ef7b9d95e114ef
          name: 'Network interfaces'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},.1.3.6.1.2.1.2.2.1.2]'
          key: ifName
          delay: 1d
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: |
            You may also consider using IF-MIB::ifType or IF-MIB::ifAlias for discovery depending on your filtering needs.
            
            {$SNMP_COMMUNITY} is a global macro.
          item_prototypes:
            - uuid: 9f29d26bdb40479c8ce32cd7bd1425a1
              name: 'Inbound errors on interface {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.2.1.2.2.1.14.{#SNMPINDEX}'
              key: 'ifInErrors[{#SNMPINDEX}]'
              status: DISABLED
              description: 'For packet-oriented interfaces, the number of inbound packets that contained errors preventing them from being deliverable to a higher-layer protocol.  For character-oriented or fixed-length interfaces, the number of inbound transmission units that contained errors preventing them from being deliverable to a higher-layer protocol.'
              preprocessing:
                - type: CHANGE_PER_SECOND
              tags:
                - tag: Application
                  value: 'Interface - {#SNMPVALUE}'
            - uuid: d64108210d1c4a07bc7a9c61e6a1b63d
              name: 'Incoming traffic on interface {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.2.1.2.2.1.10.{#SNMPINDEX}'
              key: 'ifInOctets[{#SNMPINDEX}]'
              delay: 30s
              units: Bps
              description: 'The number of octets in valid MAC frames received on this interface in 1 second, including the MAC header and FCS.'
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Application
                  value: 'Interface - {#SNMPVALUE}'
            - uuid: a7cac63eabd449dfb1025ac7da775cd5
              name: 'Operational status of interface {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}'
              key: 'ifOperStatus[{#SNMPINDEX}]'
              description: 'The current operational state of the interface.'
              tags:
                - tag: Application
                  value: 'Interface - {#SNMPVALUE}'
              trigger_prototypes:
                - uuid: 029451cc6ded4b06afdf2e71df2f1a59
                  expression: '(last(/Watchguard Firewall/ifOperStatus[{#SNMPINDEX}],#1)<>last(/Watchguard Firewall/ifOperStatus[{#SNMPINDEX}],#2))=1'
                  name: 'Operational status was changed on {HOST.NAME} interface {#SNMPVALUE}'
                  priority: INFO
                  manual_close: 'YES'
            - uuid: 6c8f7295acaf4a2a91b7655cf5a787f7
              name: 'Outbound errors on interface {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.2.1.2.2.1.20.{#SNMPINDEX}'
              key: 'ifOutErrors[{#SNMPINDEX}]'
              status: DISABLED
              description: 'For packet-oriented interfaces, the number of outbound packets that could not be transmitted because of errors. For character-oriented or fixed-length interfaces, the number of outbound transmission units that could not be transmitted because of errors.'
              preprocessing:
                - type: CHANGE_PER_SECOND
              tags:
                - tag: Application
                  value: 'Interface - {#SNMPVALUE}'
            - uuid: dd5ac751e41d45f5b98c665f47ff93f2
              name: 'Outgoing traffic on interface {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.2.1.2.2.1.16.{#SNMPINDEX}'
              key: 'ifOutOctets[{#SNMPINDEX}]'
              units: Bps
              description: 'The number of octets transmitted in MAC frames on this interface per second , including the MAC header and FCS.'
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Application
                  value: 'Interface - {#SNMPVALUE}'
          graph_prototypes:
            - uuid: 40d4ba9f1ed64f10adcb5fd12651c9da
              name: 'Traffic on interface {#SNMPVALUE}'
              graph_items:
                - color: 1A7C11
                  item:
                    host: 'Watchguard Firewall'
                    key: 'ifInOctets[{#SNMPINDEX}]'
                - sortorder: '1'
                  color: F63100
                  item:
                    host: 'Watchguard Firewall'
                    key: 'ifOutOctets[{#SNMPINDEX}]'
        - uuid: 516ecee682324e41bc0f4fffecf67cae
          name: 'Access Rules'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},.1.3.6.1.4.1.3097.4.3097.4.2.2.1.2]'
          key: 'rule[{#SNMPVALUE}]'
          delay: 1d
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'https://www.watchguard.com/help/docs/fireware/11/en-US/Content/en-US/basicadmin/snmp_mibs_details_c.html'
          item_prototypes:
            - uuid: aad74bc8f2a540c5a2db8736ea1b2a6e
              name: 'Traffic on {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.3097.4.3097.4.2.2.1.3.{#SNMPINDEX}'
              key: 'Traffic[{#SNMPVALUE}]'
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: Application
                  value: 'Traffic rules'
          graph_prototypes:
            - uuid: bf1f3bf4398b40c8b08bbc404c80dffe
              name: 'Traffic on  {#SNMPVALUE}'
              graph_items:
                - color: 1A7C11
                  item:
                    host: 'Watchguard Firewall'
                    key: 'Traffic[{#SNMPVALUE}]'
      macros:
        - macro: '{$SNMP_COMMUNITY}'
          value: MonitorZabbix
