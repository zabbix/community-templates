zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 36bff6c29af64692839d077febfc7079
      name: 'Templates/Network devices'
  templates:
    - uuid: 760b176c08d9491d9945458ef9958a25
      template: 'QNAP by SNMP'
      name: 'QNAP by SNMP'
      templates:
        - name: 'Template Net Network Generic Device SNMP'
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: aac63e428ca8472183fc819797f6ee3d
          name: 'CPU Temperature'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.4.1.1.1.1.4.2.0
          key: cpu.temp
          delay: 30m
          history: 7d
          trends: 7d
          tags:
            - tag: Application
              value: 'System Hardware'
        - uuid: 298441f51dd049c4bc1d0925223af79e
          name: 'CPU Usage'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.1.0
          key: cpu.usage
          delay: 5m
          units: '%'
          description: 'CPU Usage'
          tags:
            - tag: Application
              value: System
        - uuid: 3e5458dab21b4703816c91ca46a9f3f5
          name: 'Disk IOPS'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.4.1.11.5.6.2.1.3.1
          key: disk.iops
          delay: 15m
          history: 7d
          trends: 7d
          tags:
            - tag: Application
              value: Disks
        - uuid: 22c952d6051140719ea14f9346585099
          name: 'Disk latency'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.4.1.11.5.6.2.1.4.1
          key: disk.latency
          delay: 15m
          history: 7d
          trends: 7d
          tags:
            - tag: Application
              value: Disks
        - uuid: 44e4d5f03a484f3aab35f421fabc3635
          name: 'Device model name'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.12.0
          key: ModelName
          delay: 1h
          history: 1d
          value_type: TEXT
          tags:
            - tag: Application
              value: System
        - uuid: 55f003499e594d9093d53c1b69ccba9a
          name: 'Device firmware revision'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.47.1.1.1.1.9.1
          key: PhysicalFirmwareRev
          delay: 1h
          value_type: TEXT
          inventory_link: SOFTWARE
          tags:
            - tag: Application
              value: System
          triggers:
            - uuid: e8724b28186945b38911b48407f855ab
              expression: '(last(/QNAP by SNMP/PhysicalFirmwareRev,#1)<>last(/QNAP by SNMP/PhysicalFirmwareRev,#2))>0'
              name: 'Firmware on {HOST.NAME} has changed'
              priority: INFO
              description: 'Firmware of the system has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
                - tag: scope
                  value: security
        - uuid: c571366dfba246aab92b9f32ba3ccd10
          name: 'System Temperature'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.4.1.1.1.1.1.2.1.7.1
          key: system.temp
          delay: 30m
          history: 7d
          trends: 7d
          tags:
            - tag: Application
              value: 'System Hardware'
      discovery_rules:
        - uuid: 6c9e55230be348d4b4f1a7c598a18a07
          name: 'Disk Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},.1.3.6.1.4.1.24681.1.3.11.1.2]'
          key: disk.discovery
          delay: 15m
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: db9640a56f2f408c972dc3d96cbd0efb
              name: 'Capacity of {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.24681.1.3.11.1.6.{#SNMPINDEX}'
              key: 'HdCapacityEX[{#SNMPINDEX}]'
              delay: 1h
              units: B
              tags:
                - tag: Application
                  value: Disks
            - uuid: 17b2d62c310149fca2eb4df223722ac4
              name: 'Model of {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.24681.1.3.11.1.5.{#SNMPINDEX}'
              key: 'HdModelEX[{#SNMPINDEX}]'
              delay: 1h
              value_type: TEXT
              tags:
                - tag: Application
                  value: Disks
            - uuid: f7c61a9506a54bcb9bd167c88d546f5e
              name: '{#SNMPVALUE} SMART Status'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.24681.1.3.11.1.7.{#SNMPINDEX}'
              key: 'HdSmartInfoEX[{#SNMPINDEX}]'
              delay: 60m
              trends: '0'
              valuemap:
                name: 'QNAP S.M.A.R.T State'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      if (value === "GOOD") {
                          return 1;
                      }
                      if (value === "--") {
                          return 0;
                      }
                      return 2;
              tags:
                - tag: Application
                  value: Disks
              trigger_prototypes:
                - uuid: 99c487440abb45598ee53b4cc3fd033f
                  expression: 'find(/QNAP by SNMP/HdSmartInfoEX[{#SNMPINDEX}],,"iregexp","abnormal")=1'
                  name: 'SMART state of {#SNMPVALUE} on {HOST.NAME} is ABNORMAL'
                  priority: AVERAGE
                  description: |
                    Abnormal
                    1. Any SMART value is equal or less than trhreshold.
                    2. Hard Disk temperature is higher than 65 degree C.
                    --------
                    QNAP Knowledgebase
                - uuid: c4cb39bf8d2f424ebb56536a2b4f608c
                  expression: 'find(/QNAP by SNMP/HdSmartInfoEX[{#SNMPINDEX}],,"iregexp","normal")=1'
                  name: 'SMART state of {#SNMPVALUE} on {HOST.NAME} is not GOOD ({ITEM.VALUE1})'
                  priority: WARNING
                  description: |
                    Normal
                    1. Any Smart value is equal or less than threhold + (initial_SMART_value - threhold)/2.  For example, if the initial SMART value is 100, the current value is 50, the threshold is 20, then the Smart value, 50, is less than 20+(100-20)/2.  Thus, the health level would be Normal.
                    2. Any SMART test(Rapid or Complete) result of last 20 times is abnormal.
                    3. Hard Disk temperature is between 55 to 65 degree C.
                    --------
                    QNAP Knowledgebase
            - uuid: b6891cbfdd6a4077bfacee3a3ddb3422
              name: 'Status of {#SNMPVALUE}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.24681.1.3.11.1.4.{#SNMPINDEX}'
              key: 'HdStatusEX[{#SNMPINDEX}]'
              delay: 60m
              value_type: FLOAT
              tags:
                - tag: Application
                  value: Disks
              trigger_prototypes:
                - uuid: 3ae28908137e485eae8e5f1b2307f7e4
                  expression: 'last(/QNAP by SNMP/HdStatusEX[{#SNMPINDEX}])=-6'
                  name: 'State of {#SNMPVALUE} on {HOST.NAME} is "Invalid"'
                  priority: WARNING
                  description: 'State "Invalid"'
                - uuid: 533410627fac4f2e9b20a07ecb5a50d7
                  expression: 'last(/QNAP by SNMP/HdStatusEX[{#SNMPINDEX}])=-9'
                  name: 'State of {#SNMPVALUE} on {HOST.NAME} is "rwError"'
                  priority: WARNING
                  description: 'State "rwError"'
            - uuid: 590d60705f7844fcbc17a5c2e55f4d21
              name: '{#SNMPVALUE} Temperature'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.24681.1.3.11.1.3.{#SNMPINDEX}'
              key: 'HdTemperatureEX[{#SNMPINDEX}]'
              delay: 5m
              value_type: FLOAT
              units: C
              tags:
                - tag: Application
                  value: Disks
              trigger_prototypes:
                - uuid: 6355e92c0d9d4607b90f996d4c740511
                  expression: 'min(/QNAP by SNMP/HdTemperatureEX[{#SNMPINDEX}],2m)>{$HD_TEMPERATURE_ALARM}'
                  name: 'Temperature of {#SNMPVALUE} on {HOST.NAME} is over {$HD_TEMPERATURE_ALARM} for 2 min'
                  priority: HIGH
        - uuid: ae525295c2174a909ebe93948cf87fb8
          name: 'FAN Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#FANINDEX},1.3.6.1.4.1.24681.1.4.1.1.1.1.2.2.1.1]'
          key: fan.discovery
          delay: 15m
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 4a3c17791d7b4ef5929c8940f1e9dcf8
              name: 'FAN {#FANINDEX}: Name'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.3.15.1.2.{#FANINDEX}'
              key: 'fan.name[{#FANINDEX}]'
              delay: 1h
              history: 7d
              value_type: TEXT
              tags:
                - tag: Application
                  value: 'System Hardware'
            - uuid: 9ef63e24cf6c407a8168a81c101f703d
              name: 'FAN {#FANINDEX}: Speed'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.1.2.2.1.5.{#FANINDEX}'
              key: 'fan.speed[{#FANINDEX}]'
              delay: 30m
              history: 7d
              trends: 7d
              tags:
                - tag: Application
                  value: 'System Hardware'
            - uuid: dc4d0a879aa84859a7b7b8094e130fe2
              name: 'FAN {#FANINDEX}: Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.1.2.2.1.4.{#FANINDEX}'
              key: 'fan.status[{#FANINDEX}]'
              delay: 30m
              history: 7d
              trends: 7d
              valuemap:
                name: 'Alarm state'
              tags:
                - tag: Application
                  value: 'System Hardware'
        - uuid: 12a2c1985adc4a3991715c3e0349c183
          name: 'LUN Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#LUNINDEX},1.3.6.1.4.1.24681.1.4.1.1.2.1.11.2.1.1]'
          key: lun.discovery
          delay: 15m
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: a4010f82274847c2b2b26ca7b3f18098
              name: 'LUN {#LUNINDEX}: Name'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.2.1.11.2.1.3.{#LUNINDEX}'
              key: 'lun.name[{#LUNINDEX}]'
              delay: 1h
              history: 7d
              value_type: TEXT
              tags:
                - tag: Application
                  value: 'iSCSI & LUN'
            - uuid: 3ee489e7e8f0453e97e00b0c1655c8d7
              name: 'LUN {#LUNINDEX}: Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.2.1.11.2.1.5.{#LUNINDEX}'
              key: 'lun.status[{#LUNINDEX}]'
              delay: 15m
              history: 7d
              trends: 7d
              valuemap:
                name: 'QNAP LUN Status'
              tags:
                - tag: Application
                  value: 'iSCSI & LUN'
              trigger_prototypes:
                - uuid: b2c565d555774f67844346975760a8fa
                  expression: 'last(/QNAP by SNMP/lun.status[{#LUNINDEX}])<0'
                  name: 'State of LUN {#LUNINDEX} is disconnected'
                  priority: WARNING
                  description: 'The target of LUN is disconnected.'
        - uuid: 974d1788506a47a3bb172da067129c0b
          name: 'Pool Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#POOLINDEX},1.3.6.1.4.1.24681.1.4.1.1.1.2.2.2.1.1]'
          key: pool.discovery
          delay: 15m
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: b01f5f956ef24305b74e5f7ca11e2cb2
              name: 'Pool {#POOLINDEX}: Capacity'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.2.2.2.1.3.{#POOLINDEX}'
              key: 'pool.capacity[{#POOLINDEX}]'
              delay: 15m
              history: 7d
              trends: 7d
              units: B
              tags:
                - tag: Application
                  value: Pools
            - uuid: 7b873be6a424498a81389dafa92165c8
              name: 'Pool {#POOLINDEX}: Free size in %'
              type: CALCULATED
              key: 'pool.freepercentage[{#POOLINDEX}]'
              delay: 15m
              history: 7d
              trends: 7d
              params: 'last(//pool.freeSize[{#POOLINDEX}])/last(//pool.capacity[{#POOLINDEX}])*100'
              tags:
                - tag: Application
                  value: Pools
              trigger_prototypes:
                - uuid: dde7867deafc45df9506d1cd12e4ecd6
                  expression: 'last(/QNAP by SNMP/pool.freepercentage[{#POOLINDEX}])<{$POOL_SIZE_ALARM}'
                  name: 'Reaching threshold for pool {#POOLINDEX} (<{$POOL_SIZE_ALARM}%)'
                  opdata: 'Current %: {ITEM.LASTVALUE1}'
                  status: DISABLED
                  discover: NO_DISCOVER
                  priority: INFO
                  description: 'The free size of the pool is reaching the threshold.'
            - uuid: 0c5118751f254fa2ba510d4db06e57a9
              name: 'Pool {#POOLINDEX}: Free size'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.2.2.2.1.4.{#POOLINDEX}'
              key: 'pool.freeSize[{#POOLINDEX}]'
              delay: 15m
              history: 7d
              trends: 7d
              units: B
              tags:
                - tag: Application
                  value: Pools
            - uuid: 0bff3f3fe1374f99ab4c22978caf3f4d
              name: 'Pool {#POOLINDEX}: Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.2.2.2.1.5.{#POOLINDEX}'
              key: 'pool.status[{#POOLINDEX}]'
              delay: 15m
              history: 7d
              trends: 7d
              tags:
                - tag: Application
                  value: Pools
              trigger_prototypes:
                - uuid: b11b5adc5b444ac09a39cdb010b18a72
                  expression: 'last(/QNAP by SNMP/pool.status[{#POOLINDEX}])<>0'
                  name: 'Faulty state of Pool {#POOLINDEX}'
                  priority: HIGH
                  description: 'A faulty state has been reported by the pool.'
        - uuid: 088948e4b451452c9e62d34900d76a63
          name: 'RAID Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#RAIDINDEX},1.3.6.1.4.1.24681.1.4.1.1.1.2.1.2.1.1]'
          key: raid.discovery
          delay: 15m
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: a1c4203bb722403089f8a701ff6a906c
              name: 'RAID {#RAIDINDEX}: Capacity'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.2.1.2.1.3.{#RAIDINDEX}'
              key: 'raid.capacity[{#RAIDINDEX}]'
              delay: 1h
              history: 7d
              trends: 7d
              units: B
              tags:
                - tag: Application
                  value: RAID
            - uuid: 91753681c89a43668743e3027e42ee63
              name: 'RAID {#RAIDINDEX}: Free size'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.2.1.2.1.4.{#RAIDINDEX}'
              key: 'raid.freeSize[{#RAIDINDEX}]'
              delay: 1h
              history: 7d
              trends: 7d
              units: B
              tags:
                - tag: Application
                  value: RAID
            - uuid: 3a24d539ab364e3b99752229547c1e67
              name: 'RAID {#RAIDINDEX}: Level'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.2.1.2.1.7.{#RAIDINDEX}'
              key: 'raid.level[{#RAIDINDEX}]'
              delay: 1h
              history: 7d
              trends: 7d
              tags:
                - tag: Application
                  value: RAID
            - uuid: cb05b91cbcb94fc2adaf4d5289e49a84
              name: 'RAID {#RAIDINDEX}: State'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.2.1.2.1.5.{#RAIDINDEX}'
              key: 'raid.state[{#RAIDINDEX}]'
              delay: 15m
              history: 7d
              value_type: TEXT
              tags:
                - tag: Application
                  value: RAID
              trigger_prototypes:
                - uuid: 50a0623e329545efb7323bb4b5599bae
                  expression: 'find(/QNAP by SNMP/raid.state[{#RAIDINDEX}],,"iregexp","^Ready|Synchronizing")=0'
                  name: 'Faulty state of RAID {#RAIDINDEX}'
                  opdata: 'Current state: {ITEM.VALUE}'
                  priority: HIGH
                  description: 'RAID has reported a faulty state.'
                  manual_close: 'YES'
        - uuid: 2c68b80dccf04ea9b587c1248277b0e5
          name: 'Volume Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#VOLUMEINDEX},1.3.6.1.4.1.24681.1.4.1.1.1.2.3.2.1.1]'
          key: volume.discovery
          delay: 15m
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: a56e2dbd91f6416086c684733d87dadd
              name: 'Volume {#VOLUMEINDEX}: Capacity'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.2.3.2.1.3.{#VOLUMEINDEX}'
              key: 'volume.capacity[{#VOLUMEINDEX}]'
              delay: 15m
              history: 7d
              trends: 7d
              units: B
              tags:
                - tag: Application
                  value: Volumes
            - uuid: e7432310e49142698738850585479a02
              name: 'Volume {#VOLUMEINDEX}: Free size in %'
              type: CALCULATED
              key: 'volume.freePercentage[{#VOLUMEINDEX}]'
              delay: 15m
              history: 7d
              trends: 7d
              params: 'last(//volume.freeSize[{#VOLUMEINDEX}])/last(//volume.capacity[{#VOLUMEINDEX}])*100'
              tags:
                - tag: Application
                  value: Volumes
              trigger_prototypes:
                - uuid: 6dfcfd4cad654d1daa238935a0e2ae07
                  expression: 'last(/QNAP by SNMP/volume.freePercentage[{#VOLUMEINDEX}])<{$VOLUME_SIZE_ALARM}'
                  name: 'Reaching threshold for volume {#VOLUMEINDEX} (<{$VOLUME_SIZE_ALARM}%)'
                  opdata: 'Current state: {ITEM.LASTVALUE1}'
                  priority: WARNING
                  description: 'The free size of the volume is reaching the threshold.'
            - uuid: e9a3b70294954fe4816f5a3ba4829257
              name: 'Volume {#VOLUMEINDEX}: Free size'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.2.3.2.1.4.{#VOLUMEINDEX}'
              key: 'volume.freeSize[{#VOLUMEINDEX}]'
              delay: 15m
              history: 7d
              trends: 7d
              units: B
              tags:
                - tag: Application
                  value: Volumes
            - uuid: ad551ca5e0b24b779e43c20a3eca7fc4
              name: 'Volume {#VOLUMEINDEX}: Name'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.2.3.2.1.8.{#VOLUMEINDEX}'
              key: 'volume.name[{#VOLUMEINDEX}]'
              delay: 1h
              history: 7d
              value_type: TEXT
              tags:
                - tag: Application
                  value: Volumes
            - uuid: 77a876149afa4c55865bd7f3bbdf4462
              name: 'Volume {#VOLUMEINDEX}: Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.24681.1.4.1.1.1.2.3.2.1.5.{#VOLUMEINDEX}'
              key: 'volume.status[{#VOLUMEINDEX}]'
              delay: 15m
              history: 7d
              value_type: CHAR
              tags:
                - tag: Application
                  value: Volumes
              trigger_prototypes:
                - uuid: 31a2ec31de344d0eb78a9a087fb4413d
                  expression: 'last(/QNAP by SNMP/volume.status[{#VOLUMEINDEX}])<>"Ready"'
                  name: 'Check state of volume {#VOLUMEINDEX}'
                  priority: AVERAGE
                  description: 'Volume is not in ''Ready'' state. Check as soon as possible.'
          graph_prototypes:
            - uuid: 01d35cb9cde2427f9cae6b971394a03b
              name: 'Volume {#VOLUMEINDEX}: Volume space usage'
              width: '600'
              height: '340'
              yaxismax: '0'
              show_work_period: 'NO'
              show_triggers: 'NO'
              type: PIE
              show_3d: 'YES'
              graph_items:
                - color: '969696'
                  calc_fnc: LAST
                  type: GRAPH_SUM
                  item:
                    host: 'QNAP by SNMP'
                    key: 'volume.capacity[{#VOLUMEINDEX}]'
                - sortorder: '1'
                  color: 2E7D32
                  calc_fnc: LAST
                  item:
                    host: 'QNAP by SNMP'
                    key: 'volume.freeSize[{#VOLUMEINDEX}]'
      tags:
        - tag: class
          value: storage
        - tag: target
          value: qnap
      macros:
        - macro: '{$CPU_TEMPERATURE_ALARM}'
          value: '65'
          description: 'Amount in centigrade when an alarm shall be raised'
        - macro: '{$DISK_LATENCY_ALARM}'
          value: '30'
          description: 'Amount in ms when an alarm shall be raised'
        - macro: '{$HD_TEMPERATURE_ALARM}'
          value: '51'
          description: 'Amount in centigrade when an alarm shall be raised'
        - macro: '{$POOL_SIZE_ALARM}'
          value: '15'
          description: 'Amount in % when an alarm shall be raised'
      dashboards:
        - uuid: 87e8077772f240f0b3cbbc3b52a41fbe
          name: Overview
          pages:
            - name: Overview
              widgets:
                - type: item
                  name: 'System Name'
                  width: '36'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'System Name'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'QNAP by SNMP'
                        key: system.name
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: show.2
                      value: '4'
                    - type: INTEGER
                      name: value_size
                      value: '35'
                - type: item
                  name: Uptime
                  'y': '3'
                  width: '36'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: Uptime
                    - type: INTEGER
