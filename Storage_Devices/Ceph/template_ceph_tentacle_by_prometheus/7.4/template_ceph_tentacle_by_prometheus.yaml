zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
    - uuid: 13cc9163654c491d95a73406b9ca8dea
      name: Templates/Cluster/Ceph
    - uuid: 794fdc3c0cd44a0fb6fa23c0c3706b8e
      name: Templates/Storage
  templates:
    - uuid: 861a24398321450db212a1698011dd79
      template: 'Template App Ceph Tentacle by Prometheus endpoint'
      name: 'Template App Ceph Tentacle by Prometheus endpoint'
      description: |
        Ceph monitoring via Ceph mgr Prometheus endpoint. Uses HTTP agent master items and dependent Prometheus-pattern items/LLD. Built for Ceph 20.2.x (Tentacle); item keys use ceph20.* prefix to avoid collisions with Squid ceph19.* templates.

        Author: Alexander Rydzewski (https://github.com/AlexRydzewski)
        Project: https://github.com/AlexRydzewski/ceph-prometheus-zabbix-monitoring

        References:
        - PG state flags: https://docs.ceph.com/en/latest/rados/operations/pg-states/
        - mgr Prometheus: https://docs.ceph.com/en/latest/mgr/prometheus/
        - Optional Grafana dashboard: https://github.com/AlexRydzewski/ceph-prometheus-zabbix-monitoring/blob/main/grafana/ceph-cluster-overview.json
        - Built-in Zabbix dashboards: Ceph — Cluster health, Pool performance, OSD performance (see README.md)
      groups:
        - name: Templates/Applications
        - name: Templates/Cluster/Ceph
        - name: Templates/Storage
      items:
        - uuid: 3264afbf83aa4dcda27c14deacb78876
          name: 'Ceph: OSD blocklist count'
          type: DEPENDENT
          key: ceph20.cluster.osd.blocklist.count
          history: 7d
          value_type: FLOAT
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - ceph_cluster_osd_blocklist_count
                - value
                - ''
          master_item:
            key: ceph20.prometheus.metrics.1m
          tags:
            - tag: component
              value: osd
        - uuid: e473a9a9874247a2b268b9dfb98b720e
          name: 'Ceph: Cluster total bytes'
          type: DEPENDENT
          key: ceph20.cluster.total_bytes
          history: 7d
          value_type: FLOAT
          units: B
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - ceph_cluster_total_bytes
                - value
                - ''
          master_item:
            key: ceph20.prometheus.metrics.3m
          tags:
            - tag: component
              value: capacity
        - uuid: 10f307aa3c2b4aef94a7d74a2e75ba4c
          name: 'Ceph: Cluster used bytes'
          type: DEPENDENT
          key: ceph20.cluster.used_bytes
          history: 7d
          value_type: FLOAT
          units: B
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - ceph_cluster_total_used_bytes
                - value
                - ''
          master_item:
            key: ceph20.prometheus.metrics.3m
          tags:
            - tag: component
              value: capacity
        - uuid: b83baaad8f5749b8bb8de25e0cf0b9bd
          name: 'Ceph: Cluster used raw bytes'
          type: DEPENDENT
          key: ceph20.cluster.used_raw_bytes
          history: 7d
          value_type: FLOAT
