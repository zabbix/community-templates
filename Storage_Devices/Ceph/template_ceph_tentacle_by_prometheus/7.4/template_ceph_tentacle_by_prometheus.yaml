                - value
                - ''
          master_item:
            key: ceph20.prometheus.metrics.3m
          tags:
            - tag: component
              value: capacity
        - uuid: b4553c943d27484399f240bc7aad20e8
          name: 'Ceph: Health status'
          type: DEPENDENT
          key: ceph20.health.status
          history: 7d
          value_type: FLOAT
          description: '0=HEALTH_OK, 1=HEALTH_WARN, 2=HEALTH_ERR, as exported by Ceph prometheus module.'
          valuemap:
            name: 'Ceph health status'
          preprocessing:
            - type: PROMETHEUS_PATTERN
              parameters:
                - ceph_health_status
                - value
                - ''
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
          master_item:
            key: ceph20.prometheus.metrics.3m
          tags:
            - tag: component
              value: health
          triggers:
            - uuid: bac2c06461794e558655173f45ea730a
              expression: 'last(/Template App Ceph Tentacle by Prometheus endpoint/ceph20.health.status)=2'
              name: 'Ceph cluster health is ERROR'
              priority: HIGH
              description: 'ceph_health_status is 2=ERROR'
            - uuid: c0cd4618676c44a79a0a8d3030a2407c
              expression: 'last(/Template App Ceph Tentacle by Prometheus endpoint/ceph20.health.status)=1'
              name: 'Ceph cluster health is WARNING'
              priority: AVERAGE
              description: 'ceph_health_status is 1=WARNING'
        - uuid: 872497ae922944b39135041670fe0f3a
