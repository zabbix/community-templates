      discovery_rules:
        - uuid: c2a98b7589c24ceda6af447aef2a3646
          name: 'Ceph device class capacity discovery'
          type: DEPENDENT
          key: ceph20.device.class.discovery
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 17a41a57b7fe47a38391ad8dce73a2d6
              name: 'Device class {#DEVICE_CLASS}: Total bytes'
              type: DEPENDENT
              key: 'ceph20.cluster.by_class.total_bytes[{#DEVICE_CLASS}]'
              history: 7d
              value_type: FLOAT
              units: B
              preprocessing:
                - type: PROMETHEUS_PATTERN
                  parameters:
                    - 'ceph_cluster_by_class_total_bytes{device_class="{#DEVICE_CLASS}"}'
                    - value
                    - ''
              master_item:
                key: ceph20.prometheus.metrics.3m
              tags:
                - tag: component
                  value: capacity
                - tag: device_class
                  value: '{#DEVICE_CLASS}'
            - uuid: 5e30a62f07ff40b9a564b7634bdf80fe
              name: 'Device class {#DEVICE_CLASS}: Used bytes'
              type: DEPENDENT
              key: 'ceph20.cluster.by_class.used_bytes[{#DEVICE_CLASS}]'
              history: 7d
              value_type: FLOAT
              units: B
              preprocessing:
