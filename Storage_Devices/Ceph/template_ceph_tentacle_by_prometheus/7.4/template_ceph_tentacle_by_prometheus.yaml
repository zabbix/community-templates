          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  
                  var lines = value.split(/\r?\n/);
                  var data = [];
                  var seen = {};
                  function parseLabels(s) {
                      var labels = {};
                      var re = /([A-Za-z_][A-Za-z0-9_]*)="((?:\\.|[^"\\])*)"/g;
                      var m;
                      while ((m = re.exec(s)) !== null) {
                          labels[m[1]] = m[2].replace(/\\"/g, '"').replace(/\\\\/g, '\\');
                      }
                      return labels;
                  }
                  for (var i = 0; i < lines.length; i++) {
                      var line = lines[i];
                      if (!line || line.charAt(0) === '#') continue;
                      var m = line.match(/^([a-zA-Z_:][a-zA-Z0-9_:]*)(?:\{([^}]*)\})?\s+[-+]?([0-9]*\.?[0-9]+|NaN|Inf|-Inf)/);
                      if (!m) continue;
                      var metric = m[1];
                      if (metric !== "ceph_pool_metadata") continue;
                      var labels = parseLabels(m[2] || "");
                      var row = {};
                      if (labels["pool_id"] !== undefined) row["{#POOL_ID}"] = labels["pool_id"];
                      if (labels["name"] !== undefined) row["{#POOL_NAME}"] = labels["name"];
                      if (labels["type"] !== undefined) row["{#POOL_TYPE}"] = labels["  type"];
                      if (labels["application"] !== undefined) row["{#POOL_APPLICATION}"] = labels["application"];
                      var uniq = JSON.stringify(row);
                      if (!seen[uniq]) {
                          seen[uniq] = true;
                          data.push(row);
                      }
                  }
                  return JSON.stringify(data);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
        - uuid: dec0cca9cbf944fa9c00b809297b39e9
          name: 'Ceph Prometheus collector method discovery'
