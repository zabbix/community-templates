zabbix_export:
  version: '5.4'
  date: '2021-11-21T21:38:11Z'
  groups:
    -
      uuid: 7df96b18c230490a9a0a9e2307226338
      name: Templates
  templates:
    -
      uuid: a1b2c3d4e5f64a5b8c7d9e0f1a2b3c4d
      template: 'WD My Cloud EX4100'
      name: 'WD My Cloud EX4100'
      description: |
        ## Overview

        Zabbix SNMP Template for (Western Digital) WD My Cloud EX4100

        Adapted from the community EX4 template. OIDs updated to match the
        EX4100 MIB (submodelID 6 instead of 1):
          EX4    base: .1.3.6.1.4.1.5127.1.1.1.1.1
          EX4100 base: .1.3.6.1.4.1.5127.1.1.1.6.1

        MIB reference: https://downloads.wdc.com/nas/WDMYCLOUDEX4100-MIB.txt

        Prerequisites:
        --------------

        * Enable SNMP on WD My Cloud EX4100
        * Zabbix 3.4+ with preprocessing support for regex-magic on item

        Features:
        ---------

        Low Level Discovery:

        * Physical disks
        * Logical disks
        * UPS

        Template uses vars set on host-level:

        * {$SNMP_PORT}
        * {$SNMP_COMMUNITY}

      groups:
        -
          name: Templates
      items:
        -
          uuid: 3458b989cd48445b9da523783ff90051
          name: 'Agent Version'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5127.1.1.1.6.1.1.0
          key: agentVer
          delay: 1h
          history: 30d
          trends: '0'
          value_type: TEXT
          tags:
            -
              tag: Application
              value: System
        -
          uuid: ff9f2756e31e41a09e364c9a429589f5
          name: 'Fan status'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5127.1.1.1.6.1.8.0
          key: fanStatus
          history: 30d
          trends: '0'
          value_type: TEXT
          preprocessing:
            -
              type: LTRIM
              parameters:
                - ' fan0: '
          tags:
            -
              tag: Application
              value: System
          triggers:
            -
              uuid: cf539b94f8d64be9bb2df9a9857e9b73
              expression: 'find(/WD My Cloud EX4100/fanStatus,,"regexp","running")=0'
              name: 'Fan status'
              priority: WARNING
        -
          uuid: 61fed435d4c44798bf617e327052ca09
          name: 'FTP status'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5127.1.1.1.6.1.5.0
          key: ftpServer
          delay: 1h
          history: 1w
          trends: 30d
          valuemap:
            name: 'WD My Cloud EX4100 FTP Server'
          tags:
            -
              tag: Application
              value: System
        -
          uuid: 080554eea26f43778b3de6a6d856edde
          name: Hostname
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5127.1.1.1.6.1.3.0
          key: hostName
          delay: 1h
          history: 30d
          trends: '0'
          value_type: TEXT
          tags:
            -
              tag: Application
              value: System
        -
          uuid: 773b47790a3548bea854cf85327921c8
          name: 'Net type'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5127.1.1.1.6.1.6.0
          key: netType
          delay: 1h
          history: 1w
          trends: 30d
          valuemap:
            name: 'WD My Cloud EX4100 Net Type'
          tags:
            -
              tag: Application
              value: System
        -
          uuid: 2f77bf733ef2478383c2ba781d989d8b
          name: 'Software version'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5127.1.1.1.6.1.2.0
          key: softwareVersion
          delay: 1h
          history: 30d
          trends: '0'
          value_type: TEXT
          tags:
            -
              tag: Application
              value: System
        -
          uuid: 989d6188cbd84f578279abf2a26edd1b
          name: Temperature
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.5127.1.1.1.6.1.7.0
          key: temperature
          history: 1w
          trends: 30d
          preprocessing:
            -
              type: LTRIM
              parameters:
                - 'Centigrade:'
            -
              type: REGEX
              parameters:
                - '^\d{1,2}'
                - \0
          tags:
            -
              tag: Application
              value: System
          triggers:
            -
              uuid: f897f5f5c67d4e1fbf750e3feea51b51
              expression: 'avg(/WD My Cloud EX4100/temperature,#5)>60'
              name: 'High temperature'
              priority: WARNING
      discovery_rules:
        -
          uuid: ec39ad04dbeb4ddd8deff554743f4876
          name: 'Logical Disks'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},.1.3.6.1.4.1.5127.1.1.1.6.1.9.1.1, {#VOLUMENAME}, .1.3.6.1.4.1.5127.1.1.1.6.1.9.1.2]'
          key: ldDiscovery
          item_prototypes:
            -
              uuid: 9ea1948f0d4b432bb82c56bb75a01adc
              name: 'Logical disk {#VOLUMENAME} free space'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.9.1.6.{#SNMPINDEX}'
              key: 'ld.freespace[{#VOLUMENAME}]'
              history: 30d
              trends: 90d
              units: B
              preprocessing:
                -
                  type: REGEX
                  parameters:
                    - '(\d{1,}).(\d{0,})([GT])'
                    - '\1.\2\3:G=\1.\2:T=\1\200'
                -
                  type: REGEX
                  parameters:
                    - '(G|T)(?=.*:\1=(\d{1,}))'
                    - \2
                -
                  type: MULTIPLIER
                  parameters:
                    - '1073741824'
              tags:
                -
                  tag: Application
                  value: 'Logical Disks'
            -
              uuid: 633b984b22564db5b3a9d9ea8cc4dbe7
              name: 'Logical disk {#VOLUMENAME} FS type'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.9.1.3.{#SNMPINDEX}'
              key: 'ld.fstype[{#VOLUMENAME}]'
              delay: 1h
              history: 30d
              trends: '0'
              value_type: TEXT
              tags:
                -
                  tag: Application
                  value: 'Logical Disks'
            -
              uuid: 6ea25e00ee444c80825e4ff8e69331f6
              name: 'Logical disk {#VOLUMENAME} free percent'
              type: CALCULATED
              key: 'ld.pfree[{#VOLUMENAME}]'
              history: 30d
              trends: 90d
              units: '%'
              params: '100*last(//ld.freespace[{#VOLUMENAME}])/last(//pd.size[{#VOLUMENAME}])'
              tags:
                -
                  tag: Application
                  value: 'Logical Disks'
              trigger_prototypes:
                -
                  uuid: 882be93fb1634efd94b205bb31640de8
                  expression: 'last(/WD My Cloud EX4100/ld.pfree[{#VOLUMENAME}])<25'
                  name: 'Logical Disk {#VOLUMENAME} free space less 25%'
                  priority: WARNING
            -
              uuid: 3ba39d0d5c804e169851fbfe1995bc1c
              name: 'Logical disk {#VOLUMENAME} RAID level'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.9.1.4.{#SNMPINDEX}'
              key: 'ld.raid[{#VOLUMENAME}]'
              delay: 1h
              history: 30d
              trends: '0'
              value_type: TEXT
              tags:
                -
                  tag: Application
                  value: 'Logical Disks'
            -
              uuid: 794d4027d2564f958fc906b89c9f7f43
              name: 'Logical disk {#VOLUMENAME} size'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.9.1.5.{#SNMPINDEX}'
              key: 'pd.size[{#VOLUMENAME}]'
              delay: 1h
              history: 30d
              trends: 90d
              units: B
              preprocessing:
                -
                  type: REGEX
                  parameters:
                    - '(\d{1,}).(\d{0,})([GT])'
                    - '\1.\2\3:G=\1.\2:T=\1\200'
                -
                  type: REGEX
                  parameters:
                    - '(G|T)(?=.*:\1=(\d{1,}))'
                    - \2
                -
                  type: MULTIPLIER
                  parameters:
                    - '1073741824'
              tags:
                -
                  tag: Application
                  value: 'Logical Disks'
        -
          uuid: ae5c20042e6c4ad5bd8346c3e1ae11bc
          name: 'Physical Disks'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},.1.3.6.1.4.1.5127.1.1.1.6.1.10.1.1]'
          key: pdDiscovery
          delay: 1h
          item_prototypes:
            -
              uuid: 6583bed987a94e90b09007fd6ffa46be
              name: 'Disk capacity in slot {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.10.1.6.{#SNMPINDEX}'
              key: 'pd.capacity[{#SNMPINDEX}]'
              delay: 1h
              history: 30d
              trends: 90d
              units: B
              preprocessing:
                -
                  type: RTRIM
                  parameters:
                    - ' GB.'
                -
                  type: MULTIPLIER
                  parameters:
                    - '1073741824'
              tags:
                -
                  tag: Application
                  value: 'Physical Disks'
            -
              uuid: 20c91c166c9b42c2b1362cf6014097ef
              name: 'Disk model in slot {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.10.1.3.{#SNMPINDEX}'
              key: 'pd.model[{#SNMPINDEX}]'
              delay: 1h
              history: 30d
              trends: '0'
              value_type: TEXT
              tags:
                -
                  tag: Application
                  value: 'Physical Disks'
            -
              uuid: 34fd8aa6ac344d36b9626de9444190c9
              name: 'Disk SN in slot {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.10.1.4.{#SNMPINDEX}'
              key: 'pd.SN[{#SNMPINDEX}]'
              delay: 1h
              history: 30d
              trends: '0'
              value_type: TEXT
              tags:
                -
                  tag: Application
                  value: 'Physical Disks'
            -
              uuid: ca6664c6cdb64e30ae29203ffee34f9d
              name: 'Disk temperature in slot {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.10.1.5.{#SNMPINDEX}'
              key: 'pd.temperature[{#SNMPINDEX}]'
              history: 30d
              trends: 90d
              preprocessing:
                -
                  type: LTRIM
                  parameters:
                    - 'Centigrade:'
              tags:
                -
                  tag: Application
                  value: 'Physical Disks'
              trigger_prototypes:
                -
                  uuid: a08e01ee660644b1b107d009c88eebd4
                  expression: 'avg(/WD My Cloud EX4100/pd.temperature[{#SNMPINDEX}],#5)>55'
                  name: 'Physical disk {#SNMPINDEX} temperature'
                  priority: WARNING
            -
              uuid: f871a9da969f4b7ebaaf47ed631aec81
              name: 'Disk vendor in slot {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.10.1.2.{#SNMPINDEX}'
              key: 'pd.Vendor[{#SNMPINDEX}]'
              delay: 1h
              history: 30d
              trends: '0'
              value_type: TEXT
              tags:
                -
                  tag: Application
                  value: 'Physical Disks'
        -
          uuid: 667fe2eec53f47f8becaeada5b00dc90
          name: UPSs
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},.1.3.6.1.4.1.5127.1.1.1.6.1.11.1.1]'
          key: upsDiscovery
          delay: 1h
          item_prototypes:
            -
              uuid: db896149077441a7a848f67145eb61e3
              name: 'UPS No{#SNMPINDEX} Battery Charge'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.11.1.5.{#SNMPINDEX}'
              key: 'upsBattery[{#SNMPINDEX}]'
              history: 30d
              trends: 90d
              value_type: FLOAT
              units: '%'
              preprocessing:
                -
                  type: RTRIM
                  parameters:
                    - ' %'
              tags:
                -
                  tag: Application
                  value: UPS
              trigger_prototypes:
                -
                  uuid: fa51548808e8462a8821914ad5b2bc54
                  expression: 'last(/WD My Cloud EX4100/upsBattery[{#SNMPINDEX}])<25'
                  name: 'Battery Charge Critical'
                  priority: HIGH
                -
                  uuid: 303c2edd0834463eba7a1edc0d523b20
                  expression: 'last(/WD My Cloud EX4100/upsBattery[{#SNMPINDEX}])<50'
                  name: 'Battery Charge Low'
                  priority: AVERAGE
            -
              uuid: d7960b555e314dc0b2350106c0e16739
              name: 'UPS No{#SNMPINDEX} Manufacturer'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.11.1.3.{#SNMPINDEX}'
              key: 'upsManufacturer[{#SNMPINDEX}]'
              delay: 1h
              history: 30d
              trends: '0'
              value_type: TEXT
              tags:
                -
                  tag: Application
                  value: UPS
            -
              uuid: a683dba23ebf45038ffd5cb80854992e
              name: 'UPS No{#SNMPINDEX} Mode'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.11.1.2.{#SNMPINDEX}'
              key: 'upsMode[{#SNMPINDEX}]'
              delay: 1h
              history: 30d
              trends: '0'
              value_type: TEXT
              tags:
                -
                  tag: Application
                  value: UPS
            -
              uuid: 91709a1b82424c57ac2c56c3b0ed02cb
              name: 'UPS No{#SNMPINDEX} Product'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.11.1.4.{#SNMPINDEX}'
              key: 'upsProduct[{#SNMPINDEX}]'
              delay: 1h
              history: 30d
              trends: '0'
              value_type: TEXT
              tags:
                -
                  tag: Application
                  value: UPS
            -
              uuid: 5a9824b663ab4c9f8d7d4280f25a0f35
              name: 'UPS No{#SNMPINDEX} Status'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.5127.1.1.1.6.1.11.1.6.{#SNMPINDEX}'
              key: 'upsStatus[{#SNMPINDEX}]'
              history: 30d
              trends: '0'
              value_type: TEXT
              tags:
                -
                  tag: Application
                  value: UPS
              trigger_prototypes:
                -
                  uuid: 72c083a8ae46429cbd661635ac5851aa
                  expression: 'find(/WD My Cloud EX4100/upsStatus[{#SNMPINDEX}],#3,"regexp","On Line")=0'
                  name: 'Battery Status'
                  priority: WARNING
      valuemaps:
        -
          uuid: aa2aac9302f8452180aa4727e800f441
          name: 'WD My Cloud EX4100 FTP Server'
          mappings:
            -
              value: '0'
              newvalue: disabled
            -
              value: '1'
              newvalue: enabled
        -
          uuid: d677addc819a4d8289173f5b571677ea
          name: 'WD My Cloud EX4100 Net Type'
          mappings:
            -
              value: '0'
              newvalue: Workgroup
            -
              value: '1'
              newvalue: 'Active Directory'
