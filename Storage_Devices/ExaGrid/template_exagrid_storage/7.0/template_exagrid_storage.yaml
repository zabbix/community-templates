zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 3cf5100cc6404054828b19e29f24e37c
      name: EXAGRID
  templates:
    - uuid: e7c9c06cc14e4d3ba296c974e120a640
      template: Templete_Exagrid_Storage
      name: Templete_Exagrid_Storage
      description: |
        Advanced SNMP monitoring for ExaGrid Tiered Backup Storage. 
        Tracks core storage (Landing/Retention), hardware health, LLD network interfaces, system performance (CPU/RAM), and security/anomaly indicators.
      groups:
        - name: EXAGRID
      items:
        # --- SYSTEM & HARDWARE ---
        - uuid: f332c9ba950645ce8cb8c1e45903bfa8
          name: 'System: Hostname'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.5.0
          key: system.hostname
          delay: 1h
          value_type: CHAR
          tags:
            - tag: component
              value: system
        - uuid: b873a4d642824b06960d70ea7a8b6680
          name: 'System: Uptime'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.3.0
          key: system.uptime
          delay: 5m
          units: uptime
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: c9db2a847c9f4427a48e7a37f06ffe9e
          name: 'ExaGrid: System status'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.14941.4.6.1.0
          key: exagrid.system.status
          delay: 3m
          valuemap:
            name: 'ExaGrid System Status'
          tags:
            - tag: component
              value: hardware
            - tag: component
              value: health
              
        # --- EXAGRID STORAGE ---
        - uuid: 0844db487e034aa581ec695ba9716001
          name: 'ExaGrid: Pending deduplication data'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.14941.4.4.1.0
          key: exagrid.dedup.pending
          delay: 5m
          units: B
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1073741824'
          tags:
            - tag: component
              value: storage
        - uuid: 5b80c39b936f412cb3137d9643c06972
          name: 'ExaGrid: Landing Zone configured space'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.14941.4.1.1.0
          key: exagrid.landingspace.configured
          delay: 1h
          units: B
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1073741824'
          tags:
            - tag: component
              value: storage
        - uuid: 9e894cddc9164dc5b33733ae59ecad0e
          name: 'ExaGrid: Landing Zone free space'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.14941.4.1.3.0
          key: exagrid.landingspace.free
          delay: 5m
          units: B
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1073741824'
          tags:
            - tag: component
              value: storage
        - uuid: 54fe8caf5fcb4b26a2964db7868f5ba1
          name: 'ExaGrid: Landing Zone saved space (Logical)'
          type: CALCULATED
          key: exagrid.landingspace.used
          delay: 5m
          units: B
          params: 'last(//exagrid.landingspace.free) - last(//exagrid.landingspace.configured)'
          tags:
            - tag: component
              value: storage
        - uuid: 2b62dc8b724741598f14d73e704d4b26
          name: 'ExaGrid: Retention configured space'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.14941.4.2.1.0
          key: exagrid.retention.configured
          delay: 1h
          units: B
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1073741824'
          tags:
            - tag: component
              value: storage
        - uuid: f2c8462dc7e2482a9c129b4e07dcf0c8
          name: 'ExaGrid: Retention free space'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.14941.4.2.3.0
          key: exagrid.retention.free
          delay: 5m
          units: B
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1073741824'
          tags:
            - tag: component
              value: storage
        - uuid: 894c7efa86a5477f9111ad4251f94f5a
          name: 'ExaGrid: Retention used space'
          type: CALCULATED
          key: exagrid.retention.used
          delay: 5m
          units: B
          params: 'last(//exagrid.retention.configured) - last(//exagrid.retention.free)'
          tags:
            - tag: component
              value: storage
              
        # --- PERFORMANCE (CPU, RAM, LOAD) ---
        - uuid: 1111111111114111a111111111111111
          name: 'System: Total Memory (RAM)'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2021.4.5.0
          key: system.ram.total
          delay: 1h
          units: B
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
        - uuid: 2222222222224222a222222222222222
          name: 'System: Free Memory (RAM)'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2021.4.6.0
          key: system.ram.free
          delay: 3m
          units: B
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: component
              value: memory
        - uuid: 3333333333334333a333333333333333
          name: 'System: CPU Idle'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2021.11.11.0
          key: system.cpu.idle
          delay: 1m
          units: '%'
          tags:
            - tag: component
              value: cpu
        - uuid: 4444444444444444a444444444444444
          name: 'System: CPU Utilization'
          type: CALCULATED
          key: system.cpu.utilization
          delay: 1m
          units: '%'
          value_type: FLOAT
          params: '100 - last(//system.cpu.idle)'
          tags:
            - tag: component
              value: cpu
        - uuid: 8888888888884888a888888888888888
          name: 'System: Load Average (1m)'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2021.10.1.5.1
          key: system.cpu.load1
          delay: 3m
          value_type: FLOAT
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: cpu

        # --- SECURITY & ANOMALY DETECTION ---
        - uuid: 5555555555554555a555555555555555
          name: 'Security: Logged in Users'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.25.1.5.0
          key: system.users.logged
          delay: 5m
          tags:
            - tag: component
              value: security
        - uuid: 6666666666664666a666666666666666
          name: 'Security: Total Running Processes'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.25.1.6.0
          key: system.processes.total
          delay: 5m
          tags:
            - tag: component
              value: security
        - uuid: 7777777777774777a777777777777777
          name: 'Security: Established TCP Connections'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.6.9.0
          key: net.tcp.established
          delay: 3m
          tags:
            - tag: component
              value: security

      # --- LLD NETWORK DISCOVERY ---
      discovery_rules:
        - uuid: a187fc8d5f3044a88f72a7281f6eb293
          name: 'Network Interfaces Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFNAME},1.3.6.1.2.1.2.2.1.2]'
          key: net.if.discovery
          delay: 1h
          item_prototypes:
            - uuid: d1ab19cb1e194a2893d7c30084f7071f
              name: 'Interface {#IFNAME}: Bits received'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.10.{#SNMPINDEX}'
              key: 'net.if.in[{#IFNAME}]'
              delay: 3m
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: e52e46351d3b4e72a4f6d4d1e2e13204
              name: 'Interface {#IFNAME}: Bits sent'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.16.{#SNMPINDEX}'
              key: 'net.if.out[{#IFNAME}]'
              delay: 3m
              units: bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
      tags:
        - tag: Devices
          value: storage
      valuemaps:
        - uuid: 081b3c44568f44eb911541ede9d1be30
          name: 'ExaGrid System Status'
          mappings:
            - value: '1'
              newvalue: OK
            - value: '2'
              newvalue: Warning
            - value: '3'
              newvalue: Error

  # --- ALERTS & TRIGGERS ---
  triggers:
    - uuid: 550e8400e29b41d4a716446655440000
      expression: 'last(/Templete_Exagrid_Storage/exagrid.system.status)=2'
      name: '{HOST.NAME}: System status is in Warning state'
      priority: WARNING
      description: 'The ExaGrid appliance has detected an internal warning. Check the console.'
      tags:
        - tag: scope
          value: health
    - uuid: 123e4567e89b42d3a456426614174000
      expression: 'last(/Templete_Exagrid_Storage/exagrid.system.status)=3'
      name: '{HOST.NAME}: System status is in Error state'
      priority: HIGH
      description: 'The ExaGrid appliance reported a critical hardware or system failure.'
      tags:
        - tag: scope
          value: health
    - uuid: 9999999999994999a999999999999999
      expression: 'last(/Templete_Exagrid_Storage/system.users.logged)>0'
      name: '{HOST.NAME}: Security Warning - Active SSH/Console session detected'
      priority: WARNING
      description: 'An active user session was detected on the backup appliance. Verify if an authorized team member is performing maintenance.'
      tags:
        - tag: scope
          value: security
