zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: f107640fe4fa4d1db0ddf6d307b7ae9f
    name: Appliances
  - uuid: 7df96b18c230490a9a0a9e2307226338
    name: Templates
  templates:
  - uuid: c262c003327142c5a522075b3a310c54
    template: DELL POWERVAULT ME5012
    name: DELL POWERVAULT ME5012
    description: Dell EMC PowerVault ME5012 template for Zabbix 7.0. Uses numeric FC-MGMT-MIB OIDs only and dependent SNMP
      walk LLD. It avoids static connUnit indexes such as 0.0.0.0... or a single array-specific 32.128... index. For Dell
      ME50xx arrays set SNMP interface Max repetitions to 1 if SNMP walk/discovery returns No values received. Sensor status
      OID .1.3.6.1.3.94.1.8.1.4 is intentionally not used because ME5012 may timeout on it; overall health is parsed
      from connUnitSensorMessage.
    groups:
    - name: Appliances
    - name: Templates
    items:
    - name: 'ICMP: Ping'
      type: SIMPLE
      key: icmpping
      delay: 1m
      history: 7d
      triggers:
      - uuid: f075941d250948f2b7200100f77da202
        expression: max(/DELL POWERVAULT ME5012/icmpping,5m)=0
        name: 'Dell ME5012: Host is unavailable by ICMP'
        priority: HIGH
      uuid: 6541ca66517141c695eeb0c439aac499
    - name: System description
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.2.1.1.1.0
      key: system.descr
      delay: 1h
      history: 14d
      value_type: TEXT
      trends: '0'
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      uuid: 50242147fbc542f5ab9ef5e740413ba7
    - name: System name
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.2.1.1.5.0
      key: system.name
      delay: 1h
      history: 14d
      value_type: CHAR
      trends: '0'
      preprocessing:
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1d
      uuid: 9ea2fbf2afc945908125f1b712bc300a
    - name: System uptime
      type: SNMP_AGENT
      snmp_oid: .1.3.6.1.2.1.1.3.0
      key: system.uptime
      delay: 1m
      history: 30d
      trends: 90d
      units: uptime
      preprocessing:
      - type: MULTIPLIER
        parameters:
        - '0.01'
      triggers:
      - uuid: 52b64aa348684a5cb88eda4fd6d866df
        expression: last(/DELL POWERVAULT ME5012/system.uptime)<10m
        name: 'Dell ME5012: Device has been restarted'
        priority: INFO
        manual_close: 'YES'
      uuid: acccc176f7684d4ebbc433b520a2bd71
    - name: SNMP walk sensor table
      type: SNMP_AGENT
      snmp_oid: walk[.1.3.6.1.3.94.1.8.1.6]
      key: dell.me.sensor.walk
      delay: 5m
      history: '0'
      value_type: TEXT
      trends: '0'
      description: Walks only connUnitSensorMessage table. Dell ME5012 may timeout when connUnitSensorStatus (.1.3.6.1.3.94.1.8.1.4)
        is included.
      tags:
      - tag: component
        value: raw
      uuid: 9e0387a828e24a4eb9b1a65293d3996c
    - name: SNMP walk storage unit table
      type: SNMP_AGENT
      snmp_oid: walk[.1.3.6.1.3.94.1.6.1.20,.1.3.6.1.3.94.1.6.1.7,.1.3.6.1.3.94.1.6.1.8,.1.3.6.1.3.94.1.6.1.6]
      key: dell.me.connunit.walk
      delay: 1h
      history: '0'
      value_type: TEXT
      trends: '0'
      description: Master SNMP walk for connUnit name/model/serial/status.
      tags:
      - tag: component
        value: raw
      uuid: 9689b0cd85744299b6473f7aeb7c32a4
    - name: SNMP walk host port table
      type: SNMP_AGENT
      snmp_oid: walk[.1.3.6.1.3.94.1.10.1.17,.1.3.6.1.3.94.1.10.1.7,.1.3.6.1.3.94.1.10.1.3]
      key: dell.me.hostport.walk
      delay: 15m
      history: '0'
      value_type: TEXT
      trends: '0'
      description: Master SNMP walk for host port name/status/type.
      tags:
      - tag: component
        value: raw
      uuid: 651ff370c80645669e805d696ff1268f
    discovery_rules:
    - uuid: 976b406ddf6f410ea44ff64b1a6ec0b5
      name: 'Sensors: temperature discovery'
      type: DEPENDENT
      key: dell.me.sensor.temperature.discovery
      delay: '0'
      master_item:
        key: dell.me.sensor.walk
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var out = [];\nvar lines = value.split(/\\r?\\n/);\nvar base = '.1.3.6.1.3.94.1.8.1.6';\n\nfor (var i = 0; i <\
          \ lines.length; i++) {\n    var line = lines[i].replace(/^\\s+|\\s+$/g, '');\n    if (!line) {\n        continue;\n\
          \    }\n\n    // Expected examples:\n    // .1.3.6.1.3.94.1.8.1.6.<index> = STRING: \"CPU Temperature-Ctlr B: 62\
          \ C 143.60F\"\n    // .1.3.6.1.3.94.1.8.1.6.<index> = \"CPU Temperature-Ctlr B: 62 C 143.60F\"\n    var m = line.match(/^(?:\\\
          .1\\.3\\.6\\.1\\.3\\.94\\.1\\.8\\.1\\.6|(?:SNMPv2-SMI::)?experimental\\.94\\.1\\.8\\.1\\.6)\\.(\\S+)\\s*=\\s*(.*)$/);\n\
          \    if (!m) {\n        continue;\n    }\n\n    var idx = m[1];\n    var raw = m[2];\n    raw = raw.replace(/^[A-Za-z0-9_-]+:\\\
          s*/, '');\n    raw = raw.replace(/^\"|\"$/g, '');\n    raw = raw.replace(/^\\s+|\\s+$/g, '');\n\n    var name =\
          \ raw;\n    name = name.replace(/:\\s*[+-]?\\d+(?:\\.\\d+)?\\s*C\\b.*$/i, '');\n    name = name.replace(/:\\s*[+-]?\\\
          d+(?:\\.\\d+)?\\s*V\\b.*$/i, '');\n    name = name.replace(/:\\s*[+-]?\\d+(?:\\.\\d+)?\\s*A\\b.*$/i, '');\n    name\
          \ = name.replace(/:\\s*[+-]?\\d+(?:\\.\\d+)?\\s*%.*$/i, '');\n    name = name.replace(/:\\s*[+-]?\\d+(?:\\.\\d+)?\\\
          s*Farads.*$/i, '');\n    name = name.replace(/:\\s*[+-]?\\d+(?:\\.\\d+)?\\s*Ohms.*$/i, '');\n    name = name.replace(/:\\\
          s*OK\\s*$/i, '');\n    name = name.replace(/^\\s+|\\s+$/g, '');\n\n    out.push({\n        '{#SNMPINDEX}': idx,\n\
          \        '{#SENSOR_RAW}': raw,\n        '{#SENSOR_NAME}': name || raw || idx\n    });\n}\n\nreturn JSON.stringify({'data':\
          \ out});"
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      item_prototypes:
      - uuid: 4ff0e86fb0f84bb89117f0783d92be50
        name: '{#SENSOR_NAME}: temperature'
        type: DEPENDENT
        key: dell.me.sensor.temp[{#SNMPINDEX}]
        delay: '0'
        history: 30d
        trends: 90d
        master_item:
          key: dell.me.sensor.walk
        value_type: FLOAT
        units: °C
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - .1.3.6.1.3.94.1.8.1.6.{#SNMPINDEX}
          - '0'
        - type: REGEX
          parameters:
          - '.*: ([+-]?[0-9]+(?:\.[0-9]+)?)\s*C\b.*'
          - \1
        trigger_prototypes:
        - uuid: fb53f384a1504e5e86abb5c0de7c55cc
          expression: last(/DELL POWERVAULT ME5012/dell.me.sensor.temp[{#SNMPINDEX}])>{$DELL.ME.TEMP.HIGH}
          name: 'Dell ME5012: {#SENSOR_NAME} temperature is high'
          opdata: 'Current temperature: {ITEM.LASTVALUE1}'
          priority: HIGH
        - uuid: 57367a8302724125865d67c76b5b6a41
          expression: last(/DELL POWERVAULT ME5012/dell.me.sensor.temp[{#SNMPINDEX}])>{$DELL.ME.TEMP.WARN}
          name: 'Dell ME5012: {#SENSOR_NAME} temperature is warning'
          opdata: 'Current temperature: {ITEM.LASTVALUE1}'
          priority: WARNING
          dependencies:
          - name: 'Dell ME5012: {#SENSOR_NAME} temperature is high'
            expression: last(/DELL POWERVAULT ME5012/dell.me.sensor.temp[{#SNMPINDEX}])>{$DELL.ME.TEMP.HIGH}
      filter:
        evaltype: AND
        conditions:
        - macro: '{#SENSOR_NAME}'
          value: .*[Tt]emperature.*
          formulaid: A
          operator: MATCHES_REGEX
    - uuid: 0af92490ef7942ed9a61940acf897250
