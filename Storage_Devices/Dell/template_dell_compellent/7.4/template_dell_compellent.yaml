zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 7c2cb727f85b492d88cd56e17127c64d
      name: 'Templates/NAS & SAN'
  templates:
    - uuid: fa33e52adb534f5dae802d86d80839ca
      template: 'Dell Compellent by SNMP'
      name: 'Dell Compellent by SNMP'
      description: |
        This template uses the COMPELLENT-MIB to discover and manage COMPELLENT storage arrays (such as the SC5020) in Zabbix 6.0.
        
        This template was tested for Zabbix 6.0 and higher. This template was tested for DELL SC5020.
        
        License This template is distributed under the terms of the GNU General Public License as published by the Free Software Foundation; either version 2 of the License, or (at your option) any later version.
        
        Source : https://github.com/lnwupan/Dell-Compellent-Zabbix-6.0-Template
      groups:
        - name: 'Templates/NAS & SAN'
      items:
        - uuid: c6ea6c37db5547d78d0cb5beab9d4c77
          name: 'Device reachability using ICMP'
          type: SIMPLE
          key: icmpping
          delay: '60'
          history: 7d
          units: ms
          valuemap:
            name: 'Host status'
          tags:
            - tag: Application
              value: Information(s)
          triggers:
            - uuid: 35c8d8864cc0468f9ebd43db124a6388
              expression: 'last(/Dell Compellent by SNMP/icmpping)=0'
              name: '{HOST.NAME} is UNREACHABLE or DOWN'
              priority: DISASTER
        - uuid: 7d6e5916282b4632872f9197742c8704
          name: 'Device packet loss'
          type: SIMPLE
          key: icmppingloss
          delay: '60'
          history: 7d
          units: '%'
          tags:
            - tag: Application
              value: Information(s)
        - uuid: bd5b3447651d4a389e66ebd7aaadef6c
          name: 'Device software version'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.16139.2.7.0
          key: productIDBuildNumber
          delay: '3600'
          history: 7d
          value_type: CHAR
          inventory_link: OS
          tags:
            - tag: Application
              value: Information(s)
        - uuid: 37fb6f62db274fc5a5a013179ae99031
          name: 'Device model name'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.16139.2.1.0
          key: productIDDisplayName
          delay: '3600'
          history: 7d
          value_type: CHAR
          inventory_link: TYPE
          tags:
            - tag: Application
              value: Information(s)
        - uuid: 0ce5262c5b2742729da00d57c4203b07
          name: 'Device global status'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.16139.2.6.0
          key: productIDGlobalStatus
          delay: '300'
          history: 7d
          valuemap:
            name: scProductIDGlobalStatus
          tags:
            - tag: Application
              value: Information(s)
          triggers:
            - uuid: 25ee54dfbc774161a8b94d5ec1fd3536
              expression: 'last(/Dell Compellent by SNMP/productIDGlobalStatus)<3'
              name: 'Global status of {HOST.NAME} is abnormal'
              priority: AVERAGE
            - uuid: 5c8575cccd73460c9e3f487bb33c0c68
              expression: 'last(/Dell Compellent by SNMP/productIDGlobalStatus)=5'
              name: 'Global status of {HOST.NAME} is critical'
              priority: HIGH
            - uuid: 243e534e091c4a88a4393ab0915024f8
              expression: 'last(/Dell Compellent by SNMP/productIDGlobalStatus)=4'
              name: 'Global status of {HOST.NAME} is noncritical'
              priority: INFO
            - uuid: 760496fde95240b8a056082bcf0a3234
              expression: 'last(/Dell Compellent by SNMP/productIDGlobalStatus)=6'
              name: 'Global status of {HOST.NAME} is nonrecoverable'
              priority: DISASTER
        - uuid: 3457c07d6b1744efa3df44018d29b9ad
          name: 'Device management URL'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.16139.2.8.0
          key: productIDURL
          delay: '3600'
          history: 7d
          value_type: CHAR
          inventory_link: URL_A
          tags:
            - tag: Application
              value: Information(s)
        - uuid: 35c42d4cc4bc46b69485cda28f8921a0
          name: 'Device serial number'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.16139.2.10.0
          key: scIndex
          delay: '3600'
          history: 7d
          value_type: CHAR
          inventory_link: SERIALNO_A
          tags:
            - tag: Application
              value: Information(s)
        - uuid: 752f8ab8989a4aff9ccbce0dd106c47e
          name: Contact
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.4.0
          key: sysContact
          delay: '3600'
          history: 7d
          value_type: CHAR
          inventory_link: CONTACT
          tags:
            - tag: Application
              value: Information(s)
        - uuid: 82231e1f7bde4289bcc2097e5b6ebf01
          name: 'Device location'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.6.0
          key: sysLocation
          delay: '3600'
          history: 7d
          value_type: CHAR
          inventory_link: LOCATION
          tags:
            - tag: Application
              value: Information(s)
        - uuid: aa63b2bfce56485d8ea02d76b6790245
          name: 'Device name'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.5.0
          key: sysName
          delay: '3600'
          history: 7d
          value_type: CHAR
          inventory_link: NAME
          tags:
            - tag: Application
              value: Information(s)
          triggers:
            - uuid: 6b451633e2274fbaa595dee09059f57a
              expression: '(last(/Dell Compellent by SNMP/sysName,#1)<>last(/Dell Compellent by SNMP/sysName,#2))>0'
              name: '{HOST.NAME} name has changed'
              priority: INFO
        - uuid: fe13b1776efc437c985783ca1d934788
          name: Uptime
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.3.0
          key: sysUpTime
          delay: '300'
          history: 7d
          units: uptime
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: Application
              value: Information(s)
          triggers:
            - uuid: dfcbd55f1736444891735d4c3b1dce50
              expression: 'change(/Dell Compellent by SNMP/sysUpTime)<0'
              name: '{HOST.NAME} has just been restarted'
              priority: HIGH
      discovery_rules:
        - uuid: a640273f1e3d414d9dfce9966578abef
          name: Fan(s)
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},.1.3.6.1.4.1.16139.2.16.1.4]'
          key: scCtlrFanName
          delay: '3600'
          lifetime: 1d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 77203386300d4e64b897a06481c9662f
              name: 'Status of "$1" in Controller 1 {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.674.11000.2000.500.1.2.16.1.3.{#SNMPINDEX}'
              key: 'scCtlrFanStatus1[{#SNMPVALUE},{#SNMPINDEX}]'
              delay: '905'
              history: 30d
              trends: 180d
              valuemap:
                name: scScStatus
              tags:
                - tag: Application
                  value: Fan(s)
              trigger_prototypes:
                - uuid: cd8e50f669c34624a3152a0ca0708c6a
                  expression: 'last(/Dell Compellent by SNMP/scCtlrFanStatus1[{#SNMPVALUE},{#SNMPINDEX}])=3'
                  name: 'STATUS {#SNMPVALUE} CONTROLLER 1 IS DEGRADED'
                  priority: WARNING
                - uuid: 68b23201b85543c19b7d18186b2ae6d2
                  expression: 'last(/Dell Compellent by SNMP/scCtlrFanStatus1[{#SNMPVALUE},{#SNMPINDEX}])=2'
                  name: 'STATUS {#SNMPVALUE} CONTROLLER 1 IS DOWN'
                  priority: DISASTER
            - uuid: 0e66cf8822d44d69a5358dd65e0a0a3c
              name: 'Status of "$1" in Controller 2 {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.674.11000.2000.500.1.2.16.1.3.{#SNMPINDEX}'
              key: 'scCtlrFanStatus2[{#SNMPVALUE},{#SNMPINDEX}]'
              delay: '910'
              history: 30d
              trends: 180d
              valuemap:
                name: scScStatus
              tags:
                - tag: Application
                  value: Fan(s)
              trigger_prototypes:
                - uuid: 51ba2128ee1b4318acef240a40386175
                  expression: 'last(/Dell Compellent by SNMP/scCtlrFanStatus2[{#SNMPVALUE},{#SNMPINDEX}])=3'
                  name: 'STATUS {#SNMPVALUE} CONTROLLER 2 IS DEGRADED'
                  priority: WARNING
                - uuid: 03ec56cd50514e25bf9c560167d0371b
                  expression: 'last(/Dell Compellent by SNMP/scCtlrFanStatus2[{#SNMPVALUE},{#SNMPINDEX}])=2'
                  name: 'STATUS {#SNMPVALUE} CONTROLLER 2 IS DOWN'
                  priority: DISASTER
        - uuid: a00e64575f9440ef8984fac7cf53e553
          name: Power(s)
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},.1.3.6.1.4.1.16139.2.17.1.4]'
          key: scCtlrPowerName
          delay: '3600'
          lifetime: 1d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 5ce3e2d395d540c98514f25d7e9ca487
              name: 'Status of "$1" in Controller 1 {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.674.11000.2000.500.1.2.17.1.3.{#SNMPINDEX}'
              key: 'scCtlrPowerStatus1[{#SNMPVALUE},{#SNMPINDEX}]'
              delay: '935'
              history: 30d
              trends: 180d
              valuemap:
                name: scScStatus
              tags:
                - tag: Application
                  value: Power(s)
              trigger_prototypes:
                - uuid: feec8528246a4294943e6e02082a8e08
                  expression: 'last(/Dell Compellent by SNMP/scCtlrPowerStatus1[{#SNMPVALUE},{#SNMPINDEX}])=3'
                  name: 'STATUS {#SNMPVALUE} CONTROLLER 1 IS DEGRADED'
                  priority: WARNING
                - uuid: 00497d6a3a564eb5a340e9d753708ed8
                  expression: 'last(/Dell Compellent by SNMP/scCtlrPowerStatus1[{#SNMPVALUE},{#SNMPINDEX}])=2'
                  name: 'STATUS {#SNMPVALUE} CONTROLLER 1 IS DOWN'
                  priority: DISASTER
            - uuid: e24e1119e0434d2080391a3becfde308
              name: 'Status of "$1" in Controller 2 {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.674.11000.2000.500.1.2.17.1.3.{#SNMPINDEX}'
              key: 'scCtlrPowerStatus2[{#SNMPVALUE},{#SNMPINDEX}]'
              delay: '945'
              history: 30d
              trends: 180d
              valuemap:
                name: scScStatus
              tags:
                - tag: Application
                  value: Power(s)
              trigger_prototypes:
                - uuid: aac01aef56134471a0a27f84cf360e02
                  expression: 'last(/Dell Compellent by SNMP/scCtlrPowerStatus2[{#SNMPVALUE},{#SNMPINDEX}])=3'
                  name: 'STATUS {#SNMPVALUE} CONTROLLER 2 IS DEGRADED'
                  priority: WARNING
                - uuid: 6667c687a8ce40bab6293ed591ce69fe
                  expression: 'last(/Dell Compellent by SNMP/scCtlrPowerStatus2[{#SNMPVALUE},{#SNMPINDEX}])=2'
                  name: 'STATUS {#SNMPVALUE} CONTROLLER 2 IS DOWN'
                  priority: DISASTER
        - uuid: bba8b307430e4644a67b838334c33633
          name: Temperature(s)
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},.1.3.6.1.4.1.16139.2.19.1.4]'
          key: scCtlrTempName
          delay: '3600'
          lifetime: 1d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 27ff4c64274a4c25a6c7251b8b2b1787
              name: 'Temp of Sensor "{#SNMPVALUE}" in Controller 1 {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.674.11000.2000.500.1.2.19.1.5.{#SNMPINDEX}'
              key: 'scCtlrTempCurrentC1[{#SNMPVALUE},{#SNMPINDEX}]'
              delay: '308'
              history: 30d
              trends: 180d
              units: C
              tags:
                - tag: Application
                  value: Temperature(s)
              trigger_prototypes:
                - uuid: 1f101ab56022454bba451cdfde16ab1a
                  expression: 'last(/Dell Compellent by SNMP/scCtlrTempCurrentC1[{#SNMPVALUE},{#SNMPINDEX}])>65'
                  name: 'TEMPERATURE SENSOR {#SNMPVALUE} CONTROLLER 1 > $1'
                  priority: HIGH
            - uuid: e5da2aecaee043099111f165d9fd1cbd
              name: 'Temp of Sensor "{#SNMPVALUE}" in Controller 2 {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.674.11000.2000.500.1.2.19.1.5.{#SNMPINDEX}'
              key: 'scCtlrTempCurrentC2[{#SNMPVALUE},{#SNMPINDEX}]'
              delay: '309'
              history: 30d
              trends: 180d
              units: C
              tags:
                - tag: Application
                  value: Temperature(s)
              trigger_prototypes:
                - uuid: a578bd466bc34436a7fc57cd1f91dbd4
                  expression: 'last(/Dell Compellent by SNMP/scCtlrTempCurrentC2[{#SNMPVALUE},{#SNMPINDEX}])>65'
                  name: 'TEMPERATURE SENSOR {#SNMPVALUE} CONTROLLER 2 > $1'
                  priority: HIGH
            - uuid: 351d48ad12054b0b9682ace19fedd255
              name: 'Status of Sensor "{#SNMPVALUE}" in Controller 1 {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.674.11000.2000.500.1.2.19.1.3.{#SNMPINDEX}'
              key: 'scCtlrTempStatus1[{#SNMPVALUE},{#SNMPINDEX}]'
              delay: '306'
              history: 30d
              trends: 180d
              valuemap:
                name: scScStatus
              tags:
                - tag: Application
                  value: Temperature(s)
              trigger_prototypes:
                - uuid: a8f780fd22dc4144b0c8ef246aa936fe
                  expression: 'last(/Dell Compellent by SNMP/scCtlrTempStatus1[{#SNMPVALUE},{#SNMPINDEX}])=3'
                  name: 'STATUS SENSOR {#SNMPVALUE} CONTROLLER 1 IS DEGRADED'
                  priority: WARNING
                - uuid: e54c1688ca0b4d09acf36c63f5570902
                  expression: 'last(/Dell Compellent by SNMP/scCtlrTempStatus1[{#SNMPVALUE},{#SNMPINDEX}])=2'
                  name: 'STATUS SENSOR {#SNMPVALUE} CONTROLLER 1 IS DOWN'
                  priority: DISASTER
            - uuid: ee6471c1a5684b16929cd3adb5eae729
              name: 'Status of Sensor "{#SNMPVALUE}" in Controller 2 {#SNMPINDEX}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.674.11000.2000.500.1.2.19.1.3.{#SNMPINDEX}'
              key: 'scCtlrTempStatus2[{#SNMPVALUE},{#SNMPINDEX}]'
              delay: '307'
              history: 30d
              trends: 180d
              valuemap:
                name: scScStatus
              tags:
                - tag: Application
                  value: Temperature(s)
              trigger_prototypes:
                - uuid: 1b5fc3a4c5724559a4e872e50c27fff1
                  expression: 'last(/Dell Compellent by SNMP/scCtlrTempStatus2[{#SNMPVALUE},{#SNMPINDEX}])=3'
                  name: 'STATUS SENSOR {#SNMPVALUE} CONTROLLER 2 IS DEGRADED'
                  priority: WARNING
                - uuid: 3683fd71ff9b44c6aa0184f32c4e8db5
                  expression: 'last(/Dell Compellent by SNMP/scCtlrTempStatus2[{#SNMPVALUE},{#SNMPINDEX}])=2'
                  name: 'STATUS SENSOR {#SNMPVALUE} CONTROLLER 2 IS DOWN'
                  priority: DISASTER
          graph_prototypes:
            - uuid: 9b95cfa033c74ba1abb134936787e931
              name: 'Temperature of Sensor "{#SNMPVALUE}" in Controller 1 {#SNMPINDEX}'
              graph_items:
                - color: DD0000
                  item:
                    host: 'Dell Compellent by SNMP'
                    key: 'scCtlrTempCurrentC1[{#SNMPVALUE},{#SNMPINDEX}]'
            - uuid: f3c551e0b0574fe2ab06dd2388a10a5b
              name: 'Temperature of Sensor "{#SNMPVALUE}" in Controller 2 {#SNMPINDEX}'
              graph_items:
                - color: DD0000
                  item:
                    host: 'Dell Compellent by SNMP'
                    key: 'scCtlrTempCurrentC2[{#SNMPVALUE},{#SNMPINDEX}]'
        - uuid: a9861d7a61464f56bd5a672ae0bf5451
          name: Controller(s)
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},.1.3.6.1.4.1.16139.2.13.1.4]'
          key: scCtrlName
          delay: '3600'
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 5b0773552403497496657756949f13e1
              name: '$1 IP address'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.16139.2.13.1.5.{#SNMPINDEX}'
              key: 'scCtrlIpAddr[{#SNMPVALUE}]'
              delay: '3600'
              history: 7d
              value_type: CHAR
              tags:
                - tag: Application
                  value: Controller(s)
            - uuid: d862faf6f4bd47c9bf63b74572811e35
              name: '$1 controller id'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.16139.2.13.1.2.{#SNMPINDEX}'
              key: 'scCtrlNbr[{#SNMPVALUE}]'
              delay: '3600'
              history: 7d
              tags:
                - tag: Application
                  value: Controller(s)
            - uuid: 11209cb43c6349bb985456599ad3efb8
              name: '$1 controller status'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.16139.2.13.1.3.{#SNMPINDEX}'
              key: 'scCtrlStatus[{#SNMPVALUE}]'
              delay: '300'
              history: 7d
              valuemap:
                name: scItemStatus
              tags:
                - tag: Application
                  value: Controller(s)
              trigger_prototypes:
                - uuid: a927cc5a9de3459fb98a290662ba2086
                  expression: 'last(/Dell Compellent by SNMP/scCtrlStatus[{#SNMPVALUE}])=3'
                  name: 'Controller {#SNMPVALUE} is degraded on {HOST.NAME}'
                  priority: AVERAGE
                - uuid: 459d0713703f43bcbf1b73622fb81a7e
                  expression: 'last(/Dell Compellent by SNMP/scCtrlStatus[{#SNMPVALUE}])=2'
                  name: 'Controller {#SNMPVALUE} is down on {HOST.NAME}'
                  priority: DISASTER
        - uuid: da3fb89dbd0842998286f8e829a627b2
          name: Disk(s)
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},.1.3.6.1.4.1.16139.2.14.1.2]'
          key: scDiskNbr
          delay: '3600'
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 38fb0cb9515c45d39b48f1dc0e9b8c55
              name: 'Disk $1 Model'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.16139.2.45.1.6.{#SNMPINDEX}'
              key: 'scDiskConfigModel[{#SNMPVALUE}]'
              delay: '3600'
              value_type: CHAR
              tags:
                - tag: Application
                  value: Disk(s)
            - uuid: 0e8d7de0b46f4816a96cf63084a196e6
              name: 'Health of Disk $1'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.16139.2.14.1.5.{#SNMPINDEX}'
              key: 'scDiskHealthy[{#SNMPVALUE}]'
              delay: '3600'
              history: 30d
              trends: 180d
              valuemap:
                name: scDiskHealthy
              tags:
                - tag: Application
                  value: Disk(s)
            - uuid: 77b274f74de0475f9a19cc7b787d9247
              name: 'ID for disk $1'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.16139.2.14.1.7.{#SNMPINDEX}'
              key: 'scDiskId[{#SNMPVALUE}]'
              delay: '300'
              history: 7d
              tags:
                - tag: Application
                  value: Disk(s)
            - uuid: 37fb2e75870a426ab463b30f62068d6e
              name: 'Type of Disk $1'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.16139.2.14.1.10.{#SNMPINDEX}'
              key: 'scDiskIoPortType[{#SNMPVALUE}]'
              delay: '3600'
              history: 30d
              trends: 180d
              valuemap:
                name: scDiskType
              tags:
                - tag: Application
                  value: Disk(s)
            - uuid: 840d8ef4217f4d89b71a418b7b91cd11
              name: 'Position for disk $1'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.16139.2.14.1.4.{#SNMPINDEX}'
              key: 'scDiskPosition[{#SNMPVALUE}]'
              delay: '3600'
              history: 7d
              value_type: CHAR
              tags:
                - tag: Application
                  value: Disk(s)
            - uuid: c2a2e429223c4d1c8e4759981cbeca22
              name: 'Size of Disk $1'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.16139.2.14.1.9.{#SNMPINDEX}'
              key: 'scDiskSize[{#SNMPVALUE},{#SNMPINDEX}]'
              delay: '3600'
              history: 30d
              trends: 180d
              units: B
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '1073741824'
              tags:
                - tag: Application
                  value: Disk(s)
            - uuid: 31a17f6e421640b6ab74003964748d34
              name: 'Status message for disk $1'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.16139.2.14.1.6.{#SNMPINDEX}'
              key: 'scDiskStatusMessage[{#SNMPVALUE}]'
              delay: '300'
              history: 7d
              value_type: CHAR
              tags:
                - tag: Application
                  value: Disk(s)
            - uuid: bb9f08998e47485fa2b29eebc3e0386a
              name: 'Status for disk $1'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.16139.2.14.1.3.{#SNMPINDEX}'
              key: 'scDiskStatus[{#SNMPVALUE}]'
              delay: '300'
              history: 7d
              valuemap:
                name: scItemStatus
              tags:
                - tag: Application
                  value: Disk(s)
          trigger_prototypes:
            - uuid: 90dccad3d84345c385a6bcccd8947920
              expression: 'last(/Dell Compellent by SNMP/scDiskStatus[{#SNMPVALUE}])=3 and last(/Dell Compellent by SNMP/scDiskId[{#SNMPVALUE}])>0 and last(/Dell Compellent by SNMP/scDiskPosition[{#SNMPVALUE}])<>0'
              name: 'Disk {#SNMPVALUE} ({ITEM.VALUE3} {ITEM.VALUE2}) is degraded  {HOST.NAME}'
              priority: AVERAGE
              description: |
                {ITEM.VALUE3} is position on Compellent
                {ITEM.VALUE2} is the disk number on Compellent (ApiIndex)
                {#SNMPVALUE} is unquie id on Compellent scDiskNbr
            - uuid: a2018323d3474b42b59bfed55c3cc18c
