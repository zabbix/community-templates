            - uuid: e6a0044db0844ccd8049c9359d6fc2f2
              name: 'Disk "{#DISK.NAME}": Temperature'
              type: DEPENDENT
              key: 'truenas.disk.temperature[{#DISK.NAME}]'
              value_type: FLOAT
              units: '!°C'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var diskName = "{#DISK.NAME}";
                      var temperatures = (((data.results || {}).disk_temperatures || {}).result) || {};
                      var temperature = temperatures[diskName];
                      
                      function getValue(entry) {
                          if (entry === null || entry === undefined) {
                              return "";
                          }
                      
                          if (typeof entry === "number" || typeof entry === "string") {
                              return entry;
                          }
                      
                          if (entry.temperature !== undefined) {
                              return entry.temperature;
                          }
                      
                          if (entry.current !== undefined) {
                              return entry.current;
                          }
                      
                          if (entry.value !== undefined) {
                              return entry.value;
                          }
                      
                          if (entry.rawvalue !== undefined) {
                              return entry.rawvalue;
                          }
                      
                          return "";
                      }
                      
                      return getValue(temperature);
              master_item:
                key: truenas.get
              tags:
