                              var dataset = findDataset(diskNames[i]);
                      
                              if (dataset !== null) {
                                  stats.used += Number(getProperty(dataset, "used") || 0);
                                  stats.available += Number(getProperty(dataset, "available") || 0);
                              }
                          }
                      
