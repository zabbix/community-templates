        - uuid: 20dca16430574cbfbd79e3086d0a2342
          name: 'TrueNAS: CPU temperature'
          type: DEPENDENT
          key: truenas.system.cpu.temperature
          value_type: FLOAT
          units: '!°C'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var result = (((data.results || {}).cpu_temperature || {}).result) || [];
                  var graphs = Array.isArray(result) ? result : [result];
                  
                  function toNumber(value) {
                      var number = Number(value);
                  
                      return isFinite(number) ? number : null;
                  }
                  
                  function maxValue(current, candidate) {
                      var number = toNumber(candidate);
                  
                      if (number === null || number <= 0) {
                          return current;
                      }
                  
                      return current === null || number > current ? number : current;
                  }
                  
                  function maxFromObject(object) {
                      if (!object || typeof object !== "object") {
                          return null;
                      }
                  
                      var maximum = null;
                  
                      for (var key in object) {
                          if (!Object.prototype.hasOwnProperty.call(object, key)) {
                              continue;
                          }
                  
                          var lowerKey = key.toLowerCase();
                  
                          if (lowerKey === "time" || lowerKey === "timestamp") {
                              continue;
                          }
                  
                          maximum = maxValue(maximum, object[key]);
                      }
                  
                      return maximum;
                  }
                  
                  function maxFromArray(values, legend) {
                      var start = 0;
                  
                      if (Array.isArray(legend) && values.length === legend.length && String(legend[0] || "").toLowerCase() === "time") {
                          start = 1;
                      } else if (Array.isArray(legend) && values.length === legend.length + 1) {
                          start = 1;
                      } else if (values.length > 1 && toNumber(values[0]) !== null && Number(values[0]) > 1000000000) {
                          start = 1;
                      }
                  
                      var maximum = null;
                  
                      for (var i = start; i < values.length; i++) {
                          maximum = maxValue(maximum, values[i]);
                      }
                  
                      return maximum;
                  }
                  
                  function temperatureFromPoint(point, legend) {
                      if (Array.isArray(point)) {
                          return maxFromArray(point, legend);
                      }
                  
                      if (!point || typeof point !== "object") {
                          return null;
                      }
                  
                      if (Array.isArray(point.data) && point.data.length > 0) {
                          return temperatureFromPoint(point.data[point.data.length - 1], legend || point.legend);
                      }
                  
                      if (point.aggregations) {
                          var max = maxFromObject(point.aggregations.max);
                  
                          if (max !== null) {
                              return max;
                          }
                  
                          var mean = maxFromObject(point.aggregations.mean);
                  
                          if (mean !== null) {
                              return mean;
                          }
                      }
                  
                      return maxFromObject(point);
                  }
                  
                  for (var i = 0; i < graphs.length; i++) {
                      if (!graphs[i]) {
                          continue;
                      }
                  
                      var temperature = temperatureFromPoint(graphs[i], graphs[i].legend);
                  
                      if (temperature !== null) {
                          return temperature;
                      }
                  }
                  
                  return 0;
