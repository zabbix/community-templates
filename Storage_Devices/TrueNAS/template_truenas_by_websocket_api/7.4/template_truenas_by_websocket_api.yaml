        - uuid: 85c75d186424473eada59091430c6fa3
          name: 'TrueNAS: Available system update versions'
          type: DEPENDENT
          key: truenas.system.update.versions
          value_type: TEXT
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var result = (((data.results || {}).update_available_versions || {}).result) || [];
                  
                  if (!Array.isArray(result) || result.length === 0) {
                      return "";
                  }
                  
                  function getVersion(item) {
                      if (item === null || item === undefined) {
                          return "";
                      }
                  
                      if (typeof item !== "object") {
                          return String(item);
                      }
                  
                      if (item.version !== null && item.version !== undefined) {
                          if (typeof item.version === "object") {
                              return String(item.version.version || item.version.name || item.version.release || JSON.stringify(item.version));
                          }
                  
                          return String(item.version);
                      }
                  
                      return String(item.name || item.release || item.train || JSON.stringify(item));
                  }
                  
                  var versions = [];
                  
                  for (var i = 0; i < result.length; i++) {
                      var version = getVersion(result[i]);
                  
                      if (version === "") {
                          continue;
                      }
                  
                      if (result[i] && typeof result[i] === "object" && result[i].train) {
                          versions.push(String(result[i].train) + ": " + version);
                      } else {
                          versions.push(version);
                      }
                  }
                  
                  return versions.join(", ");
