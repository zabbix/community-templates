        - uuid: 2ec944cbded145308454a70e8bd2fcd4
          name: 'TrueNAS: Interfaces raw'
          type: DEPENDENT
          key: truenas.interfaces.raw
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var interfaces = (((data.results || {}).interfaces || {}).result) || [];
                  var result = [];

                  function text(value) {
                      if (value === null || typeof value === "undefined") {
                          return "";
                      }

                      if (Array.isArray(value)) {
                          return value.join(", ");
                      }

                      if (typeof value === "object") {
                          return JSON.stringify(value);
                      }

                      return String(value);
                  }

                  function bool(value) {
                      if (value === true || value === 1) {
                          return 1;
                      }

                      var valueText = String(value || "").toUpperCase();

                      return (valueText === "TRUE" || valueText === "YES" || valueText === "ENABLED" || valueText === "1") ? 1 : 0;
                  }

                  function pick(object, keys) {
                      if (!object || typeof object !== "object") {
                          return "";
                      }

                      for (var i = 0; i < keys.length; i++) {
                          if (object[keys[i]] !== null && typeof object[keys[i]] !== "undefined") {
                              return object[keys[i]];
                          }
                      }

                      return "";
                  }

                  function aliasText(aliases) {
                      if (!Array.isArray(aliases)) {
                          return text(aliases);
                      }

                      var result = [];

                      for (var i = 0; i < aliases.length; i++) {
                          var alias = aliases[i];

                          if (typeof alias === "object") {
                              var address = alias.address || alias.addr || "";
                              var netmask = alias.netmask || alias.prefixlen || alias.prefix || "";
                              result.push(address + (netmask !== "" ? "/" + netmask : ""));
                          } else {
                              result.push(String(alias));
                          }
                      }

                      return result.filter(Boolean).join(", ");
                  }

                  function linkState(interfaceObject) {
                      var state = interfaceObject.state || {};
                      return text(pick(state, ["link_state", "linkstate", "link"]) || interfaceObject.link_state || interfaceObject.linkstate || interfaceObject.state);
                  }

                  function linkUp(state) {
                      var upPattern = "{$TRUENAS.INTERFACE.LINK.STATE.UP.MATCHES}";
                      var regexp;

                      try {
                          regexp = new RegExp(upPattern, "i");
                      } catch (error) {
                          regexp = /^(LINK_STATE_UP|UP|ACTIVE)$/i;
                      }

                      return regexp.test(String(state || "")) ? 1 : 0;
                  }

                  function linkMonitor(name) {
                      var matches = "{$TRUENAS.INTERFACE.LINK.MONITOR.MATCHES}";
                      var notMatches = "{$TRUENAS.INTERFACE.LINK.MONITOR.NOT_MATCHES}";
                      var includeRegexp;
                      var excludeRegexp;

                      try {
                          includeRegexp = new RegExp(matches);
                      } catch (error) {
                          includeRegexp = /^.*$/;
                      }

                      try {
                          excludeRegexp = new RegExp(notMatches);
                      } catch (error) {
                          excludeRegexp = /^$/;
                      }

                      return includeRegexp.test(name) && !excludeRegexp.test(name) ? 1 : 0;
                  }

                  if (!Array.isArray(interfaces)) {
                      return JSON.stringify(result);
                  }

                  for (var i = 0; i < interfaces.length; i++) {
                      var iface = interfaces[i];
                      var state = iface.state || {};
                      var name = text(iface.name || iface.id || pick(state, ["name", "orig_name"]) || i);
                      var link = linkState(iface);
                      var aliases = iface.aliases;

                      if (!Array.isArray(aliases) || aliases.length === 0) {
                          aliases = state.aliases;
                      }

                      result.push({
                          id: name,
                          name: name,
                          type: text(iface.type || state.type || "UNKNOWN"),
                          description: text(iface.description || state.description || ""),
                          link_state: link,
                          link_up: linkUp(link),
                          link_monitor: linkMonitor(name),
                          mtu: Number(iface.mtu || state.mtu || 0),
                          mac: text(iface.macaddress || iface.mac_address || state.link_address || state.macaddress || state.mac_address || ""),
                          aliases: aliasText(aliases),
                          ipv4_dhcp: bool(iface.ipv4_dhcp),
                          ipv6_auto: bool(iface.ipv6_auto),
                          media: text(state.active_media_subtype || state.active_media_type || state.media_subtype || state.media_type || ""),
                          bridge_members: text(iface.bridge_members || state.bridge_members || ""),
                          lag_ports: text(iface.lag_ports || state.lag_ports || ""),
                          vlan_parent: text(iface.vlan_parent_interface || state.vlan_parent || ""),
                          vlan_tag: text(iface.vlan_tag || state.vlan_id || "")
                      });
                  }

                  return JSON.stringify(result);
          master_item:
            key: truenas.get
          tags:
            - tag: component
              value: network
        - uuid: b31734d106df4c4c988dcd21c594445e
          name: 'TrueNAS: Interfaces total'
          type: DEPENDENT
          key: truenas.interfaces.total
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var interfaces = JSON.parse(value);

                  return Array.isArray(interfaces) ? interfaces.length : 0;
          master_item:
            key: truenas.interfaces.raw
          tags:
            - tag: component
              value: network
        - uuid: 6ad917a763d24a42898b0ad038379900
          name: 'TrueNAS: Interfaces link up'
          type: DEPENDENT
          key: truenas.interfaces.link_up
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var interfaces = JSON.parse(value);
                  var count = 0;

                  if (!Array.isArray(interfaces)) {
                      return 0;
                  }

                  for (var i = 0; i < interfaces.length; i++) {
                      if (Number(interfaces[i].link_up) === 1) {
                          count++;
                      }
                  }

                  return count;
          master_item:
            key: truenas.interfaces.raw
          tags:
            - tag: component
              value: network
        - uuid: 75b546e078c14665ae859c879661a084
          name: 'TrueNAS: Interfaces monitored link down'
          type: DEPENDENT
          key: truenas.interfaces.link_down
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var interfaces = JSON.parse(value);
                  var count = 0;

                  if (!Array.isArray(interfaces)) {
                      return 0;
                  }

                  for (var i = 0; i < interfaces.length; i++) {
                      if (Number(interfaces[i].link_monitor) === 1 && Number(interfaces[i].link_up) !== 1) {
                          count++;
                      }
                  }

                  return count;
          master_item:
            key: truenas.interfaces.raw
          tags:
            - tag: component
              value: network
        - uuid: b7be9f3a4df24006bc2439cdea95f2a5
          name: 'TrueNAS: Certificates raw'
          type: DEPENDENT
          key: truenas.certificates.raw
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
