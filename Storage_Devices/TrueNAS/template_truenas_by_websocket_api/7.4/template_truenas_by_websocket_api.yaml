            - uuid: 63f1a25cc1464afb8f0bde3333721897
              name: 'VM "{#VM.NAME}": Memory used percentage'
              type: DEPENDENT
              key: 'truenas.vm.memory.used.pct[{#VM.NAME}]'
              value_type: FLOAT
              units: '%'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var vmName = "{#VM.NAME}";
                      var vms = (((data.results || {}).vms || {}).result) || [];
                      
                      function toNumber(value) {
                          var number = Number(value);
                      
                          return isFinite(number) ? number : null;
                      }
                      
                      function normalizePercent(value) {
                          var number = toNumber(value);
                      
                          if (number === null) {
                              return null;
                          }
                      
                          if (number >= 0 && number <= 1) {
                              number = number * 100;
                          }
                      
                          if (number < 0) {
                              return 0;
                          }
                      
                          return number > 100 ? 100 : number;
                      }
                      
                      function normalizeBytes(value) {
                          var number = toNumber(value);
                      
                          if (number === null || number < 0) {
                              return null;
                          }
                      
                          return number < 1048576 ? number * 1048576 : number;
                      }
                      
                      function pick(object, keys, normalizer) {
                          if (!object || typeof object !== "object") {
                              return null;
                          }
                      
                          for (var i = 0; i < keys.length; i++) {
                              for (var key in object) {
                                  if (Object.prototype.hasOwnProperty.call(object, key) && key.toLowerCase() === keys[i]) {
                                      return normalizer(object[key]);
                                  }
                              }
                          }
                      
                          return null;
                      }
                      
                      function pickMemoryPct(vm) {
                          var containers = [vm.status, vm.metrics, vm.stats, vm.runtime, vm.usage];
                          var percentKeys = [
                              "memory_percent", "memory_percentage", "memory_utilization",
                              "memory_usage_percent", "mem_percent", "mem_usage_percent"
                          ];
                          var usedKeys = [
                              "memory_used", "used_memory", "memory_usage", "memory_usage_bytes",
                              "memory_current", "rss", "resident_memory", "mem_used"
                          ];
                      
                          for (var i = 0; i < containers.length; i++) {
                              var percent = pick(containers[i], percentKeys, normalizePercent);
                      
                              if (percent !== null) {
                                  return percent;
                              }
                          }
                      
                          var used = null;
                      
                          for (var j = 0; j < containers.length; j++) {
                              used = pick(containers[j], usedKeys, normalizeBytes);
                      
                              if (used !== null) {
                                  break;
                              }
                          }
                      
                          var configured = normalizeBytes(vm.memory || 0);
                      
                          if (used !== null && configured !== null && configured > 0) {
                              return normalizePercent((used / configured) * 100);
                          }
                      
                          return 0;
                      }
                      
                      for (var i = 0; i < vms.length; i++) {
                          if (String(vms[i].name || vms[i].id) === vmName) {
                              return pickMemoryPct(vms[i]);
                          }
                      }
                      
                      return 0;
