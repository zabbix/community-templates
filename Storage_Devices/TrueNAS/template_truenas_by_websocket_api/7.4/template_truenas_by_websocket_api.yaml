        - uuid: 21b97654ddbb471184a9dbd97dfed347
          name: 'TrueNAS: API calls failed'
          type: DEPENDENT
          key: truenas.api.calls.failed
          description: 'Number of failed JSON-RPC calls in the bridge batch response.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var failed = 0;
                  var results = data.results || {};
                  
                  if (Array.isArray(data.errors)) {
                      failed += data.errors.length;
                  }
                  
                  for (var name in results) {
                      if (Object.prototype.hasOwnProperty.call(results, name) && results[name].ok === false) {
                          failed++;
                      }
                  }
                  
                  return failed;
          master_item:
