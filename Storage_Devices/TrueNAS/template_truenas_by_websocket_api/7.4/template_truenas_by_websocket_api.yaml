                          if (number >= 0 && number <= 1) {
                              number = number * 100;
                          }
                      
                          if (number < 0) {
                              return 0;
                          }
                      
                          return number > 100 ? 100 : number;
                      }
                      
                      function pick(object, keys) {
                          if (!object || typeof object !== "object") {
                              return null;
                          }
                      
                          for (var i = 0; i < keys.length; i++) {
                              for (var key in object) {
                                  if (Object.prototype.hasOwnProperty.call(object, key) && key.toLowerCase() === keys[i]) {
                                      return normalizePercent(object[key]);
                                  }
                              }
                          }
                      
                          return null;
                      }
                      
                      function pickCpu(container) {
                          var containersToCheck = [container.status, container.metrics, container.stats, container.runtime, container.usage, container];
                          var keys = [
                              "cpu_usage", "cpu_utilization", "cpu_percent", "cpu_percentage",
                              "cpu_usage_percent", "cpu", "usage", "utilization"
                          ];
                      
                          for (var i = 0; i < containersToCheck.length; i++) {
                              var value = pick(containersToCheck[i], keys);
                      
                              if (value !== null) {
                                  return value;
                              }
                          }
                      
                          return 0;
                      }
                      
                      for (var i = 0; i < containers.length; i++) {
                          if (String(containers[i].name || containers[i].id) === containerName) {
