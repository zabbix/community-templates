zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 7df96b18c230490a9a0a9e2307226338
      name: Templates
  templates:
    - uuid: ac01a33040b84b9781972a8f1f84c9f0
      template: 'TrueNAS by WebSocket API'
      name: 'TrueNAS by WebSocket API'
      description: |
        The template communicates with TrueNAS SCALE through the zabbix-websocket-bridge. Zabbix sends an HTTP request to the bridge. The bridge opens a WebSocket JSON-RPC connection to TrueNAS SCALE, executes the requested API calls, and returns one aggregated JSON response to Zabbix.
        
        If Zabbix Server or Zabbix Proxy and the bridge run in the same Docker Compose project, the bridge can be reached by its Docker service name, for example:
        
        http://zabbix-websocket-bridge:8080
        
        In this case the bridge does not need to publish any ports to the Docker host. Do not configure a ports section unless external access is required.
        
        If the bridge runs on another host, configure {$TRUENAS.WSBRIDGE.URL} with a reachable HTTP or HTTPS URL, for example:
        
        http://192.168.1.50:8080
        https://bridge.example.com
        
        The Zabbix Server or Zabbix Proxy that executes the HTTP agent item must be able to reach the bridge URL. The bridge itself must be able to reach the TrueNAS SCALE WebSocket API URL.
        
        The configured TrueNAS API user must be allowed to read system, alert, pool, dataset, disk, service, network interface, certificate, update, reporting, and Data Protection task data. CPU utilization is retrieved through reporting.get_data and requires reporting read permissions. System update monitoring uses update.available_versions and requires SYSTEM_UPDATE_READ. Network interface monitoring uses interface.query and requires NETWORK_INTERFACE_READ. Certificate monitoring uses certificate.query and requires CERTIFICATE_READ. Data Protection monitoring uses cloud_backup.query, cloudsync.query, pool.snapshottask.query, rsynctask.query, and replication.query.
        
        App, VM, and container monitoring uses app.query, vm.query, and container.query. These methods require the corresponding read permissions in TrueNAS. If the target TrueNAS version does not support one of these methods, the related discovery rule returns no entities and the API batch failure item reports the failed call.
      groups:
        - name: Templates
      items:
        - uuid: 430a971c4c994e678c37c9430f8c4d1c
          name: 'TrueNAS: Alerts critical'
          type: DEPENDENT
          key: truenas.alerts.critical
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.results.alerts.result
            - type: JAVASCRIPT
              parameters:
                - |
                  var alerts = JSON.parse(value);
                  
                  if (!Array.isArray(alerts)) {
                      return 0;
                  }
                  
                  var count = 0;
                  
                  for (var i = 0; i < alerts.length; i++) {
                      var level = String(alerts[i].level || "").toUpperCase();
                  
                      if (alerts[i].dismissed !== true && level === "CRITICAL") {
                          count++;
                      }
                  }
                  
                  return count;
          master_item:
            key: truenas.get
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: f5d0892d5a24447dbba9fe93b184361e
              expression: 'last(/TrueNAS by WebSocket API/truenas.alerts.critical)>0'
              name: 'TrueNAS: Critical alerts exist'
              priority: HIGH
              tags:
                - tag: scope
                  value: notice
        - uuid: bb584c36a504425e9bf2ab5cc1b2a1f9
