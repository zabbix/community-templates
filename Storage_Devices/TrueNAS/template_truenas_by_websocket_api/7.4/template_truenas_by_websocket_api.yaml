            - uuid: 4619317260c14d40a8b36567be3f69d2
              name: 'Container "{#CONTAINER.NAME}": Memory used percentage'
              type: DEPENDENT
              key: 'truenas.container.memory.used.pct[{#CONTAINER.NAME}]'
              value_type: FLOAT
              units: '%'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var containerName = "{#CONTAINER.NAME}";
                      var containers = (((data.results || {}).containers || {}).result) || [];
                      
                      function toNumber(value) {
                          var number = Number(value);
                      
                          return isFinite(number) ? number : null;
                      }
                      
                      function normalizePercent(value) {
                          var number = toNumber(value);
                      
                          if (number === null) {
                              return null;
                          }
                      
                          if (number >= 0 && number <= 1) {
                              number = number * 100;
                          }
                      
                          if (number < 0) {
                              return 0;
                          }
                      
                          return number > 100 ? 100 : number;
                      }
                      
                      function normalizeBytes(value, key) {
                          var number = toNumber(value);
                      
                          if (number === null || number < 0) {
                              return null;
                          }
                      
                          key = String(key || "").toLowerCase();
                      
                          if (key.indexOf("bytes") !== -1 || key === "rss" || key === "resident_memory") {
                              return number;
                          }
                      
                          return number < 1048576 ? number * 1048576 : number;
                      }
                      
                      function pick(object, keys, normalizer) {
                          if (!object || typeof object !== "object") {
                              return null;
                          }
                      
                          for (var i = 0; i < keys.length; i++) {
                              for (var key in object) {
                                  if (Object.prototype.hasOwnProperty.call(object, key) && key.toLowerCase() === keys[i]) {
                                      return normalizer(object[key], key);
                                  }
                              }
                          }
                      
                          return null;
                      }
                      
                      function pickMemoryPct(container) {
                          var containersToCheck = [container.status, container.metrics, container.stats, container.runtime, container.usage, container];
                          var percentKeys = [
                              "memory_percent", "memory_percentage", "memory_utilization",
                              "memory_usage_percent", "mem_percent", "mem_usage_percent"
                          ];
                          var usedKeys = [
                              "memory_used", "used_memory", "memory_usage", "memory_usage_bytes",
                              "memory_current", "rss", "resident_memory", "mem_used"
                          ];
                          var limitKeys = [
                              "memory_limit", "limit_memory", "memory_limit_bytes",
                              "mem_limit", "memory_max", "memory_total"
                          ];
                      
                          for (var i = 0; i < containersToCheck.length; i++) {
                              var percent = pick(containersToCheck[i], percentKeys, normalizePercent);
                      
                              if (percent !== null) {
                                  return percent;
                              }
                          }
                      
                          var used = null;
                      
                          for (var j = 0; j < containersToCheck.length; j++) {
                              used = pick(containersToCheck[j], usedKeys, normalizeBytes);
                      
                              if (used !== null) {
                                  break;
                              }
                          }
                      
                          var limit = null;
                      
                          for (var k = 0; k < containersToCheck.length; k++) {
                              limit = pick(containersToCheck[k], limitKeys, normalizeBytes);
                      
                              if (limit !== null) {
                                  break;
                              }
                          }
                      
                          if (used !== null && limit !== null && limit > 0) {
                              return normalizePercent((used / limit) * 100);
                          }
                      
                          return 0;
                      }
                      
                      for (var i = 0; i < containers.length; i++) {
                          if (String(containers[i].name || containers[i].id) === containerName) {
                              return pickMemoryPct(containers[i]);
