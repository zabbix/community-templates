                  name: 'Disk "{#DISK.NAME}": Temperature > {$TRUENAS.DISK.TEMP.MAX.WARN}°C'
                  priority: WARNING
                  tags:
                    - tag: scope
                      value: performance
            - uuid: 2fc37910a2a14c749700d547d7cac7c9
              name: 'Disk "{#DISK.NAME}": ZFS checksum errors'
              type: DEPENDENT
              key: 'truenas.disk.zfs.checksum_errors[{#DISK.NAME}]'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var diskName = "{#DISK.NAME}";
                      var pools = data.results.pools.result || [];
                      var total = 0;
                      
                      function collectErrors(nodes, field) {
                          var sum = 0;
                      
                          if (!Array.isArray(nodes)) {
                              return 0;
                          }
                      
                          for (var i = 0; i < nodes.length; i++) {
                              var node = nodes[i];
                      
                              if (node.disk === diskName && node.stats) {
                                  sum += Number(node.stats[field] || 0);
                              }
                      
                              sum += collectErrors(node.children || [], field);
                          }
                      
                          return sum;
                      }
                      
                      for (var p = 0; p < pools.length; p++) {
                          var topology = pools[p].topology || {};
                      
                          total += collectErrors(topology.data || [], "checksum_errors");
                          total += collectErrors(topology.log || [], "checksum_errors");
                          total += collectErrors(topology.cache || [], "checksum_errors");
                          total += collectErrors(topology.spare || [], "checksum_errors");
                          total += collectErrors(topology.special || [], "checksum_errors");
                          total += collectErrors(topology.dedup || [], "checksum_errors");
                      }
                      
                      return total;
              master_item:
                key: truenas.get
              tags:
                - tag: component
                  value: storage
              trigger_prototypes:
                - uuid: bd60082792ac4d5385686564167033e6
