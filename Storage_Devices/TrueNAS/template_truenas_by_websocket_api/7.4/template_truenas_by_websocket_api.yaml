                  var data = JSON.parse(value);
                  var result = (((data.results || {}).cpu_usage || {}).result) || [];
                  var graphs = Array.isArray(result) ? result : [result];
                  
                  function toNumber(value) {
                      var number = Number(value);
                  
                      return isFinite(number) ? number : null;
                  }
                  
                  function normalizePercent(value) {
                      var number = toNumber(value);
                  
                      if (number === null) {
                          return null;
                      }
                  
                      if (number >= 0 && number <= 1) {
                          number = number * 100;
                      }
                  
                      if (number < 0) {
                          return 0;
                      }
                  
                      if (number > 100) {
                          return 100;
                      }
                  
                      return number;
                  }
                  
                  function pickObjectValue(object, names) {
                      for (var i = 0; i < names.length; i++) {
                          for (var key in object) {
                              if (Object.prototype.hasOwnProperty.call(object, key) && key.toLowerCase() === names[i]) {
                                  return normalizePercent(object[key]);
                              }
                          }
                      }
                  
                      return null;
                  }
                  
                  function usageFromObject(object) {
                      if (!object || typeof object !== "object") {
                          return null;
                      }
                  
                      var direct = pickObjectValue(object, ["usage", "used", "utilization", "busy", "cpu", "value"]);
                  
                      if (direct !== null) {
                          return direct;
                      }
                  
                      var busyTime = 0;
                      var totalTime = 0;
                      var idleTime = null;
                      var numericValues = [];
                  
                      for (var key in object) {
                          if (!Object.prototype.hasOwnProperty.call(object, key)) {
                              continue;
                          }
                  
                          var lowerKey = key.toLowerCase();
                  
                          if (lowerKey === "time" || lowerKey === "timestamp") {
                              continue;
                          }
                  
                          var number = toNumber(object[key]);
                  
                          if (number === null) {
                              continue;
                          }
                  
                          numericValues.push(number);
                  
                          if (/(^|[._-])idle([._-]|$)/.test(lowerKey) || lowerKey === "idle") {
                              idleTime = idleTime === null ? number : idleTime + number;
                              totalTime += number;
                              continue;
                          }
                  
                          if (/(^|[._-])(user|nice|system|iowait|irq|interrupt|softirq|steal|guest)([._-]|$)/.test(lowerKey) || /^(user|nice|system|iowait|irq|interrupt|softirq|steal|guest)$/.test(lowerKey)) {
                              busyTime += number;
                              totalTime += number;
                          }
                      }
                  
                      if (totalTime > 0) {
                          return normalizePercent((busyTime / totalTime) * 100);
                      }
                  
                      if (idleTime !== null) {
                          return normalizePercent(100 - idleTime);
                      }
                  
                      if (numericValues.length === 1) {
                          return normalizePercent(numericValues[0]);
                      }
                  
                      return null;
                  }
                  
                  function usageFromArray(values, legend) {
                      if (!Array.isArray(legend) || legend.length === 0) {
                          return null;
                      }
                  
                      var offset = values.length === legend.length + 1 ? 1 : 0;
                      var object = {};
                  
                      for (var i = 0; i < legend.length && i + offset < values.length; i++) {
                          object[String(legend[i])] = values[i + offset];
                      }
                  
                      return usageFromObject(object);
                  }
                  
                  function usageFromPoint(point, legend) {
                      if (Array.isArray(point)) {
                          return usageFromArray(point, legend);
                      }
                  
                      if (!point || typeof point !== "object") {
                          return null;
                      }
                  
                      if (Array.isArray(point.data) && point.data.length > 0) {
                          return usageFromPoint(point.data[point.data.length - 1], legend || point.legend);
                      }
                  
                      if (point.aggregations) {
                          var mean = usageFromObject(point.aggregations.mean);
                  
                          if (mean !== null) {
                              return mean;
                          }
                  
                          var max = usageFromObject(point.aggregations.max);
                  
                          if (max !== null) {
                              return max;
                          }
                      }
                  
                      return usageFromObject(point);
                  }
                  
                  for (var i = 0; i < graphs.length; i++) {
                      if (!graphs[i] || !Array.isArray(graphs[i].data)) {
                          continue;
                      }
                  
                      for (var j = graphs[i].data.length - 1; j >= 0; j--) {
                          var usage = usageFromPoint(graphs[i].data[j], graphs[i].legend);
                  
                          if (usage !== null) {
                              return usage;
                          }
                      }
                  }
                  
                  return 0;
