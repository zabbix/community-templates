            - uuid: c723b2b56884423891e49dc7c35818ff
              name: 'VM "{#VM.NAME}": CPU utilization'
              type: DEPENDENT
              key: 'truenas.vm.cpu.util[{#VM.NAME}]'
              value_type: FLOAT
              units: '%'
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var vmName = "{#VM.NAME}";
                      var vms = (((data.results || {}).vms || {}).result) || [];
                      
                      function toNumber(value) {
                          var number = Number(value);
                      
                          return isFinite(number) ? number : null;
                      }
                      
                      function normalizePercent(value) {
                          var number = toNumber(value);
                      
                          if (number === null) {
                              return null;
                          }
                      
                          if (number >= 0 && number <= 1) {
                              number = number * 100;
                          }
                      
                          if (number < 0) {
                              return 0;
                          }
                      
                          return number > 100 ? 100 : number;
                      }
                      
                      function pick(object, keys) {
                          if (!object || typeof object !== "object") {
                              return null;
                          }
                      
                          for (var i = 0; i < keys.length; i++) {
                              for (var key in object) {
                                  if (Object.prototype.hasOwnProperty.call(object, key) && key.toLowerCase() === keys[i]) {
                                      return normalizePercent(object[key]);
                                  }
                              }
                          }
                      
                          return null;
                      }
                      
                      function pickCpu(vm) {
                          var containers = [vm.status, vm.metrics, vm.stats, vm.runtime, vm.usage, vm];
                          var keys = [
                              "cpu_usage", "cpu_utilization", "cpu_percent", "cpu_percentage",
                              "cpu_usage_percent", "cpu", "usage", "utilization"
                          ];
                      
                          for (var i = 0; i < containers.length; i++) {
                              var value = pick(containers[i], keys);
                      
                              if (value !== null) {
                                  return value;
                              }
                          }
                      
                          return 0;
                      }
                      
                      for (var i = 0; i < vms.length; i++) {
                          if (String(vms[i].name || vms[i].id) === vmName) {
                              return pickCpu(vms[i]);
                          }
                      }
                      
                      return 0;
              master_item:
                key: truenas.get
              tags:
                - tag: component
                  value: virtualization
              trigger_prototypes:
                - uuid: 796f22f025cf46ae91612a4182640c7f
                  expression: 'min(/TrueNAS by WebSocket API/truenas.vm.cpu.util[{#VM.NAME}],5m)>{$TRUENAS.VM.CPU.UTIL.MAX.CRIT}'
                  name: 'VM "{#VM.NAME}": CPU utilization > {$TRUENAS.VM.CPU.UTIL.MAX.CRIT}%'
                  priority: AVERAGE
                  tags:
                    - tag: scope
                      value: performance
                - uuid: ffad11bd133f42e887962abf2f7677a1
                  expression: 'min(/TrueNAS by WebSocket API/truenas.vm.cpu.util[{#VM.NAME}],5m)>{$TRUENAS.VM.CPU.UTIL.MAX.WARN} and min(/TrueNAS by WebSocket API/truenas.vm.cpu.util[{#VM.NAME}],5m)<={$TRUENAS.VM.CPU.UTIL.MAX.CRIT}'
                  name: 'VM "{#VM.NAME}": CPU utilization > {$TRUENAS.VM.CPU.UTIL.MAX.WARN}%'
                  priority: WARNING
                  tags:
                    - tag: scope
                      value: performance
            - uuid: 62a9d564e27e45379ef2c54bd823659f
              name: 'VM "{#VM.NAME}": Disk available'
              type: DEPENDENT
              key: 'truenas.vm.disk.available[{#VM.NAME}]'
              units: B
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      var data = JSON.parse(value);
                      var vmName = "{#VM.NAME}";
                      var vms = (((data.results || {}).vms || {}).result) || [];
                      var datasets = (((data.results || {}).datasets || {}).result) || [];
                      
                      function normalizeDatasetName(path) {
                          path = String(path || "");
                      
                          if (path.indexOf("/dev/zvol/") === 0) {
                              return path.substring(10);
                          }
                      
                          return path;
                      }
                      
                      function diskPath(device) {
                          var attributes = device.attributes || {};
                      
                          return String(attributes.path || device.path || attributes.zvol || device.zvol || "");
                      }
                      
                      function isDiskDevice(device) {
                          var attributes = device.attributes || {};
                          var dtype = String(attributes.dtype || device.dtype || device.type || "").toUpperCase();
                          var path = diskPath(device);
                      
                          return dtype === "DISK" || path.indexOf("/dev/zvol/") === 0;
                      }
                      
                      function getVmDiskNames(vm) {
                          var names = [];
                          var devices = vm.devices || [];
                      
                          for (var i = 0; i < devices.length; i++) {
                              if (!isDiskDevice(devices[i])) {
                                  continue;
                              }
                      
                              var name = normalizeDatasetName(diskPath(devices[i]));
                      
                              if (name !== "") {
                                  names.push(name);
                              }
                          }
                      
                          return names;
                      }
                      
                      function getProperty(dataset, name) {
                          var property = dataset[name];
                      
                          if (property === undefined && dataset.properties) {
                              property = dataset.properties[name];
                          }
                      
                          if (property && typeof property === "object") {
                              if (property.rawvalue !== undefined) {
                                  return property.rawvalue;
                              }
                      
                              if (property.parsed !== undefined) {
                                  return property.parsed;
                              }
                      
                              if (property.value !== undefined) {
                                  return property.value;
                              }
                          }
                      
                          return property;
                      }
                      
                      function findDataset(name) {
                          for (var i = 0; i < datasets.length; i++) {
                              var datasetName = String(datasets[i].id || datasets[i].name || "");
                      
                              if (datasetName === name) {
                                  return datasets[i];
                              }
                          }
                      
                          return null;
                      }
                      
                      function sumVmDiskProperty(vm, propertyName) {
                          var diskNames = getVmDiskNames(vm);
                          var total = 0;
                      
                          for (var i = 0; i < diskNames.length; i++) {
                              var dataset = findDataset(diskNames[i]);
                      
                              if (dataset !== null) {
                                  total += Number(getProperty(dataset, propertyName) || 0);
                              }
                          }
                      
                          return total;
                      }
                      
                      for (var i = 0; i < vms.length; i++) {
                          if (String(vms[i].name || vms[i].id) === vmName) {
                              return sumVmDiskProperty(vms[i], "available");
                          }
                      }
                      
                      return 0;
              master_item:
                key: truenas.get
              tags:
                - tag: component
                  value: storage
            - uuid: 105914bfee5441c795b4f856fbf40388
              name: 'VM "{#VM.NAME}": Disk used percentage'
              type: DEPENDENT
