      name: 'Lenovo DM5000F: Number of failed disks has changed'
      opdata: 'Current value: {ITEM.LASTVALUE1}'
      priority: WARNING
      description: '{{ITEM.LASTVALUE2}.regsub("(.*)", \1)}'
      type: MULTIPLE
      tags:
        - tag: scope
          value: availability
        - tag: scope
          value: performance
