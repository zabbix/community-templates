          trigger_prototypes:
            - uuid: dc6b9652eb5a4601afa80c756f93f2df
              expression: |
                min(/Lenovo SAN DM5000F by SNMP/netapp.net.if[if64InErrors, "{#NODE}", "{#IFNAME}"],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}
                or min(/Lenovo SAN DM5000F by SNMP/netapp.net.if[if64OutErrors, "{#NODE}", "{#IFNAME}"],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                max(/Lenovo SAN DM5000F by SNMP/netapp.net.if[if64InErrors, "{#NODE}", "{#IFNAME}"],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8
                and max(/Lenovo SAN DM5000F by SNMP/netapp.net.if[if64OutErrors, "{#NODE}", "{#IFNAME}"],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8
              name: 'Lenovo DM5000F: Node {#NODE}: port {#IFNAME} ({#TYPE}): High error rate'
              event_name: 'Lenovo DM5000F: Node {#NODE}: port {#IFNAME} ({#TYPE}): High error rate (>{$IF.ERRORS.WARN:"{#IFNAME}"} for 5m)'
              opdata: 'errors in: {ITEM.LASTVALUE1}, errors out: {ITEM.LASTVALUE2}'
              priority: WARNING
              description: 'It recovers when it is below 80% of the `{$IF.ERRORS.WARN:"{#IFNAME}"}` threshold.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: performance
            - uuid: 9180ae5261eb469c9fcf636363965a78
              expression: 'last(/Lenovo SAN DM5000F by SNMP/netapp.net.port[netportLinkState, "{#NODE}", "{#IFNAME}"])<>2 and last(/Lenovo SAN DM5000F by SNMP/netapp.net.port[netportUpAdmin, "{#NODE}", "{#IFNAME}"])=1'
