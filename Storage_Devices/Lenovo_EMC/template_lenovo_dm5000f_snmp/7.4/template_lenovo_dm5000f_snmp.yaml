zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 7c2cb727f85b492d88cd56e17127c64d
      name: 'Templates/NAS & SAN'
  templates:
    - uuid: 2387048876f14b4e8e1f4156749a0f3e
      template: 'Lenovo SAN DM5000F by SNMP'
      name: 'Lenovo SAN DM5000F by SNMP (NetApp)'
      description: |
        The template to monitor Lenovo SAN DM5000F cluster by Zabbix SNMP agent.
        
        MIBs used:
        HOST-RESOURCES-MIB
        SNMPv2-MIB
        NETAPP-MIB
        IF-MIB
        
        You can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/416694-discussion-thread-for-official-zabbix-template-netapp-fas3220
        
        Generated by official Zabbix template tool "Templator"
      groups:
        - name: 'Templates/NAS & SAN'
      items:
        - uuid: f888b9046c294b4a9658a98675cf8b60
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          description: |
            The host accessibility by ICMP ping.
            
            0 - ICMP ping fails;
            1 - ICMP ping successful.
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 3d53d7eb54c14e4a8186700f563d6d14
              expression: 'max(/Lenovo SAN DM5000F by SNMP/icmpping,#3)=0'
              name: 'Lenovo DM5000F: Unavailable by ICMP ping'
              priority: HIGH
              description: 'Last three attempts returned timeout. Please check device connectivity.'
              tags:
                - tag: scope
                  value: availability
        - uuid: 6bf0bab16b8345cca2500509f5c2726e
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          value_type: FLOAT
          units: '%'
          description: 'The percentage of lost packets.'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: d5271e8fa2b74327adb892d005e1216d
              expression: 'min(/Lenovo SAN DM5000F by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/Lenovo SAN DM5000F by SNMP/icmppingloss,5m)<100'
              name: 'Lenovo DM5000F: High ICMP ping loss'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'ICMP packets loss detected.'
              dependencies:
                - name: 'Lenovo DM5000F: Unavailable by ICMP ping'
                  expression: 'max(/Lenovo SAN DM5000F by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 1d1b404319074b7db340055d04ac3c96
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          value_type: FLOAT
          units: s
          description: 'The ICMP ping response time (in seconds).'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 4f9c474cb22246aa81567b6c3548bc99
              expression: 'avg(/Lenovo SAN DM5000F by SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'Lenovo DM5000F: High ICMP ping response time'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'Average ICMP response time is too high.'
              dependencies:
                - name: 'Lenovo DM5000F: High ICMP ping loss'
                  expression: 'min(/Lenovo SAN DM5000F by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/Lenovo SAN DM5000F by SNMP/icmppingloss,5m)<100'
                - name: 'Lenovo DM5000F: Unavailable by ICMP ping'
                  expression: 'max(/Lenovo SAN DM5000F by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: e3096fe4807e484390810698131c3908
          name: 'Failed disks count'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.789.1.6.4.7.0]'
          key: 'netapp.disk[diskFailedCount]'
          description: 'The number of disks that are currently broken.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 10m
          tags:
            - tag: component
              value: storage
        - uuid: d6f6119e034e4928bbba737a804bf351
          name: 'Failed disks message'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.789.1.6.4.10.0]'
          key: 'netapp.disk[diskFailedMessage]'
          value_type: TEXT
          description: 'If diskFailedCount is non-zero, this is a string describing the failed disk or disks. Each failed disk is described.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: component
              value: storage
        - uuid: 225c712967cf45f8b4b72817c9a3696d
          name: 'Product firmware version'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.789.1.1.6.0]'
          key: 'netapp.inventory[productFirmwareVersion]'
          value_type: CHAR
          description: 'Version string for the firmware running on this platform.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: component
              value: system
        - uuid: 85a8d2db3b6e48f4bc5ce0f6aa0cbde1
          name: 'Product version'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.4.1.789.1.1.2.0]'
          key: 'netapp.inventory[productVersion]'
          value_type: CHAR
          description: |
            MIB: NETAPP-MIB
            Version string for the software running on this platform.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
          tags:
            - tag: component
              value: system
        - uuid: aeda125dcfb04750b3a5f4a7cd013be8
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          value_type: LOG
          description: 'The item is used to collect all SNMP traps unmatched by other snmptrap items'
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          tags:
            - tag: component
              value: network
        - uuid: 19762aea56c24ab39ee89ef5da95dfd0
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'system.contact[sysContact.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            The textual identification of the contact person for this managed node, together with information on how to contact this person. If no contact information is known, the value is the zero-length string.
          inventory_link: CONTACT
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 988196e6829244c982f9f57cf4fa223f
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'system.descr[sysDescr.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            A textual description of the entity. This value should
            include the full name and version identification of the system's hardware type, software operating-system, and
            networking software.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: a655bb0f2aa0451cbc1f9d7e5e57e2ad
          name: 'Uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.25.1.1.0]'
          key: 'system.hw.uptime[hrSystemUptime.0]'
          delay: 30s
          trends: '0'
          units: uptime
          description: |
            MIB: HOST-RESOURCES-MIB
            The amount of time since this host was last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB [RFC1907] because sysUpTime is the uptime of the network management portion of the system.
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 39181de92ed04565a7e26774a6090a21
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'system.location[sysLocation.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            Physical location of the node (e.g., `equipment room`, `3rd floor`). If not provided, the value is a zero-length string.
          inventory_link: LOCATION
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 0602fafa1c81433f9f8ab757b9320cf6
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: system.name
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            An administratively-assigned name for this managed node.By convention, this is the node's fully-qualified domain name. If the name is unknown, the value is the zero-length string.
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 937af1cfdcb5412a86368c564eb222be
              expression: 'last(/Lenovo SAN DM5000F by SNMP/system.name,#1)<>last(/Lenovo SAN DM5000F by SNMP/system.name,#2) and length(last(/Lenovo SAN DM5000F by SNMP/system.name))>0'
              name: 'Lenovo DM5000F: System name has changed'
              event_name: 'Lenovo DM5000F: System name has changed (new name: {ITEM.VALUE})'
              priority: INFO
              description: 'The name of the system has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
                - tag: scope
                  value: security
        - uuid: 9eac1ba4aa2d4427be1ffc650d9119de
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: 30s
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            Time (in hundredths of a second) since the network management portion of the system was last re-initialized.
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: ff2ff4187a6a4d258fe5ce749beb3dc6
          name: 'System object ID'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.2.0]'
          key: 'system.objectid[sysObjectID.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            The vendor's authoritative identification of the network management subsystem contained in the entity. This value is allocated within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones, Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier 1.3.6.1.4.1.4242.1.1 to its `Fred Router'.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 7f2f414423f54b46a32dcdc1918f2137
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          description: |
            Availability of SNMP checks on the host. The value of this item corresponds to availability icons in the host list.
            Possible values:
            0 - not available
            1 - available
            2 - unknown
          valuemap:
            name: zabbix.host.available
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 95f6435375b248169db2becc19455998
              expression: 'max(/Lenovo SAN DM5000F by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'Lenovo DM5000F: No SNMP data collection'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'SNMP is not available for polling. Please check device connectivity and SNMP settings.'
              dependencies:
                - name: 'Lenovo DM5000F: Unavailable by ICMP ping'
                  expression: 'max(/Lenovo SAN DM5000F by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
      discovery_rules:
        - uuid: 0b5f1af78ede4837a425da07059c790f
          name: 'Cluster metrics discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#NODE.NAME},1.3.6.1.4.1.789.1.25.2.1.1]'
          key: netapp.cluster.discovery
          delay: 1h
          description: 'Discovery of Cluster metrics per node'
          item_prototypes:
            - uuid: bfcb45513efc4fe194f8be27faf03e8b
              name: 'Node {#NODE.NAME}: Failed FAN count'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.789.1.25.2.1.19.{#SNMPINDEX}]'
              key: 'netapp.cluster[nodeEnvFailedFanCount, "{#NODE.NAME}"]'
              description: 'Count of the number of chassis fans that are not operating within the recommended RPM range.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: node
                - tag: node
                  value: '{#NODE.NAME}'
            - uuid: 445838ecbc4a434ab1a475a1fa628bc6
              name: 'Node {#NODE.NAME}: Failed FAN message'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.789.1.25.2.1.20.{#SNMPINDEX}]'
              key: 'netapp.cluster[nodeEnvFailedFanMessage, "{#NODE.NAME}"]'
              value_type: TEXT
              description: 'Text message describing current condition of chassis fans. This is useful only if envFailedFanCount is not zero.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: node
                - tag: node
                  value: '{#NODE.NAME}'
            - uuid: 6f1b5019e5634b51b08eaf86571e94ce
              name: 'Node {#NODE.NAME}: Degraded power supplies count'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.789.1.25.2.1.21.{#SNMPINDEX}]'
              key: 'netapp.cluster[nodeEnvFailedPowerSupplyCount, "{#NODE.NAME}"]'
              description: 'Count of the number of power supplies that are in degraded mode.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: node
                - tag: node
                  value: '{#NODE.NAME}'
            - uuid: 84fcb7a55da0477e8f168b443076f51e
              name: 'Node {#NODE.NAME}: Degraded power supplies message'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.789.1.25.2.1.22.{#SNMPINDEX}]'
              key: 'netapp.cluster[nodeEnvFailedPowerSupplyMessage, "{#NODE.NAME}"]'
              value_type: TEXT
              description: 'Text message describing the state of any power supplies that are currently degraded. This is useful only if envFailedPowerSupplyCount is not zero.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: node
                - tag: node
                  value: '{#NODE.NAME}'
            - uuid: f3a5dc070d8241bbba89ae55bca9cf1b
              name: 'Node {#NODE.NAME}: Over-temperature'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.789.1.25.2.1.18.{#SNMPINDEX}]'
              key: 'netapp.cluster[nodeEnvOverTemperature, "{#NODE.NAME}"]'
              description: 'An indication of whether the hardware is currently operating outside of its recommended temperature range. The hardware will shutdown if the temperature exceeds critical thresholds.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: node
                - tag: node
                  value: '{#NODE.NAME}'
              trigger_prototypes:
                - uuid: 686d858e862746718e55d16d9c3190cc
                  expression: 'last(/Lenovo SAN DM5000F by SNMP/netapp.cluster[nodeEnvOverTemperature, "{#NODE.NAME}"])=2'
                  name: 'Lenovo DM5000F: Node {#NODE.NAME}: Temperature is over than recommended'
                  priority: HIGH
                  description: 'The hardware will shutdown if the temperature exceeds critical thresholds.'
                  tags:
                    - tag: scope
                      value: availability
            - uuid: 028d86ec6ecd47b692806aba8c51b6ba
              name: 'Node {#NODE.NAME}: Health'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.789.1.25.2.1.11.{#SNMPINDEX}]'
              key: 'netapp.cluster[nodeHealth, "{#NODE.NAME}"]'
              description: 'Whether or not the node can communicate with the cluster.'
              valuemap:
                name: 'Service state'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: health
                - tag: component
                  value: node
                - tag: node
                  value: '{#NODE.NAME}'
              trigger_prototypes:
                - uuid: e7d8aa488dbf4f8296ca550e174f53b7
                  expression: 'last(/Lenovo SAN DM5000F by SNMP/netapp.cluster[nodeHealth, "{#NODE.NAME}"])=0'
                  name: 'Lenovo DM5000F: Node {#NODE.NAME}: Node can not communicate with the cluster'
                  priority: HIGH
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
            - uuid: 74553db7cbd64222920df3cd33874747
              name: 'Node {#NODE.NAME}: Location'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.789.1.25.2.1.3.{#SNMPINDEX}]'
              key: 'netapp.cluster[nodeLocation, "{#NODE.NAME}"]'
              value_type: CHAR
              description: 'Node Location. Same as sysLocation for a specific node.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: node
                - tag: node
                  value: '{#NODE.NAME}'
            - uuid: dfc3b0bc17594412924b33941640f9d5
              name: 'Node {#NODE.NAME}: Model'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.789.1.25.2.1.4.{#SNMPINDEX}]'
              key: 'netapp.cluster[nodeModel, "{#NODE.NAME}"]'
              value_type: CHAR
              description: 'Node Model. Same as productModel for a specific node.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: node
                - tag: node
                  value: '{#NODE.NAME}'
            - uuid: fd355a3eeed24c75aa4cca7a7f5626f9
              name: 'Node {#NODE.NAME}: NVRAM battery status'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.789.1.25.2.1.17.{#SNMPINDEX}]'
              key: 'netapp.cluster[nodeNvramBatteryStatus, "{#NODE.NAME}"]'
              description: |
                An indication of the current status of the NVRAM battery or batteries.
                Batteries which are fully or partially discharged may not fully protect the system during a crash. The end-of-life status values are based on the manufacturer's recommended life for the batteries.
                Possible values:
                ok(1),
                partiallyDischarged(2),
                fullyDischarged(3),
                notPresent(4),
                nearEndOfLife(5),
                atEndOfLife(6),
                unknown(7),
                overCharged(8),
                fullyCharged(9).
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: node
                - tag: node
                  value: '{#NODE.NAME}'
              trigger_prototypes:
                - uuid: 7d4e2ceb1ecd4cfcbee2fa477f07f62a
                  expression: 'last(/Lenovo SAN DM5000F by SNMP/netapp.cluster[nodeNvramBatteryStatus, "{#NODE.NAME}"])<>1'
                  name: 'Lenovo DM5000F: Node {#NODE.NAME}: NVRAM battery status is not OK'
                  priority: AVERAGE
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
            - uuid: 75e59f7292dc439abf4e147a958159de
              name: 'Node {#NODE.NAME}: Serial number'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.789.1.25.2.1.5.{#SNMPINDEX}]'
              key: 'netapp.cluster[nodeSerialNumber, "{#NODE.NAME}"]'
              value_type: CHAR
              description: 'Node Serial Number. Same as productSerialNum for a specific node.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: node
                - tag: node
                  value: '{#NODE.NAME}'
            - uuid: e158ed8dc4d14469ac5c13126e53ec3c
              name: 'Node {#NODE.NAME}: Uptime'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.789.1.25.2.1.7.{#SNMPINDEX}]'
              key: 'netapp.cluster[nodeUptime, "{#NODE.NAME}"]'
              units: s
              description: 'Node uptime. Same as sysUpTime for a specific node.'
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '0.01'
              tags:
                - tag: component
                  value: node
                - tag: node
                  value: '{#NODE.NAME}'
              trigger_prototypes:
                - uuid: 68caa144f34b458d91e10f2ef139f113
                  expression: 'last(/Lenovo SAN DM5000F by SNMP/netapp.cluster[nodeUptime, "{#NODE.NAME}"])<10m'
                  name: 'Lenovo DM5000F: Node {#NODE.NAME}: Host has been restarted'
                  event_name: 'Lenovo DM5000F: Node {#NODE.NAME}: {HOST.NAME} has been restarted (uptime < 10m)'
                  priority: INFO
                  description: 'Uptime is less than 10 minutes.'
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: notice
          trigger_prototypes:
            - uuid: e0d66c7bf9f04c678cad96390eba2286
              expression: 'last(/Lenovo SAN DM5000F by SNMP/netapp.cluster[nodeEnvFailedPowerSupplyCount, "{#NODE.NAME}"])>0 and last(/Lenovo SAN DM5000F by SNMP/netapp.cluster[nodeEnvFailedPowerSupplyMessage, "{#NODE.NAME}"])=last(/Lenovo SAN DM5000F by SNMP/netapp.cluster[nodeEnvFailedPowerSupplyMessage, "{#NODE.NAME}"])'
              name: 'Lenovo DM5000F: Node {#NODE.NAME}: Degraded power supplies count is more than zero'
              priority: AVERAGE
              description: '{{ITEM.VALUE2}.regsub("(.*)", \1)}'
              tags:
                - tag: scope
                  value: availability
            - uuid: 13ae5b8c6a5e4ade8b925d5ddb16d127
              expression: 'last(/Lenovo SAN DM5000F by SNMP/netapp.cluster[nodeEnvFailedFanCount, "{#NODE.NAME}"])>0 and last(/Lenovo SAN DM5000F by SNMP/netapp.cluster[nodeEnvFailedFanMessage, "{#NODE.NAME}"])=last(/Lenovo SAN DM5000F by SNMP/netapp.cluster[nodeEnvFailedFanMessage, "{#NODE.NAME}"])'
              name: 'Lenovo DM5000F: Node {#NODE.NAME}: Failed FAN count is over than zero'
              priority: HIGH
              description: '{{ITEM.VALUE2}.regsub("(.*)", \1)}'
              tags:
                - tag: scope
                  value: availability
