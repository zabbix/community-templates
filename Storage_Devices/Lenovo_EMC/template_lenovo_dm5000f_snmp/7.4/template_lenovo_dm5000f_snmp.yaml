              expression: 'last(/Lenovo SAN DM5000F by SNMP/netapp.net.port[netportHealthStatus, "{#NODE}", "{#IFNAME}"])<>0 and length(last(/Lenovo SAN DM5000F by SNMP/netapp.net.port[netportDegradedReason, "{#NODE}", "{#IFNAME}"]))>0'
              name: 'Lenovo DM5000F: Node {#NODE}: port {#IFNAME} ({#TYPE}): Port is not healthy'
