        - uuid: dee33c56776f400e85b7fd606713b70c
          name: 'HA discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#NODE.NAME},1.3.6.1.4.1.789.1.21.2.1.1,{#PARTNER.NAME},1.3.6.1.4.1.789.1.21.2.1.8]'
          key: netapp.ha.discovery
          delay: 1h
          description: 'Discovery of high availability metrics per node'
          item_prototypes:
            - uuid: 2a3cf14e65c4483baf9ce6c8215cbd2f
              name: 'Node {#NODE.NAME}: Cannot takeover cause'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.789.1.21.2.1.5.{#SNMPINDEX}]'
              key: 'netapp.ha[haCannotTakeoverCause, "{#NODE.NAME}"]'
              description: |
                The reason node cannot take over it's HA partner {#PARTNER.NAME}.
                Possible states:
                  ok(1),
                  unknownReason(2),
                  disabledByOperator(3),
                  interconnectOffline(4),
                  disabledByPartner(5),
                  takeoverFailed(6),
                  mailboxIsInDegradedState(7),
                  partnermailboxIsInUninitialisedState(8),
                  mailboxVersionMismatch(9),
                  nvramSizeMismatch(10),
                  kernelVersionMismatch(11),
                  partnerIsInBootingStage(12),
                  diskshelfIsTooHot(13),
                  partnerIsPerformingRevert(14),
                  nodeIsPerformingRevert(15),
                  sametimePartnerIsAlsoTryingToTakeUsOver(16),
                  alreadyInTakenoverMode(17),
                  nvramLogUnsynchronized(18),
                  stateofBackupMailboxIsDoubtful(19).
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: ha
                - tag: node
                  value: '{#NODE.NAME}'
              trigger_prototypes:
                - uuid: 517cc79e2e424887925ecb2c1fc72ec6
                  expression: 'last(/Lenovo SAN DM5000F by SNMP/netapp.ha[haCannotTakeoverCause, "{#NODE.NAME}"])<>1'
                  name: 'Lenovo DM5000F: Node {#NODE.NAME}: Node cannot takeover it''s HA partner {#PARTNER.NAME}. Reason: {ITEM.VALUE}'
                  priority: HIGH
                  description: |
                    Possible reasons:
                      unknownReason(2),
                      disabledByOperator(3),
                      interconnectOffline(4),
                      disabledByPartner(5),
                      takeoverFailed(6),
                      mailboxIsInDegradedState(7),
                      partnermailboxIsInUninitialisedState(8),
                      mailboxVersionMismatch(9),
                      nvramSizeMismatch(10),
                      kernelVersionMismatch(11),
                      partnerIsInBootingStage(12),
                      diskshelfIsTooHot(13),
                      partnerIsPerformingRevert(14),
                      nodeIsPerformingRevert(15),
                      sametimePartnerIsAlsoTryingToTakeUsOver(16),
                      alreadyInTakenoverMode(17),
                      nvramLogUnsynchronized(18),
                      stateofBackupMailboxIsDoubtful(19).
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
            - uuid: 77c88b53670f464b8e261879763eb0ac
              name: 'Node {#NODE.NAME}: HA settings'
              type: SNMP_AGENT
              snmp_oid: 'get[1.3.6.1.4.1.789.1.21.2.1.3.{#SNMPINDEX}]'
              key: 'netapp.ha[haSettings, "{#NODE.NAME}"]'
              description: 'High Availability configuration settings. The value notConfigured(1) indicates that the HA is not licensed. The thisNodeDead(5) setting indicates that this node has been takenover.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: ha
                - tag: node
                  value: '{#NODE.NAME}'
              trigger_prototypes:
                - uuid: 4701c148d31d4264b20ce4f080954f95
                  expression: 'last(/Lenovo SAN DM5000F by SNMP/netapp.ha[haSettings, "{#NODE.NAME}"])=1'
                  name: 'Lenovo DM5000F: Node {#NODE.NAME}: HA is not licensed'
                  priority: AVERAGE
                  description: 'The value notConfigured(1) indicates that the HA is not licensed.'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
                - uuid: 380e4324cb864b1aabf27cca71be5119
                  expression: 'last(/Lenovo SAN DM5000F by SNMP/netapp.ha[haSettings, "{#NODE.NAME}"])=5'
                  name: 'Lenovo DM5000F: Node {#NODE.NAME}: Node has been taken over'
                  priority: HIGH
                  description: 'The thisNodeDead(5) setting indicates that this node has been takenover.'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
