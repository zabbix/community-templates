  triggers:
    - uuid: e8dca9ea01cc41c2b17d83d38afa818d
      expression: '(last(/Lenovo SAN DM5000F by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/Lenovo SAN DM5000F by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/Lenovo SAN DM5000F by SNMP/system.hw.uptime[hrSystemUptime.0])=0 and last(/Lenovo SAN DM5000F by SNMP/system.net.uptime[sysUpTime.0])<10m)'
      name: 'Lenovo DM5000F: Host has been restarted'
      event_name: 'Lenovo DM5000F: {HOST.NAME} has been restarted (uptime < 10m)'
      priority: WARNING
      description: 'Uptime is less than 10 minutes.'
      manual_close: 'YES'
      dependencies:
        - name: 'Lenovo DM5000F: No SNMP data collection'
          expression: 'max(/Lenovo SAN DM5000F by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
      tags:
