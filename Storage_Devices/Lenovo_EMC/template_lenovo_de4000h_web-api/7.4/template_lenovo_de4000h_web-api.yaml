        - uuid: 0499cadb7b604257a2b0fbba18d12400
          name: 'SANtricity: Get Storage Lockdown Status'
          type: HTTP_AGENT
          key: santricity.storage.systems.id.lockdown.status
          delay: 15m
          history: 90d
          value_type: TEXT
          authtype: BASIC
          username: '{$SANTRICITY.USERNAME}'
          password: '{$SANTRICITY.PASSWORD}'
          description: 'True if the storage system is in lockdown mode'
          preprocessing:
            - type: REGEX
              parameters:
                - '(?<="isLockdown":)(.*?)(?=,)'
                - \0
          timeout: 7s
          url: '{$SANTRICITY.SCHEME}://{HOST.DNS}/devmgr/v2/storage-systems/{$SYSTEM_ID}/lockdownstatus'
          tags:
            - tag: Application
              value: 'Storage Lockdown Status'
