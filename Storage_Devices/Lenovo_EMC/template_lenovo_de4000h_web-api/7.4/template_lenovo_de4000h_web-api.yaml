              expression: 'nodata(/Lenovo SAN DE4000H by Web API/santricity.storage.systems.id.hotspare,900s)=1'
              name: 'No Data Retrieved "Storage Hot Spare Drives" for ID № "{$SYSTEM_ID}" in last 15 minutes'
