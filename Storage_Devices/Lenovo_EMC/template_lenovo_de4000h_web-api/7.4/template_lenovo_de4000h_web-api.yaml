        - uuid: 14bd2e09501941f49ea1df4ed8ac65ff
          name: 'Storage Systems ID Numbers'
          type: DEPENDENT
          key: santricity.storage.systems.numbers
          history: 90d
          value_type: TEXT
          description: 'Get the numbers ID of systems'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.[*].length()'
          master_item:
            key: santricity.storage.systems
          tags:
            - tag: Application
              value: 'Storage Systems ID'
      discovery_rules:
        - uuid: d0c6ac3187ab462999539a40aa83391f
          name: 'Storage About Information'
          type: DEPENDENT
          key: santricity.storage.systems.id.about.discovery
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'Additional Information'
          item_prototypes:
            - uuid: 647907f8522b483790f1fd2740673617
              name: 'Storage Systems ID № {$SYSTEM_ID} Name "{#NAME}" Serial Number'
              type: DEPENDENT
              key: 'santricity.storage.systems.id.about.[{#NAME},serialNumber]'
