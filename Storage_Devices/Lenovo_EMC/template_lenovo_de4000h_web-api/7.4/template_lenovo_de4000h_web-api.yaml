              parameters:
                - '$..hotSpareDriveCoverage.[*]'
          timeout: 7s
          url: '{$SANTRICITY.SCHEME}://{HOST.DNS}/devmgr/v2/storage-systems/{$SYSTEM_ID}/hot-spares'
