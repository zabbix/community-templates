        - uuid: 6edb7679cab64e1db8c79832879bda3f
          name: 'Storage Volume Groups'
          type: DEPENDENT
          key: santricity.storage.systems.id.volumegroups.discovery
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'Volume Groups Information'
          item_prototypes:
            - uuid: 22add02b5dcf4b26a4a3e41eb20700a4
              name: 'Storage Systems ID № {$SYSTEM_ID} Volume Group "{#LABEL}"  Raid Level'
              type: DEPENDENT
              key: 'santricity.storage.systems.id.system.config.volumegroups.name.[{$SYSTEM_ID},{#LABEL},{#RAIDLEVEL}]'
              value_type: TEXT
              description: 'Raid Level'
              preprocessing:
                - type: REGEX
                  parameters:
                    - '(?<="label":"{#LABEL}").*'
                    - \0
                - type: REGEX
                  parameters:
                    - '(?<="raidLevel":")(.*?)(?=\")'
                    - \0
              master_item:
                key: 'santricity.storage.systems.id.system.config.[{$SYSTEM_ID}]'
              tags:
                - tag: Application
                  value: 'Storage Volume Groups'
          master_item:
            key: 'santricity.storage.systems.id.system.config.[{$SYSTEM_ID}]'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $..volumeGroups
            - type: JAVASCRIPT
              parameters:
                - |
                  var json_data = value;
                  // All letters to Capital ones (keys only)
                  json_data = json_data.replace(/"([^"]+)":/g, function(match, p1) {
                      return '"' + p1.toUpperCase() + '":';
                  });
                  // Keys to Macros {#KEY}
                  json_data = json_data.replace(/"([A-Z0-9_]+)":/g, function(match, p1) {
                      return '"{#' + p1 + '}":';
                  });
                  // Cleaning
                  json_data = json_data.replace(/\[(?=\[)/g, '');
                  json_data = json_data.replace(/(\])(?!.*\1)/g, '');
                  return json_data;
