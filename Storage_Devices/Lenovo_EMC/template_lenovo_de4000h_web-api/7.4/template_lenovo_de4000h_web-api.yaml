        - uuid: 3135a0d391a94826a4ad360b7b50b408
          name: 'SANtricity: Get Storage Hot Spare Drives'
          type: HTTP_AGENT
          key: santricity.storage.systems.id.hotspare
          delay: 5m
          history: 1h
          value_type: TEXT
          authtype: BASIC
