zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 7c2cb727f85b492d88cd56e17127c64d
      name: 'Templates/NAS & SAN'
  templates:
    - uuid: 0081348a232c4a3985d16235a0a44cf9
      template: 'Lenovo SAN DE4000H by Web API'
      name: 'Lenovo SAN DE4000H by Web API (SANtricity)'
      description: |
        Created by A.Cherednikov
        
        Pay attention to macros values.
        Fill the username, password and scheme to successfully receive the data.
        If you have more than one system storage ID - just create separate host, link this template to new host and set new macros {$SYSTEM_ID}
        To determine how many systems id's you have check the result of item "Storage Systems ID Numbers" Default ID = 1
        
        
        Updated by Cool34000
        Fix CPU utilization item
        Fix spare drives status item (when more than 1 spare drive)
        Fix spare blocks Trigger for non SSD drives
        Added Hardware Inventory (Batteries, Fans, PSU & Temperatures)
        Added Dashboard
        Drive Temperatures disabled by default (returns 404 on my DE4000H)
      templates:
        - name: 'ICMP Ping'
      groups:
        - name: 'Templates/NAS & SAN'
      items:
        - uuid: e67301feb47641c2a08558b0b0c75670
          name: 'SAN Name'
          type: DEPENDENT
          key: santricity.san.name
          value_type: TEXT
          inventory_link: NAME
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[*].name'
            - type: REGEX
              parameters:
                - '"(.*?)"'
                - \1
          master_item:
            key: santricity.storage.systems.id.about
          tags:
            - tag: Application
              value: 'Storage About Info'
        - uuid: 50a533e70c7345c2a69b5c7c4eb44ef5
          name: 'SAN NVSRAM version'
          type: DEPENDENT
          key: santricity.san.nvram.version
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[0].codeVersions[?(@.codeModule==''nvsram'')].versionString'
            - type: REGEX
              parameters:
                - '"(.*?)"'
                - \1
          master_item:
            key: santricity.storage.systems.id.firmware
          tags:
            - tag: Application
              value: 'Storage Firmware'
        - uuid: 5bde7b9d56104115ac5f7e20a6d0635d
          name: 'SAN OS version'
          type: DEPENDENT
          key: santricity.san.os.version
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[0].codeVersions[?(@.codeModule==''bundleDisplay'')].versionString'
            - type: REGEX
              parameters:
                - '"(.*?)"'
                - \1
          master_item:
            key: santricity.storage.systems.id.firmware
          tags:
            - tag: Application
              value: 'Storage Firmware'
        - uuid: 4d3b4c15ff184a56acae4a73b11f1537
          name: 'SAN Serial Number'
          type: DEPENDENT
          key: santricity.san.sn
          value_type: TEXT
          description: 'Serial Number'
          inventory_link: SERIALNO_A
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[*].serialNumber'
            - type: REGEX
              parameters:
                - '"(.*?)"'
                - \1
          master_item:
            key: santricity.storage.systems.id.about
          tags:
            - tag: Application
              value: 'Storage About Info'
        - uuid: b4bbe3e707a24e4096f7234bc671c9d0
          name: 'SANtricity: Get Storage Systems ID'
          type: HTTP_AGENT
          key: santricity.storage.systems
          delay: 15m
          history: 1h
          value_type: TEXT
          authtype: BASIC
          username: '{$SANTRICITY.USERNAME}'
          password: '{$SANTRICITY.PASSWORD}'
          description: 'Main item to collect system ID numbers information (raw data)'
          timeout: 7s
          url: '{$SANTRICITY.SCHEME}://{HOST.DNS}/devmgr/v2/storage-systems'
          tags:
            - tag: Application
              value: 'Storage Systems ID'
          triggers:
            - uuid: ef2767e25973478ba5aa85bce440e658
              expression: 'nodata(/Lenovo SAN DE4000H by Web API/santricity.storage.systems,1800s)=1'
              name: 'No Data Retrieved "Storage Systems ID" in last 30 minutes for {HOST.DNS}'
              priority: HIGH
              description: 'Check the access to http or https'
              manual_close: 'YES'
        - uuid: e162328f51394693ae37b23e5de37725
          name: 'Storage System ID № "{$SYSTEM_ID}" Certificate Status'
          type: DEPENDENT
          key: 'santricity.storage.systems.certificate.status.id.[{$SYSTEM_ID}]'
          history: 90d
          value_type: TEXT
          description: 'Get the certificate status (https)'
          preprocessing:
            - type: REGEX
              parameters:
                - '(?<="id":"{$SYSTEM_ID}",).*'
                - \0
            - type: REGEX
              parameters:
                - '(?<="certificateStatus":")(.*?)(?=\")'
                - \0
          master_item:
            key: santricity.storage.systems
          tags:
            - tag: Application
              value: 'Storage Systems ID'
        - uuid: bef04b862110479782033c125461ac1f
          name: 'SANtricity: Get Storage About Information'
          type: HTTP_AGENT
          key: santricity.storage.systems.id.about
          delay: 30m
          history: 1h
          value_type: TEXT
          authtype: BASIC
          username: '{$SANTRICITY.USERNAME}'
          password: '{$SANTRICITY.PASSWORD}'
          description: 'Main item to collect additional information (raw data)'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - '   return(''['' + value + '']'') //making an array'
          timeout: 7s
          url: '{$SANTRICITY.SCHEME}://{HOST.DNS}/devmgr/v2/storage-systems/{$SYSTEM_ID}/about'
          tags:
            - tag: Application
              value: 'Storage About Info'
          triggers:
            - uuid: 52e582dacf4940b183e2f167fedaf20f
              expression: 'nodata(/Lenovo SAN DE4000H by Web API/santricity.storage.systems.id.about,3600s)=1'
              name: 'No Data Retrieved "About Information" for ID № "{$SYSTEM_ID}" in last 60 minutes'
              priority: HIGH
              description: 'Check the access to http or https'
              manual_close: 'YES'
        - uuid: bd3b6392442b449eaf726ef3dfcc61a9
          name: 'SANtricity: Get Storage Admin Password Set Status'
          type: HTTP_AGENT
          key: santricity.storage.systems.id.admin.password.status
          delay: 30m
          history: 1h
          value_type: TEXT
          authtype: BASIC
          username: '{$SANTRICITY.USERNAME}'
          password: '{$SANTRICITY.PASSWORD}'
          description: 'Main item to collect admin password status information (raw data)'
          preprocessing:
            - type: REGEX
              parameters:
                - '(?<="adminPasswordSet":)(.*?)(?=,)'
                - \0
          timeout: 7s
          url: '{$SANTRICITY.SCHEME}://{HOST.DNS}/devmgr/v2/storage-systems/{$SYSTEM_ID}/passwords'
          tags:
            - tag: Application
              value: 'Storage Admin Password Status'
          triggers:
            - uuid: d83b031b88e14f3aa5bd2988b157b2d5
              expression: 'find(/Lenovo SAN DE4000H by Web API/santricity.storage.systems.id.admin.password.status,#1,"like","true")=0'
              name: 'Admin Password Not Set for ID № "{$SYSTEM_ID}"'
              priority: AVERAGE
              description: 'Set Admin Password Please'
              manual_close: 'YES'
            - uuid: 0decffe6df484bf19885dc817eb5bccc
              expression: 'nodata(/Lenovo SAN DE4000H by Web API/santricity.storage.systems.id.admin.password.status,3600s)=1'
              name: 'No Data Retrieved "Admin Password Set Status" for ID № "{$SYSTEM_ID}" in last 60 minutes'
              priority: HIGH
              description: 'Check the access to http or https'
              manual_close: 'YES'
        - uuid: 4c0c452ba14c4d38a99a61fbf9def366
          name: 'SANtricity: Get Storage Analysed System Statistics'
          type: HTTP_AGENT
          key: santricity.storage.systems.id.analysed.statstics
          delay: 5m
          history: 1h
          value_type: TEXT
          authtype: BASIC
          username: '{$SANTRICITY.USERNAME}'
          password: '{$SANTRICITY.PASSWORD}'
          description: |
            Main item to collect analysed system information (raw data)
            
            Statistics generation frequency is about 5 minutes 
            Cannot be got frequently than 5 minutes - getting values will be the same
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - '   return(''['' + value + '']'') //making an array'
          timeout: 7s
