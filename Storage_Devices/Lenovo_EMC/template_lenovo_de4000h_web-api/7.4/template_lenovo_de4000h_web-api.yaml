          triggers:
            - uuid: d53f4931df3c484ba96987ee19ae61d8
              expression: 'nodata(/Lenovo SAN DE4000H by Web API/santricity.storage.systems.id.diagnostic.temperature,600s)=1'
              name: 'No Data Retrieved "Storage Drives Temperature" for ID № "{$SYSTEM_ID}" in last 10 minutes'
              status: DISABLED
              priority: HIGH
              description: 'Check the access to http or https'
              manual_close: 'YES'
        - uuid: 466c242a417040bb99ccc8299d923bf8
          name: 'SANtricity: Get Storage Drives'
          type: HTTP_AGENT
          key: santricity.storage.systems.id.drives
          history: 1h
          value_type: TEXT
          authtype: BASIC
          username: '{$SANTRICITY.USERNAME}'
          password: '{$SANTRICITY.PASSWORD}'
          description: 'Main item to collect drives  information (raw data)'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |2
                     json_data = value
                     json_data = json_data.replace(/(?="protectionInformationCapabilities":)(.*?)},(?=")/g, '');  // delete some unused strings to fit into 65535 bytes
                     return(json_data);
          timeout: 7s
          url: '{$SANTRICITY.SCHEME}://{HOST.DNS}/devmgr/v2/storage-systems/{$SYSTEM_ID}/drives'
          tags:
            - tag: Application
              value: 'Storage Drives'
          triggers:
            - uuid: 5d50457144dd4fd9b86852214e804198
              expression: 'nodata(/Lenovo SAN DE4000H by Web API/santricity.storage.systems.id.drives,600s)=1'
              name: 'No Data Retrieved "Storage Drives"  for ID № "{$SYSTEM_ID}" in last 10 minutes'
