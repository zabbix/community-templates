            - uuid: f21d2e45915a4a2fa205c1a48ee89a47
              name: 'Storage Systems ID № "{$SYSTEM_ID}" Volume Group "{#VOLUMEGROUPLABEL}" Volume "{#LABEL}"  Write Cache Enabled'
              type: DEPENDENT
