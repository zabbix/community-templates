            - uuid: 405d6f0286c249b68fe81c35d5ff22f0
              name: 'Storage Systems ID № "{$SYSTEM_ID}" Volume Group "{#VOLUMEGROUPLABEL}" Volume "{#LABEL}" Size'
              type: DEPENDENT
              key: 'santricity.storage.systems.id.system.config.volumes.name.[{$SYSTEM_ID},{#LABEL}]'
              units: B
              description: 'Volume Size in bytes'
              preprocessing:
                - type: REGEX
                  parameters:
                    - '(?<="label":"{#LABEL}").*'
                    - \0
                - type: REGEX
                  parameters:
                    - '(?<="capacity":")(.*?)(?=\")'
                    - \0
              master_item:
                key: 'santricity.storage.systems.id.system.config.[{$SYSTEM_ID}]'
              tags:
                - tag: Application
                  value: 'Storage Volumes'
          master_item:
            key: 'santricity.storage.systems.id.system.config.[{$SYSTEM_ID}]'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $..volumes
            - type: JAVASCRIPT
              parameters:
                - |
                  var json_data = value;
                  // All letters to Capital ones (keys only)
                  json_data = json_data.replace(/"([^"]+)":/g, function(match, p1) {
                      return '"' + p1.toUpperCase() + '":';
                  });
                  // Keys to Macros {#KEY}
                  json_data = json_data.replace(/"([A-Z0-9_]+)":/g, function(match, p1) {
                      return '"{#' + p1 + '}":';
                  });
                  // Cleaning
                  json_data = json_data.replace(/\[(?=\[)/g, '');
                  json_data = json_data.replace(/(\])(?!.*\1)/g, '');
                  return json_data;
