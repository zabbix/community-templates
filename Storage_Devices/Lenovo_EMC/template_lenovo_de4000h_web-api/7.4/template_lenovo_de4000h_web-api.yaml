          description: 'Main item to collect drives temperature information (raw data)'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - '   return(''['' + value + '']'') //making an array'
          timeout: 7s
          url: '{$SANTRICITY.SCHEME}://{HOST.DNS}/devmgr/v2/storage-systems/{$SYSTEM_ID}/diagnostic-data/temperature-information'
          tags:
            - tag: Application
