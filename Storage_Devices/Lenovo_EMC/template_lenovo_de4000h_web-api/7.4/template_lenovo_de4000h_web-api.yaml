        - uuid: 3288c9ac5a534e0bae7c38906ce7167e
          name: 'Storage Drives Temperature'
          type: DEPENDENT
          key: santricity.storage.systems.id.diagnostic.temperature.discovery
          status: DISABLED
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'Drive Temperature Sensors'
          item_prototypes:
            - uuid: 80da74d6c68f4530b9d1be9d4ef102fd
              name: 'Storage Systems ID № {$SYSTEM_ID} Drive  "{#ID}"  Temperature'
              type: DEPENDENT
              key: 'santricity.storage.systems.id.diagnostic.temperature.drive.[{#ID}]'
              description: 'in Celsius'
              preprocessing:
                - type: REGEX
                  parameters:
                    - '(?<="id":"{#ID}").*'
                    - \0
                - type: REGEX
                  parameters:
                    - '(?<="currentTempInCelsius":)\d\d'
                    - \0
              master_item:
                key: santricity.storage.systems.id.diagnostic.temperature
              tags:
                - tag: Application
                  value: 'Storage Drives Temperature'
              trigger_prototypes:
                - uuid: 3738f4079fe7419abc8f95aea6d2cc8b
                  expression: 'min(/Lenovo SAN DE4000H by Web API/santricity.storage.systems.id.diagnostic.temperature.drive.[{#ID}],#3)>={$TEMP_DRIVE_HIGH}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'min(/Lenovo SAN DE4000H by Web API/santricity.storage.systems.id.diagnostic.temperature.drive.[{#ID}],#3)<={$TEMP_DRIVE_HIGH}'
                  name: 'Drive  "{#ID}"  Temperature is too HIGH (>{$TEMP_DRIVE_HIGH})'
                  priority: HIGH
                  description: 'Reference Temp is {#REFERENCETEMPINCELSIUS}'
                  manual_close: 'YES'
                  dependencies:
                    - name: 'Drive  "{#ID}"  Temperature Warning (>{$TEMP_DRIVE_WARN})'
                      expression: 'min(/Lenovo SAN DE4000H by Web API/santricity.storage.systems.id.diagnostic.temperature.drive.[{#ID}],#3)>={$TEMP_DRIVE_WARN}'
                      recovery_expression: 'min(/Lenovo SAN DE4000H by Web API/santricity.storage.systems.id.diagnostic.temperature.drive.[{#ID}],#3)<={$TEMP_DRIVE_WARN}'
                - uuid: 80fd3236629e4a65a284f2d7d409fc63
                  expression: 'min(/Lenovo SAN DE4000H by Web API/santricity.storage.systems.id.diagnostic.temperature.drive.[{#ID}],#3)>={$TEMP_DRIVE_WARN}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'min(/Lenovo SAN DE4000H by Web API/santricity.storage.systems.id.diagnostic.temperature.drive.[{#ID}],#3)<={$TEMP_DRIVE_WARN}'
                  name: 'Drive  "{#ID}"  Temperature Warning (>{$TEMP_DRIVE_WARN})'
                  priority: WARNING
                  description: 'Reference Temp is {#REFERENCETEMPINCELSIUS}'
                  manual_close: 'YES'
          master_item:
            key: santricity.storage.systems.id.diagnostic.temperature
          preprocessing:
            - type: JSONPATH
              parameters:
                - $..DriveTemperatureInformationData
            - type: JAVASCRIPT
              parameters:
                - |
                  json_data = value
                     json_data = json_data.replace(/"([^"]*)":/g, function(v) { return v.toUpperCase(); } );    // all letters to Capital ones
                     json_data = json_data.replace(/"(?=[A-Z])/g,'"{#');                                        // making an array
                     json_data = json_data.replace(/"(?=:)/g,'}"' );                                            // making an array 
                     json_data = json_data.replace(/\[(?=\[)/g,'' );                                            // making an array
                     json_data = json_data.replace(/(\])(?!.*\1)/g,'' );                                        // making an array
                     return(json_data);
