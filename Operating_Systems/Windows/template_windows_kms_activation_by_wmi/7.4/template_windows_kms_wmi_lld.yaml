zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 8f7f6db7e8c54c6ba7b50b1444dd0a11
      name: Templates
  templates:
    - uuid: 5a5e1fa4e86b4d1ab7c3d6de65a0b101
      template: 'Template Windows KMS WMI LLD'
      name: 'Template Windows KMS WMI LLD'
      description: |
        Windows-only activation monitoring through WMI.
        
        Data model:
        - Regular master item via wmi.getall[] on SoftwareLicensingProduct
        - Dependent LLD discovery rule fed from the master JSON item
        - Dependent item prototypes for days/minutes/status/name
        - Extra OS information via Win32_OperatingSystem
        
        Recommended agent setting on monitored hosts:
        Timeout=10
      groups:
        - name: Templates
      items:
        - uuid: b2bc72cfd36c4b33a8e38e7c2027f102
          name: 'Windows activation raw JSON (WMI)'
          key: 'wmi.getall[root\cimv2,"SELECT ID,Name,LicenseStatus,GracePeriodRemaining FROM SoftwareLicensingProduct WHERE PartialProductKey IS NOT NULL AND ApplicationID=''55c92734-d682-4d71-983e-d6ec3f16059f''"]'
          delay: 1h
          value_type: TEXT
        - uuid: 2d31b6483e6f4f5db5a9e7fa0f7e7105
          name: 'Windows OS build'
          key: 'wmi.get[root\cimv2,"SELECT BuildNumber FROM Win32_OperatingSystem"]'
          delay: 12h
          value_type: TEXT
        - uuid: 11bc72cfd36c4b33a8e38e7c2027f103
          name: 'Windows OS caption'
          key: 'wmi.get[root\cimv2,"SELECT Caption FROM Win32_OperatingSystem"]'
          delay: 12h
          value_type: TEXT
        - uuid: 77a8de175a624f4cb4c020f612227104
          name: 'Windows OS version'
          key: 'wmi.get[root\cimv2,"SELECT Version FROM Win32_OperatingSystem"]'
          delay: 12h
          value_type: TEXT
      discovery_rules:
        - uuid: 86d6bf95fbdb4dadb8c2366f8295f201
          name: 'Windows activation discovery'
          type: DEPENDENT
          key: windows.activation.discovery
          item_prototypes:
            - uuid: c6ce2b3c27184fa6a9a2fcf2dc99f301
              name: '{#LICENSENAME}: Days until activation expiry'
              type: DEPENDENT
              key: 'windows.license.days[{#LICENSEID}]'
              value_type: FLOAT
              trends: 36d
              units: d
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.ID == ''{#LICENSEID}'')].GracePeriodRemaining.first()'
                - type: MULTIPLIER
                  parameters:
                    - '0.000694444444'
              master_item:
                key: 'wmi.getall[root\cimv2,"SELECT ID,Name,LicenseStatus,GracePeriodRemaining FROM SoftwareLicensingProduct WHERE PartialProductKey IS NOT NULL AND ApplicationID=''55c92734-d682-4d71-983e-d6ec3f16059f''"]'
              trigger_prototypes:
                - uuid: 5ab59e68786d4f639d26aa778245d301
                  expression: 'last(/Template Windows KMS WMI LLD/windows.license.days[{#LICENSEID}])<{$WINDOWS.KMS.CRIT.DAYS}'
                  name: '{#LICENSENAME}: activation expires in <{$WINDOWS.KMS.CRIT.DAYS} days'
                  priority: HIGH
                - uuid: 88ba11f6b0c24c9cb08b26ae45ca5302
                  expression: 'last(/Template Windows KMS WMI LLD/windows.license.days[{#LICENSEID}])<{$WINDOWS.KMS.WARN.DAYS}'
                  name: '{#LICENSENAME}: activation expires in <{$WINDOWS.KMS.WARN.DAYS} days'
                  priority: WARNING
            - uuid: d839d8df7e19489a80c680811512f302
              name: '_INTERNAL_: {#LICENSENAME}: Grace minutes'
              type: DEPENDENT
              key: 'windows.license.minutes[{#LICENSEID}]'
              value_type: FLOAT
              trends: '0'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.ID == ''{#LICENSEID}'')].GracePeriodRemaining.first()'
              master_item:
                key: 'wmi.getall[root\cimv2,"SELECT ID,Name,LicenseStatus,GracePeriodRemaining FROM SoftwareLicensingProduct WHERE PartialProductKey IS NOT NULL AND ApplicationID=''55c92734-d682-4d71-983e-d6ec3f16059f''"]'
            - uuid: 7ead89d97d68440ebf29db9d803f7304
              name: '{#LICENSENAME}: Product name'
              type: DEPENDENT
              key: 'windows.license.name[{#LICENSEID}]'
              value_type: TEXT
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.ID == ''{#LICENSEID}'')].Name.first()'
              master_item:
                key: 'wmi.getall[root\cimv2,"SELECT ID,Name,LicenseStatus,GracePeriodRemaining FROM SoftwareLicensingProduct WHERE PartialProductKey IS NOT NULL AND ApplicationID=''55c92734-d682-4d71-983e-d6ec3f16059f''"]'
            - uuid: 6276b0433a2d474eb3a53a7ac8df4303
              name: '{#LICENSENAME}: License status code'
              type: DEPENDENT
              key: 'windows.license.status[{#LICENSEID}]'
              value_type: FLOAT
              trends: '0'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.ID == ''{#LICENSEID}'')].LicenseStatus.first()'
              master_item:
                key: 'wmi.getall[root\cimv2,"SELECT ID,Name,LicenseStatus,GracePeriodRemaining FROM SoftwareLicensingProduct WHERE PartialProductKey IS NOT NULL AND ApplicationID=''55c92734-d682-4d71-983e-d6ec3f16059f''"]'
              trigger_prototypes:
                - uuid: cb65e6b6b0284f8da2df2c0a30f2c303
                  expression: 'last(/Template Windows KMS WMI LLD/windows.license.status[{#LICENSEID}])<>1'
                  name: '{#LICENSENAME}: license is not in Licensed state'
                  priority: AVERAGE
          master_item:
            key: 'wmi.getall[root\cimv2,"SELECT ID,Name,LicenseStatus,GracePeriodRemaining FROM SoftwareLicensingProduct WHERE PartialProductKey IS NOT NULL AND ApplicationID=''55c92734-d682-4d71-983e-d6ec3f16059f''"]'
          lld_macro_paths:
            - lld_macro: '{#LICENSEID}'
              path: $.ID
            - lld_macro: '{#LICENSENAME}'
              path: $.Name
      macros:
        - macro: '{$WINDOWS.KMS.CRIT.DAYS}'
          value: '7'
          description: 'Critical threshold for Windows activation expiration, in days.'
        - macro: '{$WINDOWS.KMS.WARN.DAYS}'
          value: '30'
          description: 'Warning threshold for Windows activation expiration, in days.'
