zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 65585c7322a8422e965dccf49ce59293
      name: Templates/MORI
  templates:
    - uuid: aec99de3c8ed4198958f5128f0ba0120
      template: 'MORI Linux Security Baseline'
      name: 'MORI Linux Security Baseline'
      description: 'MORI SOC baseline for Linux endpoints. Surfaces disk/CPU/memory/agent problems into MORI Alert Triage (ISMS-P / ISO 27001 audit evidence).'
      groups:
        - name: Templates/MORI
      items:
        - uuid: 70d20e23e1a04b40a92c55aa50ea27a5
          name: 'Zabbix agent availability'
          key: agent.ping
          delay: 60s
          tags:
            - tag: class
              value: security
            - tag: component
              value: agent
            - tag: source
              value: mori
          triggers:
            - uuid: eb675a0ca6454960b6ca8f2eae8ec33e
              expression: 'nodata(/MORI Linux Security Baseline/agent.ping,{$MORI.AGENT.NODATA})=1'
              name: 'Zabbix agent is not responding ({$MORI.AGENT.NODATA})'
              url_name: 'MORI Alert Triage'
              url: '{$MORI.URL}'
              priority: HIGH
              tags:
                - tag: class
                  value: security
                - tag: component
                  value: agent
                - tag: source
                  value: mori
        - uuid: f47170f2d6594fd0a5fb9bdb69dd56fc
          name: 'CPU: load average (1m)'
          key: 'system.cpu.load[all,avg1]'
          delay: 60s
          value_type: FLOAT
          tags:
            - tag: class
              value: security
            - tag: component
              value: cpu
            - tag: source
              value: mori
          triggers:
            - uuid: 7d754614d965456f8b3d3f3722ed7058
              expression: 'avg(/MORI Linux Security Baseline/system.cpu.load[all,avg1],5m)>{$MORI.CPU.LOAD.MAX}'
              name: 'CPU load is too high (avg 5m >{$MORI.CPU.LOAD.MAX})'
              url_name: 'MORI Alert Triage'
              url: '{$MORI.URL}'
              priority: AVERAGE
              tags:
                - tag: class
                  value: security
                - tag: component
                  value: cpu
                - tag: source
                  value: mori
        - uuid: 6da07f7be24343b581924b7180a8a792
          name: 'Memory: available, in %'
          key: 'vm.memory.size[pavailable]'
          delay: 60s
          value_type: FLOAT
          units: '%'
          tags:
            - tag: class
              value: security
            - tag: component
              value: memory
            - tag: source
              value: mori
          triggers:
            - uuid: 207112b824e04687b6ed99bb7a6094be
              expression: 'last(/MORI Linux Security Baseline/vm.memory.size[pavailable])<{$MORI.MEM.PAVAIL.MIN}'
              name: 'Available memory is low (<{$MORI.MEM.PAVAIL.MIN}%)'
              url_name: 'MORI Alert Triage'
              url: '{$MORI.URL}'
              priority: HIGH
              tags:
                - tag: class
                  value: security
                - tag: component
                  value: memory
                - tag: source
                  value: mori
      discovery_rules:
        - uuid: db94ad90f4eb4c5d96116fd670755a23
          name: 'Mounted filesystem discovery'
          key: vfs.fs.discovery
          delay: 1h
          item_prototypes:
            - uuid: 8e557d1c56194d67879c82ffce2ed944
              name: 'FS {#FSNAME}: space used, in %'
              key: 'vfs.fs.size[{#FSNAME},pused]'
              delay: 60s
              value_type: FLOAT
              units: '%'
              tags:
                - tag: class
                  value: security
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: mori
              trigger_prototypes:
                - uuid: 8910c42d167b4edca2f89b0b11be12c1
                  expression: 'last(/MORI Linux Security Baseline/vfs.fs.size[{#FSNAME},pused])>{$MORI.DISK.PUSED.MAX:"{#FSNAME}"}'
                  name: 'FS {#FSNAME}: space usage is high (>{$MORI.DISK.PUSED.MAX:"{#FSNAME}"}%)'
                  url_name: 'MORI Alert Triage'
                  url: '{$MORI.URL}'
                  priority: HIGH
                  tags:
                    - tag: class
                      value: security
                    - tag: component
                      value: storage
                    - tag: filesystem
                      value: '{#FSNAME}'
                    - tag: source
                      value: mori
      macros:
        - macro: '{$MORI.AGENT.NODATA}'
          value: 5m
          description: 'agent 무응답 판정 시간'
        - macro: '{$MORI.CPU.LOAD.MAX}'
          value: '4'
          description: 'CPU load(1m avg) 임계'
        - macro: '{$MORI.DISK.PUSED.MAX}'
          value: '85'
          description: '루트 FS 사용률 임계(%)'
        - macro: '{$MORI.MEM.PAVAIL.MIN}'
          value: '10'
          description: '가용 메모리 최소(%)'
        - macro: '{$MORI.URL}'
          description: '트리거 링크 대상(MORI Alert Triage URL). 비우면 링크 없음'
