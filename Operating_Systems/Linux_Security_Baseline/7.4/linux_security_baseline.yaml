zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 65585c7322a8422e965dccf49ce59293
      name: Templates/Operating systems
  templates:
    - uuid: aec99de3c8ed4198958f5128f0ba0120
      template: 'Linux Security Baseline by Zabbix agent 2'
      name: 'Linux Security Baseline by Zabbix agent 2'
      description: 'A lightweight Linux security/audit baseline for hosts monitored by Zabbix agent 2. Surfaces filesystem, CPU, memory and agent-availability problems with macro-based thresholds so they can be consumed as audit evidence. Vendor-neutral: the only vendor-specific piece is an optional trigger URL macro that defaults to empty.'
      groups:
        - name: Templates/Operating systems
      items:
        - uuid: 70d20e23e1a04b40a92c55aa50ea27a5
          name: 'Zabbix agent availability'
          key: agent.ping
          delay: 60s
          tags:
            - tag: class
              value: security
            - tag: component
              value: agent
            - tag: source
              value: linux-security-baseline
          triggers:
            - uuid: eb675a0ca6454960b6ca8f2eae8ec33e
              expression: 'nodata(/Linux Security Baseline by Zabbix agent 2/agent.ping,{$BASELINE.AGENT.NODATA})=1'
              name: 'Zabbix agent is not responding ({$BASELINE.AGENT.NODATA})'
              url_name: 'Security/Audit link'
              url: '{$BASELINE.URL}'
              priority: HIGH
              tags:
                - tag: class
                  value: security
                - tag: component
                  value: agent
                - tag: source
                  value: linux-security-baseline
        - uuid: f47170f2d6594fd0a5fb9bdb69dd56fc
          name: 'CPU: load average (1m)'
          key: 'system.cpu.load[all,avg1]'
          delay: 60s
          value_type: FLOAT
          tags:
            - tag: class
              value: security
            - tag: component
              value: cpu
            - tag: source
              value: linux-security-baseline
          triggers:
            - uuid: 7d754614d965456f8b3d3f3722ed7058
              expression: 'avg(/Linux Security Baseline by Zabbix agent 2/system.cpu.load[all,avg1],5m)>{$BASELINE.CPU.LOAD.MAX}'
              name: 'CPU load is too high (avg 5m >{$BASELINE.CPU.LOAD.MAX})'
              url_name: 'Security/Audit link'
              url: '{$BASELINE.URL}'
              priority: AVERAGE
              tags:
                - tag: class
                  value: security
                - tag: component
                  value: cpu
                - tag: source
                  value: linux-security-baseline
        - uuid: 6da07f7be24343b581924b7180a8a792
          name: 'Memory: available, in %'
          key: 'vm.memory.size[pavailable]'
          delay: 60s
          value_type: FLOAT
          units: '%'
          tags:
            - tag: class
              value: security
            - tag: component
              value: memory
            - tag: source
              value: linux-security-baseline
          triggers:
            - uuid: 207112b824e04687b6ed99bb7a6094be
              expression: 'last(/Linux Security Baseline by Zabbix agent 2/vm.memory.size[pavailable])<{$BASELINE.MEM.PAVAIL.MIN}'
              name: 'Available memory is low (<{$BASELINE.MEM.PAVAIL.MIN}%)'
              url_name: 'Security/Audit link'
              url: '{$BASELINE.URL}'
              priority: AVERAGE
              tags:
                - tag: class
                  value: security
                - tag: component
                  value: memory
                - tag: source
                  value: linux-security-baseline
      discovery_rules:
        - uuid: db94ad90f4eb4c5d96116fd670755a23
          name: 'Mounted filesystem discovery'
          key: vfs.fs.discovery
          delay: 1h
          item_prototypes:
            - uuid: 8e557d1c56194d67879c82ffce2ed944
              name: 'FS {#FSNAME}: space used, in %'
              key: 'vfs.fs.size[{#FSNAME},pused]'
              delay: 60s
              value_type: FLOAT
              units: '%'
              tags:
                - tag: class
                  value: security
                - tag: component
                  value: storage
                - tag: filesystem
                  value: '{#FSNAME}'
                - tag: source
                  value: linux-security-baseline
              trigger_prototypes:
                - uuid: 8910c42d167b4edca2f89b0b11be12c1
                  expression: 'last(/Linux Security Baseline by Zabbix agent 2/vfs.fs.size[{#FSNAME},pused])>{$BASELINE.DISK.PUSED.MAX:"{#FSNAME}"}'
                  name: 'FS {#FSNAME}: space usage is high (>{$BASELINE.DISK.PUSED.MAX:"{#FSNAME}"}%)'
                  url_name: 'Security/Audit link'
                  url: '{$BASELINE.URL}'
                  priority: WARNING
                  tags:
                    - tag: class
                      value: security
                    - tag: component
                      value: storage
                    - tag: filesystem
                      value: '{#FSNAME}'
                    - tag: source
                      value: linux-security-baseline
      macros:
        - macro: '{$BASELINE.AGENT.NODATA}'
          value: 5m
          description: 'No-data window before the agent is considered unresponsive.'
        - macro: '{$BASELINE.CPU.LOAD.MAX}'
          value: '4'
          description: 'CPU load (1m avg) trigger threshold.'
        - macro: '{$BASELINE.DISK.PUSED.MAX}'
          value: '85'
          description: 'Filesystem used-space trigger threshold, %. Context-aware per {#FSNAME}.'
        - macro: '{$BASELINE.MEM.PAVAIL.MIN}'
          value: '10'
          description: 'Minimum available memory, %.'
        - macro: '{$BASELINE.URL}'
          description: 'Optional URL attached to triggers (e.g. a security/audit dashboard or runbook). Leave empty for no link.'
