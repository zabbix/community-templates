            name: 'Schleifenbauer Ring State'
          triggers:
            - uuid: 'f639c832e87a465fbc0f8af16b2c7626'
              expression: 'last(/Template_Schleifenbauer PDU/sdb.mgmt.ring_state)=0 and last(/Template_Schleifenbauer PDU/sdb.mgmt.ring_state,#2)=1'
              name: 'PDU: Databus ring is open (fault)'
              priority: 'AVERAGE'
              description: |
                The Schleifenbauer databus ring topology is open, indicating a cable or device fault.
                
                Only fires after the ring has been confirmed closed (OK) at least once. Can be manually closed.
              manual_close: 'YES'
