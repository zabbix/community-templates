---
zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: '826ad5987744493eb01ddcb5956d4a40'
      name: 'Templates/Network devices'
  templates:
    - uuid: 'af3a67c6b2c64ffd94f105da70eded61'
      template: 'Template_Schleifenbauer PDU'
      name: 'Template_Schleifenbauer PDU'
      description: |
        Schleifenbauer PDU — Modern SNMP template for Zabbix 7.4.
        
        Supports single and multi-PDU deployments via the Schleifenbauer databus (ring topology).
        Uses walk[]/get[] master items and Low-Level Discovery for devices, inputs, outlets, branches and sensors.
        
        Enterprise OID: 1.3.6.1.4.1.31034 (SCHLEIFENBAUER-DATABUS-MIB)
        Vendor documentation: https://www.schleifenbauer.eu
        
        Author: Brandon van der Loo (@metrotyranno)
        License: MIT
      templates:
        - name: 'ICMP Ping'
      groups:
        - name: 'Templates/Network devices'
      macros:
        - macro: '{$SNMP_COMMUNITY}'
          value: 'public'
          description: 'SNMP v2c community string'
        - macro: '{$SNMP_PORT}'
          value: '161'
          description: 'SNMP UDP port'
        - macro: '{$PDU_TEMP_WARN}'
          value: '40'
          description: 'Internal temperature warning threshold (°C)'
        - macro: '{$PDU_TEMP_HIGH}'
          value: '50'
          description: 'Internal temperature critical threshold (°C)'
        - macro: '{$PDU_LOAD_WARN}'
          value: '80'
          description: 'Outlet current load warning (% of maximum)'
        - macro: '{$PDU_LOAD_HIGH}'
          value: '95'
          description: 'Outlet current load critical (% of maximum)'
      items:
        - uuid: 'b969d2dbf2a144aea66ab55d095eec31'
          name: 'SNMP walk: Management status'
          type: 'SNMP_AGENT'
          snmp_oid: 'walk[1.3.6.1.4.1.31034.12.1.1.1.1]'
          key: 'sdb.walk.mgmt'
          history: '0'
          trends: '0'
          value_type: 'TEXT'
          description: 'Master SNMP walk item — SNMP walk: Management status. Used by dependent items and LLD rules.'
          tags:
            - tag: 'component'
              value: 'management'
            - tag: 'Application'
              value: 'Raw Walk'
        - uuid: '3c5224f45eb74adfbc508a4ed11b5943'
