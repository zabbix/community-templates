zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 3dcd5bbe90534f9e8eb5c2d53756af63
      name: Templates/Power
  templates:
    - uuid: c4dcc9ba0590400e93162df66cd88db9
      template: 'INFOSEC UPS'
      name: 'INFOSEC UPS'
      groups:
        - name: Templates/Power
      items:
        - uuid: 3269a33255d04872bba4acd5a7ffa9ed
          name: 'Ping check'
          type: SIMPLE
          key: icmpping
          delay: 30s
          history: 45d
          trends: 120d
          valuemap:
            name: 'Service state'
          tags:
            - tag: Application
              value: Alarm
          triggers:
            - uuid: bf37ce355b8c48eabd72017c8fbcdd2d
              expression: 'sum(/INFOSEC UPS/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/INFOSEC UPS/icmpping,#3)<>3)'
              name: '{HOSTNAME} - Network unavailable'
              priority: HIGH
        - uuid: d3dfd0d4a2c349638ee5259dda21d564
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: 30s
          trends: '0'
          units: uptime
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 71ee9aacf6694e83b2d0ede5b0d73d92
          name: 'Ambient Temperature'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.2.7.0
          key: upsAmbientTemperature.0
          history: 7d
          units: °C
          description: '"The ambient temperature inside the UPS in 0.1 degree"'
          tags:
            - tag: Application
              value: Temperature
          triggers:
            - uuid: d1a8a44e924d4683a175137b0cc78798
              expression: 'avg(/INFOSEC UPS/upsAmbientTemperature.0,30s)>40'
              name: '{HOSTNAME} - Ambient temperature critical'
              priority: HIGH
              description: 'External Temperature Critical'
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/INFOSEC UPS/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/INFOSEC UPS/icmpping,#3)<>3)'
            - uuid: be3c8b9410354e7b93d85236a19c58da
              expression: 'avg(/INFOSEC UPS/upsAmbientTemperature.0,30s)>37'
              name: '{HOSTNAME} - Ambient temperature High'
              priority: AVERAGE
              description: 'External Temperature High'
              dependencies:
                - name: '{HOSTNAME} - Ambient temperature critical'
                  expression: 'avg(/INFOSEC UPS/upsAmbientTemperature.0,30s)>40'
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/INFOSEC UPS/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/INFOSEC UPS/icmpping,#3)<>3)'
            - uuid: 7b2dd67c2fe548dca08d11c1d96323a8
              expression: 'avg(/INFOSEC UPS/upsAmbientTemperature.0,30s)<10'
              name: '{HOSTNAME} - Ambient temperature low'
              priority: AVERAGE
              description: 'External Temperature Low'
              dependencies:
                - name: '{HOSTNAME} - Ambient temperature too low'
                  expression: 'avg(/INFOSEC UPS/upsAmbientTemperature.0,30s)<5'
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/INFOSEC UPS/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/INFOSEC UPS/icmpping,#3)<>3)'
            - uuid: 6f2da2a534d04d83a307933bad16d6f3
              expression: 'avg(/INFOSEC UPS/upsAmbientTemperature.0,30s)<5'
              name: '{HOSTNAME} - Ambient temperature too low'
              priority: HIGH
              description: 'External Temperature Too Low'
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/INFOSEC UPS/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/INFOSEC UPS/icmpping,#3)<>3)'
        - uuid: 83c7d1ab74eb44be87a8d7804b0f273e
          name: 'Battery Status'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.2.1.0
          key: upsBatteryStatus.0
          history: 7d
          valuemap:
            name: 'Socomec - BatteryStatus'
          tags:
            - tag: Application
              value: Battery
          triggers:
            - uuid: f1f61b4e77314d41acd9d63b2f516846
              expression: 'last(/INFOSEC UPS/upsBatteryStatus.0)=1 or last(/INFOSEC UPS/upsBatteryStatus.0)=8 or last(/INFOSEC UPS/upsBatteryStatus.0)=9'
              name: '{HOSTNAME} - Battery Error'
              priority: HIGH
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/INFOSEC UPS/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/INFOSEC UPS/icmpping,#3)<>3)'
        - uuid: 5a45b6629fc7464dabc7ac94751d3714
          name: 'Battery Voltage'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.2.5.0
          key: upsBatteryVoltage.0
          history: 7d
          units: V
          description: '"The magnitude of the present battery voltage in 0.1 Volt DC."'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.1'
          tags:
            - tag: Application
              value: Battery
        - uuid: 6ef68381c062443cbf97bcab9bc741f0
          name: 'Battery Percent'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.2.4.0
          key: upsEstimatedChargeRemaining.0
          history: 7d
          value_type: FLOAT
          units: '%'
          description: '"An estimate of the battery charge remaining expressed as a percent of full charge."'
          tags:
            - tag: Application
              value: Battery
          triggers:
            - uuid: ae0e81b73bb54566aa653095dd4cd008
              expression: 'last(/INFOSEC UPS/upsEstimatedChargeRemaining.0)<15'
              name: '{HOSTNAME} - Battery Charge Critical'
              priority: HIGH
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/INFOSEC UPS/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/INFOSEC UPS/icmpping,#3)<>3)'
            - uuid: 06536f7ccfe1414eb3c96fd464497227
              expression: 'last(/INFOSEC UPS/upsEstimatedChargeRemaining.0)<30'
              name: '{HOSTNAME} - Battery Charge Low'
              priority: AVERAGE
              dependencies:
                - name: '{HOSTNAME} - Battery Charge Critical'
                  expression: 'last(/INFOSEC UPS/upsEstimatedChargeRemaining.0)<15'
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/INFOSEC UPS/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/INFOSEC UPS/icmpping,#3)<>3)'
        - uuid: 9d00eae07ea24e9f9925a7835025736e
          name: 'Battery Time Remaining'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.2.3.0
          key: upsEstimatedMinutesRemaining.0
          history: 7d
          units: minutes
          tags:
            - tag: component
              value: power
        - uuid: 4b10b3806aa8425793770c3a6481da4c
          name: 'Firmware Version'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.1.4.0
          key: upsfirmware.0
          delay: 1d
          history: 7d
          value_type: TEXT
          inventory_link: OS
          tags:
            - tag: Application
              value: Information
        - uuid: 67adb69d728f417dbd3f6a8a6e4cceef
          name: Model
          type: SNMP_AGENT
          snmp_oid: iso.3.6.1.2.1.33.1.1.2.0
          key: upsIdentModel.0
          delay: 1d
          history: 7d
          value_type: TEXT
          inventory_link: MODEL
          tags:
            - tag: Application
              value: Information
        - uuid: 96e870febc7d491e8b2cf740b618c8b8
          name: 'Serial Number'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.4555.1.1.1.1.1.4.0
          key: upsIdentSerialNumber.0
          delay: 1d
          history: 7d
          value_type: TEXT
          inventory_link: SERIALNO_A
          tags:
            - tag: Application
              value: Information
        - uuid: 721f3a0215f54c53bede411d58861471
          name: 'Input Frequency'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.3.3.1.2.1
          key: upsInputFrequency.0
          history: 7d
          units: Hz
          description: '"The current input frequency to the UPS system in 0.1 HZ."'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.1'
          tags:
            - tag: Application
              value: Input
          triggers:
            - uuid: 011de0eeff214526bc37d00982fcc459
              expression: 'last(/INFOSEC UPS/upsInputFrequency.0)<45'
              name: '{HOSTNAME} - No Input Power'
              priority: HIGH
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/INFOSEC UPS/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/INFOSEC UPS/icmpping,#3)<>3)'
                - name: '{HOSTNAME} - Output status changed'
                  expression: 'last(/INFOSEC UPS/upsOutputSource.0)<>3'
        - uuid: f89f635c8eb1425a9c08fda7efac88a1
          name: 'Rectifier Input Voltage'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.3.3.1.3.1
          key: upsInputVoltage.0
          history: 7d
          units: V
          tags:
            - tag: Application
              value: Input
        - uuid: f8f10be83d75460c9e67bafdf7837b42
          name: 'Input Voltage'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.3.3.1.3.1
          key: upsInputVoltage.01
          history: 7d
          units: V
          tags:
            - tag: Application
              value: Input
        - uuid: 1a963d987bb7498e840bb829bcca48ce
          name: 'Output Frequency'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.4.2.0
          key: upsOutputFrequency.0
          history: 7d
          units: Hz
          description: '"The current output frequency of the UPS system in 0.1 of HZ."'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.1'
          tags:
            - tag: Application
              value: Output
        - uuid: fdfc1b0af557425381eb38483e416d39
          name: 'Output Load'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.4.4.1.5.1
          key: upsOutputLoad.0
          history: 7d
          value_type: FLOAT
          units: '%'
          description: '"Output global Load Rate."'
          tags:
            - tag: Application
              value: Output
          triggers:
            - uuid: 49b230f286474da0b486b752b09abab9
              expression: 'avg(/INFOSEC UPS/upsOutputLoad.0,30s)>80'
              name: '{HOSTNAME} - Output overloaded'
              priority: AVERAGE
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/INFOSEC UPS/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/INFOSEC UPS/icmpping,#3)<>3)'
        - uuid: f35443e4528e4b05acb5e255d11bbd60
          name: 'Output Status'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.4.1.0
          key: upsOutputSource.0
          history: 7d
          description: '"The present source of output power."'
          valuemap:
            name: 'Socomec - OutputSource'
          tags:
            - tag: Application
              value: Output
          triggers:
            - uuid: f674e0ac3fcb4ba7b6296c00ac3235bc
              expression: 'last(/INFOSEC UPS/upsOutputSource.0)<>3'
              name: '{HOSTNAME} - Output status changed'
              priority: AVERAGE
              dependencies:
                - name: '{HOSTNAME} - Network unavailable'
                  expression: 'sum(/INFOSEC UPS/icmpping,#3)=0 or ({TRIGGER.VALUE}=1 and sum(/INFOSEC UPS/icmpping,#3)<>3)'
        - uuid: cae491083b014dbb9650f67170c44886
          name: 'Output Voltage'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.33.1.4.4.1.2.1
          key: upsOutputVoltage.0
          history: 7d
          units: V
          tags:
            - tag: Application
              value: Output
      macros:
        - macro: '{$SNMP_COMMUNITY}'
      dashboards:
        - uuid: 62866542cca54594bd1a5763dd7568c0
          name: 'SOCOMEC - UPS Status'
          pages:
            - name: Overview
              widgets:
                - type: item
                  name: 'UPS Model'
                  width: '36'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'UPS Model'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'INFOSEC UPS'
                        key: upsIdentModel.0
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: value_size
                      value: '35'
                - type: item
                  name: Firmware
                  'y': '3'
                  width: '36'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: Firmware
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'INFOSEC UPS'
                        key: upsfirmware.0
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: show.2
                      value: '4'
                    - type: INTEGER
                      name: value_size
                      value: '30'
                - type: item
                  name: Uptime
                  x: '36'
                  width: '36'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: Uptime
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'INFOSEC UPS'
                        key: 'system.net.uptime[sysUpTime.0]'
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: value_size
                      value: '35'
                - type: item
                  name: 'Ambiant Temp'
                  x: '36'
                  'y': '3'
                  width: '19'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'Ambiant Temp'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'INFOSEC UPS'
                        key: upsAmbientTemperature.0
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: show.2
                      value: '4'
                - type: item
                  name: 'Battery Charge'
                  x: '55'
                  'y': '3'
                  width: '17'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: INTEGER
                      name: decimal_places
                      value: '0'
                    - type: STRING
                      name: description
                      value: 'Battery Charge'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'INFOSEC UPS'
                        key: upsEstimatedChargeRemaining.0
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: show.2
                      value: '4'
            - name: Metrics
              widgets:
                - type: graph
                  width: '72'
                  height: '5'
                  fields:
                    - type: GRAPH
                      name: graphid.0
                      value:
                        host: 'INFOSEC UPS'
                        name: 'Ambient Temperature'
                    - type: STRING
                      name: reference
                      value: AAAAA
                - type: graph
                  'y': '5'
                  width: '72'
                  height: '5'
                  fields:
                    - type: GRAPH
                      name: graphid.0
                      value:
                        host: 'INFOSEC UPS'
                        name: 'Output Load'
                    - type: STRING
                      name: reference
                      value: AAAAC
                - type: graph
                  'y': '10'
                  width: '72'
                  height: '5'
                  fields:
                    - type: GRAPH
                      name: graphid.0
                      value:
                        host: 'INFOSEC UPS'
                        name: 'Battery Charge'
                    - type: STRING
                      name: reference
                      value: AAAAB
      valuemaps:
        - uuid: 533e031d29d5435cb867672b5738deda
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: Down
            - value: '1'
              newvalue: Up
        - uuid: 7e2768e8a56d4e7fb7e601318b07fec4
          name: 'Socomec - BatteryStatus'
          mappings:
            - value: '1'
              newvalue: unknown
            - value: '2'
              newvalue: batteryNormal
            - value: '3'
              newvalue: batteryCharging
            - value: '4'
              newvalue: batteryTest
            - value: '5'
              newvalue: batteryDischarging
            - value: '6'
              newvalue: batteryLow
            - value: '7'
              newvalue: batteryDepleted
            - value: '8'
              newvalue: batteryFailure
            - value: '9'
              newvalue: batteryDisconnected
        - uuid: ae7e1f701c824b719d6fa73b0024f5eb
          name: 'Socomec - OutputSource'
          mappings:
            - value: '1'
              newvalue: unknown
            - value: '2'
              newvalue: onMaintenBypass
            - value: '3'
              newvalue: onInverter
            - value: '4'
              newvalue: normalMode
            - value: '5'
              newvalue: ecoMode
            - value: '6'
              newvalue: onBypass
            - value: '7'
              newvalue: standby
            - value: '8'
              newvalue: upsOff
  graphs:
    - uuid: 0310a232d2394262a1677e8fca0a16be
      name: 'Ambient Temperature'
      yaxismax: '50'
      show_work_period: 'NO'
      ymin_type_1: FIXED
      ymax_type_1: FIXED
      graph_items:
        - color: 0040FF
          item:
            host: 'INFOSEC UPS'
            key: upsAmbientTemperature.0
    - uuid: 9261188eb5444ead955aee21582f4d78
      name: 'Battery Charge'
      ymin_type_1: FIXED
      ymax_type_1: FIXED
      graph_items:
        - color: 1A7C11
          item:
            host: 'INFOSEC UPS'
            key: upsEstimatedChargeRemaining.0
    - uuid: 3f3ec07da1d64dac899c5dcb7cc79000
      name: 'Output Load'
      ymin_type_1: FIXED
      ymax_type_1: FIXED
      graph_items:
        - color: 1A7C11
          item:
            host: 'INFOSEC UPS'
            key: upsOutputLoad.0
    - uuid: e19bbeb7d5464dd38f83a8be673319ed
      name: 'Output Status'
      yaxismin: '1'
      yaxismax: '9'
      ymin_type_1: FIXED
      ymax_type_1: FIXED
      graph_items:
        - color: 0040FF
          item:
            host: 'INFOSEC UPS'
            key: upsOutputSource.0
