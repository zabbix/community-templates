        - uuid: a00bd97f09cb40a4a032b98ced32c1b4
          name: 'Mailcow: Database reachable'
          type: ZABBIX_ACTIVE
          key: mailcow.db.reachable
          delay: '60'
          history: 30d
          trends: 90d
          description: |
            1 = die Mailcow-Datenbank hat auf SELECT 1 geantwortet.
            Ohne dieses Signal ist ein DB-Ausfall unsichtbar: alle DB-Metriken
            stehen dann auf 0, ohne dass ein Fehler gemeldet wird.
          valuemap:
            name: 'Mailcow Boolean'
          tags:
            - tag: application
              value: mailcow
            - tag: component
              value: collector
          triggers:
            - uuid: 7e27273f1dbf431083034b2f2940746e
              expression: 'last(/Mailcow by Zabbix agent 2/mailcow.db.reachable)=0'
              name: 'Mailcow: Database not reachable'
              opdata: 'all database metrics are 0 while this is set'
              priority: HIGH
              description: |
                Der Collector bekommt keine Antwort aus der Mailcow-Datenbank.
                Mailbox-, Domain-, Alias-, Quarantaene- und LLD-Metriken sind
                dann bedeutungslos (0), auch wenn kein anderer Alarm ausloest.
              tags:
                - tag: scope
                  value: availability
