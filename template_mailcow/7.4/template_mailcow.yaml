  triggers:
    - uuid: b1602febcca4424799fb52115562a52d
      expression: 'last(/Mailcow by Zabbix agent 2/mailcow.rspamd.bayes.total.learned)<200 and last(/Mailcow by Zabbix agent 2/mailcow.rspamd.uptime)>86400'
      name: 'Mailcow: Bayes filter poorly trained'
      opdata: '{ITEM.LASTVALUE1} messages learned'
      priority: INFO
      description: 'Der Bayes-Filter hat weniger als 200 Nachrichten gelernt. Rspamd empfiehlt mindestens 200 Ham + 200 Spam für zuverlässige Erkennung.'
      manual_close: 'YES'
      tags:
        - tag: scope
          value: notice
