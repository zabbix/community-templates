      macros:
        - macro: '{$MAILCOW.CERT.CRIT}'
          value: '7'
          description: 'Certificate expiry: critical threshold in days (must be < CERT.WARN)'
        - macro: '{$MAILCOW.CERT.WARN}'
          value: '14'
          description: 'Certificate expiry: warning threshold in days'
        - macro: '{$MAILCOW.CONTAINER.MEM.MAX}'
          value: '25'
          description: 'Container memory usage that triggers a problem, in percent of host memory'
        - macro: '{$MAILCOW.DISK.RECOVER}'
          value: '85'
          description: 'Disk trigger resolves below this percentage (must be < DISK.WARN)'
        - macro: '{$MAILCOW.DISK.VMAIL.RECOVER}'
          value: '80'
          description: 'vmail trigger resolves below this percentage (must be < DISK.VMAIL.WARN)'
        - macro: '{$MAILCOW.DISK.VMAIL.WARN}'
          value: '85'
          description: 'Mail storage warns earlier than other filesystems'
        - macro: '{$MAILCOW.DISK.WARN}'
          value: '90'
          description: 'Disk usage percentage that triggers a problem'
        - macro: '{$MAILCOW.QUEUE.RECOVER}'
          value: '30'
          description: 'Mail queue trigger resolves below this value (must be < QUEUE.WARN)'
        - macro: '{$MAILCOW.QUEUE.WARN}'
          value: '50'
          description: 'Mail queue length that triggers a problem'
        - macro: '{$MAILCOW.QUOTA.CRIT}'
          value: '95'
          description: 'Domain/mailbox quota: critical threshold in percent'
        - macro: '{$MAILCOW.QUOTA.WARN}'
          value: '80'
          description: 'Domain/mailbox quota: warning threshold in percent'
        - macro: '{$MAILCOW.RBL.CRIT}'
          value: '1'
          description: 'Trigger if listed on this many RBLs or more'
        - macro: '{$MAILCOW.SYNCJOB.AGE.MAX}'
          value: '48'
          description: 'Sync job is considered stale after this many hours'
      dashboards:
        - uuid: f1a7c1e1aac849b08cbafa3a40968961
          name: '01 - Postfix'
          pages:
            - widgets:
                - type: svggraph
