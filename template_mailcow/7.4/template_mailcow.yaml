zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications
  templates:
    - uuid: 33fee4d48e63458485cd0c65f9a7a787
      template: 'Mailcow by Zabbix agent 2'
      name: 'Mailcow by Zabbix agent 2'
      description: |
        Vollständiges Mailcow-Dockerized Monitoring (246 Metriken, 71 Trigger, 19 Dashboards).
        Postfix, Dovecot, Rspamd (inkl. Bayes-Training), ClamAV, Docker Health, TLS/Zertifikate,
        DNS (SPF/DKIM/DMARC), Security Audit (DANE/MTA-STS/TLS-RPT/BIMI), Postscreen,
        Mailflow mit Anomalie-Erkennung (Baseline-Trigger), Backup, Quarantine, SOGo u.v.m.
        4 LLD Discovery Rules (Domains, Mailboxen, Sync Jobs, Docker Container).
        
        Vendor:  Alexander Fox | PlaNet Fox
        Project: https://github.com/linuser/Mailcow-Zabbix-Monitoring
        Created with Open Source and ♥
      vendor:
        name: 'Alexander Fox | PlaNet Fox'
        version: '1.3'
      groups:
        - name: Templates/Applications
      items:
        - uuid: bfa38dab4fc347718eda24764475ed04
          name: 'Mailcow: ACME cert days left'
          type: ZABBIX_ACTIVE
          key: mailcow.acme.cert.days.left
          delay: 1h
          history: 90d
          units: d
          tags:
            - tag: application
              value: mailcow
            - tag: component
              value: acme
          triggers:
            - uuid: 9347ce7c87b54e018d0d1b234094d579
              expression: 'last(/Mailcow by Zabbix agent 2/mailcow.acme.cert.days.left)<{$MAILCOW.CERT.WARN}'
              name: 'Mailcow: ACME certificate expires soon'
              event_name: 'Mailcow: ACME certificate expires soon (less than {$MAILCOW.CERT.WARN} days left)'
              opdata: '{ITEM.LASTVALUE1} days left'
              priority: WARNING
              manual_close: 'YES'
              dependencies:
                - name: 'Mailcow: ACME certificate expiry critical'
                  expression: 'last(/Mailcow by Zabbix agent 2/mailcow.acme.cert.days.left)<{$MAILCOW.CERT.CRIT}'
              tags:
                - tag: scope
                  value: security
            - uuid: 4611e7f01a0c4d1585dbae10f0f1e644
              expression: 'last(/Mailcow by Zabbix agent 2/mailcow.acme.cert.days.left)<{$MAILCOW.CERT.CRIT}'
              name: 'Mailcow: ACME certificate expiry critical'
              event_name: 'Mailcow: ACME certificate expiry critical (less than {$MAILCOW.CERT.CRIT} days left)'
              opdata: '{ITEM.LASTVALUE1} days left'
              priority: HIGH
