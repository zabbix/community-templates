                      value: DD0000
                    - type: STRING
                      name: ds.0.color.1
                      value: 0000DD
                    - type: INTEGER
                      name: ds.0.dataset_type
                      value: '0'
                    - type: ITEM
                      name: ds.0.itemids.0
                      value:
                        host: 'Mailcow by Zabbix agent 2'
                        key: postfix.pfmailq
                    - type: ITEM
                      name: ds.0.itemids.1
                      value:
                        host: 'Mailcow by Zabbix agent 2'
                        key: postfix.connections
                    - type: INTEGER
                      name: ds.0.missingdatafunc
                      value: '1'
                    - type: INTEGER
                      name: ds.0.width
                      value: '2'
                    - type: STRING
                      name: reference
