zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: e960332b3f6c46a1956486d4f3f99fce
      name: 'Templates/Server hardware'
  templates:
    - uuid: 6c2534a531744910938a4d2b573600b7
      template: 'Lenovo XCC by SNMP'
      name: 'Lenovo XCC by SNMP'
      templates:
        - name: 'Generic by SNMP'
      groups:
        - name: 'Templates/Server hardware'
      items:
        - uuid: cb1d5e9f271e4fca9eae3e0f1ed5e0d7
          name: currentSysPowerStatus
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.19046.11.1.5.1.1.0
          key: IMMcurrentSysPowerStatus
          delay: '300'
          history: 7d
          valuemap:
            name: 'IMM-MIB::systemHealthStat'
        - uuid: f2c9786c61ba47148263e2c6a50660fa
          name: PowerOnHours
          type: SNMP_AGENT
          snmp_oid: 'LENOVO-XCC-MIB:powerStatistics.2.0'
          key: IMMpowerOnHours
          delay: '3600'
          history: 7d
        - uuid: 32b09c0aa022465ba5d5355fbbf6830c
          name: restartCount
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.19046.11.1.5.1.3.0
          key: IMMrestartCount
          delay: '3600'
          history: 7d
        - uuid: 354949319ecf4427ac242bfff00688e4
          name: 'System Health Status'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.19046.11.1.1.4.1.0
          key: IMMsystemHealthStat
          history: 7d
          valuemap:
            name: 'IMM-MIB::systemHealthStat'
          tags:
            - tag: Application
              value: General
          triggers:
            - uuid: 0d82d25f67cf4e678a37c762eceead3b
              expression: 'last(/Lenovo XCC by SNMP/IMMsystemHealthStat)<>255'
              name: 'Check System Health Status on {HOSTNAME}'
              priority: WARNING
              description: 'Проверь железку!!!!!!'
            - uuid: 8fb7016e5eb64b93a04241bdfcb17c20
              expression: 'nodata(/Lenovo XCC by SNMP/IMMsystemHealthStat,1200s)=1'
              name: 'nodata SNMP! Check IMM {HOSTNAME} status'
              priority: INFO
              description: 'Нет данных по SNMP'
        - uuid: b1d30d1931a44a6d9baf45792d19715d
          name: systemState
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.19046.11.1.5.1.4.0
          key: IMMsystemState
          delay: '300'
          history: 7d
          valuemap:
            name: 'IMM-MIB::systemHealthStat'
        - uuid: 39bb41ba70b649958b5febbc097d8431
          name: serialNumber
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.19046.11.1.1.5.2.1.3.0
          key: serialNumber
          delay: 1h
          history: 7d
          value_type: TEXT
        - uuid: a6c62ffc8426473aa97e4e5a99d8e43d
          name: Trap
          type: SNMP_TRAP
          key: 'snmptrap["General"]'
          history: 90d
          value_type: LOG
          logtimefmt: 'hh:mm:ss yyyy/MM/dd'
          tags:
            - tag: Application
              value: Status
        - uuid: 283da29cbcfa4509b15290a1a241438b
          name: systemType
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.19046.11.1.1.5.2.1.5.0
          key: systemType
          delay: 1h
          history: 7d
          value_type: TEXT
      discovery_rules:
        - uuid: 785ef2435a944f65a03545e690513e20
          name: 'FAN Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#FANDESCR},.1.3.6.1.4.1.19046.11.1.1.3.2.1.2]'
          key: fan.discovery
          delay: 1h
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'Discovering fans from LENOVO-XCC-MIB::fanDescr'
          item_prototypes:
            - uuid: 6345725900f045739947fe99ef27480c
              name: '{#FANDESCR}: Fan speed, %'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.3.2.1.3.{#SNMPINDEX}'
              key: 'sensor.fan.speed.percentage[fanSpeed.{#SNMPINDEX}]'
              delay: 5m
              history: 30d
              units: '%'
              description: |
                LENOVO-XCC-MIB
                Fan  speed expressed in percent(%) of maximum RPM. An octet string expressed as 'ddd% of maximum' where: d is a decimal digit or blank space for a leading zero. If the fan is determined not to be running or the fan speed cannot be determined, the string will indicate 'Offline'.
              preprocessing:
                - type: REGEX
                  parameters:
                    - '(\d{1,3}) *%( of maximum)?'
                    - \1
              tags:
                - tag: Application
                  value: Fans
            - uuid: d1494da1a5f746008fb5568104ed5acb
              name: '{#FANDESCR}: Fan status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.3.2.1.10.{#SNMPINDEX}'
              key: 'sensor.fan.status[fanHealthStatus.{#SNMPINDEX}]'
              delay: 3m
              history: 2w
              value_type: CHAR
              description: |
                LENOVO-XCC-MIB
                A description of the fan measurement channel.
              tags:
                - tag: Application
                  value: Fans
              trigger_prototypes:
                - uuid: 35167bd53f754460bab00ecd6114ba69
                  expression: 'find(/Lenovo XCC by SNMP/sensor.fan.status[fanHealthStatus.{#SNMPINDEX}],,"regexp","{$FAN_OK_STATUS}")=0'
                  name: '{#FANDESCR}: Fan is not in normal state'
                  priority: INFO
                  description: |
                    Last value: {ITEM.LASTVALUE1}.
                    Please check the fan unit
          graph_prototypes:
            - uuid: 708e7710286843f1b84a69b872bbe8cf
              name: '{#FANDESCR} Speed in %'
              graph_items:
                - calc_fnc: ALL
                  item:
                    host: 'Lenovo XCC by SNMP'
                    key: 'sensor.fan.speed.percentage[fanSpeed.{#SNMPINDEX}]'
        - uuid: 3300f20e38104a9a989a16effb15b0bd
          name: 'Physical Disk Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},.1.3.6.1.4.1.19046.11.1.1.12.2.1.1,{#DISKDESCR},.1.3.6.1.4.1.19046.11.1.1.12.2.1.2]'
          key: physicalDisk.discovery
          delay: 1h
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'LENOVO-XCC-MIB:diskIndex'
          item_prototypes:
            - uuid: b2c76cdedadb4f56b83e91c31c72ca07
              name: '{#SNMPINDEX}: Physical disk part number'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.12.2.1.2.{#SNMPINDEX}'
              key: 'system.hw.physicaldisk.part_number[diskFruName.{#SNMPINDEX}]'
              delay: 1h
              history: 2w
              value_type: CHAR
              description: |
                LENOVO-XCC-MIB
                disk module FRU name.
              tags:
                - tag: Application
                  value: 'Physical Disks'
            - uuid: aad0f4499f12497da1b05b440b99032a
              name: '{#DISKDESCR}: Physical disk status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.12.2.1.3.{#SNMPINDEX}'
              key: 'system.hw.physicaldisk.status[diskHealthStatus.{#SNMPINDEX}]'
              delay: 3m
              history: 30d
              value_type: CHAR
              description: |
                LENOVO-XCC-MIB
                A description of the disk module status.
              tags:
                - tag: Application
                  value: 'Physical Disks'
              trigger_prototypes:
                - uuid: b2badf0287984d518f247796a6ace445
                  expression: 'count(/Lenovo XCC by SNMP/system.hw.physicaldisk.status[diskHealthStatus.{#SNMPINDEX}],#1,"ne","{$DISK_OK_STATUS}")=1'
                  name: '{#SNMPINDEX}: Physical disk is not in OK state'
                  priority: WARNING
                  description: |
                    Last value: {ITEM.LASTVALUE1}.
                    Please check physical disk for warnings or errors
        - uuid: 2f248e19f10346a2825e108ee0918bc0
          name: 'PSU Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#PSU_DESCR},.1.3.6.1.4.1.19046.11.1.1.11.2.1.2]'
          key: psu.discovery
          delay: 1h
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'LENOVO-XCC-MIB::powerFruName'
          item_prototypes:
            - uuid: d5b151ff652b4015a798611d25386fc2
              name: '{#PSU_DESCR}: Power supply status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.11.2.1.6.{#SNMPINDEX}'
              key: 'sensor.psu.status[powerHealthStatus.{#SNMPINDEX}]'
              delay: 3m
              history: 2w
              value_type: CHAR
              description: |
                LENOVO-XCC-MIB
                A description of the power module status.
              tags:
                - tag: Application
                  value: 'Power Supply'
              trigger_prototypes:
                - uuid: a784bdeb29614d33aeaf82d79ba2ac47
                  expression: 'count(/Lenovo XCC by SNMP/sensor.psu.status[powerHealthStatus.{#SNMPINDEX}],#1,"ne","{$PSU_OK_STATUS}")=1'
                  name: '{#PSU_DESCR}: Power supply is not in normal state'
                  priority: INFO
                  description: |
                    Last value: {ITEM.LASTVALUE1}.
                    Please check the power supply unit for errors
        - uuid: 469742e13fb64490bb64fe9b1bdfdd37
          name: 'Temperature Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.4.1.19046.11.1.1.1.2.1.2]'
          key: tempDescr.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#SNMPVALUE}'
                value: '(DIMM|PSU|PCH|OCP|RAID|RR|PCI|Exhaust).*'
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'LENOVO-XCC-MIB::tempDescr'
          item_prototypes:
            - uuid: 13698d6172984ba2b4595b56bd3e3c97
              name: '{#SNMPVALUE}: Critical high limit'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.1.2.1.6.{#SNMPINDEX}'
              key: 'sensor.temp.limit[tempReading.{#SNMPINDEX}]'
              delay: 1h
              history: 30d
              value_type: FLOAT
              units: °C
              description: |
                LENOVO-XCC-MIB
                The high limit temperature.
              tags:
                - tag: Application
                  value: Temperature
            - uuid: 313e901d27ee4c468bc06a927abf7061
              name: '{#SNMPVALUE}: Temperature'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.1.2.1.3.{#SNMPINDEX}'
              key: 'sensor.temp.value[tempReading.{#SNMPINDEX}]'
              delay: 3m
              history: 30d
              value_type: FLOAT
              units: °C
              description: |
                LENOVO-XCC-MIB
                The mesured temperature.
              tags:
                - tag: Application
                  value: Temperature
          trigger_prototypes:
            - uuid: bb15ad69a9034e44a537e6bc96b38151
              expression: 'last(/Lenovo XCC by SNMP/sensor.temp.value[tempReading.{#SNMPINDEX}])>last(/Lenovo XCC by SNMP/sensor.temp.limit[tempReading.{#SNMPINDEX}])'
              name: '{#SNMPVALUE} is above critical high limit'
              priority: HIGH
          graph_prototypes:
            - uuid: 553477b23e3a4ce5889e0d9df7070a9f
              name: '{#SNMPVALUE}'
              graph_items:
                - color: 00A0B0
                  calc_fnc: ALL
                  item:
                    host: 'Lenovo XCC by SNMP'
                    key: 'sensor.temp.value[tempReading.{#SNMPINDEX}]'
        - uuid: 16cebe329c4944b9a1f42aca933ccfc0
          name: 'Temperature Discovery Ambient'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.4.1.19046.11.1.1.1.2.1.2]'
          key: tempDescr.discovery.ambient
          delay: 1h
          filter:
            conditions:
              - macro: '{#SNMPVALUE}'
                value: 'Ambient.*'
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 0a83f05d575943a497c870029f16c360
              name: 'Ambient Temp: Critical high limit'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.1.2.1.6.{#SNMPINDEX}'
              key: 'sensor.temp.limit[tempReading.Ambient.{#SNMPINDEX}]'
              delay: 1h
              history: 30d
              value_type: FLOAT
              units: °C
              description: |
                LENOVO-XCC-MIB
                The high limit Ambient temperature.
              tags:
                - tag: Application
                  value: Temperature
            - uuid: e6f353d5550647f486904ff6c95a1d93
              name: 'Ambient Temp: Temperature'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.1.2.1.3.{#SNMPINDEX}'
              key: 'sensor.temp.value[tempReading.Ambient.{#SNMPINDEX}]'
              delay: 3m
              history: 30d
              value_type: FLOAT
              units: °C
              description: |
                LENOVO-XCC-MIB
                The measured temperature Ambient
              tags:
                - tag: Application
                  value: Temperature
          trigger_prototypes:
            - uuid: cf64b5d2cf7a4e18b4e321997c086a37
              expression: 'last(/Lenovo XCC by SNMP/sensor.temp.value[tempReading.Ambient.{#SNMPINDEX}])>last(/Lenovo XCC by SNMP/sensor.temp.limit[tempReading.Ambient.{#SNMPINDEX}])'
              name: 'Ambient Temp is above critical high limit'
              priority: HIGH
        - uuid: c375605fee334b52b949c1684ae4e237
          name: 'Temperature Discovery CPU'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.4.1.19046.11.1.1.1.2.1.2]'
          key: tempDescr.discovery.cpu
          delay: 1h
          filter:
            conditions:
              - macro: '{#SNMPVALUE}'
                value: 'CPU*[0-9]* Temp'
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'LENOVO-XCC-MIB::tempDescr'
          item_prototypes:
            - uuid: c86bda92a0714113a631f7b58af9dd6c
              name: '{#SNMPVALUE}: Temperature'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.1.2.1.3.{#SNMPINDEX}'
              key: 'sensor.temp.value[tempReading.CPU.{#SNMPINDEX}]'
              delay: 3m
              history: 30d
              value_type: FLOAT
              units: °C
              description: |
                LENOVO-XCC-MIB
                The measured temperature CPU
              tags:
                - tag: Application
                  value: Temperature
              trigger_prototypes:
                - uuid: af1bd7aa8fb040998d95013afa48a615
                  expression: 'last(/Lenovo XCC by SNMP/sensor.temp.value[tempReading.CPU.{#SNMPINDEX}])>{$CPU_TEMP_CRIT}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/Lenovo XCC by SNMP/sensor.temp.value[tempReading.CPU.{#SNMPINDEX}])<{$CPU_TEMP_CRIT}'
                  name: 'CPU Temp is above critical high limit'
                  priority: HIGH
        - uuid: f00f2f508dcd4aeb833d5ab00138675c
          name: 'Voltage Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#VOLTDESCR},1.3.6.1.4.1.19046.11.1.1.2.2.1.2]'
          key: voltDescr.discovery
          delay: 1h
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'LENOVO-XCC-MIB::voltDescr'
          item_prototypes:
            - uuid: 36b62b1edf214931b136d8593ed61d80
              name: '{#VOLTDESCR}: Status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.2.2.1.11.{#SNMPINDEX}'
              key: 'voltage.status[{#SNMPINDEX}]'
              delay: 3m
              history: 2w
              value_type: CHAR
              description: |
                LENOVO-XCC-MIB
                A description of the voltage component status.
              tags:
                - tag: Application
                  value: Voltage
              trigger_prototypes:
                - uuid: ac793d10c4324bc0837ed78eaec74d92
                  expression: 'find(/Lenovo XCC by SNMP/voltage.status[{#SNMPINDEX}],#2,"like","Normal")=0'
                  name: '{#VOLTDESCR}: voltage is not in normal state'
                  priority: WARNING
                  description: 'Last value: {ITEM.LASTVALUE1}.'
            - uuid: dd41cefe17b3423da376f1c9cda361bd
              name: '{#VOLTDESCR}: Voltage'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.19046.11.1.1.2.2.1.3.{#SNMPINDEX}'
              key: 'voltage[{#SNMPINDEX}]'
              delay: 3m
              history: 2w
              value_type: FLOAT
              units: V
              description: |
                LENOVO-XCC-MIB
                The measured voltage.
              preprocessing:
                - type: RTRIM
                  parameters:
                    - '".*'
                - type: LTRIM
                  parameters:
                    - '.*"'
              tags:
                - tag: Application
                  value: Voltage
          graph_prototypes:
            - uuid: f3dfb24316814228ae3920a43af1fb36
              name: '{#VOLTDESCR}: Voltage'
              yaxismax: '0'
              graph_items:
                - color: 00A0B0
                  calc_fnc: ALL
                  item:
                    host: 'Lenovo XCC by SNMP'
                    key: 'voltage[{#SNMPINDEX}]'
      macros:
        - macro: '{$CPU_TEMP_CRIT}'
          value: '75'
        - macro: '{$DISK_OK_STATUS}'
          value: Normal
        - macro: '{$FAN_OK_STATUS}'
          value: Normal|Unknown
        - macro: '{$HEALTH_CRIT_STATUS}'
          value: '2'
        - macro: '{$HEALTH_DISASTER_STATUS}'
          value: '0'
        - macro: '{$HEALTH_WARN_STATUS}'
          value: '4'
        - macro: '{$PSU_OK_STATUS}'
          value: Normal
      dashboards:
        - uuid: 7bf192a4161346ffad8652f92661ab73
          name: Overview
          pages:
            - name: Overview
              widgets:
                - type: item
                  name: 'System Type'
                  width: '28'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'System Type'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Lenovo XCC by SNMP'
                        key: systemType
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: value_size
                      value: '35'
                - type: item
                  name: 'System Name'
                  'y': '3'
                  width: '28'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'System Name'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Lenovo XCC by SNMP'
                        key: system.name
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: value_size
                      value: '35'
                - type: honeycomb
                  name: 'Power supply Status'
                  'y': '6'
                  width: '36'
                  height: '3'
                  fields:
                    - type: STRING
                      name: items.0
                      value: '*Power supply status'
                    - type: STRING
                      name: primary_label
                      value: '{{ITEM.NAME}.regsub("^(.*):\s*Power supply status$","\1")}'
                    - type: STRING
                      name: reference
                      value: TELIQ
                - type: honeycomb
                  name: 'Disks Status'
                  'y': '9'
                  width: '36'
                  height: '3'
                  fields:
                    - type: STRING
                      name: items.0
                      value: '*Physical disk status'
                    - type: STRING
                      name: primary_label
                      value: '{{ITEM.NAME}.regsub("^(.*):\s*Physical disk status$","\1")}'
                    - type: STRING
                      name: reference
                      value: NWVGB
                - type: honeycomb
                  name: 'Fan Status'
                  'y': '12'
                  width: '72'
                  height: '5'
                  fields:
                    - type: STRING
                      name: items.0
                      value: '*Fan status'
                    - type: STRING
                      name: primary_label
                      value: '{{ITEM.NAME}.regsub("^(.*):\s*Fan status$","\1")}'
                    - type: STRING
                      name: reference
                      value: BCZWQ
                - type: honeycomb
                  name: Temperatures
                  'y': '17'
                  width: '72'
                  height: '5'
                  fields:
                    - type: STRING
                      name: items.0
                      value: '*Temperature'
                    - type: STRING
                      name: primary_label
                      value: '{{ITEM.NAME}.regsub("^(.*) Temp: Temperature$","\1")}'
                    - type: STRING
                      name: reference
                      value: WJIAM
                    - type: INTEGER
                      name: secondary_label_decimal_places
                      value: '0'
                - type: item
                  name: 'Serial Number'
                  x: '28'
                  width: '27'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: 'Serial Number'
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Lenovo XCC by SNMP'
                        key: serialNumber
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: value_size
                      value: '35'
                - type: item
                  name: Uptime
                  x: '28'
                  'y': '3'
                  width: '27'
                  height: '3'
                  hide_header: 'YES'
                  fields:
                    - type: STRING
                      name: description
                      value: Uptime
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'Lenovo XCC by SNMP'
                        key: 'system.uptime[sysUpTime.0]'
                    - type: INTEGER
                      name: show.0
                      value: '1'
                    - type: INTEGER
                      name: show.1
                      value: '2'
                    - type: INTEGER
                      name: value_size
                      value: '35'
                - type: honeycomb
                  name: 'CMOS Battery Status'
                  x: '36'
                  'y': '6'
                  width: '36'
                  height: '3'
                  fields:
                    - type: STRING
                      name: items.0
                      value: 'CMOS Battery: Status'
                    - type: STRING
                      name: primary_label
                      value: 'CMOS Battery'
                    - type: STRING
                      name: reference
                      value: FWWBS
                - type: honeycomb
                  name: 'Voltages Status'
                  x: '36'
                  'y': '9'
                  width: '36'
                  height: '3'
                  fields:
                    - type: STRING
                      name: items.0
                      value: 'SysBrd *V: Status'
