zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: b51ee2d2af47401c850a280091490498
      name: 'Templates/Hardware/Dell'
  templates:
    - uuid: 8e08d5db55974234969608437a8f2d7a
      template: 'Dell PowerEdge MX7000 OME-M by HTTP v1.3'
      name: 'Dell PowerEdge MX7000 OME-M by HTTP v1.3'
      description: |
        Template empresarial para el monitoreo de infraestructura Dell MX7000 a traves de Dell OpenManage Enterprise Modular (OME-M).
        Arquitectura 100% basada en HTTP Agent, Dependent Items, LLD nativo y JSONPath.
        Sin dependencias de SNMP, SSH o Agentes externos.
        
        Validated on:
        - Zabbix 7.4
        - Dell OpenManage Enterprise Modular (OME-M)
        - Dell PowerEdge MX7000
        
        Features:
        - PSU Health
        - PSU Input Voltage
        - PSU Input Current
        - PSU Capacity
        - Fan RPM
        - Fan Health
        - Chassis Temperature Sensors
        - Chassis Power Consumption
        - Subsystem Health
        
        Required Macros:
        {$REDFISH.URL}
        {$REDFISH.USER}
        {$REDFISH.PASSWORD}
        {$MX7000.ID}
        
        Known Limitation:
        OME-M does not expose individual PSU power consumption. Only total chassis power is available.
      groups:
        - name: 'Templates/Hardware/Dell'
      items:
        # ====================================================================
        # ÍTEMS MAESTROS (HTTP AGENT)
        # ====================================================================
        - uuid: c4e948e84dd943f78755e8800f99fd1d
          name: 'OME-M: Get Devices Raw'
          type: HTTP_AGENT
          key: ome.get.devices
          history: 0d
          trends: '0'
          value_type: TEXT
          authtype: BASIC
          username: '{$REDFISH.USER}'
          password: '{$REDFISH.PASSWORD}'
          url: '{$REDFISH.URL}:{$REDFISH.PORT}/api/DeviceService/Devices'
          headers:
            - name: Accept
              value: 'application/json'
          timeout: '{$REDFISH.TIMEOUT}'
          verify_peer: 'NO'
          verify_host: 'NO'
          tags:
            - tag: component
              value: raw

        - uuid: aadedbba51ac4c1e8ecc041ed1b40083
          name: 'OME-M: Get Power Usage Raw'
          type: HTTP_AGENT
          key: ome.get.power
          history: 0d
          trends: '0'
          value_type: TEXT
          authtype: BASIC
          username: '{$REDFISH.USER}'
          password: '{$REDFISH.PASSWORD}'
          url: '{$REDFISH.URL}:{$REDFISH.PORT}/api/DeviceService/Devices({$MX7000.ID})/PowerUsageByDevice'
          headers:
            - name: Accept
              value: 'application/json'
          timeout: '{$REDFISH.TIMEOUT}'
          verify_peer: 'NO'
          verify_host: 'NO'
          tags:
            - tag: component
              value: raw

        - uuid: 4f4a28fd1b3c4d7ab05d737b6e259450
          name: 'OME-M: Get PSU Inventory Raw'
          type: HTTP_AGENT
          key: ome.get.psu
          history: 0d
          trends: '0'
          value_type: TEXT
          authtype: BASIC
          username: '{$REDFISH.USER}'
          password: '{$REDFISH.PASSWORD}'
          url: "{$REDFISH.URL}:{$REDFISH.PORT}/api/DeviceService/Devices({$MX7000.ID})/InventoryDetails('chassisPowerSupplies')"
          headers:
            - name: Accept
              value: 'application/json'
          timeout: '{$REDFISH.TIMEOUT}'
          verify_peer: 'NO'
          verify_host: 'NO'
          tags:
            - tag: component
              value: raw

        - uuid: 8ebb0c7a129a429d89455e593acb881d
          name: 'OME-M: Get Fans Inventory Raw'
          type: HTTP_AGENT
          key: ome.get.fans
          history: 0d
          trends: '0'
          value_type: TEXT
          authtype: BASIC
          username: '{$REDFISH.USER}'
          password: '{$REDFISH.PASSWORD}'
          url: "{$REDFISH.URL}:{$REDFISH.PORT}/api/DeviceService/Devices({$MX7000.ID})/InventoryDetails('chassisFansList')"
          headers:
            - name: Accept
              value: 'application/json'
          timeout: '{$REDFISH.TIMEOUT}'
          verify_peer: 'NO'
          verify_host: 'NO'
          tags:
            - tag: component
              value: raw

        - uuid: 22d2d3ae6da140738b485d7a2765d52e
          name: 'OME-M: Get Temperature Inventory Raw'
          type: HTTP_AGENT
          key: ome.get.temperature
          history: 0d
          trends: '0'
          value_type: TEXT
          authtype: BASIC
          username: '{$REDFISH.USER}'
          password: '{$REDFISH.PASSWORD}'
          url: "{$REDFISH.URL}:{$REDFISH.PORT}/api/DeviceService/Devices({$MX7000.ID})/InventoryDetails('chassisTemperatureList')"
          headers:
            - name: Accept
              value: 'application/json'
          timeout: '{$REDFISH.TIMEOUT}'
          verify_peer: 'NO'
          verify_host: 'NO'
          tags:
            - tag: component
              value: raw

        - uuid: 8b6f48c6a7154f20800147f2df9d987c
          name: 'OME-M: Get Subsystem Health Raw'
          type: HTTP_AGENT
          key: ome.get.subsystem.health
          history: 0d
          trends: '0'
          value_type: TEXT
          authtype: BASIC
          username: '{$REDFISH.USER}'
          password: '{$REDFISH.PASSWORD}'
          url: '{$REDFISH.URL}:{$REDFISH.PORT}/api/DeviceService/Devices({$MX7000.ID})/SubSystemHealth'
          headers:
            - name: Accept
              value: 'application/json'
          timeout: '{$REDFISH.TIMEOUT}'
          verify_peer: 'NO'
          verify_host: 'NO'
          tags:
            - tag: component
              value: raw

        # ====================================================================
        # ÍTEMS DEPENDIENTES DE SUBSISTEMAS FIJOS
        # ====================================================================
        - uuid: b2fa25bee2054c6e91054395d0158802
          name: 'Chassis Subsystem: Fan Rollup Status'
          type: DEPENDENT
          key: ome.chassis.fan.health
          delay: '0'
          master_item:
            key: ome.get.subsystem.health
          value_type: UNSIGNED
          valuemap:
            name: 'Dell OME Status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.SubSystems[?(@.Name=="Fan")].RollupStatus.first()'
          tags:
            - tag: component
              value: environment

        - uuid: b76aa980f91f49a380ad0428d745d2b0
          name: 'Chassis Subsystem: Power Supply Rollup Status'
          type: DEPENDENT
          key: ome.chassis.power.health
          delay: '0'
          master_item:
            key: ome.get.subsystem.health
          value_type: UNSIGNED
          valuemap:
            name: 'Dell OME Status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.SubSystems[?(@.Name=="PowerSupply")].RollupStatus.first()'
          tags:
            - tag: component
              value: power

        - uuid: b9e3bc4f14834ea0960b9a94d040bd66
          name: 'Chassis Subsystem: Temperature Rollup Status'
          type: DEPENDENT
          key: ome.chassis.temperature.health
          delay: '0'
          master_item:
            key: ome.get.subsystem.health
          value_type: UNSIGNED
          valuemap:
            name: 'Dell OME Status'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$.SubSystems[?(@.Name=="Temperature")].RollupStatus.first()'
          tags:
            - tag: component
              value: environment
      discovery_rules:
        # ====================================================================
        # REGLA LLD: MAESTRA DE DISPOSITIVOS
        # ====================================================================
        - uuid: 6398919f8a284b3c8cabccb84a1515e2
          name: 'All Devices Discovery'
          type: DEPENDENT
          key: ome.discovery.all
          master_item:
            key: ome.get.devices
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var input = JSON.parse(value);
                  var output = [];
                  var rawDevices = input.value || input;
                  
                  for (var i = 0; i < rawDevices.length; i++) {
                      var d = rawDevices[i];
                      if (d.Model.match(/MX7000|MX750c|MX5108n|MXG610s/i)) {
                          output.push({
                              "{#DEVICE_ID}": String(d.Id),
                              "{#DEVICE_NAME}": d.DeviceName || "Unknown",
                              "{#MODEL}": d.Model,
                              "{#SERVICETAG}": d.ServiceTag || "",
                              "{#CHASSIS_TAG}": d.ChassisServiceTag || "",
                              "{#TYPE}": String(d.Type),
                              "{#MGMT_IP}": d.ManagementIp || "",
                              "{#HOSTNAME}": d.Hostname || ""
                          });
                      }
                  }
                  return JSON.stringify(output);
          item_prototypes:
            - uuid: 76ad7f39414146bea26ce40e3bb5cda8
              name: 'Device [{#DEVICE_NAME}]: Model'
              type: DEPENDENT
              key: 'ome.device.model[{#DEVICE_ID}]'
              delay: '0'
              master_item:
                key: ome.get.devices
              value_type: TEXT
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.value[?(@.Id=={#DEVICE_ID})].Model.first()'
              tags:
                - tag: device
                  value: '{#DEVICE_NAME}'

            - uuid: bbc21fa34c2d4edbb917b97ebe28293e
              name: 'Device [{#DEVICE_NAME}]: Status'
              type: DEPENDENT
              key: 'ome.device.status[{#DEVICE_ID}]'
              delay: '0'
              master_item:
                key: ome.get.devices
              value_type: UNSIGNED
              valuemap:
                name: 'Dell OME Status'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.value[?(@.Id=={#DEVICE_ID})].Status.first()'
              tags:
                - tag: device
                  value: '{#DEVICE_NAME}'

            - uuid: 7a35a3de044041a39b83fb3c291875bf
              name: 'Device [{#DEVICE_NAME}]: Managed State'
              type: DEPENDENT
              key: 'ome.device.managed_state[{#DEVICE_ID}]'
              delay: '0'
              master_item:
                key: ome.get.devices
              value_type: UNSIGNED
              valuemap:
                name: 'Dell OME ManagedState'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.value[?(@.Id=={#DEVICE_ID})].ManagedState.first()'
              tags:
                - tag: device
                  value: '{#DEVICE_NAME}'

            - uuid: c71649614ae643b6870c5c35f5ccce19
              name: 'Device [{#DEVICE_NAME}]: Connection State'
              type: DEPENDENT
              key: 'ome.device.connection_state[{#DEVICE_ID}]'
              delay: '0'
              master_item:
                key: ome.get.devices
              value_type: TEXT
              valuemap:
                name: 'Dell OME ConnectionState'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.value[?(@.Id=={#DEVICE_ID})].ConnectionState.first()'
              tags:
                - tag: device
                  value: '{#DEVICE_NAME}'

            - uuid: 495cd7baa20140d79a08e63bfd043865
              name: 'Device [{#DEVICE_NAME}]: Power State'
              type: DEPENDENT
              key: 'ome.device.power_state[{#DEVICE_ID}]'
              delay: '0'
              master_item:
                key: ome.get.devices
              value_type: TEXT
              valuemap:
                name: 'Dell OME PowerState'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.value[?(@.Id=={#DEVICE_ID})].PowerState.first()'
              tags:
                - tag: device
                  value: '{#DEVICE_NAME}'

            - uuid: e9d60e01edb14180972964593afcac31
              name: 'Device [{#DEVICE_NAME}]: Management IP'
              type: DEPENDENT
              key: 'ome.device.mgmt_ip[{#DEVICE_ID}]'
              delay: '0'
              master_item:
                key: ome.get.devices
              value_type: TEXT
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.value[?(@.Id=={#DEVICE_ID})].ManagementIp.first()'
              tags:
                - tag: device
                  value: '{#DEVICE_NAME}'

            - uuid: fb10101fabbb47c89fdd6feec9b8740b
              name: 'Device [{#DEVICE_NAME}]: System Uptime'
              type: DEPENDENT
              key: 'ome.device.uptime[{#DEVICE_ID}]'
              delay: '0'
              master_item:
                key: ome.get.devices
              value_type: UNSIGNED
              units: s
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.value[?(@.Id=={#DEVICE_ID})].Uptime.first()'
                - type: JAVASCRIPT
                  parameters:
                    - 'return Math.round(Number(value) / 1000);'
              tags:
                - tag: device
                  value: '{#DEVICE_NAME}'
          trigger_prototypes:
            - uuid: 917d98bf419947378187d1cad346a8d5
              expression: 'last(/Dell PowerEdge MX7000 OME-M by HTTP v1.3/ome.device.connection_state[{#DEVICE_ID}])="Disconnected"'
              name: 'Device [{#DEVICE_NAME}]: Connection lost'
              priority: HIGH
              manual_close: 'YES'
            - uuid: 02f94806b9fc41f196a8f8f3a1b96ecb
              expression: 'last(/Dell PowerEdge MX7000 OME-M by HTTP v1.3/ome.device.status[{#DEVICE_ID}])=3000'
              name: 'Device [{#DEVICE_NAME}]: Health is Critical'
              priority: HIGH
            - uuid: 2df466c96a8c461885dc542be23f7ae2
              expression: 'last(/Dell PowerEdge MX7000 OME-M by HTTP v1.3/ome.device.status[{#DEVICE_ID}])=2000'
              name: 'Device [{#DEVICE_NAME}]: Health is Warning'
              priority: AVERAGE

        # ====================================================================
        # REGLA LLD: POWER USAGE DISCOVERY
        # ====================================================================
        - uuid: cbfb151fd5b54c41aca94616eecdde79
          name: 'Power Usage Discovery'
          type: DEPENDENT
          key: ome.discovery.power
          master_item:
            key: ome.get.power
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var input = JSON.parse(value);
                  var output = [];
                  var devices = input.value || input;
                  for (var i = 0; i < devices.length; i++) {
                      output.push({
                          "{#DEVICE}": devices[i].DeviceName
                      });
                  }
                  return JSON.stringify(output);
          item_prototypes:
            - uuid: 47b0f1fe816c4d9e82c166250ca9c703
              name: 'Power [{#DEVICE}]: Power Consumption'
              type: DEPENDENT
              key: 'ome.power.consumption[{#DEVICE}]'
              delay: '0'
              master_item:
                key: ome.get.power
              value_type: UNSIGNED
              units: W
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.value[?(@.DeviceName=="{#DEVICE}")].PowerConsumption.first()'
              tags:
                - tag: component
                  value: power

            - uuid: 44258f7fb8ae435e9097c7eb8631ddda
              name: 'Power [{#DEVICE}]: Peak Power'
              type: DEPENDENT
              key: 'ome.power.peak[{#DEVICE}]'
              delay: '0'
              master_item:
                key: ome.get.power
              value_type: UNSIGNED
              units: W
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.value[?(@.DeviceName=="{#DEVICE}")].PeakPower.first()'
              tags:
                - tag: component
                  value: power
          trigger_prototypes:
            - uuid: 9b293ca3d9c440979738c3773c157363
              expression: 'last(/Dell PowerEdge MX7000 OME-M by HTTP v1.3/ome.power.consumption[{#DEVICE}]) > {$REDFISH.POWER.MAX}'
              name: 'Power [{#DEVICE}]: Power consumption above threshold'
              priority: AVERAGE
        # ====================================================================
        # REGLA LLD: PSU DISCOVERY
        # ====================================================================
        - uuid: 25122401a18a4a5cb533ca4ebbb69a6c
          name: 'PSU Discovery'
          type: DEPENDENT
          key: ome.discovery.psu
          master_item:
            key: ome.get.psu
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var input = JSON.parse(value);
                  var list = input.InventoryInfo || [];
                  var result = [];
                  for (var i = 0; i < list.length; i++) {
                      result.push({
                          "{#PSU}": list[i].Name,
                          "{#MEMBER}": list[i].MemberId
                      });
                  }
                  return JSON.stringify(result);
          item_prototypes:
            - uuid: 49c6c6b3a87745a581ca3b1e17a3d382
              name: 'PSU [{#PSU}]: Health State'
              type: DEPENDENT
              key: 'ome.psu.health[{#MEMBER}]'
              delay: '0'
              master_item:
                key: ome.get.psu
              value_type: UNSIGNED
              valuemap:
                name: 'Dell OME Status'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.InventoryInfo[?(@.Name=="{#PSU}")].HealthState.first()'
              tags:
                - tag: component
                  value: psu

            - uuid: 53bbb291ccab444f993102dcafc728e4
              name: 'PSU [{#PSU}]: Capacity'
              type: DEPENDENT
              key: 'ome.psu.capacity[{#MEMBER}]'
              delay: '0'
              master_item:
                key: ome.get.psu
              value_type: UNSIGNED
              units: W
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.InventoryInfo[?(@.Name=="{#PSU}")].CapacityWatts.first()'
              tags:
                - tag: component
                  value: psu
                  
            - uuid: c9a4e7f19b6d4a1f8e2c7d5b3f9a6142
              name: 'PSU [{#PSU}]: Input Voltage'
              type: DEPENDENT
              key: 'ome.psu.voltage[{#MEMBER}]'
              delay: '0'
              master_item:
                key: ome.get.psu
              value_type: UNSIGNED
              units: V
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.InventoryInfo[?(@.Name=="{#PSU}")].InputVoltage.first()'
              tags:
                - tag: component
                  value: psu     

            - uuid: d4f8a1c27e5b49f0a3c6d8e1f7b2a954
              name: 'PSU [{#PSU}]: Input Current'
              type: DEPENDENT
              key: 'ome.psu.current[{#MEMBER}]'
              delay: '0'
              master_item:
                key: ome.get.psu
              value_type: TEXT
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.InventoryInfo[?(@.Name=="{#PSU}")].InputCurrent.first()'
              tags:
                - tag: component
                  value: psu

          trigger_prototypes:
            - uuid: b3b4ed8a22fd436bba3cd6c6781e89f1
              expression: 'last(/Dell PowerEdge MX7000 OME-M by HTTP v1.3/ome.psu.health[{#MEMBER}])=2000'
              name: 'PSU [{#PSU}]: Status is Degraded'
              priority: AVERAGE
            - uuid: 34a31e6d607743ba8b8ca1a178f68734
              expression: 'last(/Dell PowerEdge MX7000 OME-M by HTTP v1.3/ome.psu.health[{#MEMBER}])=3000'
              name: 'PSU [{#PSU}]: Status is Critical'
              priority: HIGH

        # ====================================================================
        # REGLA LLD: FAN DISCOVERY
        # ====================================================================
        - uuid: 668b37d4c8d246609ad64fb71be0d8ff
          name: 'Fan Discovery'
          type: DEPENDENT
          key: ome.discovery.fans
          master_item:
            key: ome.get.fans
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var input = JSON.parse(value);
                  var list = input.InventoryInfo || [];
                  var result = [];
                  for (var i = 0; i < list.length; i++) {
                      result.push({
                          "{#FAN}": list[i].Name,
                          "{#MEMBER}": list[i].MemberId
                      });
                  }
                  return JSON.stringify(result);
          item_prototypes:
            - uuid: 7db5e22fde584f8790eae0ab85afa688
              name: 'Fan [{#FAN}]: Speed'
              type: DEPENDENT
              key: 'ome.fan.rpm[{#MEMBER}]'
              delay: '0'
              master_item:
                key: ome.get.fans
              value_type: UNSIGNED
              units: RPM
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.InventoryInfo[?(@.Name=="{#FAN}")].Speed.first()'
              tags:
                - tag: component
                  value: fan

            - uuid: be8c23766a60483491f35d88481d63bc
              name: 'Fan [{#FAN}]: Status'
              type: DEPENDENT
              key: 'ome.fan.status[{#MEMBER}]'
              delay: '0'
              master_item:
                key: ome.get.fans
              value_type: UNSIGNED
              valuemap:
                name: 'Dell OME Status'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.InventoryInfo[?(@.Name=="{#FAN}")].Status.first()'
              tags:
                - tag: component
                  value: fan
          trigger_prototypes:
            - uuid: 15a2da9a25d24f62bfcbcad361c5e770
              expression: 'last(/Dell PowerEdge MX7000 OME-M by HTTP v1.3/ome.fan.rpm[{#MEMBER}])=0'
              name: 'Fan [{#FAN}]: Speed is 0 RPM'
              priority: HIGH

        # ====================================================================
        # REGLA LLD: TEMPERATURE DISCOVERY
        # ====================================================================
        - uuid: 80ae4868db00436d89a90dd48a0e4aaf
          name: 'Temperature Discovery'
          type: DEPENDENT
          key: ome.discovery.temperature
          master_item:
            key: ome.get.temperature
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var input = JSON.parse(value);
                  var output = [];
                  var list = input.InventoryInfo || [];
                  for (var i = 0; i < list.length; i++) {
                      output.push({
                          "{#TEMP}": list[i].SensorName,
                          "{#MEMBER}": list[i].MemberId
                      });
                  }
                  return JSON.stringify(output);
          item_prototypes:
            - uuid: 67f81d11bb12415ab56cd3ab6d52eed5
              name: 'Sensor [{#TEMP}]: Temperature'
              type: DEPENDENT
              key: 'ome.temp.value[{#TEMP}]'
              delay: '0'
              master_item:
                key: ome.get.temperature
              value_type: FLOAT
              units: °C
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.InventoryInfo[?(@.SensorName=="{#TEMP}")].ReadingCelsius.first()'
              tags:
                - tag: component
                  value: temperature
          trigger_prototypes:
            - uuid: 5173b1bcc8ed44229b317f088c5610e3
              expression: 'last(/Dell PowerEdge MX7000 OME-M by HTTP v1.3/ome.temp.value[{#TEMP}]) > 40'
              name: 'Sensor [{#TEMP}]: High temperature detected'
              priority: HIGH

      # ====================================================================
      # MACROS DE LA PLANTILLA
      # ====================================================================
      macros:
        - macro: '{$REDFISH.URL}'
          value: 'https://10.0.0.1'
          description: 'IP o FQDN del Endpoint OME-M'
        - macro: '{$REDFISH.PORT}'
          value: '443'
        - macro: '{$REDFISH.USER}'
          value: ''
        - macro: '{$REDFISH.PASSWORD}'
          type: SECRET_TEXT
          value: ''
        - macro: '{$REDFISH.TIMEOUT}'
          value: '15s'
        - macro: '{$REDFISH.POWER.MAX}'
          value: '5000'
          description: 'Umbral maximo tolerado de consumo de potencia del chasis'
        - macro: '{$MX7000.ID}'
          value: '10081'
          description: 'ID del chassis MX7000 en OME-M'

      # ====================================================================
      # VALUE MAPS REQUERIDOS
      # ====================================================================
      valuemaps:
        - uuid: b004505af7124d30aa399c05c49de74e
          name: 'Dell OME Status'
          mappings:
            - value: '1000'
              newvalue: OK
            - value: '2000'
              newvalue: Warning
            - value: '3000'
              newvalue: Critical
            - value: '4000'
              newvalue: Unknown
            - value: '5000'
              newvalue: Error
        - uuid: 18d47911463447f0a60147e124f14f50
          name: 'Dell OME ManagedState'
          mappings:
            - value: '1000'
