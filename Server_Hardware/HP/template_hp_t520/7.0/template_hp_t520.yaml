zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: e960332b3f6c46a1956486d4f3f99fce
      name: 'Templates/Server hardware'
  templates:
    - uuid: 61af9d380f7a4ab08014e5790a123cbc
      template: 'HP t520 hardware sensors'
      name: 'HP t520 hardware sensors'
      groups:
        - name: 'Templates/Server hardware'
      items:
        - uuid: 4864c69fc01c4f90a1411790cddfe007
          name: 'Power usage'
          type: ZABBIX_ACTIVE
          key: 'sensor[fam15h_power-pci-00c4,power1]'
          value_type: FLOAT
          units: W
          tags:
            - tag: scope
              value: sensors
          triggers:
            - uuid: 6ea852f834904ce7ac138f730dace43f
              expression: 'last(/HP t520 hardware sensors/sensor[fam15h_power-pci-00c4,power1],#1)>=5.991'
              name: 'Power usage: Power usage is above critical threshold'
              priority: HIGH
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: sensors
        - uuid: 160118acfa2f40b0a5c1056c98a0bb8a
          name: 'CPU temperature'
          type: ZABBIX_ACTIVE
          key: 'sensor[k10temp-pci-00c3,temp1]'
          value_type: FLOAT
          units: °C
          tags:
            - tag: scope
              value: sensors
          triggers:
            - uuid: 560f930a357c4c29ad4fbaea1efe83c6
              expression: 'last(/HP t520 hardware sensors/sensor[k10temp-pci-00c3,temp1],#1)>=105.000'
              name: 'CPU Temp: Temperature is above critical threshold'
              priority: HIGH
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: sensors
        - uuid: d3cd531b6a234c27a607824fcaf420a5
          name: 'GPU temperature'
          type: ZABBIX_ACTIVE
          key: 'sensor[radeon-pci-0008,temp1]'
          value_type: FLOAT
          units: °C
          tags:
            - tag: scope
              value: sensors
          triggers:
            - uuid: fc8d82ac60db4333941b39186ff37acc
              expression: 'last(/HP t520 hardware sensors/sensor[radeon-pci-0008,temp1],#1)>=120.000'
              name: 'GPU Temp: Temperature is above critical threshold'
              priority: HIGH
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: sensors
      tags:
        - tag: scope
          value: sensors
