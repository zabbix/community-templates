zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 7f090c72c93c4c5ca4010fa0601fc160
      name: Templates/Environment
  templates:
    - uuid: 8bf5acad14bf4e46acb1cde384404944
      template: 'Kentix Devices by SNMP'
      name: 'Kentix Devices by SNMP'
      description: |
        Universal SNMP template for Kentix devices based on the official KENTIXDEVICES SMIv2 MIB.
        All pollable scalar objects and all MIB tables are represented. Unsupported tables simply discover no rows.
        Measurement scaling is controlled by host macros because Zabbix preprocessing cannot read a multiplier from another item dynamically.
        Logbook discoveries and SNMP trap items are included but disabled by default.
        Only raw current measurement values are scaled by {$KENTIX.SCALE.*} macros; device Min/Max/threshold objects are already returned in engineering units and are not scaled.
      groups:
        - name: Templates/Environment
      items:
        - uuid: 32dbe5762d454828985c81df383d638b
          name: 'Kentix: Alarmstate: Alarmactivpower'
          type: SNMP_AGENT
          snmp_oid: 'KENTIXDEVICES::alarmactivpower.0'
          key: kentix.alarmstate.alarmactivpower
          delay: '{$KENTIX.POLL.INTERVAL}'
          description: |
            Collective alarm for active power.
            MIB object: KENTIXDEVICES::alarmactivpower.
            Syntax: TruthValue; access: read-write.
          valuemap:
            name: 'Kentix Alarm state'
          tags:
            - tag: component
              value: power
            - tag: protocol
              value: snmp
            - tag: vendor
              value: kentix
          triggers:
            - uuid: 26a89766919c45d7b7c8654c822b41bf
              expression: 'last(/Kentix Devices by SNMP/kentix.alarmstate.alarmactivpower)=1'
              name: 'Kentix: Alarmactivpower'
              priority: AVERAGE
              description: 'Kentix reports an active alarm through KENTIXDEVICES::alarmactivpower.'
              tags:
                - tag: component
                  value: power
                - tag: protocol
                  value: snmp
                - tag: scope
                  value: device
                - tag: vendor
                  value: kentix
        - uuid: d00c0ec91a8f44e89ad04092b3c23e0c
