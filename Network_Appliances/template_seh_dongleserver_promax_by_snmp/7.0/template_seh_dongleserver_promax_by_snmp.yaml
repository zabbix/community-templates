        - uuid: 7db2da15eb8d4c2c806e2c231b0a9b13
          name: 'Current Firmware Numeric Version'
          type: CALCULATED
          key: seh.fw.numeric
          delay: 1h
          params: |
            last(//seh.fw.major)*100000+
            last(//seh.fw.release)*1000+
            last(//seh.fw.subrelease)
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '86400'
        - uuid: 28f8fec09719480f8a65027e704d1d88
