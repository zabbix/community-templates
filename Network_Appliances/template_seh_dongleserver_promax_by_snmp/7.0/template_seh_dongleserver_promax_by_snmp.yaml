        - uuid: e03c51dc0e6746dcb9cd127e9c0d6382
          name: 'System Uptime'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.3.0
          key: seh.sys.uptime
          delay: 30s
          trends: '0'
          units: uptime
          description: 'SEH System Uptime'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          triggers:
            - uuid: 91737002f99143519fd1316972191513
              expression: 'nodata(/SEH Dongle Server ProMAX by SNMP/seh.sys.uptime,5m)=1'
              name: 'No SNMP data collection'
              priority: HIGH
              description: |
                SNMP polling failed for SEH Dongle Server ProMAX.
                
                Possible causes:
                - Device unreachable
                - SNMP service stopped
                - Wrong SNMP credentials
                - Network connectivity issue
            - uuid: d52f4864d5394cfe8cbc4f9850ef1d26
              expression: 'last(/SEH Dongle Server ProMAX by SNMP/seh.sys.uptime)<10m'
              name: '{HOST.NAME} has been restarted'
              event_name: '{HOST.NAME} has been restarted (uptime < 10m)'
              priority: AVERAGE
              manual_close: 'YES'
        - uuid: d9cb546fb1564dfb9907e98fa4a64783
