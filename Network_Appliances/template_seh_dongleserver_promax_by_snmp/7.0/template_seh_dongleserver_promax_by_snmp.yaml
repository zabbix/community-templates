          triggers:
            - uuid: e22c2184a1b94c1b940fc708896f9cfd
              expression: 'avg(/SEH Dongle Server ProMAX by SNMP/seh.temp.phy2,5m)> {$SEH.PHY.TEMP.CRIT}'
              name: 'PHY2 Temperature is above critical threshold'
              event_name: 'PHY2 Temperature is above critical threshold: >{$SEH.PHY.TEMP.CRIT}°C'
              priority: HIGH
            - uuid: 2982af3a8fcd49c4a631614495166daa
              expression: 'avg(/SEH Dongle Server ProMAX by SNMP/seh.temp.phy2,5m)> {$SEH.PHY.TEMP.WARN}'
              name: 'PHY2 Temperature is above warning threshold'
              event_name: 'PHY2 Temperature is above warning threshold: >{$SEH.PHY.TEMP.WARN}°C'
              priority: WARNING
              dependencies:
                - name: 'PHY2 Temperature is above critical threshold'
                  expression: 'avg(/SEH Dongle Server ProMAX by SNMP/seh.temp.phy2,5m)> {$SEH.PHY.TEMP.CRIT}'
        - uuid: ea1b7ec9fc3f44aea193ed7f039506ea
          name: 'Connected USB Devices Count'
          type: CALCULATED
          key: seh.usb.connected.count
          params: 'count(last_foreach(/*/seh.usb.status[*]),"gt",0)'
          triggers:
            - uuid: a2893399aa544b1f80629d1a8abef20a
              expression: 'last(/SEH Dongle Server ProMAX by SNMP/seh.usb.connected.count)=0'
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'last(/SEH Dongle Server ProMAX by SNMP/seh.usb.connected.count)>0'
              name: 'No USB devices connected'
              priority: INFO
        - uuid: 1c98992b94264708813659aed5664549
          name: 'Total USB Ports'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.1229.5.10.1.0
          key: seh.usb.total
          delay: 1d
          description: 'Number of entries in the UTN port table.'
          preprocessing:
            - type: DISCARD_UNCHANGED
              parameters:
                - ''
        - uuid: 11c2de03c0bd40c49ba69622b78f5b8b
          name: 'UTN Port'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.1229.2.1.35.0
          key: seh.utn.port
          delay: 1h
          description: 'SEH UTN Port'
          preprocessing:
            - type: DISCARD_UNCHANGED
              parameters:
                - ''
        - uuid: bc1b3a7ecfe44fdeb382107e01e488de
          name: 'UTN SSL Port'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.1229.2.1.45.0
          key: seh.utnssl.port
          delay: 1h
          description: 'SEH UTN SSL Port'
          preprocessing:
            - type: DISCARD_UNCHANGED
              parameters:
                - ''
      discovery_rules:
        - uuid: e723c111c4854a898bbfb207832ec7b1
          name: 'Network Interface Discovery'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.2.2.1.1,1.3.6.1.2.1.2.2.1.2,1.3.6.1.2.1.2.2.1.3,1.3.6.1.2.1.2.2.1.4,1.3.6.1.2.1.2.2.1.5,1.3.6.1.2.1.2.2.1.7,1.3.6.1.2.1.2.2.1.8,1.3.6.1.2.1.2.2.1.10,1.3.6.1.2.1.2.2.1.13,1.3.6.1.2.1.2.2.1.14,1.3.6.1.2.1.2.2.1.16,1.3.6.1.2.1.2.2.1.19,1.3.6.1.2.1.2.2.1.20]'
          key: seh.net.if.discovery
          delay: 1h
          item_prototypes:
            - uuid: d139580537934b679a46f904a874fc45
              name: 'Interface {#IFINDEX}({#IFDESC}): Admin status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.7.{#SNMPINDEX}'
              key: 'seh.net.if.admin.status[{#SNMPINDEX}]'
              description: |
                The desired state of the interface.  The
                testing(3) state indicates that no operational
                packets can be passed.
              valuemap:
                name: IF-Admin-Status-Mapping
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
            - uuid: fcf9aa86b56e4509b748b87b874ae694
              name: 'Interface {#IFINDEX}({#IFDESC}): Inbound packets discarded'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.13.{#SNMPINDEX}'
              key: 'seh.net.if.in.discards[{#SNMPINDEX}]'
              description: |
                The number of inbound packets which were chosen
                to be discarded even though no errors had been
                detected to prevent their being deliverable to a
                higher-layer protocol.  One possible reason for
                discarding such a packet could be to free up
                buffer space.
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
            - uuid: 336a1a8252244f6786f93b369d4503e2
              name: 'Interface {#IFINDEX}({#IFDESC}): Inbound packets with errors'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.14.{#SNMPINDEX}'
              key: 'seh.net.if.in.errors[{#SNMPINDEX}]'
              description: |
                The number of inbound packets that contained
                errors preventing them from being deliverable to a
                higher-layer protocol.
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              trigger_prototypes:
                - uuid: 1ea311105cf040d8a8958fcd3e35b8dc
                  expression: 'min(/SEH Dongle Server ProMAX by SNMP/seh.net.if.in.errors[{#SNMPINDEX}],5m)>{$SEH.IF.ERRORS.WARN}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'max(/SEH Dongle Server ProMAX by SNMP/seh.net.if.in.errors[{#SNMPINDEX}],5m)<{$SEH.IF.ERRORS.WARN}*0.8'
                  name: 'Interface {#IFINDEX}({#IFDESC}): High input error rate'
                  event_name: 'Interface {#IFINDEX}({#IFDESC}): High input error rate ( > {$SEH.IF.ERRORS.WARN} for 5m)'
                  opdata: 'errors in: {ITEM.LASTVALUE}'
                  priority: WARNING
                  description: 'It recovers when it goes below 80% of the {$SEH.IF.ERRORS.WARN} threshold.'
                  dependencies:
                    - name: 'Interface {#IFINDEX}({#IFDESC}): Link down'
                      expression: |
                        last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.admin.status[{#SNMPINDEX}])=1
                        and
                        last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.oper.status[{#SNMPINDEX}])<>1
            - uuid: 99ff3387a7fe493989f74e5c32e62c85
              name: 'Interface {#IFINDEX}({#IFDESC}): Bits received'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.10.{#SNMPINDEX}'
              key: 'seh.net.if.in[{#SNMPINDEX}]'
              units: bps
              description: 'The total number of octets received on the interface, including framing characters.'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
            - uuid: aca7a57320a744539eb26230941a7c23
              name: 'Interface {#IFINDEX}({#IFDESC}): MTU'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.4.{#SNMPINDEX}'
              key: 'seh.net.if.mtu[{#SNMPINDEX}]'
              description: |
                The size of the largest datagram which can be
                sent/received on the interface, specified in
                octets.  For interfaces that are used for
                transmitting network datagrams, this is the size
                of the largest network datagram that can be sent
                on the interface.
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
            - uuid: b3b79a8da0154dce8b0b43e8848a30a4
              name: 'Interface {#IFINDEX}({#IFDESC}): Operational status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}'
              key: 'seh.net.if.oper.status[{#SNMPINDEX}]'
              description: |
                The current operational state of the interface.
                The testing(3) state indicates that no operational
                packets can be passed.
              valuemap:
                name: IF-Operational-Status-Mapping
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
            - uuid: 893ad578fd4847e6a00186a5cc271728
              name: 'Interface {#IFINDEX}({#IFDESC}): Outbound packets discarded'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.19.{#SNMPINDEX}'
              key: 'seh.net.if.out.discards[{#SNMPINDEX}]'
              description: |
                The number of outbound packets which were chosen
                to be discarded even though no errors had been
                detected to prevent their being deliverable to a
                higher-layer protocol.  One possible reason for
                discarding such a packet could be to free up
                buffer space.
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
            - uuid: 2ee62a36597949cba5903d5cf181da0b
              name: 'Interface {#IFINDEX}({#IFDESC}): Outbound packets with errors'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.20.{#SNMPINDEX}'
              key: 'seh.net.if.out.errors[{#SNMPINDEX}]'
              description: |
                The number of outbound packets that could not be
                transmitted because of errors.
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              trigger_prototypes:
                - uuid: 22d8a96a681147a0971f4ac6dbecbb84
                  expression: 'min(/SEH Dongle Server ProMAX by SNMP/seh.net.if.out.errors[{#SNMPINDEX}],5m)>{$SEH.IF.ERRORS.WARN}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'max(/SEH Dongle Server ProMAX by SNMP/seh.net.if.out.errors[{#SNMPINDEX}],5m)<{$SEH.IF.ERRORS.WARN}*0.8'
                  name: 'Interface {#IFINDEX}({#IFDESC}): High output error rate'
                  event_name: 'Interface {#IFINDEX}({#IFDESC}): High output error rate ( > {$SEH.IF.ERRORS.WARN} for 5m)'
                  opdata: 'errors in: {ITEM.LASTVALUE}'
                  priority: WARNING
                  description: 'It recovers when it goes below 80% of the {$SEH.IF.ERRORS.WARN} threshold.'
                  dependencies:
                    - name: 'Interface {#IFINDEX}({#IFDESC}): Link down'
                      expression: |
                        last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.admin.status[{#SNMPINDEX}])=1
                        and
                        last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.oper.status[{#SNMPINDEX}])<>1
            - uuid: 752c650b873a42438f1fc450a4a44c5e
              name: 'Interface {#IFINDEX}({#IFDESC}): Bits sent'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.16.{#SNMPINDEX}'
              key: 'seh.net.if.out[{#SNMPINDEX}]'
              units: bps
              description: 'The total number of octets transmitted out of the interface, including framing characters.'
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
            - uuid: 262ebc3acb5e4c9595155cc7c4acb1ef
              name: 'Interface {#IFINDEX}({#IFDESC}): Speed'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.5.{#SNMPINDEX}'
              key: 'seh.net.if.speed[{#SNMPINDEX}]'
              units: bps
              description: |
                An estimate of the interface's current bandwidth
                in bits per second.  For interfaces which do not
                vary in bandwidth or for those where no accurate
                estimation can be made, this object should contain
                the nominal bandwidth.
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
            - uuid: 94c22106601d4c01b7ee2382ec7d0bd3
              name: 'Interface {#IFINDEX}({#IFDESC}): Interface type'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.3.{#SNMPINDEX}'
              key: 'seh.net.if.type[{#SNMPINDEX}]'
              description: |
                The type of interface, distinguished according to
                the physical/link protocol(s) immediately `below'
                the network layer in the protocol stack.
              valuemap:
                name: IF-Type-Mapping
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
          trigger_prototypes:
            - uuid: de7894b2193e44eda13132c27924272c
              expression: |
                (avg(/SEH Dongle Server ProMAX by SNMP/seh.net.if.in[{#SNMPINDEX}],15m)>({$SEH.IF.UTIL.MAX}/100)*last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.speed[{#SNMPINDEX}])) and
                last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.speed[{#SNMPINDEX}])>0
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                avg(/SEH Dongle Server ProMAX by SNMP/seh.net.if.in[{#SNMPINDEX}],15m)
                <
                (({$SEH.IF.UTIL.MAX}-3)/100) *
                last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.speed[{#SNMPINDEX}])
              name: 'Interface {#IFINDEX}({#IFDESC}): High inbound bandwidth usage'
              event_name: 'Interface {#IFINDEX}({#IFDESC}): High inbound bandwidth usage ( > {$SEH.IF.UTIL.MAX}% )'
              opdata: 'Out: {ITEM.LASTVALUE1}, speed: {ITEM.LASTVALUE2}'
              priority: WARNING
              description: 'The utilization of the network interface is close to its estimated maximum bandwidth.'
              dependencies:
                - name: 'Interface {#IFINDEX}({#IFDESC}): Link down'
                  expression: |
                    last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.admin.status[{#SNMPINDEX}])=1
                    and
                    last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.oper.status[{#SNMPINDEX}])<>1
            - uuid: 10dc4ef254a34346ace7b9c78bd33dc6
              expression: |
                (avg(/SEH Dongle Server ProMAX by SNMP/seh.net.if.out[{#SNMPINDEX}],15m)>({$SEH.IF.UTIL.MAX}/100)*last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.speed[{#SNMPINDEX}])) and
                last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.speed[{#SNMPINDEX}])>0
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                avg(/SEH Dongle Server ProMAX by SNMP/seh.net.if.out[{#SNMPINDEX}],15m)
                <
                (({$SEH.IF.UTIL.MAX}-3)/100) *
                last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.speed[{#SNMPINDEX}])
              name: 'Interface {#IFINDEX}({#IFDESC}): High outbound bandwidth usage'
              event_name: 'Interface {#IFINDEX}({#IFDESC}): High outbound bandwidth usage ( > {$SEH.IF.UTIL.MAX}% )'
              opdata: 'Out: {ITEM.LASTVALUE1}, speed: {ITEM.LASTVALUE2}'
              priority: WARNING
              description: 'The utilization of the network interface is close to its estimated maximum bandwidth.'
              dependencies:
                - name: 'Interface {#IFINDEX}({#IFDESC}): Link down'
                  expression: |
                    last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.admin.status[{#SNMPINDEX}])=1
                    and
                    last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.oper.status[{#SNMPINDEX}])<>1
            - uuid: ebb747419a674cb09624e9de9d58ce3d
              expression: |
                last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.admin.status[{#SNMPINDEX}])=1
                and
                last(/SEH Dongle Server ProMAX by SNMP/seh.net.if.oper.status[{#SNMPINDEX}])<>1
              name: 'Interface {#IFINDEX}({#IFDESC}): Link down'
              opdata: 'Admin status: {ITEM.LASTVALUE1}, Operational status: {ITEM.LASTVALUE2}'
              priority: HIGH
              description: 'Alerts only when the interface is supposed to be up but is not operational.'
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - '{#IFINDEX}'
                - 1.3.6.1.2.1.2.2.1.1
                - '0'
                - '{#IFDESC}'
                - 1.3.6.1.2.1.2.2.1.2
                - '0'
                - '{#IFTYPE}'
                - 1.3.6.1.2.1.2.2.1.3
                - '0'
                - '{#IFMTU}'
                - 1.3.6.1.2.1.2.2.1.4
                - '0'
                - '{#IFSPEED}'
                - 1.3.6.1.2.1.2.2.1.5
                - '0'
                - '{#IFADMINSTATUS}'
                - 1.3.6.1.2.1.2.2.1.7
                - '0'
                - '{#IFOPERSTATUS}'
                - 1.3.6.1.2.1.2.2.1.8
                - '0'
                - '{#IFINOCTETS}'
                - 1.3.6.1.2.1.2.2.1.10
                - '0'
                - '{#IFINDISCARDS}'
                - 1.3.6.1.2.1.2.2.1.13
                - '0'
                - '{#IFINERRORS}'
                - 1.3.6.1.2.1.2.2.1.14
                - '0'
                - '{#IFOUTOCTETS}'
                - 1.3.6.1.2.1.2.2.1.16
                - '0'
                - '{#IFOUTDISCARDS}'
                - 1.3.6.1.2.1.2.2.1.19
                - '0'
                - '{#IFOUTERRORS}'
                - 1.3.6.1.2.1.2.2.1.20
                - '0'
        - uuid: d627923e3d894ab7be8aab8048987870
          name: 'USB Port Discovery'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.1229.5.20.2.1.2,1.3.6.1.4.1.1229.5.20.2.1.3,1.3.6.1.4.1.1229.5.20.2.1.7,1.3.6.1.4.1.1229.5.20.2.1.8]'
          key: seh.usb.port.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#PORT}'
                value: '{$SEH.PORT.MATCHES}'
                formulaid: A
              - macro: '{#PORT}'
                value: '{$SEH.PORT.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
          lifetime_type: DELETE_NEVER
          lifetime: '0'
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: b09f48bef77546d09f7ac69e73abdfb8
              name: 'USB {#DISPLAYPORT} Connected Host'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.1229.5.20.2.1.7.{#SNMPINDEX}'
              key: 'seh.usb.host[{#SNMPINDEX}]'
              value_type: TEXT
              trends: '0'
              trigger_prototypes:
                - uuid: 072876d592344cf183fa96fb6c1a888e
                  expression: 'find(/SEH Dongle Server ProMAX by SNMP/seh.usb.host[{#SNMPINDEX}], #1, "regexp","^Available$")=1'
                  name: 'USB Not Connected to any UTN Manager on Port {#PORT}'
                  priority: WARNING
                  description: 'USB exists but no host is connected.'
            - uuid: ecdc108e504a4425beb5d78b3b8c4df0
              name: 'USB {#DISPLAYPORT} Manufacturer'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.1229.5.20.2.1.2.{#SNMPINDEX}'
              key: 'seh.usb.manufacturer[{#SNMPINDEX}]'
              value_type: TEXT
              trends: '0'
            - uuid: 0d172e839b82472a90a873e5c6c9d210
              name: 'USB {#DISPLAYPORT} Product'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.1229.5.20.2.1.3.{#SNMPINDEX}'
              key: 'seh.usb.product[{#SNMPINDEX}]'
              value_type: TEXT
              trends: '0'
            - uuid: 1324615c80a34a90bc69d4c21bfa21ed
              name: 'USB {#DISPLAYPORT} Status'
              type: DEPENDENT
              key: 'seh.usb.status[{#SNMPINDEX}]'
              delay: '0'
              valuemap:
                name: Port-Status-Mapping
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      if (value === "-")
                          return 0;
                      
                      if (value === "Available")
                          return 1;
                      
                      return 2;
              master_item:
                key: 'seh.usb.host[{#SNMPINDEX}]'
              trigger_prototypes:
                - uuid: 9f5726d691fe4693907e0240ec2da5ae
                  expression: |
                    last(/SEH Dongle Server ProMAX by SNMP/seh.usb.status[{#SNMPINDEX}], #1)=0
                    and
                    last(/SEH Dongle Server ProMAX by SNMP/seh.usb.status[{#SNMPINDEX}], #2)>0
                  name: 'USB Dongle Removed from Port {#PORT}'
                  priority: AVERAGE
                  manual_close: 'YES'
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - '{#PORT}'
                - 1.3.6.1.4.1.1229.5.20.2.1.8
                - '0'
                - '{#MANUFACTURER}'
                - 1.3.6.1.4.1.1229.5.20.2.1.2
                - '0'
                - '{#PRODUCT}'
                - 1.3.6.1.4.1.1229.5.20.2.1.3
                - '0'
                - '{#OWNER}'
                - 1.3.6.1.4.1.1229.5.20.2.1.7
                - '0'
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  
                  data.forEach(function(item) {
                  
                      if (item["{#PORT}"] === "0") {
                          item["{#DISPLAYPORT}"] = "Index " + item["{#SNMPINDEX}"];
                      } else {
                          item["{#DISPLAYPORT}"] = "Port " + item["{#PORT}"];
                      }
                  
                  });
                  
                  return JSON.stringify(data);
      httptests:
        - uuid: 51fe6add46a349bab70f9e038490d088
          name: 'URL Check'
          steps:
            - name: URL_Check
              url: '{$SEH.URL}'
              status_codes: '200'
      macros:
        - macro: '{$SEH.BOX.TEMP.CRIT}'
          value: '60'
          description: 'Internal enclosure temperature, critical threshold (°C)'
        - macro: '{$SEH.BOX.TEMP.WARN}'
          value: '50'
          description: 'Internal enclosure temperature, warning threshold (°C)'
        - macro: '{$SEH.CPU.TEMP.CRIT}'
          value: '85'
          description: 'CPU temperature, critical threshold (°C)'
        - macro: '{$SEH.CPU.TEMP.WARN}'
          value: '75'
          description: 'CPU temperature, warning threshold (°C)'
        - macro: '{$SEH.CPU.UTIL.CRIT}'
          value: '90'
          description: 'CPU utilization, critical threshold (%)'
        - macro: '{$SEH.CPU.UTIL.WARN}'
          value: '80'
          description: 'CPU utilization, warning threshold (%)'
        - macro: '{$SEH.ICMP_LOSS_WARN}'
          value: '20'
          description: 'ICMP packet loss warning threshold (%)'
        - macro: '{$SEH.ICMP_RESPONSE_TIME_WARN}'
          value: '0.15'
          description: 'ICMP response time warning threshold (seconds)'
        - macro: '{$SEH.IF.ERRORS.WARN}'
          value: '2'
          description: 'Interface in/out error rate warning threshold (errors/sec)'
        - macro: '{$SEH.IF.UTIL.MAX}'
          value: '90'
          description: 'Interface bandwidth utilization warning threshold (%)'
        - macro: '{$SEH.MEMORY.UTIL.CRIT}'
          value: '90'
          description: 'Memory utilization, critical threshold (%)'
        - macro: '{$SEH.MEMORY.UTIL.WARN}'
          value: '80'
          description: 'Memory utilization, warning threshold (%)'
        - macro: '{$SEH.PHY.TEMP.CRIT}'
          value: '85'
          description: 'Ethernet transceiver temperature, critical threshold (°C)'
        - macro: '{$SEH.PHY.TEMP.WARN}'
          value: '75'
          description: 'Ethernet transceiver temperature, warning threshold (°C)'
        - macro: '{$SEH.PORT.MATCHES}'
          value: '^.*'
          description: 'Regex to include USB ports from discovery'
        - macro: '{$SEH.PORT.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'Regex to exclude USB ports from discovery'
        - macro: '{$SEH.SNMP.AUTHPRIV_PASSWORD}'
          type: SECRET_TEXT
          description: 'SNMPv3 auth/priv passphrase'
        - macro: '{$SEH.SNMP.USER}'
          value: sehread
          description: 'SNMPv3 username'
        - macro: '{$SEH.URL}'
          value: 'https://seh-dongleserver.promax'
          description: 'URL used by the "URL Check" web scenario'
        - macro: '{$SEH.USB.UTIL.MAX}'
          value: '80'
          description: 'USB port capacity-usage warning threshold (%)'
        - macro: '{$SEH.UTN.PORT}'
          value: '9200'
          description: 'UTN (non-SSL) TCP port checked for availability'
        - macro: '{$SEH.UTNSSL.PORT}'
          value: '9443'
          description: 'UTN SSL TCP port checked for availability'
