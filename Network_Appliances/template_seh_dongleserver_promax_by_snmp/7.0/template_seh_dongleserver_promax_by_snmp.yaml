  triggers:
    - uuid: 2d281f359b7444789436c86c09bb0870
      expression: 'last(/SEH Dongle Server ProMAX by SNMP/seh.usb.connected.count) = last(/SEH Dongle Server ProMAX by SNMP/seh.usb.total)'
      name: 'All USB Ports Occupied'
      priority: HIGH
      manual_close: 'YES'
    - uuid: 81005d9b5f4f4088b713415a2f477b66
      expression: |
        last(/SEH Dongle Server ProMAX by SNMP/seh.fw.numeric)<
        last(/SEH Dongle Server ProMAX by SNMP/seh.fw.latestnumeric)
      name: 'Firmware Update Available'
      event_name: 'Firmware update available: Installed {ITEM.LASTVALUE1}, Latest {ITEM.LASTVALUE2}'
      opdata: 'Installed firmware: {ITEM.LASTVALUE1}, Latest firmware: {ITEM.LASTVALUE2}'
      priority: INFO
      manual_close: 'YES'
    - uuid: 664bf7f012e6443ca9c001ec14b4bbba
      expression: 'min(/SEH Dongle Server ProMAX by SNMP/web.test.fail[URL Check],3m)=1'
      name: 'SEH URL is Down'
      priority: HIGH
    - uuid: e5cf95a54a254040acee2de1cf3f9a80
      expression: |
        (last(/SEH Dongle Server ProMAX by SNMP/seh.usb.connected.count)
        /
        last(/SEH Dongle Server ProMAX by SNMP/seh.usb.total))
        *100
        >= {$SEH.USB.UTIL.MAX}
      name: 'USB port utilization is above {$SEH.USB.UTIL.MAX}%'
      priority: HIGH
