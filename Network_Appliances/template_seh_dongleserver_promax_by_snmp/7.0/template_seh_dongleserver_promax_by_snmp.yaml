        - uuid: e9451ae4ac124ed088330f8693b45bb5
          name: 'Current Firmware Version'
          type: DEPENDENT
          key: seh.fw.currentversion
          delay: '0'
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: REGEX
              parameters:
                - 'version ([0-9]+\.[0-9]+\.[0-9]+)'
                - \1
          master_item:
            key: seh.device.info
        - uuid: ae5a1e75bb8e43b5bdd62dc1d36445c9
          name: 'Latest Firmware Numeric Version'
          type: DEPENDENT
          key: seh.fw.latestnumeric
          delay: '0'
          description: 'Latest Numeric Firmware Version Available'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var p = value.split(".");
                  return parseInt(p[0])*100000 +
                         parseInt(p[1])*1000 +
                         parseInt(p[2]);
          master_item:
            key: seh.fw.latestversion
        - uuid: 8a950df9444542769bf2c48dfce6a430
          name: 'Latest Firmware Version'
          type: DEPENDENT
          key: seh.fw.latestversion
          delay: '0'
          value_type: TEXT
          trends: '0'
          preprocessing:
            - type: REGEX
              parameters:
                - 'Software Version ([0-9]+\.[0-9]+\.[0-9]+)'
                - \1
          master_item:
            key: seh.fw.page
        - uuid: 433bd3aedae7491faef38eac3b24ba34
          name: 'Firmware Major Version'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.1229.2.1.12.0
          key: seh.fw.major
          delay: 1h
          preprocessing:
            - type: DISCARD_UNCHANGED
