zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 4a7239d825044287bba8ed8288975b70
      name: Templates/Network_Appliances
  templates:
    - uuid: 4b67e347f1f441d1b6a8ae7a73e14acf
      template: 'SEH Dongle Server ProMAX by SNMP'
      name: 'SEH Dongle Server ProMAX by SNMP'
      description: 'Monitors SEH Dongle Server Promax by SNMP'
      groups:
        - name: Templates/Network_Appliances
      items:
        - uuid: 85459a56742d45e4899ce86a1444d82c
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          valuemap:
            name: ICMP-Status-Mapping
          triggers:
            - uuid: 107fc2acb2094135865779c974eec0a8
              expression: 'max(/SEH Dongle Server ProMAX by SNMP/icmpping, #3)=0'
              name: '{HOST.NAME} Unavailable by ICMP ping'
              priority: HIGH
              description: 'Last three attempts returned timeout.  Please check device connectivity.'
        - uuid: 9883ebd1246440a9aa0b288638db0113
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          value_type: FLOAT
          units: '%'
          triggers:
            - uuid: 6a584c0784814d45a07a414e53a9ad06
              expression: |
                min(/SEH Dongle Server ProMAX by SNMP/icmppingloss,5m)>{$SEH.ICMP_LOSS_WARN} 
                and 
                min(/SEH Dongle Server ProMAX by SNMP/icmppingloss,5m)<100
              name: 'High ICMP ping loss on {HOST.NAME}'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'Last three attempts returned timeout.  Please check device connectivity.'
              dependencies:
                - name: '{HOST.NAME} Unavailable by ICMP ping'
                  expression: 'max(/SEH Dongle Server ProMAX by SNMP/icmpping, #3)=0'
        - uuid: 780def0665c94a87b5ff35283c82a1e9
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          value_type: FLOAT
          units: s
          valuemap:
            name: ICMP-Status-Mapping
          triggers:
            - uuid: 7133e0913b9b499fa2ae2e849d0f7998
              expression: 'avg(/SEH Dongle Server ProMAX by SNMP/icmppingsec,5m)>{$SEH.ICMP_RESPONSE_TIME_WARN}'
              name: 'High ICMP ping response time on {HOST.NAME}'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'Last three attempts returned timeout.  Please check device connectivity.'
              dependencies:
                - name: 'High ICMP ping loss on {HOST.NAME}'
                  expression: |
                    min(/SEH Dongle Server ProMAX by SNMP/icmppingloss,5m)>{$SEH.ICMP_LOSS_WARN} 
                    and 
                    min(/SEH Dongle Server ProMAX by SNMP/icmppingloss,5m)<100
                - name: '{HOST.NAME} Unavailable by ICMP ping'
                  expression: 'max(/SEH Dongle Server ProMAX by SNMP/icmpping, #3)=0'
        - uuid: e8cef4ccc4154cbb92af9c6db452b4fb
          name: 'TCP Port Check (Port {$SEH.UTN.PORT})'
          type: SIMPLE
          key: 'net.tcp.service[tcp,{HOST.IP},{$SEH.UTN.PORT}]'
          description: 'TCP check of UTN port'
          triggers:
            - uuid: 315df1caf0b94237a9d5a8c3a659f3cc
              expression: 'max(/SEH Dongle Server ProMAX by SNMP/net.tcp.service[tcp,{HOST.IP},{$SEH.UTN.PORT}],3m)=0'
              name: 'Port TCP {$SEH.UTN.PORT} on {HOST.NAME} is Down'
              priority: HIGH
        - uuid: 4d98c50931e44417873e820dbce2af70
          name: 'TCP Port Check (Port {$SEH.UTNSSL.PORT})'
          type: SIMPLE
          key: 'net.tcp.service[tcp,{HOST.IP},{$SEH.UTNSSL.PORT}]'
          description: 'TCP check of UTN SSL port'
          triggers:
            - uuid: cf09504b647845428d59dd65f7bcea58
              expression: 'max(/SEH Dongle Server ProMAX by SNMP/net.tcp.service[tcp,{HOST.IP},{$SEH.UTNSSL.PORT}],3m)=0'
              name: 'Port TCP {$SEH.UTNSSL.PORT} on {HOST.NAME} is Down'
              priority: HIGH
        - uuid: 2d48979ef76f41f8841fde3132598c4a
          name: 'Bonjour Name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.1229.2.6.21.1.10.1.0
          key: seh.bonjour
          delay: 1h
          value_type: TEXT
          trends: '0'
          description: 'SEH Bonjour Name'
          preprocessing:
            - type: DISCARD_UNCHANGED
              parameters:
                - ''
        - uuid: 85f50c740d674ac7b78fecc27f8af9f3
          name: 'CPU Utilization'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.1229.6.1.1.0
          key: seh.cpu.util
          units: '%'
          description: 'This is the current busy average value in percent of all CPUs'
          triggers:
            - uuid: d0c8499a7c254659bc7cf0b39a4e2ba2
              expression: 'avg(/SEH Dongle Server ProMAX by SNMP/seh.cpu.util,5m)> {$SEH.CPU.UTIL.CRIT}'
              name: 'Critical CPU utilization'
              event_name: 'Critical CPU utilization (over {$SEH.CPU.UTIL.CRIT}% for 5m)'
              priority: HIGH
            - uuid: 75a2390748144783938b29f88a13f5ec
              expression: 'avg(/SEH Dongle Server ProMAX by SNMP/seh.cpu.util,5m)> {$SEH.CPU.UTIL.WARN}'
              name: 'High CPU utilization'
              event_name: 'High CPU utilization (over {$SEH.CPU.UTIL.WARN}% for 5m)'
              priority: WARNING
              dependencies:
                - name: 'Critical CPU utilization'
                  expression: 'avg(/SEH Dongle Server ProMAX by SNMP/seh.cpu.util,5m)> {$SEH.CPU.UTIL.CRIT}'
        - uuid: c6ceaf4267504e8ca74594492ec19c49
