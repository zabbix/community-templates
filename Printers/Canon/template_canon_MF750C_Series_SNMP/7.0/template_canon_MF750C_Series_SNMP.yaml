zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 65e6690d98c14a44ad4d2ff89828bd64
      name: Printers
  templates:
    - uuid: cdc908a0f0d84a439b3f3902ee309ea6
      template: 'Canon MF750C Series SNMP'
      name: 'Canon MF750C Series SNMP'
      description: 'Мониторинг Canon MF750C Series по SNMP v2c. Покрывает: тонеры (CMYK), лотки бумаги, статус принтера, сетевые интерфейсы, системную нформацию. Zabbix 7.0+'
      groups:
        - name: Printers
      items:
        - uuid: a753ba5f868d42a0a22967f43e3490ce
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          valuemap:
            name: 'Service state'
          triggers:
            - uuid: 629c29542d544a67aad2d666ab93ba43
              expression: 'max(/Canon MF750C Series SNMP/icmpping,3m)=0'
              name: '{HOST.NAME} is unavailable (ICMP)'
              priority: DISASTER
        - uuid: a4b1080affd145b0b36081207e17874f
          name: 'ICMP packet loss (%)'
          type: SIMPLE
          key: icmppingloss
          value_type: FLOAT
          units: '%'
          triggers:
            - uuid: d32a6b4289f94943bfe397bdeb2a74d1
              expression: 'min(/Canon MF750C Series SNMP/icmppingloss,5m)>20'
              name: '{HOST.NAME}: High packet loss (> 20%)'
              priority: WARNING
              dependencies:
                - name: '{HOST.NAME} is unavailable (ICMP)'
                  expression: 'max(/Canon MF750C Series SNMP/icmpping,3m)=0'
        - uuid: f94081497ddd49799283c4df0bc136e0
          name: 'ICMP ping response time (ms)'
          type: SIMPLE
          key: icmppingsec
          value_type: FLOAT
          units: ms
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1000'
        - uuid: 093ef4f24c5e48838ae54c4f85572282
          name: 'Printer cover status'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.43.6.1.1.3.1.1
          key: printer.cover.status
          description: |
            prtCoverStatus:
            3=coverClosed, 4=coverOpen, 5=interlockClosed, 6=interlockOpen
          valuemap:
            name: prtCoverStatus
          triggers:
            - uuid: 49d9664dc7e647db81936fa87645fe28
              expression: 'last(/Canon MF750C Series SNMP/printer.cover.status)=3'
              name: 'Printer cover is open'
              priority: WARNING
        - uuid: a2b08837ac294ba6979ec7ae2ff334ec
          name: 'Total pages printed'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.43.10.2.1.4.1.1
          key: printer.pages.total
          delay: 15m
          description: 'prtMarkerLifeCount — суммарный счётчик отпечатков'
        - uuid: f4c704c243f447ffa91b5a700bb76a02
          name: 'Printer operational status (Printer MIB)'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.43.16.5.1.2.1.1
          key: printer.state.text
          value_type: CHAR
          trends: '0'
          description: 'Текстовое состояние: sleep, idle, processing и т.д.'
        - uuid: c6bd1cf849a842a98174422949152c87
          name: 'Printer status'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.25.3.2.1.5.1
          key: printer.status
          description: |
            hrDeviceStatus:
            1=unknown, 2=running, 3=warning, 4=testing, 5=down
          valuemap:
            name: hrDeviceStatus
          triggers:
            - uuid: 889c6aed4a434533bd4c2aa00f1bbb6a
              expression: 'last(/Canon MF750C Series SNMP/printer.status)<>2'
              name: 'Printer is not in operational state'
              priority: AVERAGE
              dependencies:
                - name: '{HOST.NAME} is unavailable (ICMP)'
                  expression: 'max(/Canon MF750C Series SNMP/icmpping,3m)=0'
        - uuid: 6e95b93c65694011ab0923a2809593ae
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.1.0
          key: system.descr
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: 'sysDescr — модель и тип устройства'
        - uuid: 0c81cb33a0e646b5a4dd472f4bcabf90
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.5.0
          key: system.name
          delay: 1h
          value_type: CHAR
          trends: '0'
          description: 'System name'
        - uuid: b3267d23cccf43c996b851d7fa0e81f1
          name: Uptime
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.3.0
          key: system.uptime
          delay: 5m
          units: uptime
          description: 'sysUpTime — время работы устройства'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          triggers:
            - uuid: e536ebbd47b2476a81ca367040f97dbb
              expression: 'nodata(/Canon MF750C Series SNMP/system.uptime,10m)=1'
              name: '{HOST.NAME}: No SNMP response'
              priority: HIGH
              dependencies:
                - name: '{HOST.NAME} is unavailable (ICMP)'
                  expression: 'max(/Canon MF750C Series SNMP/icmpping,3m)=0'
      discovery_rules:
        - uuid: 4d73ad4b532a4e759ac72ca1189fb994
          name: 'Toner and Supplies Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#TONER_INDEX},1.3.6.1.2.1.43.11.1.1.3.1,{#TONER_NAME},1.3.6.1.2.1.43.11.1.1.6.1,{#TONER_COLOR},1.3.6.1.2.1.43.12.1.1.4.1]'
          key: toner.discovery
          delay: 1h
          lifetime: 30d
          item_prototypes:
            - uuid: 04eb455a845e4eaf8ac13c8166110907
              name: 'Toner % {#NAME}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.43.11.1.1.9.1.{#TONER_INDEX}'
              key: 'toner.level[{#TONER_COLOR}]'
              delay: 5m
              units: '%'
              description: |
                Текущий уровень тонера в процентах.
                prtMarkerSuppliesLevel / prtMarkerSuppliesMaxCapacity * 100.
                Значение уже в % согласно SNMP-дампу (max=100).
              trigger_prototypes:
                - uuid: 294b3edfa30a4e45ada18c7600bd252d
                  expression: 'last(/Canon MF750C Series SNMP/toner.level[{#TONER_COLOR}])<10'
                  name: 'Toner [{#TONER_NAME}] is low (< 10%)'
                  priority: HIGH
                  dependencies:
                    - name: 'Toner [{#TONER_NAME}] is low (< 20%)'
                      expression: 'last(/Canon MF750C Series SNMP/toner.level[{#TONER_COLOR}])<20'
                - uuid: 2f7a8b7ff0d047a5ac5e277ad2a76379
                  expression: 'last(/Canon MF750C Series SNMP/toner.level[{#TONER_COLOR}])<20'
                  name: 'Toner [{#TONER_NAME}] is low (< 20%)'
                  priority: WARNING
                  description: 'Уровень тонера {#TONER_NAME} ниже 20% — подготовить замену'
                - uuid: 0995567a0a374f85aed82989ea39b1cb
                  expression: 'last(/Canon MF750C Series SNMP/toner.level[{#TONER_COLOR}])=0'
                  name: 'Toner [{#TONER_NAME}] is low (= 0%)'
                  priority: DISASTER
                  dependencies:
                    - name: 'Toner [{#TONER_NAME}] is low (< 10%)'
                      expression: 'last(/Canon MF750C Series SNMP/toner.level[{#TONER_COLOR}])<10'
            - uuid: 1905d1fd41c14f92a124902a5cac0840
              name: 'Toner capacity {#NAME}'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.43.11.1.1.8.1.{#TONER_INDEX}'
              key: 'toner.max[{#TONER_COLOR}]'
              delay: 1h
              description: prtMarkerSuppliesMaxCapacity
          graph_prototypes:
            - uuid: f2ac80cd1c1f4dd1aec71fd0bcfe244e
              name: 'Toner [{#TONER_NAME}] — level (%)'
              graph_items:
                - color: 199C0D
                  calc_fnc: ALL
                  item:
                    host: 'Canon MF750C Series SNMP'
                    key: 'toner.level[{#TONER_COLOR}]'
      valuemaps:
        - uuid: cd61765979d34016af3deb552c40dd2e
          name: hrDeviceStatus
          mappings:
            - value: '1'
              newvalue: unknown
            - value: '2'
              newvalue: running
            - value: '3'
              newvalue: warning
            - value: '4'
              newvalue: testing
            - value: '5'
              newvalue: down
        - uuid: 42ef0d64814c4239aaa656f66e4aa1d9
          name: ifOperStatus
          mappings:
            - value: '1'
              newvalue: up
            - value: '2'
              newvalue: down
            - value: '3'
              newvalue: testing
            - value: '4'
              newvalue: unknown
            - value: '5'
              newvalue: dormant
            - value: '6'
              newvalue: notPresent
            - value: '7'
              newvalue: lowerLayerDown
        - uuid: 45861bf147f54f3988466efbe7c342e9
          name: prtCoverStatus
          mappings:
            - value: '3'
              newvalue: coverOpen
            - value: '4'
              newvalue: coverClosed
            - value: '5'
              newvalue: interlockClosed
            - value: '6'
              newvalue: interlockOpen
        - uuid: c5dbfefbf6884d629515a2edd6ca5a32
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: Down
            - value: '1'
              newvalue: Up
