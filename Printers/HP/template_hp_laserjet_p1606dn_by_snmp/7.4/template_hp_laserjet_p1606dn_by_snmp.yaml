zabbix_export:
  version: '7.4'
  template_groups:
  - uuid: 7df96b18c230490a9a0a9e2307226338
    name: Templates
  templates:
  - uuid: a6abae7916f64319b0823c751bce97d7
    template: HP LaserJet P1606dn by SNMP
    name: HP LaserJet P1606dn by SNMP
    description: 'Community template for monitoring HP LaserJet Professional P1606dn printers over SNMPv2.


      The template collects printer status, error state, toner metrics, page counters, TCP print port availability, web administration availability, network traffic
      metrics, graphs, triggers, and a host dashboard.


      Tested with:

      - Zabbix 7.4

      - HP LaserJet Professional P1606dn

      - SNMPv2

      - Zabbix Proxy in the same LAN as the printer


      Notes:

      - This template is focused on HP LaserJet Professional P1606dn.

      - Several OIDs use fixed indexes and may require adjustment for other printer models.

      - No external scripts are required.


      Author: TyranR'
    vendor:
      name: TyranR
      version: '1.0'
    groups:
    - name: Templates
    items:
    - uuid: 1d94d7c18182491fb47507d9d6870b7a
      name: Web interface availability
      type: SIMPLE
      key: net.tcp.service[http,,{$PRINTER_WEB_PORT}]
      trends: '0'
      valuemap:
        name: Web interface availability
      tags:
      - tag: component
        value: web
      triggers:
      - uuid: 2ee41de9114a4d99a0f003e24509da6f
        expression: last(/HP LaserJet P1606dn by SNMP/net.tcp.service[http,,{$PRINTER_WEB_PORT}])=0
        name: Printer web interface is unavailable
        priority: WARNING
        tags:
        - tag: component
          value: web
        - tag: scope
          value: availability
    - uuid: 122c49fcd4024a9b8068dfa0977d9970
      name: Print port availability
      type: SIMPLE
      key: net.tcp.service[tcp,,{$PRINTER_PRINT_PORT}]
      trends: '0'
      valuemap:
        name: Web interface availability
      tags:
      - tag: component
        value: print
      triggers:
      - uuid: 8098b2400f6c432d959acd343dd7f7b4
        expression: last(/HP LaserJet P1606dn by SNMP/net.tcp.service[tcp,,{$PRINTER_PRINT_PORT}])=0
        name: Printer TCP print port is unavailable
        priority: WARNING
        tags:
        - tag: component
          value: print
        - tag: scope
          value: availability
    - uuid: 8f85c522f65d483c8998f98dd84145a1
      name: Cartridge color
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.43.12.1.1.4.1.1
      key: printer.cartridge.color
      delay: 1d
      value_type: CHAR
      tags:
      - tag: component
        value: toner
    - uuid: 5532dd91a0e64797a58c03d5106ce9a5
      name: Cartridge name
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.43.11.1.1.6.1.1
      key: printer.cartridge.name
      delay: 1d
      value_type: CHAR
      tags:
      - tag: component
        value: toner
    - uuid: 592103fc8c78427699438705d0a0d05a
      name: Printer error state
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.25.3.5.1.2.1
      key: printer.error
      value_type: CHAR
      tags:
      - tag: component
        value: system
      triggers:
      - uuid: 100ea5077642424e9688651ca57bb208
        expression: last(/HP LaserJet P1606dn by SNMP/printer.error)<>"00"
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: last(/HP LaserJet P1606dn by SNMP/printer.error)="00"
        name: Printer reports an error state
        priority: WARNING
        tags:
        - tag: component
          value: system
        - tag: scope
          value: availability
    - uuid: 1417cc653b454c478bd1a7e421cc0b89
      name: Printer MAC address
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.2.2.1.6.2
      key: printer.mac.address
      delay: 1d
      value_type: CHAR
      tags:
      - tag: component
        value: network
    - uuid: 516794d4b57948b1906a1b5938b050a9
      name: Printer model
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.25.3.2.1.3.1
      key: printer.model
      delay: 1d
      value_type: CHAR
      tags:
      - tag: component
        value: system
    - uuid: 009f70d78f424e6e9636039f85aabe63
      name: Printer name
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.1.5.0
      key: printer.name
      delay: 1d
      value_type: CHAR
      tags:
      - tag: component
        value: system
    - uuid: 377fe2ea1bd842b085b00ac780fd7313
      name: Network traffic incoming
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.2.2.1.10.2
      key: printer.net.if.in
      units: bps
      preprocessing:
      - type: CHANGE_PER_SECOND
      - type: MULTIPLIER
        parameters:
        - '8'
      tags:
      - tag: component
        value: network
    - uuid: 95600947ac114e16b3676df56048d141
      name: Network traffic outgoing
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.2.2.1.16.2
      key: printer.net.if.out
      units: bps
      preprocessing:
      - type: CHANGE_PER_SECOND
      - type: MULTIPLIER
        parameters:
        - '8'
      tags:
      - tag: component
        value: network
    - uuid: af353632414240aeadf15ae1606c87ae
      name: Pages printed in last 7d
      type: CALCULATED
      key: printer.pages.last7d
      delay: 1h
      units: pages
      params: max(//printer.pages.total,7d)-min(//printer.pages.total,7d)
      tags:
      - tag: component
        value: print
    - uuid: 7690522499cc492291e91de972ce9967
      name: Pages printed in last 24h
      type: CALCULATED
      key: printer.pages.last24h
      delay: 1h
      units: pages
      params: max(//printer.pages.total,1d)-min(//printer.pages.total,1d)
      tags:
      - tag: component
        value: print
    - uuid: 4b7c25ca3ce4465889a66ceaa368846c
      name: Pages printed in last 30d
      type: CALCULATED
      key: printer.pages.last30d
      delay: 1h
      units: pages
      params: max(//printer.pages.total,30d)-min(//printer.pages.total,30d)
      tags:
      - tag: component
        value: print
    - uuid: be251ba780684f4bb41ac769e5a91c2a
      name: Printed pages total
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.43.10.2.1.4.1.1
      key: printer.pages.total
      delay: 1h
      history: 90d
      tags:
      - tag: component
        value: print
    - uuid: 5aab571df3524070abb68065d5b44ff2
      name: Printer status
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.25.3.5.1.1.1
      key: printer.status
      trends: '0'
      valuemap:
        name: Printer status
      tags:
      - tag: component
        value: system
    - uuid: 30366c9dbd404359a499e70488364cd7
      name: Toner level
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.43.11.1.1.9.1.1
      key: printer.toner.level
      delay: 1h
      units: '%'
      tags:
      - tag: component
        value: toner
      triggers:
      - uuid: 813c0dcfb92b4b1d8395ecd5963a9eac
        expression: last(/HP LaserJet P1606dn by SNMP/printer.toner.level)<={$PRINTER_TONER_LOW_INFO}
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: last(/HP LaserJet P1606dn by SNMP/printer.toner.level)>{$PRINTER_TONER_RECOVERY_INFO}
        name: Printer toner level is low
        priority: INFO
        tags:
        - tag: component
          value: toner
        - tag: scope
          value: capacity
    - uuid: 9f06ebb291284eec9e3f3e8b7ed2047e
      name: Toner max capacity
      type: SNMP_AGENT
      snmp_oid: 1.3.6.1.2.1.43.11.1.1.8.1.1
      key: printer.toner.max_capacity
      delay: 1d
      trends: '0'
      units: '%'
      tags:
      - tag: component
        value: toner
    - uuid: f1768f9d653c4df2823606c6bf4c6ce7
      name: Pages printed on current toner
      type: CALCULATED
      key: printer.toner.pages.current
      delay: 1h
      history: 365d
      trends: 730d
      units: pages
      params: last(//printer.pages.total)-{$PRINTER_TONER_START_PAGES}
      tags:
      - tag: component
        value: toner
    - uuid: b84e0cd50a52435baad7384b0795ce25
      name: Max pages per toner observed
      type: CALCULATED
      key: printer.toner.pages.max_observed
      delay: 1h
      history: 365d
      trends: 730d
      units: pages
      params: max(//printer.toner.pages.current,365d)
      tags:
      - tag: component
        value: toner
    httptests:
    - uuid: 69b0fadbbd354e3aba9e43bcaa7f959f
      name: Printer admin page
      steps:
      - name: Open admin page
        url: http://{HOST.CONN}:{$PRINTER_WEB_PORT}{$PRINTER_WEB_PATH}
        timeout: '{$PRINTER_WEB_TIMEOUT}'
        status_codes: '200'
      tags:
